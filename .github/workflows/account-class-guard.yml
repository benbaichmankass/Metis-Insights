name: Account class guard

# Fails the PR check when an account in config/accounts.yaml is missing
# `account_class` (the paper/real funding category) or sets a value that
# contradicts the Bybit-only `demo` transport flag.
#
# Motivation: account_class is the single source of truth for the
# paper-vs-real-money reporting axis (trades.account_class → the
# dashboard/Android `accountClass` field → every "real-money only"
# aggregate). A missing or inconsistent value silently mis-attributes
# paper trades as real money (the pre-2026-06-15 ib_paper bug), so the
# invariant is frozen in CI.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# NOT a required status check (not in branch-protection-sync.yml's
# REQUIRED_CONTEXTS), so it's safe to trigger-filter with `paths:` —
# the job never even queues on a PR that doesn't touch the file it
# validates.

on:
  pull_request:
    branches: [main]
    paths:
      - "config/accounts.yaml"
      - "scripts/check_account_class.py"
      - ".github/workflows/account-class-guard.yml"

permissions:
  contents: read

jobs:
  account-class-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run guard
        run: python scripts/check_account_class.py --list
