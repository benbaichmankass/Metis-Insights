name: crypto-signals-backfill

# M29 — reconstruct HISTORICAL point-in-time crypto derivatives-positioning snapshots
# (BTC/ETH/SOL funding-rate / open-interest / perp-spot basis, valuation-snapshot
# schema) off Bybit's keyless public v5 API, run the M28 P4 gate + horizon-IC scan
# over them (short horizons), and land the snapshots + both scorecards on main.
# Because the sleeve emits the SAME snapshot schema as the value/COT sleeves, the P4
# gate + horizon-IC scan grade it UNCHANGED. The backfill writes the Bybit SPOT
# candle CSVs itself (the same fetch that computes the basis), so no separate candle
# fetch is needed.
#
# One-shot / occasional. Runs entirely off-VM on a GitHub-hosted runner (Bybit public
# API is keyless; ICT_OFFVM_BUILD_HOST=1 gates the guarded fetchers). No SSH, no
# live-VM touch, no order path.
#
# Lands on protected main via the shared ./.github/actions/commit-to-main (PAT
# auto-merge PR). Candle CSVs are regenerated each run and NOT committed; only the
# reconstructed snapshots + the scorecards land.
#
# Triggers:
#   1. workflow_dispatch — operator "Run workflow" (lookback override).
#   2. issues.opened w/ label `crypto-signals-backfill-now` — Claude-driven.

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Rolling percentile window (days)"
        required: false
        default: "90"
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: crypto-signals-backfill
  cancel-in-progress: false

jobs:
  backfill:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.login == github.repository_owner &&
       contains(github.event.issue.labels.*.name, 'crypto-signals-backfill-now'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip "pyyaml>=6.0"

      - name: Reconstruct crypto funding/OI/basis snapshots + spot candles (Bybit)
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -euo pipefail
          python scripts/macro/crypto_signals_backfill.py \
            --path comms/macro/crypto_snapshots.jsonl \
            --candles-dir data/macro_candles \
            --lookback "${{ github.event.inputs.lookback_days || '90' }}"

      - name: Run the M28 P4 value-thesis gate over the crypto snapshots (short horizon)
        id: gate
        run: |
          set -euo pipefail
          python scripts/macro/thesis_backtest_run.py \
            --snapshots comms/macro/crypto_snapshots.jsonl \
            --candles-dir data/macro_candles \
            --rebalance-every 3 --horizon-days 7 \
            --json comms/macro/crypto_p4_scorecard.json | tee /tmp/crypto_card.txt

      - name: Horizon-IC scan over the crypto snapshots (short horizons)
        id: horizon
        continue-on-error: true
        run: |
          set -uo pipefail
          python scripts/macro/horizon_ic_scan.py \
            --snapshots comms/macro/crypto_snapshots.jsonl \
            --candles-dir data/macro_candles \
            --rebalance-every 3 --horizons 1,3,7,14,30 \
            --generated-at "$(date -u +%FT%TZ)" \
            --json comms/macro/crypto_horizon_ic_scorecard.json | tee -a /tmp/crypto_card.txt || \
            echo "::warning::horizon-IC scan degraded"

      - name: Land crypto snapshots + scorecards on main
        id: commit
        uses: ./.github/actions/commit-to-main
        with:
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          paths: comms/macro/crypto_snapshots.jsonl comms/macro/crypto_p4_scorecard.json comms/macro/crypto_horizon_ic_scorecard.json
          message: "chore(m29): crypto funding/OI/basis snapshots + P4 + horizon-IC scorecards"
          pr-title: "chore(m29): crypto signals backfill + scorecards (auto)"
          pr-body: "Reconstructed point-in-time BTC/ETH/SOL funding/OI/basis snapshots (valuation schema, Bybit public API) + the M28 P4 gate + horizon-IC scan graded over them (short horizons). Research data; auto-merge."
          branch-prefix: automation/crypto-signals-backfill

      - name: Comment + close issue (issue-driven path)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          PR: ${{ steps.commit.outputs.pr }}
        with:
          script: |
            const fs = require('fs');
            let card = '(scorecard unavailable)';
            try { card = fs.readFileSync('/tmp/crypto_card.txt', 'utf8'); } catch (e) {}
            const pr = process.env.PR || '';
            const body = [
              '🪙 **crypto-signals-backfill** — reconstructed BTC/ETH/SOL funding/OI/basis history + graded it with the P4 + horizon-IC scans.',
              '',
              '```', card.trim(), '```',
              '',
              pr ? `landed via auto-merge PR: ${pr}` : 'nothing to commit this run.',
              '',
              '---',
              '_Generated by [Claude Code](https://claude.ai/code)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed',
            });
