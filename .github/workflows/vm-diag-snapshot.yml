name: vm-diag-snapshot

# PM-side / web-sandbox bridge to the VM's diagnostic surface.
#
# The Claude Code on the web sandbox cannot egress to the Oracle VM
# directly (158.178.210.252:8001 isn't on the platform allowlist).
# GitHub-hosted runners can. Two trigger paths into the same job:
#
#   1. workflow_dispatch — operator clicks "Run workflow" in the UI.
#      Result: artifact + 4 KB run-log preview.
#
#   2. issues.opened with label `vm-diag-request` — fully automated
#      path. The issue title carries the diag endpoint
#      (`[diag-request] snapshot?limit=200`); the workflow runs, posts
#      the JSON back as an issue comment, and closes the issue. This
#      is the path Claude Code sessions drive via the GitHub MCP
#      (`issue_write` to open, `pull_request_read` / equivalent on
#      issue comments to read the result back).
#
# Trust contract (matches docs/claude/vm-operator-mode.md § 9):
#   * Read-only — only allowlisted GET paths under /api/diag/* run.
#   * Token-gated — DIAG_READ_TOKEN authenticates against the FastAPI
#     bearer-token check. The VM returns 503 if the token is unset.
#   * No mutating commands shipped over SSH; the only command we run
#     is a fixed-form `curl ... /api/diag/<path>`.
#   * Path validated against `^[A-Za-z0-9/?&=_.-]+$` before any
#     interpolation, so issue titles can't smuggle shell.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   * VM_SSH_KEY        — contents of ict-bot-ovm-private.key
#   * DIAG_READ_TOKEN   — bearer token from /etc/ict-trader/web-api.env
#
# Required repo label (Settings → Labels):
#   * vm-diag-request   — opened issues carrying this label trigger a
#                         run. Created by `scripts/bootstrap_diag_relay.sh`
#                         (also creatable manually).
#
# Optional repo variables:
#   * VM_SSH_HOST       — defaults to 158.178.210.252
#   * VM_SSH_USER       — defaults to ubuntu

on:
  workflow_dispatch:
    inputs:
      diag_path:
        description: "Diag endpoint (e.g. snapshot?limit=200)"
        required: false
        default: "snapshot?limit=200"
      label:
        description: "Optional artifact label (alphanumerics + dashes only)"
        required: false
        default: ""
  issues:
    # Only `opened` — when a session opens an issue *with* the label,
    # GitHub fires both `opened` and `labeled` and the workflow would
    # run twice. The session-driven path always opens-with-label, so
    # `opened` alone is sufficient. If a human ever needs to label an
    # already-open issue, they can use workflow_dispatch instead.
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: vm-diag-snapshot
  # 2026-05-11 FU-20260511-005: bumped from false → true. With
  # cancel-in-progress: false, a single hung SSH/curl step held the
  # lane and subsequent diag-request issues queued indefinitely (no
  # comment, no failure ping). Issues #941 / #942 / #947 in that
  # session never received a result. Preemption gives us
  # "always-fresh" semantics — a newer diag-request always wins —
  # and the cancelled-run handler below posts a re-open hint on the
  # preempted issue so neither side is silently dropped.
  cancel-in-progress: true

jobs:
  snapshot:
    # The label-based filter has to live on the job (workflow `on`
    # event filters can't combine `types` with `if`-style label gates).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'vm-diag-request'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve and validate diag path
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PATH: ${{ inputs.diag_path }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "issues" ]; then
            # Title format: "[diag-request] <path>"
            # Strip the prefix; allow either bracket form or a bare path.
            raw="${ISSUE_TITLE}"
            raw="${raw#\[diag-request\] }"
            raw="${raw#\[diag-request\]}"
            raw="${raw# }"
            # GitHub stores `&` in issue titles as the HTML entity
            # `&amp;` (verified 2026-05-11 — the title coming from the
            # webhook payload contains literal "&amp;", not "&"). Any
            # path with a `&` query separator therefore fails the
            # validation regex below (the `;` of `amp;` is rejected,
            # and decoded-then-re-encoded paths look wrong to curl).
            # Decode the common entities here so issue-driven callers
            # don't have to URL-encode every separator. `&amp;` first
            # so a literal `&` in the body of any other entity doesn't
            # get re-substituted.
            raw="${raw//&amp;/&}"
            raw="${raw//&lt;/<}"
            raw="${raw//&gt;/>}"
            raw="${raw//&quot;/\"}"
            DIAG_PATH="${raw:-snapshot?limit=200}"
          else
            DIAG_PATH="${DISPATCH_PATH}"
          fi

          # Strip optional leading /api/diag/ so callers can pass either
          # "snapshot?limit=200" or "/api/diag/snapshot?limit=200".
          path="${DIAG_PATH#/api/diag/}"
          path="${path#/}"

          # Allowed chars: alphanumeric, slash, query separators (`?` `&` `=`),
          # safe path/symbol chars (`_.-`), ISO-8601 colon (`:`) for
          # journalctl ?since=/?until=, and URL-encoding (`%`) for any
          # caller that prefers to URL-encode rather than rely on the
          # HTML-entity decode above. Still rejects shell metachars
          # (space, $, `, ;, &&, etc.) so an issue title can't smuggle
          # commands into the ssh + curl invocation below.
          if ! printf '%s' "$path" | grep -qE '^[A-Za-z0-9/?&=_.:%-]+$'; then
            echo "::error::Rejected diag_path (illegal characters): $DIAG_PATH"
            exit 1
          fi
          echo "diag_path_safe=$path" >>"$GITHUB_ENV"
          echo "diag_path_display=$DIAG_PATH" >>"$GITHUB_ENV"

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '158.178.210.252' }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fetch diag endpoint
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '158.178.210.252' }}
          VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN}" ]; then
            echo "::error::DIAG_READ_TOKEN secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "curl -sS --fail --max-time 20 \
                    -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' \
                    'http://127.0.0.1:8001/api/diag/${diag_path_safe}'" \
              > diag-output.json
          python3 -c "import json,sys; json.load(open('diag-output.json')); print('valid json,', __import__('os').path.getsize('diag-output.json'), 'bytes')"

      - name: Pretty-print diag response (run-log preview)
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          with open("diag-output.json") as f:
              data = json.load(f)
          preview = json.dumps(data, indent=2, default=str)
          if len(preview) > 4000:
              print(preview[:4000])
              print(f"... ({len(preview) - 4000} more chars in artifact / issue comment)")
          else:
              print(preview)
          PY

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: vm-diag-snapshot${{ inputs.label && format('-{0}', inputs.label) || '' }}-${{ github.run_id }}
          path: diag-output.json
          retention-days: 7
          if-no-files-found: error

      # ────────────────────────────────────────────────────────────
      # Issue-driven path: post result back as a comment + close.
      # ────────────────────────────────────────────────────────────

      - name: Reply to issue with diag result
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          DIAG_PATH_DISPLAY: ${{ env.diag_path_display }}
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('diag-output.json', 'utf8'));
            const pretty = JSON.stringify(data, null, 2);
            // GitHub comments cap at ~65 KB; leave headroom for the
            // header + fenced-code wrapper. Truncate from the *end*
            // (audit_tail and trades arrays are reverse-chron, so the
            // top of the JSON is the most recent / most useful bit).
            const MAX_BODY = 55_000;
            const path = process.env.DIAG_PATH_DISPLAY;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const header = [
              `**vm-diag-snapshot** result for \`${path}\``,
              `Run: ${runUrl}`,
              `Bytes: ${pretty.length}`,
              ''
            ].join('\n');
            let body;
            if (pretty.length <= MAX_BODY) {
              body = header + '\n```json\n' + pretty + '\n```';
            } else {
              body = header
                + `\n_(Truncated to first ${MAX_BODY} bytes of ${pretty.length}; full JSON not retained as artifact on the issue path — re-run via workflow_dispatch with the same path to get the full artifact.)_`
                + '\n```json\n' + pretty.slice(0, MAX_BODY) + '\n... (truncated)\n```';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Reply to issue with failure note
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **vm-diag-snapshot run failed.**\nRun: ${runUrl}\n\nCheck the run logs for the failing step. Common causes: VM_SSH_KEY/DIAG_READ_TOKEN secret unset, malformed key, VM web-api down, token mismatch with /etc/ict-trader/web-api.env.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });

      # Concurrency-cancel handler (FU-20260511-005). When
      # cancel-in-progress: true preempts this run because a newer
      # diag-request arrived, GitHub marks the run "cancelled" — which
      # is neither success() nor failure(). Without this step the
      # preempted issue stays commentless and looks identical to a
      # wedge. With it, the operator sees "preempted, re-open to retry."
      - name: Reply to issue when run was cancelled
        if: github.event_name == 'issues' && cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⏭ **vm-diag-snapshot run cancelled** — a newer diag-request preempted this one (concurrency.cancel-in-progress=true).\nRun: ${runUrl}\n\nRe-open this issue (or open a fresh one with the same title) to retry. If multiple back-to-back diag pulls are needed, space them ~90 s apart so each completes before the next arrives.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });
