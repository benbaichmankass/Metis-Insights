name: vm-diag-snapshot

# PM-side / web-sandbox bridge to the VM's diagnostic surface.
#
# The Claude Code on the web sandbox cannot egress to the Oracle VM
# directly (141.145.193.91:8001 isn't on the platform allowlist).
# GitHub-hosted runners can. Two trigger paths into the same job:
#
#   1. workflow_dispatch — operator clicks "Run workflow" in the UI.
#      Result: artifact + 4 KB run-log preview.
#
#   2. issues.opened with label `vm-diag-request` — fully automated
#      path. The issue title carries the diag endpoint
#      (`[diag-request] snapshot?limit=200`); the workflow runs, posts
#      the JSON back as an issue comment, and closes the issue. This
#      is the path Claude Code sessions drive via the GitHub MCP
#      (`issue_write` to open, `pull_request_read` / equivalent on
#      issue comments to read the result back).
#
#      **Batched multi-path requests (2026-07-06, MB-20260706-CI-MINUTES):**
#      the issue TITLE still carries exactly one path (unchanged, kept as
#      the documented fallback so existing muscle-memory/docs keep
#      working). To request SEVERAL paths in one issue — and therefore
#      one billed job instead of N — put the list in the issue BODY as
#      either a JSON array (`["snapshot?limit=5", "audit?limit=50"]`,
#      optionally inside a ```json fence) or one path per line (plain
#      text or a `-`/`*` bulleted list). When the body parses to a
#      non-empty list, it wins over the title; an empty/unparsable body
#      falls back to the single title path exactly as before. All paths
#      run over ONE ssh session server-side (the reconnect, not the
#      curl, is the expensive part) and come back as ONE issue comment,
#      one `## <path>` section per result. Capped at 15 paths per issue
#      (extras silently would blow the ~65 KB GitHub comment cap); each
#      path gets its own truncation marker if the combined output would
#      exceed the safe comment size, rather than dropping a path outright.
#      Every path — title or body — still passes through the SAME
#      validation regex individually; nothing is relaxed. See
#      docs/claude/diag-relay.md for the batched-request pattern and why
#      it matters (427 issues opened in the first 5.5 days of the
#      2026-07 billing cycle, 90% of them single-path relay/action calls).
#
# Trust contract (matches docs/claude/vm-operator-mode.md § 9):
#   * Read-only — only allowlisted GET paths under /api/diag/* run.
#   * Token-gated — DIAG_READ_TOKEN authenticates against the FastAPI
#     bearer-token check. The VM returns 503 if the token is unset.
#   * No mutating commands shipped over SSH; the only command we run
#     is a fixed-form `curl ... /api/diag/<path>`.
#   * Path validated against `^[A-Za-z0-9/?&=_.-]+$` before any
#     interpolation, so issue titles can't smuggle shell.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   * VM_SSH_KEY        — contents of ict-bot-ovm-private.key
#   * DIAG_READ_TOKEN   — bearer token from /etc/ict-trader/web-api.env
#
# Required repo label (Settings → Labels):
#   * vm-diag-request   — opened issues carrying this label trigger a
#                         run. Created by `scripts/bootstrap_diag_relay.sh`
#                         (also creatable manually).
#
# Optional repo variables:
#   * VM_SSH_HOST       — defaults to 141.145.193.91 (Ampere live trader; was the
#                         x86 micro 158.178.210.252 pre-2026-06-14 cutover)
#   * VM_SSH_USER       — defaults to ubuntu

on:
  workflow_dispatch:
    inputs:
      diag_path:
        description: "Diag endpoint (e.g. snapshot?limit=200)"
        required: false
        default: "snapshot?limit=200"
      label:
        description: "Optional artifact label (alphanumerics + dashes only)"
        required: false
        default: ""
  issues:
    # 2026-06-08: added `labeled` as a fallback for the dropped-webhook
    # failure mode (BL-20260527-001 / diag-relay-sweep.yml). GitHub
    # occasionally drops `issues.opened` events when several issues are
    # filed within a few seconds — observed on the 2026-06-08
    # /performance-review session where 4 diag-request issues fired in
    # ~5s and 2 of them (#2969, #2972) never produced a comment because
    # the workflow simply never started. The companion sweep workflow
    # auto-closes the stale issues but does not recover the data, so the
    # session loses the pull and has to refile.
    #
    # The dropped-webhook fix: also fire on `labeled` so the second
    # event arrives even when `opened` is lost. The dedup-against-
    # double-fire (the original 2026-05-16 concern when both events
    # arrive) lives in the first job step below — it bails cleanly
    # when a `github-actions[bot]` comment already exists on the
    # issue. With `cancel-in-progress: false` two simultaneous fires
    # `opened` only (2026-06-10): a create-with-label dispatch fires both
    # `opened` and `labeled`, so listening to both spawned two runs per
    # request. `opened` alone (label checked in the job `if:`) spawns exactly
    # one; the dedup step below stays as a belt-and-suspenders no-op.
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  # 2026-07-04 (BL-20260611-002): PER-ISSUE group. The single shared
  # ``vm-diag-snapshot`` group silently dropped bursts even with
  # ``cancel-in-progress: false`` — GitHub keeps at most ONE *pending*
  # run per group, so each newly-queued diag-request cancelled the
  # previously-queued one (only the running + newest-pending survive),
  # and queued-cancelled runs never execute their ``if: cancelled()``
  # commenter (verified again 2026-07-03: 8 of 11 burst pulls dropped,
  # runs 28673741352…28673753514). Keying the group on the issue number
  # gives every request its own lane: bursts run CONCURRENTLY instead of
  # queuing, and nothing can cancel a sibling request. Concurrency
  # within one issue (the ``opened``+``labeled`` double-fire) still
  # shares a group and queues serially, which the dedup step handles.
  # Load is bounded: each run is a read-only SSH+curl hard-capped at
  # 5 min (job ``timeout-minutes``) with its own connect/max-time
  # bounds. ``workflow_dispatch`` runs (no issue) fall back to run_id
  # (always-unique group = unrestricted).
  group: vm-diag-snapshot-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  snapshot:
    # The label-based filter has to live on the job (workflow `on`
    # event filters can't combine `types` with `if`-style label gates).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'vm-diag-request'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dedup — bail if a bot comment already exists (2026-06-08)
        # The `issues: [opened, labeled]` trigger fires twice when the
        # session opens-with-label; this step short-circuits the second
        # fire cleanly. Also covers the workflow_dispatch case where
        # the operator re-runs after the issue was already answered.
        if: github.event_name == 'issues'
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const hasBotComment = comments.some(
              c => c.user && c.user.login === 'github-actions[bot]'
            );
            if (hasBotComment) {
              core.notice(
                `Issue #${context.issue.number} already has a github-actions[bot] ` +
                `comment — likely the labeled-fire after a successful opened-fire. ` +
                `Skipping cleanly.`
              );
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      # ────────────────────────────────────────────────────────────
      # workflow_dispatch path: single path, operator-driven, unchanged
      # behaviour/artifact contract from before the 2026-07-06 batching
      # change. The issues path (below) is where multi-path batching
      # lives — kept separate so the operator UI flow never changes.
      # ────────────────────────────────────────────────────────────

      - name: Resolve and validate diag path
        if: github.event_name == 'workflow_dispatch' && steps.dedup.outputs.skip != 'true'
        id: resolve
        env:
          DISPATCH_PATH: ${{ inputs.diag_path }}
        run: |
          set -euo pipefail

          DIAG_PATH="${DISPATCH_PATH}"

          # Strip optional leading /api/diag/ so callers can pass either
          # "snapshot?limit=200" or "/api/diag/snapshot?limit=200".
          path="${DIAG_PATH#/api/diag/}"
          path="${path#/}"

          # Default upstream is the /api/diag/* surface. A caller may instead
          # target an allowlisted READ-ONLY /api/bot/* Tier-1 GET endpoint —
          # the aggregate/analytics routes relay-only (Trusted-network) review
          # sessions need but that live OUTSIDE /api/diag/ (e.g.
          # /api/bot/performance, /api/bot/trades/closed). BL-20260604-002.
          # Only the explicit allowlist below is reachable; anything else
          # stays diag-only. These are unauthenticated GET reads server-side,
          # so the Bearer header is simply ignored on them.
          upstream_prefix="/api/diag/"
          case "$path" in
            api/bot/*)
              botpath="${path#api/bot/}"
              botbase="${botpath%%\?*}"   # drop query string for the allowlist check
              case "$botbase" in
                # pnl/history is a caller-facing alias only: the real route is
                # the top-level /api/pnl/history (NOT under /api/bot/), so it
                # gets its own upstream_prefix instead of falling into the
                # generic /api/bot/ case below (BL-20260705-RELAY-ALLOWLIST-GAPS —
                # this used to construct /api/bot/pnl/history, which 404s).
                pnl/history)
                  upstream_prefix="/api/"
                  path="$botpath"
                  ;;
                performance|stats|positions|positions/net|signals|strategies|strategies/*/review|strategies/*/tune|strategy/attribution|backtests|backtests/sweeps|order-packages|trades/closed|trades/scores|candles|accounts/balances|liquidity|config|insights/summary|insights/recent|insights/health|insights/usage|insights/history|insights/strategy/*|health/latest|health/history|health/services|health/snapshot|shadow/stats|shadow/drift|shadow/predictions|exit-ladder/soak|allocator/soak|fc-geometry/soak|ml/status|ml/cycle|ml/sessions|ml/registry|ml/builds|ml/db_pulls|ml/runs/*|news/recent|pnl/exchange|gpu/spend|roadmap|roadmap/sprint/*|reports|reports/*|notifications|prop/fills|prop/tickets|prop/status|prop/reconcile|db/tables|db/table/*)
                  upstream_prefix="/api/bot/"
                  path="$botpath"
                  ;;
                *)
                  echo "::error::/api/bot/ path not in the relay read-only allowlist: $botbase"
                  exit 1
                  ;;
              esac
              ;;
          esac

          # Allowed chars (validate the FINAL path): alphanumeric, slash, query
          # separators (`?` `&` `=`), safe path/symbol chars (`_.-`), ISO-8601
          # colon (`:`) for journalctl ?since=/?until=, and URL-encoding (`%`)
          # for any caller that prefers to URL-encode rather than rely on the
          # HTML-entity decode above. Still rejects shell metachars
          # (space, $, `, ;, &&, etc.) so an issue title can't smuggle
          # commands into the ssh + curl invocation below.
          if ! printf '%s' "$path" | grep -qE '^[A-Za-z0-9/?&=_.:%-]+$'; then
            echo "::error::Rejected diag_path (illegal characters): $DIAG_PATH"
            exit 1
          fi
          echo "diag_path_safe=$path" >>"$GITHUB_ENV"
          echo "diag_path_display=$DIAG_PATH" >>"$GITHUB_ENV"
          echo "diag_upstream_prefix=$upstream_prefix" >>"$GITHUB_ENV"

      - name: Set up SSH key
        if: steps.dedup.outputs.skip != 'true'
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Fetch diag endpoint
        if: github.event_name == 'workflow_dispatch' && steps.dedup.outputs.skip != 'true'
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
          VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN}" ]; then
            echo "::error::DIAG_READ_TOKEN secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "curl -sS --fail --max-time 40 \
                    -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' \
                    'http://127.0.0.1:8001${diag_upstream_prefix}${diag_path_safe}'" \
              > diag-output.json
          python3 -c "import json,sys; json.load(open('diag-output.json')); print('valid json,', __import__('os').path.getsize('diag-output.json'), 'bytes')"

      - name: Pretty-print diag response (run-log preview)
        if: github.event_name == 'workflow_dispatch' && steps.dedup.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          with open("diag-output.json") as f:
              data = json.load(f)
          preview = json.dumps(data, indent=2, default=str)
          if len(preview) > 4000:
              print(preview[:4000])
              print(f"... ({len(preview) - 4000} more chars in artifact / issue comment)")
          else:
              print(preview)
          PY

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch' && steps.dedup.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vm-diag-snapshot${{ inputs.label && format('-{0}', inputs.label) || '' }}-${{ github.run_id }}
          path: diag-output.json
          retention-days: 7
          if-no-files-found: error

      # ────────────────────────────────────────────────────────────
      # Issue-driven path: batched multi-path support (2026-07-06,
      # MB-20260706-CI-MINUTES). Resolve/validate the full path list,
      # fetch every path over ONE ssh session, build one combined
      # comment, post it, and close the issue.
      # ────────────────────────────────────────────────────────────

      - name: Resolve and validate diag path(s)
        if: github.event_name == 'issues' && steps.dedup.outputs.skip != 'true'
        id: resolve_multi
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import fnmatch
          import json
          import os
          import re
          import sys

          MAX_PATHS = 15
          PATH_RE = re.compile(r'^[A-Za-z0-9/?&=_.:%-]+$')

          # Mirrors the workflow_dispatch allowlist above exactly — keep
          # the two in sync if the allowlist ever changes.
          BOT_ALLOWLIST_EXACT = {
              "performance", "stats", "positions", "positions/net", "signals",
              "strategies", "strategy/attribution",
              "backtests", "backtests/sweeps", "order-packages",
              "trades/closed", "trades/scores", "candles",
              "accounts/balances", "liquidity", "config",
              "insights/summary", "insights/recent", "insights/health",
              "insights/usage", "insights/history",
              "health/latest", "health/history", "health/services",
              "health/snapshot",
              "shadow/stats", "shadow/drift", "shadow/predictions",
              "exit-ladder/soak", "allocator/soak", "fc-geometry/soak",
              # ML lifecycle (BL-20260708-RELAY-ALLOWLIST-ML) — the /ml-review's
              # registry/cycle/dataset-build/db-pull mandate. These read the
              # trainer-store sidecar mirrored onto the LIVE VM, so they stay
              # reachable via the relay even when the trainer VM's SSH is down
              # (the 2026-07-08 review had to skip ML lifecycle for exactly this
              # gap while the trainer box was unreachable).
              "ml/status", "ml/cycle", "ml/sessions", "ml/registry",
              "ml/builds", "ml/db_pulls",
              "news/recent", "pnl/exchange", "gpu/spend",
              "roadmap", "reports", "notifications",
              "prop/fills", "prop/tickets", "prop/status", "prop/reconcile",
              "db/tables",
          }
          BOT_ALLOWLIST_GLOB = (
              "strategies/*/review", "strategies/*/tune",
              "insights/strategy/*", "db/table/*",
              "ml/runs/*", "roadmap/sprint/*", "reports/*",
          )

          def decode_entities(s: str) -> str:
              # GitHub stores `&` in issue titles/bodies as `&amp;` — see
              # the note in the original single-path resolver.
              return (
                  s.replace("&amp;", "&")
                   .replace("&lt;", "<")
                   .replace("&gt;", ">")
                   .replace("&quot;", '"')
              )

          def resolve_one(raw: str):
              path = raw.strip()
              if not path:
                  raise ValueError("empty path")
              if path.startswith("/api/diag/"):
                  path = path[len("/api/diag/"):]
              path = path.lstrip("/")
              upstream_prefix = "/api/diag/"
              if path.startswith("api/bot/"):
                  botpath = path[len("api/bot/"):]
                  botbase = botpath.split("?", 1)[0]
                  if botbase == "pnl/history":
                      upstream_prefix = "/api/"
                      path = botpath
                  elif botbase in BOT_ALLOWLIST_EXACT or any(
                      fnmatch.fnmatch(botbase, pat) for pat in BOT_ALLOWLIST_GLOB
                  ):
                      upstream_prefix = "/api/bot/"
                      path = botpath
                  else:
                      raise ValueError(
                          f"/api/bot/ path not in the relay read-only allowlist: {botbase}"
                      )
              # Same charset as the single-path validator — nothing relaxed.
              if not PATH_RE.match(path):
                  raise ValueError(f"illegal characters in resolved path: {path}")
              return upstream_prefix, path

          title = os.environ.get("ISSUE_TITLE", "") or ""
          body = (os.environ.get("ISSUE_BODY", "") or "").strip()

          raw_title = title
          for prefix in ("[diag-request] ", "[diag-request]"):
              if raw_title.startswith(prefix):
                  raw_title = raw_title[len(prefix):]
                  break
          raw_title = raw_title.lstrip(" ")
          title_path = decode_entities(raw_title).strip() or "snapshot?limit=200"

          candidates = []
          if body:
              parsed = None
              try:
                  parsed = json.loads(body)
              except Exception:
                  m = re.search(r"```(?:json)?\s*(\[.*?\])\s*```", body, re.S)
                  if m:
                      try:
                          parsed = json.loads(m.group(1))
                      except Exception:
                          parsed = None
              if isinstance(parsed, list) and parsed and all(isinstance(x, str) for x in parsed):
                  candidates = [decode_entities(x) for x in parsed]
              else:
                  lines = []
                  for line in body.splitlines():
                      s = line.strip()
                      if not s or s.startswith("```"):
                          continue
                      s = re.sub(r"^[-*]\s+", "", s)
                      lines.append(decode_entities(s))
                  candidates = lines

          # Empty/unparsable body -> fall back to the single title path
          # exactly as before the batching change (backward compat).
          is_multi = bool(candidates)
          if not candidates:
              candidates = [title_path]

          dropped = 0
          if len(candidates) > MAX_PATHS:
              dropped = len(candidates) - MAX_PATHS
              candidates = candidates[:MAX_PATHS]

          resolved = []
          for c in candidates:
              try:
                  prefix, p = resolve_one(c)
              except ValueError as e:
                  print(f"::error::Rejected diag path {c!r}: {e}", file=sys.stderr)
                  sys.exit(1)
              resolved.append((c, prefix, p))

          with open("diag_paths.tsv", "w") as f:
              for display, prefix, p in resolved:
                  # Tabs/newlines can't occur in `display` past this point —
                  # decode_entities + strip already removed line breaks, and
                  # a literal tab would have failed PATH_RE for an
                  # /api/diag/ path or is simply carried as free text for a
                  # display-only value; strip it defensively regardless.
                  safe_display = display.replace("\t", " ").replace("\n", " ")
                  f.write(f"{safe_display}\t{prefix}\t{p}\n")

          print(f"Resolved {len(resolved)} diag path(s) (dropped {dropped} over the {MAX_PATHS}-path cap):")
          for display, prefix, p in resolved:
              print(f"  {display} -> {prefix}{p}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"path_count={len(resolved)}\n")
              f.write(f"dropped_count={dropped}\n")
              f.write(f"multi={'true' if is_multi else 'false'}\n")
          PY

      - name: Fetch diag endpoint(s)
        if: github.event_name == 'issues' && steps.dedup.outputs.skip != 'true'
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
          VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN}" ]; then
            echo "::error::DIAG_READ_TOKEN secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi

          # Build ONE remote bash script covering every requested path so
          # the whole batch rides a SINGLE ssh session (server-side loop)
          # instead of reconnecting per path — the reconnect, not the
          # curl, is the expensive/billed part (MB-20260706-CI-MINUTES:
          # 201 vm-diag-request issues opened in the first 5.5 days of the
          # 2026-07 billing cycle). Each path's result is bracketed by
          # plain-text markers so the next step can split them back apart
          # even though one is JSON and captures newlines.
          REMOTE_SCRIPT=""
          while IFS=$'\t' read -r display prefix path; do
            REMOTE_SCRIPT+="echo '===DIAG_PATH_START==='"$'\n'
            REMOTE_SCRIPT+="printf '%s\n' $(printf '%q' "$display")"$'\n'
            REMOTE_SCRIPT+="curl -sS --fail --max-time 40 -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' $(printf '%q' "http://127.0.0.1:8001${prefix}${path}") || printf '%s' '{\"error\":\"fetch_failed\"}'"$'\n'
            REMOTE_SCRIPT+=$'\n'
            REMOTE_SCRIPT+="echo '===DIAG_PATH_END==='"$'\n'
          done < diag_paths.tsv

          # No `set -e` in the remote script on purpose — a failing path
          # (handled by its own `|| printf` fallback above) must never
          # abort the loop before later paths run.
          printf '%s' "$REMOTE_SCRIPT" | ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              'bash -s' > diag-multi-output.txt
          wc -l diag-multi-output.txt

      - name: Build combined diag comment
        if: github.event_name == 'issues' && steps.dedup.outputs.skip != 'true'
        id: build_comment
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          # Shared 55 KB budget (same cap the single-path comment always
          # used — GitHub caps comments at ~65 KB, this leaves headroom
          # for headers/fences), split evenly across paths so one huge
          # result can't starve the others. Each path gets its own
          # truncation marker rather than being silently dropped.
          MAX_TOTAL = 55_000

          with open("diag_paths.tsv") as f:
              rows = [line.rstrip("\n").split("\t") for line in f if line.strip()]

          with open("diag-multi-output.txt") as f:
              raw = f.read()

          chunks = []
          rest = raw
          while "===DIAG_PATH_START===" in rest:
              rest = rest.split("===DIAG_PATH_START===", 1)[1]
              chunk, rest = rest.split("===DIAG_PATH_END===", 1) if "===DIAG_PATH_END===" in rest else (rest, "")
              # `echo '===DIAG_PATH_START==='` itself emits a trailing
              # newline, so `chunk` starts with that blank line — strip it
              # before splitting off the display-name line (from
              # `printf '%s\n' ...`). Everything after it up to the end
              # marker is the curl output (which may itself contain
              # newlines — it's the JSON response body).
              chunk = chunk.lstrip("\n")
              parts = chunk.split("\n", 1)
              display_line = parts[0].strip()
              payload = parts[1] if len(parts) > 1 else ""
              chunks.append((display_line, payload.strip("\n")))

          n = max(len(chunks), 1)
          per_path_budget = max(1500, MAX_TOTAL // n)

          sections = []
          for display, payload in chunks:
              try:
                  data = json.loads(payload)
                  pretty = json.dumps(data, indent=2, default=str)
              except Exception:
                  pretty = payload  # not JSON (e.g. a curl-level error string) — show raw
              if len(pretty) > per_path_budget:
                  shown = pretty[:per_path_budget]
                  note = (
                      f"\n_(truncated, {len(pretty) - per_path_budget} more bytes of "
                      f"{len(pretty)} total not shown — this path's share of the "
                      f"{MAX_TOTAL}-byte combined comment budget was used up; "
                      f"re-request just this path alone for the full result)_"
                  )
              else:
                  shown = pretty
                  note = ""
              sections.append(f"## `{display}`\n```json\n{shown}\n```{note}")

          dropped = int(os.environ.get("DROPPED_COUNT", "0") or "0")
          extra = ""
          if dropped:
              extra = f"\n\n_(**{dropped} additional path(s) dropped** — capped at 15 paths per issue; split into a follow-up request.)_"

          body_md = "\n\n".join(sections) + extra
          with open("diag-comment-body.md", "w") as f:
              f.write(body_md)

          print(f"Built combined comment: {len(chunks)} path(s), {len(body_md)} bytes total.")
          PY
        env:
          DROPPED_COUNT: ${{ steps.resolve_multi.outputs.dropped_count }}

      - name: Reply to issue with diag result
        if: github.event_name == 'issues' && steps.dedup.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          PATH_COUNT: ${{ steps.resolve_multi.outputs.path_count }}
        with:
          script: |
            const fs = require('fs');
            const body_md = fs.readFileSync('diag-comment-body.md', 'utf8');
            const pathCount = process.env.PATH_COUNT || '1';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const header = [
              `**vm-diag-snapshot** result — ${pathCount} path(s) fetched over one ssh session`,
              `Run: ${runUrl}`,
              ''
            ].join('\n');
            let body = header + '\n' + body_md;
            // Final hard cap in case the per-path budgeting above still
            // produced something over GitHub's ~65 KB comment limit
            // (header + multiple fences add overhead the per-path budget
            // doesn't account for exactly).
            const HARD_MAX = 60_000;
            if (body.length > HARD_MAX) {
              body = body.slice(0, HARD_MAX) + '\n\n_(comment hard-capped at 60000 bytes; some path output cut off)_';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Reply to issue with failure note
        if: github.event_name == 'issues' && failure() && steps.dedup.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **vm-diag-snapshot run failed.**\nRun: ${runUrl}\n\nCheck the run logs for the failing step. Common causes: VM_SSH_KEY/DIAG_READ_TOKEN secret unset, malformed key, VM web-api down, token mismatch with /etc/ict-trader/web-api.env.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });

      # Concurrency-cancel handler (FU-20260511-005). When
      # cancel-in-progress: true preempts this run because a newer
      # diag-request arrived, GitHub marks the run "cancelled" — which
      # is neither success() nor failure(). Without this step the
      # preempted issue stays commentless and looks identical to a
      # wedge. With it, the operator sees "preempted, re-open to retry."
      - name: Reply to issue when run was cancelled
        if: github.event_name == 'issues' && cancelled() && steps.dedup.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⏭ **vm-diag-snapshot run cancelled** — a newer diag-request preempted this one (concurrency.cancel-in-progress=true).\nRun: ${runUrl}\n\nRe-open this issue (or open a fresh one with the same title) to retry. If multiple back-to-back diag pulls are needed, space them ~90 s apart so each completes before the next arrives.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });
