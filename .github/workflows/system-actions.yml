name: system-actions

# PM-side / web-sandbox bridge for a small, auditable set of mutating
# VM operations. Every action is gated by a fixed allowlist; there is
# no freeform-command input by design.
#
# Two dispatch paths, both flowing through the SAME allowlist + audit:
#   1. workflow_dispatch — operator clicks "Run workflow" in the
#      Actions UI. Used for ad-hoc operator interventions.
#   2. issues.opened (label `system-action`) — sandbox session opens
#      an issue, body encodes `action:` + `reason:`. Lets a Claude
#      sandbox session autonomously drive the same allowlist when the
#      operator has granted Tier-2/Tier-3 permission in conversation.
#      Mirrors vm-web-api-recover.yml; the label is created
#      idempotently by bootstrap-labels.yml. Trust contract is
#      identical — see Tier policy below.
#
# Trust contract (full text in docs/claude/system-actions.md):
#   * Allowlisted actions only — the `case` arms below are exhaustive
#     and reject anything else with exit 2.
#   * One wrapper script per action. The workflow does not embed
#     remote shell beyond invoking the script by absolute path.
#   * GitHub-hosted ubuntu-latest runner is the control plane. The VM
#     never orchestrates its own reboot path (would self-decapitate).
#   * Tier-2 actions (pull-and-deploy, restart-bot-service, reboot-vm,
#     set-account-mode, fix-data-dir, …) require a non-empty `reason`
#     so the audit artifact records intent.
#   * The issue body for issue-driven dispatch passes through env
#     (`ISSUE_BODY`), never inline `${{ }}` interpolation, so an
#     attacker-controlled issue body cannot inject shell into the
#     parser step.
#   * Every run uploads a JSON artifact with pre-state, action output,
#     and post-state. Read it from the run page; for issue-driven
#     runs the same summary lands as a comment on the originating issue.
#   * Strategy parameters, risk caps, the `mode:` field of
#     `config/accounts.yaml`, and the runtime data-dir alignment
#     are mutated **only** by their explicit, named,
#     Telegram-notified actions (`set-account-mode` and
#     `fix-data-dir`). All other Tier-3 paths (live order code,
#     key rotation, etc.) remain off-limits to this workflow.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   * VM_SSH_KEY        — contents of ict-bot-ovm-private.key
#   * DIAG_READ_TOKEN   — bearer for the read-only diag surface
#                         (used for post-action /api/diag/services
#                         verification only)
#
# Optional repo variables:
#   * VM_SSH_HOST       — defaults to 141.145.193.91 (Ampere live trader; was the
#                         x86 micro 158.178.210.252 pre-2026-06-14 cutover)
#   * VM_SSH_USER       — defaults to ubuntu
#
# Required VM sudoers (granted by deploy/claude-vm-runner.sudoers /
# vm_bootstrap.sh — NOT mutated by this workflow):
#   * NOPASSWD systemctl    — already present
#   * NOPASSWD shutdown -r  — manual one-time add for reboot-vm; see
#                             docs/claude/system-actions.md § Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: "System action (allowlisted)"
        required: true
        type: choice
        options:
          - status-check
          - list-listening-ports
          - gateway-logs
          - pull-latest-logs
          - pull-and-deploy
          - restart-bot-service
          - reboot-vm
          - enable-closed-flat-invariant
          - disable-closed-flat-invariant
          - enable-m5-consumer
          - disable-m5-consumer
          - set-mobile-push-secrets
          - enable-insights-generator
          - disable-insights-generator
          - inspect-insights
          - kick-insights
          - enable-signal-dual-write
          - disable-signal-dual-write
          - backfill-pnl-nulls
          - backfill-orphan-pnl
          - backfill-closed-null-pnl
          - backfill-monitor-closed-pnl
          - revert-backfill-monitor-closed-pnl
          - mark-reconciler-incomplete
          - rebuild-pnl-from-bybit
          - backfill-shadow-predictions
          - backfill-account-class
          - backfill-closed-at
          - backfill-trade-costs
          - backfill-broker-order-id
          - migrate-closed-at-iso
          - pull-exchange-fills
          - inspect-closed-pnl
          - bybit-account-audit
          - strategy-performance-audit
          - monitor-miss-analysis
          - vwap-backtest-sweep
          - pull-mes-ibkr-history
          - pull-mes-ibkr-history-daily
          - pull-ibkr-history
          - set-account-mode
          - fix-data-dir
          - rotate-account-keys
          - init-diag-token
          - send-ping
          - send-prop-test-ping
          - generate-strategy-review-packets
          - grade-closed-trades
          - set-env
          - scrub-env-noncompliant
          - pause-autoheal
          - resume-autoheal
          - sync-clock
          - purge-cloudflared
          - flatten-ib-position
          - flatten-bybit-position
          - flatten-alpaca-position
          - close-stranded-journal-row
          - reconcile-orphan-history
          - supersede-options-adoption-artifacts
          - supersede-reset-orphan-artifacts
          - fix-prop-mislinked-close
          - reset-daily-risk-state
          - repair-malformed-notes
      reason:
        description: "Why this action is being run (audit trail; required for Tier-2)"
        required: false
        default: ""
      message:
        description: "Ping body (send-ping only)"
        required: false
        default: ""
      priority:
        description: "Ping priority (send-ping only)"
        required: false
        type: choice
        default: normal
        options:
          - low
          - normal
          - high
          - urgent
      target:
        description: "Ping target bot (send-ping only)"
        required: false
        type: choice
        default: claude
        options:
          - claude
          - trader
      env_key:
        description: "Env var name (set-env only; e.g. TELEGRAM_CLAUDE_THREAD_ID)"
        required: false
        default: ""
      env_value:
        description: "Env var value (set-env only; leave blank for secret-backed keys)"
        required: false
        default: ""
      service:
        description: "Service to restart after set-env (e.g. ict-claude-bridge; 'none' to skip)"
        required: false
        default: ""
      account_id:
        description: "Target account name (set-account-mode only; e.g. bybit_2)"
        required: false
        default: ""
      mode:
        description: "Target mode (set-account-mode only)"
        required: false
        type: choice
        default: live
        options:
          - live
          - dry_run
  # Issue-driven trigger — mirrors vm-web-api-recover.yml. A sandbox
  # session opens an issue with label `system-action`, the body
  # encodes `action:` + `reason:` (+ `account:` + `mode:` for
  # set-account-mode), this workflow runs, posts the result back as
  # a comment, and closes the issue. This is the canonical
  # autonomous-dispatch path; no operator click required. Label
  # `system-action` is created idempotently by bootstrap-labels.yml.
  issues:
    # `opened` only. When an issue is created WITH the `system-action` label
    # (the dispatch path), GitHub fires BOTH `opened` and `labeled` — and the
    # old two-branch `if:` matched both, running the action TWICE (e.g. two
    # pull-and-deploys from one request, 2026-06-10). The label is checked in
    # the job `if:` below, so `opened` alone fires exactly once. (Matches the
    # single-fire pattern the other issue-driven workflows already use.)
    types: [opened]

permissions:
  contents: read
  issues: write   # required to comment + close issue-driven requests

# Serialise. Two system-actions on the same VM at the same time is
# never desired and likely buggy.
concurrency:
  group: system-actions
  cancel-in-progress: false

jobs:
  system-action:
    # Actor-guard (defense-in-depth): owner (or repo automation) only. The label
    # gate already blocks non-collaborators (they can't apply a label), but this
    # also defeats the social-engineering path where a triager is induced to apply
    # `system-action` to an externally-opened issue (the 2026-06-03 #2688 probe).
    # AND-ed onto the label gate (restrict-only). (Security audit 2026-06-28:
    # docs/security/intrusion-surface-audit-2026-06-28.md.)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.action == 'opened' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'system-action'))
    runs-on: ubuntu-latest
    # 10 min covers status-check / restart-bot-service / reboot-vm.
    # pull-and-deploy can pip-install on a cold cache + restart 14 units, so
    # allow headroom; deploy_pull_restart.sh takes ~2-4 min on a typical run,
    # more on a CPU-constrained VM. Bumped 15→20 (2026-06-10) so a slow-but-
    # healthy deploy under VM load doesn't hit the cap and report a false
    # failure (the verbose per-unit status dump that used to blow the budget
    # was also slimmed to a one-line is-active summary in deploy_pull_restart.sh).
    timeout-minutes: 20
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
      # The IB-Gateway container lives on its own dedicated VM (gateway-
      # isolation, 2026-06-10) — private IP, reached from the live trader
      # over the 10.0.0.0/24 subnet. `gateway-logs` is the one action in
      # this workflow's fixed allowlist that must run there instead of on
      # VM_SSH_HOST; every other action is unaffected. Mirrors the
      # JUMP_HOST/GATEWAY_HOST + ProxyJump pattern already used by
      # vm-ib-gateway-recover.yml / vm-ib-gateway-selftest.yml.
      GATEWAY_HOST: ${{ vars.IB_GATEWAY_HOST || '10.0.0.251' }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout (for wrapper scripts inside repo)
        uses: actions/checkout@v4

      - name: Resolve action + reason
        # Both event types funnel into ACTION + REASON in $GITHUB_ENV
        # so every downstream step is event-shape-agnostic. For
        # set-account-mode, ACCOUNT_ID + MODE are also resolved here.
        env:
          DISPATCH_ACTION: ${{ inputs.action }}
          DISPATCH_REASON: ${{ inputs.reason }}
          DISPATCH_ACCOUNT_ID: ${{ inputs.account_id }}
          DISPATCH_MODE: ${{ inputs.mode }}
          DISPATCH_MESSAGE: ${{ inputs.message }}
          DISPATCH_PRIORITY: ${{ inputs.priority }}
          DISPATCH_TARGET: ${{ inputs.target }}
          DISPATCH_ENV_KEY: ${{ inputs.env_key }}
          DISPATCH_ENV_VALUE: ${{ inputs.env_value }}
          DISPATCH_SERVICE: ${{ inputs.service }}
          # ISSUE_BODY rides through env (NOT inline interpolation) so
          # an attacker-controlled issue body cannot inject shell.
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            action="${DISPATCH_ACTION}"
            reason="${DISPATCH_REASON}"
            account_id="${DISPATCH_ACCOUNT_ID}"
            mode="${DISPATCH_MODE}"
            message="${DISPATCH_MESSAGE}"
            priority="${DISPATCH_PRIORITY}"
            target="${DISPATCH_TARGET}"
            env_key="${DISPATCH_ENV_KEY}"
            env_value="${DISPATCH_ENV_VALUE}"
            service="${DISPATCH_SERVICE}"
          else
            # Issue body convention:
            #   action: pull-and-deploy
            #   reason: <free text — single line, anything after the colon>
            #   account: <bybit_2>           (set-account-mode only)
            #   mode: <live|dry_run>         (set-account-mode only)
            # Lines may be in any order; only the first match wins.
            action=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*action[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Aa]ction[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            reason=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*reason[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Rr]eason[[:space:]]*:[[:space:]]*//' \
                     | sed -E 's/[[:space:]]+$//' || true)
            account_id=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*account[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Aa]ccount[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            mode=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*mode[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Mm]ode[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            trade_id=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*trade_id[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Tt]rade_id[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            symbol=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*symbol[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ss]ymbol[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            days=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*days[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Dd]ays[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            windows=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*windows[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ww]indows[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            window_days=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*window_days[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ww]indow_days[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # pull-ibkr-history params: `symbol:` (reused, MES/MGC/MHG),
            # `timeframes:` may carry >1 space-separated tf (e.g. "1h 1d") so
            # it keeps internal spaces (trailing trim only); `hist_start:` is a
            # YYYY-MM-DD, `dataset_version:` a vNNN, `max_contracts:` an int.
            pull_timeframes=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*timeframes[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Tt]imeframes[[:space:]]*:[[:space:]]*//' \
                     | sed -E 's/[[:space:]]+$//' || true)
            pull_hist_start=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*hist_start[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Hh]ist_start[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            pull_dataset_version=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*dataset_version[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Dd]ataset_version[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            pull_max_contracts=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*max_contracts[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Mm]ax_contracts[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # per_contract: a truthy value (1/true/yes) writes the PER-CONTRACT
            # roll-adjustment stream (market_raw_percontract/) instead of the
            # deduped market_raw shard. Blank/absent = the normal shard.
            pull_per_contract=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*per_contract[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Pp]er_contract[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # generate-strategy-review-packets params. `strategy:` may carry
            # a comma-separated list; the wrapper splits on comma. `all_btc:`
            # is a truthy gate that lets the operator iterate every BTCUSDT
            # strategy without naming each one.
            review_strategy=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*strategy[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ss]trategy[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            review_all_btc=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*all_btc[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Aa]ll_btc[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            review_shadow_soak_days=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*shadow_soak_days[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ss]hadow_soak_days[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            review_print_packets=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*print_packets[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Pp]rint_packets[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # grade-closed-trades params: `since:` is an ISO timestamp,
            # `limit:` an int (defaults inside the wrapper), `include_open:`
            # a truthy gate to widen scope beyond closed-only packages.
            grade_since=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*since[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ss]ince[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            grade_limit=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*limit[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ll]imit[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            grade_include_open=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*include_open[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ii]nclude_open[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # bt_mode chosen distinct from `mode:` (which set-account-mode owns).
            # Used by vwap-backtest-sweep to select the run_backtest_vwap flag:
            # compare → --compare, threshold-sweep → --threshold-sweep,
            # adaptive → --adaptive, param-sweep → --param-sweep.
            bt_mode=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*bt_mode[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Bb][Tt]_mode[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            recent_only_frac=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*recent_only_frac[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Rr]ecent_only_frac[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # send-ping: message preserves internal spaces (trailing trim
            # only, like reason); priority/target are single tokens.
            message=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*message[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Mm]essage[[:space:]]*:[[:space:]]*//' \
                     | sed -E 's/[[:space:]]+$//' || true)
            priority=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*priority[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Pp]riority[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            target=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*target[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Tt]arget[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # set-env: env_key/service are single tokens; env_value
            # preserves internal spaces (trailing trim only).
            env_key=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*env_key[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ee]nv_key[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            env_value=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*env_value[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ee]nv_value[[:space:]]*:[[:space:]]*//' \
                     | sed -E 's/[[:space:]]+$//' || true)
            service=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*service[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ss]ervice[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # flatten-ib-position: apply gates dry-run (default) vs execute.
            apply=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*apply[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Aa]pply[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # supersede-*-artifacts: optional comma-separated trade-id allowlist.
            ids=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*ids[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ii]ds[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            # close-stranded-journal-row: optional flatten fill price for local-compute pnl.
            exit_price=$(printf '%s\n' "${ISSUE_BODY}" \
                     | grep -i -m1 '^[[:space:]]*exit_price[[:space:]]*:' \
                     | sed -E 's/^[[:space:]]*[Ee]xit_price[[:space:]]*:[[:space:]]*//' \
                     | tr -d '[:space:]' || true)
            if [ -z "${action}" ]; then
              echo "::error::Issue body must contain a line of the form 'action: <name>'. Title was: ${ISSUE_TITLE}"
              exit 1
            fi
          fi
          echo "ACTION=${action}" >>"$GITHUB_ENV"
          echo "REASON=${reason}" >>"$GITHUB_ENV"
          echo "ACCOUNT_ID=${account_id}" >>"$GITHUB_ENV"
          echo "MODE=${mode}" >>"$GITHUB_ENV"
          echo "TRADE_ID=${trade_id}" >>"$GITHUB_ENV"
          echo "ACTION_SYMBOL=${symbol}" >>"$GITHUB_ENV"
          echo "ACTION_DAYS=${days}" >>"$GITHUB_ENV"
          echo "ACTION_WINDOWS=${windows}" >>"$GITHUB_ENV"
          echo "ACTION_WINDOW_DAYS=${window_days}" >>"$GITHUB_ENV"
          echo "ACTION_MODE=${bt_mode}" >>"$GITHUB_ENV"
          echo "ACTION_RECENT_ONLY_FRAC=${recent_only_frac}" >>"$GITHUB_ENV"
          echo "ACTION_STRATEGY=${review_strategy:-}" >>"$GITHUB_ENV"
          echo "ACTION_ALL_BTC=${review_all_btc:-}" >>"$GITHUB_ENV"
          echo "ACTION_SHADOW_SOAK_DAYS=${review_shadow_soak_days:-}" >>"$GITHUB_ENV"
          echo "ACTION_PRINT_PACKETS=${review_print_packets:-}" >>"$GITHUB_ENV"
          echo "ACTION_SINCE=${grade_since:-}" >>"$GITHUB_ENV"
          echo "ACTION_LIMIT=${grade_limit:-}" >>"$GITHUB_ENV"
          echo "ACTION_INCLUDE_OPEN=${grade_include_open:-}" >>"$GITHUB_ENV"
          # pull-ibkr-history params. PULL_TIMEFRAMES may contain a space
          # (e.g. "1h 1d") so it rides via the heredoc form (env, not inline).
          {
            echo "PULL_TIMEFRAMES<<__PULLTF_EOF__"
            printf '%s\n' "${pull_timeframes:-}"
            echo "__PULLTF_EOF__"
          } >>"$GITHUB_ENV"
          echo "PULL_HIST_START=${pull_hist_start:-}" >>"$GITHUB_ENV"
          echo "PULL_DATASET_VERSION=${pull_dataset_version:-}" >>"$GITHUB_ENV"
          echo "PULL_MAX_CONTRACTS=${pull_max_contracts:-}" >>"$GITHUB_ENV"
          echo "PULL_PER_CONTRACT=${pull_per_contract:-}" >>"$GITHUB_ENV"
          # send-ping / set-env params. ACTION_MESSAGE + ENV_VALUE may
          # contain spaces, so they ride to later steps via $GITHUB_ENV
          # (env, not inline interpolation) for shell safety.
          {
            echo "ACTION_MESSAGE<<__PING_EOF__"
            printf '%s\n' "${message}"
            echo "__PING_EOF__"
          } >>"$GITHUB_ENV"
          echo "ACTION_PRIORITY=${priority}" >>"$GITHUB_ENV"
          echo "ACTION_TARGET=${target}" >>"$GITHUB_ENV"
          echo "ENV_KEY=${env_key}" >>"$GITHUB_ENV"
          {
            echo "ENV_VALUE<<__ENVVAL_EOF__"
            printf '%s\n' "${env_value}"
            echo "__ENVVAL_EOF__"
          } >>"$GITHUB_ENV"
          echo "ENV_SERVICE=${service}" >>"$GITHUB_ENV"
          echo "ACTION_APPLY=${apply:-}" >>"$GITHUB_ENV"
          echo "ACTION_IDS=${ids:-}" >>"$GITHUB_ENV"
          echo "ACTION_EXIT_PRICE=${exit_price:-}" >>"$GITHUB_ENV"
          echo ">>> Resolved ACTION=${action} REASON=${reason} ACCOUNT_ID=${account_id} MODE=${mode} TRADE_ID=${trade_id} SYMBOL=${symbol} DAYS=${days} WINDOWS=${windows} WINDOW_DAYS=${window_days} BT_MODE=${bt_mode} RECENT_ONLY_FRAC=${recent_only_frac} (event=${{ github.event_name }})"

      - name: Validate action and tier policy
        run: |
          set -euo pipefail
          case "${ACTION}" in
            status-check|list-listening-ports|gateway-logs|pull-latest-logs|inspect-closed-pnl|bybit-account-audit|strategy-performance-audit|monitor-miss-analysis|vwap-backtest-sweep|send-ping|send-prop-test-ping|generate-strategy-review-packets|grade-closed-trades)
              echo "tier=1" >>"$GITHUB_ENV"
              ;;
            pull-and-deploy|restart-bot-service|reboot-vm|enable-closed-flat-invariant|disable-closed-flat-invariant|enable-m5-consumer|disable-m5-consumer|set-mobile-push-secrets|enable-insights-generator|disable-insights-generator|inspect-insights|kick-insights|enable-signal-dual-write|disable-signal-dual-write|backfill-pnl-nulls|backfill-orphan-pnl|backfill-closed-null-pnl|backfill-monitor-closed-pnl|revert-backfill-monitor-closed-pnl|mark-reconciler-incomplete|rebuild-pnl-from-bybit|backfill-shadow-predictions|backfill-account-class|backfill-closed-at|backfill-trade-costs|backfill-broker-order-id|migrate-closed-at-iso|pull-exchange-fills|pull-mes-ibkr-history|pull-mes-ibkr-history-daily|pull-ibkr-history|set-account-mode|fix-data-dir|rotate-account-keys|init-diag-token|set-env|scrub-env-noncompliant|pause-autoheal|resume-autoheal|sync-clock|purge-cloudflared|flatten-ib-position|flatten-bybit-position|flatten-alpaca-position|close-stranded-journal-row|reconcile-orphan-history|supersede-options-adoption-artifacts|supersede-reset-orphan-artifacts|fix-prop-mislinked-close|reset-daily-risk-state|repair-malformed-notes)
              echo "tier=2" >>"$GITHUB_ENV"
              if [ -z "${REASON// }" ]; then
                echo "::error::Tier-2 action '${ACTION}' requires a non-empty 'reason' input."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown action '${ACTION}'. Allowlist is enforced; this should be unreachable via the choice input."
              exit 2
              ;;
          esac
          # set-account-mode requires account_id + mode; validate both.
          if [ "${ACTION}" = "set-account-mode" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::set-account-mode requires 'account_id' (workflow_dispatch input) or 'account: <name>' (issue body)."
              exit 1
            fi
            if [ -z "${MODE// }" ]; then
              echo "::error::set-account-mode requires 'mode' (workflow_dispatch input) or 'mode: <live|dry_run>' (issue body)."
              exit 1
            fi
            case "${MODE}" in
              live|dry_run) ;;
              *)
                echo "::error::set-account-mode mode must be 'live' or 'dry_run' (got '${MODE}')."
                exit 1
                ;;
            esac
            if ! printf '%s' "${ACCOUNT_ID}" | grep -Eq '^[A-Za-z0-9_-]+$'; then
              echo "::error::set-account-mode account_id '${ACCOUNT_ID}' contains invalid characters (allowed: A-Z a-z 0-9 _ -)."
              exit 1
            fi
          fi
          # rotate-account-keys requires account_id; validate it.
          if [ "${ACTION}" = "rotate-account-keys" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::rotate-account-keys requires 'account_id' (workflow_dispatch input) or 'account: <name>' (issue body)."
              exit 1
            fi
            case "${ACCOUNT_ID}" in
              bybit_1|bybit_2) ;;
              *)
                echo "::error::rotate-account-keys account_id must be bybit_1 or bybit_2 (got '${ACCOUNT_ID}')."
                exit 1
                ;;
            esac
          fi
          # send-ping requires a non-empty message.
          if [ "${ACTION}" = "send-ping" ] && [ -z "${ACTION_MESSAGE// }" ]; then
            echo "::error::send-ping requires 'message' (workflow_dispatch input) or 'message: <text>' (issue body)."
            exit 1
          fi
          # set-env requires a valid env_key; service defaults in the wrapper.
          if [ "${ACTION}" = "set-env" ]; then
            if [ -z "${ENV_KEY// }" ]; then
              echo "::error::set-env requires 'env_key' (workflow_dispatch input) or 'env_key: <NAME>' (issue body)."
              exit 1
            fi
            if ! printf '%s' "${ENV_KEY}" | grep -Eq '^[A-Z][A-Z0-9_]*$'; then
              echo "::error::set-env env_key '${ENV_KEY}' invalid (allowed: ^[A-Z][A-Z0-9_]*$)."
              exit 1
            fi
          fi
          # flatten-ib-position requires account_id + symbol; apply (if set)
          # must be true|false. The wrapper defaults to a DRY-RUN unless
          # apply=true, so a missing/blank apply is safe (preview only).
          if [ "${ACTION}" = "flatten-ib-position" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::flatten-ib-position requires 'account: <id>' (issue body) or 'account_id' input."
              exit 1
            fi
            if [ -z "${ACTION_SYMBOL// }" ]; then
              echo "::error::flatten-ib-position requires 'symbol: <SYM>' (issue body)."
              exit 1
            fi
            if ! printf '%s' "${ACCOUNT_ID}" | grep -Eq '^[A-Za-z0-9_-]+$'; then
              echo "::error::flatten-ib-position account_id '${ACCOUNT_ID}' invalid (allowed: A-Z a-z 0-9 _ -)."
              exit 1
            fi
            if ! printf '%s' "${ACTION_SYMBOL}" | grep -Eq '^[A-Za-z0-9_]+$'; then
              echo "::error::flatten-ib-position symbol '${ACTION_SYMBOL}' invalid (allowed: A-Z a-z 0-9 _)."
              exit 1
            fi
            case "${ACTION_APPLY:-}" in
              ""|true|false|True|False) ;;
              *)
                echo "::error::flatten-ib-position apply must be true or false (got '${ACTION_APPLY}')."
                exit 1
                ;;
            esac
          fi
          # flatten-bybit-position: same contract as flatten-ib-position
          # (account_id + symbol required; apply gates dry-run-vs-execute). The
          # python script additionally guards exchange==bybit, so a non-Bybit
          # account is refused there too.
          if [ "${ACTION}" = "flatten-bybit-position" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::flatten-bybit-position requires 'account: <id>' (issue body) or 'account_id' input."
              exit 1
            fi
            if [ -z "${ACTION_SYMBOL// }" ]; then
              echo "::error::flatten-bybit-position requires 'symbol: <SYM>' (issue body)."
              exit 1
            fi
            if ! printf '%s' "${ACCOUNT_ID}" | grep -Eq '^[A-Za-z0-9_-]+$'; then
              echo "::error::flatten-bybit-position account_id '${ACCOUNT_ID}' invalid (allowed: A-Z a-z 0-9 _ -)."
              exit 1
            fi
            if ! printf '%s' "${ACTION_SYMBOL}" | grep -Eq '^[A-Za-z0-9_]+$'; then
              echo "::error::flatten-bybit-position symbol '${ACTION_SYMBOL}' invalid (allowed: A-Z a-z 0-9 _)."
              exit 1
            fi
            case "${ACTION_APPLY:-}" in
              ""|true|false|True|False) ;;
              *)
                echo "::error::flatten-bybit-position apply must be true or false (got '${ACTION_APPLY}')."
                exit 1
                ;;
            esac
          fi
          # flatten-alpaca-position: same contract as flatten-bybit-position
          # (account_id + symbol required; apply gates dry-run-vs-execute). The
          # python script additionally guards exchange==alpaca, so a non-Alpaca
          # account is refused there too.
          if [ "${ACTION}" = "flatten-alpaca-position" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::flatten-alpaca-position requires 'account: <id>' (issue body) or 'account_id' input."
              exit 1
            fi
            if [ -z "${ACTION_SYMBOL// }" ]; then
              echo "::error::flatten-alpaca-position requires 'symbol: <SYM>' (issue body)."
              exit 1
            fi
            if ! printf '%s' "${ACCOUNT_ID}" | grep -Eq '^[A-Za-z0-9_-]+$'; then
              echo "::error::flatten-alpaca-position account_id '${ACCOUNT_ID}' invalid (allowed: A-Z a-z 0-9 _ -)."
              exit 1
            fi
            if ! printf '%s' "${ACTION_SYMBOL}" | grep -Eq '^[A-Za-z0-9_]+$'; then
              echo "::error::flatten-alpaca-position symbol '${ACTION_SYMBOL}' invalid (allowed: A-Z a-z 0-9 _)."
              exit 1
            fi
            case "${ACTION_APPLY:-}" in
              ""|true|false|True|False) ;;
              *)
                echo "::error::flatten-alpaca-position apply must be true or false (got '${ACTION_APPLY}')."
                exit 1
                ;;
            esac
          fi
          # close-stranded-journal-row: same contract shape as flatten-alpaca-position
          # (account_id + symbol required; apply gates dry-run-vs-write; optional
          # numeric exit_price for local-compute pnl). The python script guards
          # exchange==alpaca AND requires a broker-confirmed-flat read before it
          # writes, so a still-open position or a non-Alpaca account is refused there.
          if [ "${ACTION}" = "close-stranded-journal-row" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::close-stranded-journal-row requires 'account: <id>' (issue body) or 'account_id' input."
              exit 1
            fi
            if [ -z "${ACTION_SYMBOL// }" ]; then
              echo "::error::close-stranded-journal-row requires 'symbol: <SYM>' (issue body)."
              exit 1
            fi
            if ! printf '%s' "${ACCOUNT_ID}" | grep -Eq '^[A-Za-z0-9_-]+$'; then
              echo "::error::close-stranded-journal-row account_id '${ACCOUNT_ID}' invalid (allowed: A-Z a-z 0-9 _ -)."
              exit 1
            fi
            if ! printf '%s' "${ACTION_SYMBOL}" | grep -Eq '^[A-Za-z0-9_]+$'; then
              echo "::error::close-stranded-journal-row symbol '${ACTION_SYMBOL}' invalid (allowed: A-Z a-z 0-9 _)."
              exit 1
            fi
            case "${ACTION_APPLY:-}" in
              ""|true|false|True|False) ;;
              *)
                echo "::error::close-stranded-journal-row apply must be true or false (got '${ACTION_APPLY}')."
                exit 1
                ;;
            esac
            if [ -n "${ACTION_EXIT_PRICE// }" ] && ! printf '%s' "${ACTION_EXIT_PRICE}" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
              echo "::error::close-stranded-journal-row exit_price '${ACTION_EXIT_PRICE}' must be a non-negative number."
              exit 1
            fi
          fi
          echo ">>> Resolved tier: $(grep tier= "$GITHUB_ENV" | tail -1)"

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Capture pre-action snapshot
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN}" ]; then
            echo "::warning::DIAG_READ_TOKEN unset — pre/post diag verification will be skipped."
            echo '{"diag_skipped": true}' > pre-state.json
            exit 0
          fi
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "curl -sS --fail --max-time 15 \
                    -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' \
                    'http://127.0.0.1:8001/api/diag/status'" \
              > pre-state.json || echo '{"diag_unreachable": true}' > pre-state.json

      - name: Execute action wrapper on VM
        id: exec
        env:
          # BYBIT key/secret pairs — only consumed by rotate-account-keys.
          # Ride through SSH env (via REMOTE_CMD prefix), never in run logs.
          BYBIT_API_KEY_1: ${{ secrets.BYBIT_API_KEY_1 }}
          BYBIT_API_SECRET_1: ${{ secrets.BYBIT_API_SECRET_1 }}
          BYBIT_API_KEY_2: ${{ secrets.BYBIT_API_KEY_2 }}
          BYBIT_API_SECRET_2: ${{ secrets.BYBIT_API_SECRET_2 }}
          # Secret-backed env values for set-env. When env_key names one
          # of these and env_value is left blank, the workflow supplies
          # the value from this Actions secret so the token never appears
          # in the (public) issue body or run log. Add more here as new
          # secret-backed keys are needed.
          SECRET_TELEGRAM_CLAUDE_BOT_TOKEN: ${{ secrets.TELEGRAM_CLAUDE_BOT_TOKEN }}
          # NEWS_API_KEY backs the M9 news layer (set-env env_key=NEWS_API_KEY,
          # env_value blank). Lets Claude propagate the operator-provided NewsAPI
          # key to the VM .env via set-env without it ever reaching the issue
          # body or run log. Empty until the operator adds the NEWS_API_KEY secret.
          SECRET_NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # FCM_SERVICE_ACCOUNT_JSON is the service-account JSON that the
          # mobile-push notifier uses to authenticate against FCM HTTP v1.
          # Consumed by the set-mobile-push-secrets action (and by set-env
          # when env_key=FCM_SERVICE_ACCOUNT_JSON + env_value blank).
          SECRET_FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          # Each action maps to ONE script under scripts/ops/. The
          # remote command is fixed-form; the only variable piece is
          # the script name resolved from the validated `ACTION`.
          case "${ACTION}" in
            status-check)                       SCRIPT="status_check.sh" ;;
            list-listening-ports)               SCRIPT="list_listening_ports.sh" ;;
            gateway-logs)                       SCRIPT="gateway_logs.sh" ;;
            pull-latest-logs)                   SCRIPT="pull_logs.sh" ;;
            pull-and-deploy)                    SCRIPT="pull_and_deploy.sh" ;;
            restart-bot-service)                SCRIPT="restart_bot.sh" ;;
            reboot-vm)                          SCRIPT="reboot_vm.sh" ;;
            enable-closed-flat-invariant)       SCRIPT="enable_closed_flat_invariant.sh" ;;
            disable-closed-flat-invariant)      SCRIPT="disable_closed_flat_invariant.sh" ;;
            enable-m5-consumer)                 SCRIPT="enable_m5_consumer.sh" ;;
            disable-m5-consumer)                SCRIPT="disable_m5_consumer.sh" ;;
            set-mobile-push-secrets)            SCRIPT="set_mobile_push_secrets.sh" ;;
            enable-insights-generator)          SCRIPT="enable_insights_generator.sh" ;;
            disable-insights-generator)         SCRIPT="disable_insights_generator.sh" ;;
            inspect-insights)                   SCRIPT="inspect_insights.sh" ;;
            kick-insights)                      SCRIPT="kick_insights.sh" ;;
            enable-signal-dual-write)           SCRIPT="enable_signal_dual_write.sh" ;;
            disable-signal-dual-write)          SCRIPT="disable_signal_dual_write.sh" ;;
            backfill-pnl-nulls)                 SCRIPT="backfill_pnl_nulls_action.sh" ;;
            backfill-orphan-pnl)                SCRIPT="backfill_orphan_pnl_action.sh" ;;
            backfill-closed-null-pnl)           SCRIPT="backfill_closed_null_pnl_action.sh" ;;
            mark-reconciler-incomplete)         SCRIPT="mark_reconciler_incomplete_action.sh" ;;
            backfill-monitor-closed-pnl)        SCRIPT="backfill_monitor_closed_pnl_action.sh" ;;
            revert-backfill-monitor-closed-pnl) SCRIPT="revert_backfill_monitor_closed_pnl_action.sh" ;;
            rebuild-pnl-from-bybit)             SCRIPT="rebuild_pnl_from_bybit_action.sh" ;;
            backfill-shadow-predictions)        SCRIPT="backfill_shadow_predictions_action.sh" ;;
            backfill-account-class)             SCRIPT="backfill_account_class_action.sh" ;;
            backfill-closed-at)                 SCRIPT="backfill_closed_at_action.sh" ;;
            backfill-trade-costs)               SCRIPT="backfill_trade_cost_estimates_action.sh" ;;
            backfill-broker-order-id)           SCRIPT="backfill_broker_order_id_action.sh" ;;
            migrate-closed-at-iso)              SCRIPT="migrate_closed_at_to_iso_action.sh" ;;
            pull-exchange-fills)                SCRIPT="pull_exchange_fills_action.sh" ;;
            inspect-closed-pnl)                 SCRIPT="inspect_closed_pnl_action.sh" ;;
            bybit-account-audit)                SCRIPT="bybit_account_audit_action.sh" ;;
            strategy-performance-audit)         SCRIPT="strategy_performance_audit_action.sh" ;;
            generate-strategy-review-packets)   SCRIPT="generate_strategy_review_packets_action.sh" ;;
            grade-closed-trades)                SCRIPT="grade_closed_trades_action.sh" ;;
            monitor-miss-analysis)              SCRIPT="monitor_miss_analysis_action.sh" ;;
            vwap-backtest-sweep)                SCRIPT="vwap_backtest_sweep_action.sh" ;;
            pull-mes-ibkr-history)              SCRIPT="pull_mes_ibkr_history.sh" ;;
            pull-mes-ibkr-history-daily)        SCRIPT="pull_mes_ibkr_history.sh" ;;
            pull-ibkr-history)                  SCRIPT="pull_mes_ibkr_history.sh" ;;
            set-account-mode)                   SCRIPT="set_account_mode.sh" ;;
            fix-data-dir)                       SCRIPT="fix_data_dir.sh" ;;
            rotate-account-keys)                SCRIPT="rotate_account_keys.sh" ;;
            init-diag-token)                    SCRIPT="init_diag_token.sh" ;;
            send-ping)                          SCRIPT="send_ping_action.sh" ;;
            send-prop-test-ping)                SCRIPT="send_prop_test_ping_action.sh" ;;
            set-env)                            SCRIPT="set_env.sh" ;;
            scrub-env-noncompliant)             SCRIPT="scrub_env_noncompliant.sh" ;;
            pause-autoheal)                     SCRIPT="pause_autoheal.sh" ;;
            resume-autoheal)                    SCRIPT="resume_autoheal.sh" ;;
            sync-clock)                         SCRIPT="sync_clock.sh" ;;
            purge-cloudflared)                  SCRIPT="purge_cloudflared.sh" ;;
            flatten-ib-position)                SCRIPT="flatten_ib_position_action.sh" ;;
            flatten-bybit-position)             SCRIPT="flatten_bybit_position_action.sh" ;;
            flatten-alpaca-position)            SCRIPT="flatten_alpaca_position_action.sh" ;;
            close-stranded-journal-row)         SCRIPT="close_stranded_journal_row_action.sh" ;;
            reconcile-orphan-history)           SCRIPT="reconcile_orphan_history_action.sh" ;;
            supersede-options-adoption-artifacts) SCRIPT="supersede_options_adoption_artifacts_action.sh" ;;
            supersede-reset-orphan-artifacts)   SCRIPT="supersede_reset_orphan_artifacts_action.sh" ;;
            fix-prop-mislinked-close)           SCRIPT="prop_fix_mislinked_close_action.sh" ;;
            reset-daily-risk-state)             SCRIPT="reset_daily_risk_state.sh" ;;
            repair-malformed-notes)             SCRIPT="repair_malformed_notes_action.sh" ;;
            *)
              echo "::error::Allowlist regression: '${ACTION}' was not mapped to a wrapper script."
              exit 2
              ;;
          esac
          if [ "${ACTION}" = "gateway-logs" ]; then
            echo ">>> Running scripts/ops/${SCRIPT} on ${GATEWAY_HOST} (via ${VM_SSH_HOST})"
          else
            echo ">>> Running scripts/ops/${SCRIPT} on ${VM_SSH_HOST}"
          fi
          # Build the remote command. For set-account-mode, prepend
          # ACCOUNT_ID + MODE.
          # We pipe through `printf %q` to keep substitutions shell-safe.
          REMOTE_CMD="bash /home/ubuntu/ict-trading-bot/scripts/ops/${SCRIPT}"
          if [ "${ACTION}" = "set-account-mode" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") MODE=$(printf '%q' "${MODE}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "rotate-account-keys" ]; then
            case "${ACCOUNT_ID}" in
              bybit_1)
                if [ -z "${BYBIT_API_KEY_1}" ] || [ -z "${BYBIT_API_SECRET_1}" ]; then
                  echo "::error::rotate-account-keys(bybit_1): BYBIT_API_KEY_1 / BYBIT_API_SECRET_1 secrets not set."
                  echo "::error::Add them at Settings → Secrets and variables → Actions before dispatching."
                  exit 1
                fi
                REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") NEW_API_KEY=$(printf '%q' "${BYBIT_API_KEY_1}") NEW_API_SECRET=$(printf '%q' "${BYBIT_API_SECRET_1}") ${REMOTE_CMD}"
                ;;
              bybit_2)
                if [ -z "${BYBIT_API_KEY_2}" ] || [ -z "${BYBIT_API_SECRET_2}" ]; then
                  echo "::error::rotate-account-keys(bybit_2): BYBIT_API_KEY_2 / BYBIT_API_SECRET_2 secrets not set."
                  echo "::error::Add them at Settings → Secrets and variables → Actions before dispatching."
                  exit 1
                fi
                REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") NEW_API_KEY=$(printf '%q' "${BYBIT_API_KEY_2}") NEW_API_SECRET=$(printf '%q' "${BYBIT_API_SECRET_2}") ${REMOTE_CMD}"
                ;;
            esac
          fi
          if [ "${ACTION}" = "inspect-closed-pnl" ] && [ -n "${TRADE_ID}" ]; then
            REMOTE_CMD="ACTION_TRADE_ID=$(printf '%q' "${TRADE_ID}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "pull-mes-ibkr-history-daily" ]; then
            # Same wrapper as pull-mes-ibkr-history, but baked to a DAILY
            # multi-year pull: native MES 1d bars back toward the contract's
            # ~2019 inception (the ibkr_offvm adapter stitches dated MES
            # expiries for depth — max_contracts=28 ≈ the quarterly expiries
            # since 2019). DATASET_VERSION must match 'vNNN' (digits only —
            # metadata.py enforces it); v003 keeps the daily series in its own
            # shard dir distinct from the intraday v002 (the 1d/ timeframe
            # subdir already separates them, but a distinct version is clearer).
            # All the wrapper's live-gateway guards still apply (live-first
            # heartbeat abort, idle nice/ionice, distinct clientId 450,
            # 20s pacing). For validating mes_trend_long_1d on real MES.
            REMOTE_CMD="MES_TIMEFRAMES=1d MES_HIST_START=2019-05-06 DATASET_VERSION=v003 MES_MAX_CONTRACTS=28 ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "pull-ibkr-history" ]; then
            # Generalized symbol-parameterized IBKR historical pull — same
            # wrapper + same live-gateway guards as pull-mes-ibkr-history
            # (live-first heartbeat abort, idle nice/ionice, distinct clientId
            # 450, 20s pacing, single-instance lock), but the SYMBOL, timeframes,
            # start, dataset version and max_contracts come from the issue body
            # so the metals sleeve (MGC/MHG) can be backfilled the same way MES
            # is. Symbol is validated against the futures roots the ibkr_offvm
            # adapter + IB _build_contract map (MES/MGC/MHG) — the pull writes
            # market_raw/<SYMBOL>/<tf>/<version>/data.jsonl.
            if [ -z "${ACTION_SYMBOL// }" ]; then
              echo "::error::pull-ibkr-history requires 'symbol: <MES|MGC|MHG>' (issue body)."
              exit 1
            fi
            case "${ACTION_SYMBOL}" in
              MES|MGC|MHG) : ;;
              *)
                echo "::error::pull-ibkr-history symbol '${ACTION_SYMBOL}' not supported (allowed: MES, MGC, MHG — the IB futures roots _build_contract maps)."
                exit 1
                ;;
            esac
            # timeframes may be blank → wrapper default "5m 15m"; validate the
            # allowed tf tokens when provided so a typo fails fast, not mid-pull.
            if [ -n "${PULL_TIMEFRAMES// }" ]; then
              for _tf in ${PULL_TIMEFRAMES}; do
                case "${_tf}" in
                  1m|5m|15m|30m|1h|4h|1d) : ;;
                  *)
                    echo "::error::pull-ibkr-history timeframe '${_tf}' invalid (allowed: 1m 5m 15m 30m 1h 4h 1d)."
                    exit 1
                    ;;
                esac
              done
            fi
            # hist_start (YYYY-MM-DD), dataset_version (vNNN), max_contracts (int)
            # are validated shape-only; blank falls back to the wrapper defaults.
            if [ -n "${PULL_HIST_START// }" ] && ! printf '%s' "${PULL_HIST_START}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "::error::pull-ibkr-history hist_start '${PULL_HIST_START}' must be YYYY-MM-DD."
              exit 1
            fi
            if [ -n "${PULL_DATASET_VERSION// }" ] && ! printf '%s' "${PULL_DATASET_VERSION}" | grep -Eq '^v[0-9]{3}$'; then
              echo "::error::pull-ibkr-history dataset_version '${PULL_DATASET_VERSION}' must match vNNN (e.g. v002)."
              exit 1
            fi
            if [ -n "${PULL_MAX_CONTRACTS// }" ] && ! printf '%s' "${PULL_MAX_CONTRACTS}" | grep -Eq '^[0-9]{1,3}$'; then
              echo "::error::pull-ibkr-history max_contracts '${PULL_MAX_CONTRACTS}' must be an integer."
              exit 1
            fi
            REMOTE_CMD="MES_SYMBOL=$(printf '%q' "${ACTION_SYMBOL}") ${REMOTE_CMD}"
            [ -n "${PULL_TIMEFRAMES// }" ] && REMOTE_CMD="MES_TIMEFRAMES=$(printf '%q' "${PULL_TIMEFRAMES}") ${REMOTE_CMD}"
            [ -n "${PULL_HIST_START// }" ] && REMOTE_CMD="MES_HIST_START=$(printf '%q' "${PULL_HIST_START}") ${REMOTE_CMD}"
            [ -n "${PULL_DATASET_VERSION// }" ] && REMOTE_CMD="DATASET_VERSION=$(printf '%q' "${PULL_DATASET_VERSION}") ${REMOTE_CMD}"
            [ -n "${PULL_MAX_CONTRACTS// }" ] && REMOTE_CMD="MES_MAX_CONTRACTS=$(printf '%q' "${PULL_MAX_CONTRACTS}") ${REMOTE_CMD}"
            # per_contract: any truthy value flips the wrapper to the per-contract
            # writer (market_raw_percontract/ — the roll-adjustment input). Only
            # 1/true/yes are accepted so a stray value can't silently enable it.
            case "$(printf '%s' "${PULL_PER_CONTRACT}" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes) REMOTE_CMD="PER_CONTRACT=1 ${REMOTE_CMD}" ;;
              ''|0|false|no) : ;;
              *)
                echo "::error::pull-ibkr-history per_contract '${PULL_PER_CONTRACT}' invalid (use 1/true/yes or omit)."
                exit 1
                ;;
            esac
          fi
          if [ "${ACTION}" = "bybit-account-audit" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ACTION_SYMBOL=$(printf '%q' "${ACTION_SYMBOL}") ACTION_DAYS=$(printf '%q' "${ACTION_DAYS}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "rebuild-pnl-from-bybit" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ACTION_DAYS=$(printf '%q' "${ACTION_DAYS}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "strategy-performance-audit" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ACTION_DAYS=$(printf '%q' "${ACTION_DAYS}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "monitor-miss-analysis" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ACTION_DAYS=$(printf '%q' "${ACTION_DAYS}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "vwap-backtest-sweep" ]; then
            REMOTE_CMD="ACTION_MODE=$(printf '%q' "${ACTION_MODE}") ACTION_DAYS=$(printf '%q' "${ACTION_DAYS}") ACTION_WINDOWS=$(printf '%q' "${ACTION_WINDOWS}") ACTION_WINDOW_DAYS=$(printf '%q' "${ACTION_WINDOW_DAYS}") ACTION_RECENT_ONLY_FRAC=$(printf '%q' "${ACTION_RECENT_ONLY_FRAC}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "generate-strategy-review-packets" ]; then
            REMOTE_CMD="ACTION_STRATEGY=$(printf '%q' "${ACTION_STRATEGY}") ACTION_WINDOW_DAYS=$(printf '%q' "${ACTION_WINDOW_DAYS}") ACTION_ALL_BTC=$(printf '%q' "${ACTION_ALL_BTC}") ACTION_SHADOW_SOAK_DAYS=$(printf '%q' "${ACTION_SHADOW_SOAK_DAYS}") ACTION_PRINT_PACKETS=$(printf '%q' "${ACTION_PRINT_PACKETS}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "grade-closed-trades" ]; then
            REMOTE_CMD="ACTION_SINCE=$(printf '%q' "${ACTION_SINCE}") ACTION_LIMIT=$(printf '%q' "${ACTION_LIMIT:-300}") ACTION_INCLUDE_OPEN=$(printf '%q' "${ACTION_INCLUDE_OPEN}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "send-ping" ]; then
            REMOTE_CMD="ACTION_MESSAGE=$(printf '%q' "${ACTION_MESSAGE}") ACTION_PRIORITY=$(printf '%q' "${ACTION_PRIORITY:-normal}") ACTION_TARGET=$(printf '%q' "${ACTION_TARGET:-claude}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "send-prop-test-ping" ]; then
            REMOTE_CMD="ACTION_SYMBOL=$(printf '%q' "${ACTION_SYMBOL:-SOLUSDT}") ACTION_STRATEGY=$(printf '%q' "${ACTION_STRATEGY:-trend_donchian_sol}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "flatten-ib-position" ] || [ "${ACTION}" = "flatten-bybit-position" ] || [ "${ACTION}" = "flatten-alpaca-position" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ACTION_SYMBOL=$(printf '%q' "${ACTION_SYMBOL}") ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "close-stranded-journal-row" ]; then
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ACTION_SYMBOL=$(printf '%q' "${ACTION_SYMBOL}") ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ACTION_EXIT_PRICE=$(printf '%q' "${ACTION_EXIT_PRICE:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "reconcile-orphan-history" ]; then
            REMOTE_CMD="ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "supersede-options-adoption-artifacts" ]; then
            REMOTE_CMD="ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ACTION_IDS=$(printf '%q' "${ACTION_IDS:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "supersede-reset-orphan-artifacts" ]; then
            REMOTE_CMD="ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ACTION_IDS=$(printf '%q' "${ACTION_IDS:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "fix-prop-mislinked-close" ]; then
            REMOTE_CMD="ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "repair-malformed-notes" ]; then
            REMOTE_CMD="ACTION_APPLY=$(printf '%q' "${ACTION_APPLY:-}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "reset-daily-risk-state" ]; then
            if [ -z "${ACCOUNT_ID// }" ]; then
              echo "::error::reset-daily-risk-state requires 'account: <id>' (issue body) or 'account_id' input."
              exit 1
            fi
            REMOTE_CMD="ACCOUNT_ID=$(printf '%q' "${ACCOUNT_ID}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "set-env" ]; then
            env_value="${ENV_VALUE}"
            # Secret-backed keys: if the value was left blank, pull it
            # from the matching SECRET_<KEY> Actions secret so it never
            # transits the issue body / run log.
            if [ -z "${env_value}" ]; then
              secret_var="SECRET_${ENV_KEY}"
              env_value="${!secret_var:-}"
            fi
            REMOTE_CMD="ENV_KEY=$(printf '%q' "${ENV_KEY}") ENV_VALUE=$(printf '%q' "${env_value}") ENV_SERVICE=$(printf '%q' "${ENV_SERVICE}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "scrub-env-noncompliant" ]; then
            # The wrapper restarts ENV_SERVICE (defaults to
            # ict-trader-live.service inside the script). Forward an
            # operator-supplied service if one was set on the issue body
            # so they can scrub a different unit's .env without editing
            # the wrapper. No other params — the scrub policy is fixed.
            REMOTE_CMD="ENV_SERVICE=$(printf '%q' "${ENV_SERVICE}") ${REMOTE_CMD}"
          fi
          if [ "${ACTION}" = "set-mobile-push-secrets" ]; then
            # The wrapper script pins ENV_KEY + ENV_SERVICE; we only need
            # to inject ENV_VALUE from the secret. Kept separate from
            # set-env above so the operator dispatches with no params and
            # never has the chance to retarget the wrong key/service.
            if [ -z "${SECRET_FCM_SERVICE_ACCOUNT_JSON}" ]; then
              echo "::error::set-mobile-push-secrets requires the FCM_SERVICE_ACCOUNT_JSON secret on this repo."
              echo "::error::Add it at Settings → Secrets and variables → Actions → New repository secret."
              exit 1
            fi
            REMOTE_CMD="ENV_VALUE=$(printf '%q' "${SECRET_FCM_SERVICE_ACCOUNT_JSON}") ${REMOTE_CMD}"
          fi
          # gateway-logs targets the dedicated IB-Gateway VM (GATEWAY_HOST),
          # not the live trader (VM_SSH_HOST) — the ib-gateway container has
          # lived there since the 2026-06-10 gateway-isolation redesign, so a
          # direct call at VM_SSH_HOST always reports "No such container"
          # instead of the real login/auth diagnostics. ProxyJump through the
          # trader unless the two hosts coincide (degenerate config), same
          # pattern as vm-ib-gateway-recover.yml / vm-ib-gateway-selftest.yml.
          SSH_TARGET_HOST="${VM_SSH_HOST}"
          SSH_ARGS=( -i ~/.ssh/id_rsa
                     -o BatchMode=yes
                     -o StrictHostKeyChecking=accept-new
                     -o ConnectTimeout=15 )
          if [ "${ACTION}" = "gateway-logs" ]; then
            SSH_TARGET_HOST="${GATEWAY_HOST}"
            if [ "${GATEWAY_HOST}" != "${VM_SSH_HOST}" ]; then
              SSH_ARGS+=( -o "ProxyJump=${VM_SSH_USER}@${VM_SSH_HOST}" )
              echo ">>> gateway-logs: reaching ${GATEWAY_HOST} via ProxyJump ${VM_SSH_USER}@${VM_SSH_HOST}"
            fi
          fi

          # Capture both stdout and exit code; never let the SSH wrap
          # swallow the wrapper's exit status.
          set +e
          ssh "${SSH_ARGS[@]}" \
              "${VM_SSH_USER}@${SSH_TARGET_HOST}" \
              "${REMOTE_CMD}" \
              > action-output.txt 2>&1
          rc=$?
          set -e
          echo "exit_code=${rc}" >>"$GITHUB_OUTPUT"
          echo ">>> Wrapper exit code: ${rc}"
          # Truncate preview to keep run-log readable.
          if [ "$(wc -c <action-output.txt)" -gt 4000 ]; then
            head -c 4000 action-output.txt
            echo ""
            echo "... (truncated; full output in artifact)"
          else
            cat action-output.txt
          fi
          # reboot-vm intentionally returns nonzero from SSH because
          # the connection drops as the VM reboots. Treat that as
          # success-with-reconnect-pending.
          if [ "${ACTION}" = "reboot-vm" ] && [ "${rc}" -ne 0 ]; then
            echo ">>> reboot-vm: SSH disconnect is expected. Continuing to post-check."
            exit 0
          fi
          exit "${rc}"

      - name: Wait for VM to come back (reboot-vm only)
        if: env.ACTION == 'reboot-vm'
        run: |
          set -euo pipefail
          echo ">>> Waiting up to 5 min for ${VM_SSH_HOST} to accept SSH again..."
          deadline=$(( $(date +%s) + 300 ))
          until ssh -i ~/.ssh/id_rsa \
                    -o BatchMode=yes \
                    -o StrictHostKeyChecking=accept-new \
                    -o ConnectTimeout=10 \
                    "${VM_SSH_USER}@${VM_SSH_HOST}" \
                    "true" 2>/dev/null; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::VM did not return within 5 min of reboot. Manual recovery required."
              exit 1
            fi
            sleep 10
          done
          echo ">>> VM reachable again."

      - name: Capture post-action snapshot
        if: always()
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN}" ]; then
            echo '{"diag_skipped": true}' > post-state.json
            exit 0
          fi
          # The web-api may take a few seconds to come back after
          # reboot-vm; retry briefly.
          attempts=6
          while [ "${attempts}" -gt 0 ]; do
            if ssh -i ~/.ssh/id_rsa \
                   -o BatchMode=yes \
                   -o StrictHostKeyChecking=accept-new \
                   -o ConnectTimeout=10 \
                   "${VM_SSH_USER}@${VM_SSH_HOST}" \
                   "curl -sS --fail --max-time 15 \
                         -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' \
                         'http://127.0.0.1:8001/api/diag/status'" \
                   > post-state.json 2>/dev/null; then
              break
            fi
            attempts=$(( attempts - 1 ))
            sleep 5
          done
          if [ "${attempts}" -eq 0 ]; then
            echo '{"diag_unreachable_after_action": true}' > post-state.json
            echo "::warning::Post-action diag fetch failed; see post-state.json."
          fi

      - name: Build audit bundle
        if: always()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib
          def load(p):
              try:
                  return json.loads(pathlib.Path(p).read_text())
              except Exception as e:
                  return {"_load_error": str(e)}
          bundle = {
              "action": os.environ["ACTION"],
              "reason": os.environ.get("REASON", ""),
              "account_id": os.environ.get("ACCOUNT_ID", ""),
              "mode": os.environ.get("MODE", ""),
              "tier": os.environ.get("tier", ""),
              "run_url": os.environ["RUN_URL"],
              "exit_code": os.environ.get("EXIT_CODE", ""),
              "pre_state": load("pre-state.json"),
              "post_state": load("post-state.json"),
              "action_output_excerpt": pathlib.Path("action-output.txt").read_text()[-4000:]
                  if pathlib.Path("action-output.txt").exists() else "",
          }
          pathlib.Path("audit-bundle.json").write_text(json.dumps(bundle, indent=2, default=str))
          print("Audit bundle bytes:", pathlib.Path("audit-bundle.json").stat().st_size)
          PY
        env:
          EXIT_CODE: ${{ steps.exec.outputs.exit_code }}

      # ────────────────────────────────────────────────────────────
      # Transparency notify — routes through @claude_ict_comms_bot.
      # Fires for every action regardless of dispatcher / tier /
      # outcome per docs/claude/system-actions.md § 5.5.
      # Notify failures never break the workflow; the artifact + run
      # log remain the canonical audit trail.
      # ────────────────────────────────────────────────────────────
      - name: Notify operator via Claude bot channel
        if: always()
        continue-on-error: true
        env:
          NOTIFY_EXIT_CODE: ${{ steps.exec.outputs.exit_code }}
        run: |
          set -uo pipefail
          # Default to 99 if the action step never produced an exit
          # code (e.g. pre-flight failure). The notify script maps
          # any non-allowlisted code to "FAILED".
          exit_code="${NOTIFY_EXIT_CODE:-99}"
          if [ -z "${exit_code}" ]; then
            exit_code=99
          fi
          # Build the reason notify_run.sh receives. For
          # set-account-mode we prepend the target so a glance at
          # Telegram tells the operator WHICH account + WHICH mode
          # without opening the run page.
          notify_reason="${REASON}"
          if [ "${ACTION}" = "set-account-mode" ]; then
            target_descr="target ${ACCOUNT_ID}=${MODE}"
            if [ -n "${notify_reason}" ]; then
              notify_reason="${target_descr} | ${notify_reason}"
            else
              notify_reason="${target_descr}"
            fi
          fi
          if [ "${ACTION}" = "rotate-account-keys" ]; then
            target_descr="account=${ACCOUNT_ID}"
            if [ -n "${notify_reason}" ]; then
              notify_reason="${target_descr} | ${notify_reason}"
            else
              notify_reason="${target_descr}"
            fi
          fi
          # Base64-encode so the reason survives transport through
          # the SSH command line without quoting surprises (single
          # quotes, backticks, $-expansion). notify_run.sh decodes
          # the 4th arg if it ends with the `:b64` suffix; otherwise
          # treats it as a plain string.
          if [ -n "${notify_reason}" ]; then
            reason_arg="$(printf '%s' "${notify_reason}" | base64 -w0):b64"
          else
            reason_arg=""
          fi
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "bash /home/ubuntu/ict-trading-bot/scripts/ops/notify_run.sh \
                    '${ACTION}' \
                    '${exit_code}' \
                    '${RUN_URL}' \
                    '${reason_arg}'" \
              || echo "::warning::notify_run.sh failed; transparency ping not delivered. Audit bundle still uploaded."

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-action-${{ env.ACTION }}-${{ github.run_id }}
          path: |
            audit-bundle.json
            pre-state.json
            post-state.json
            action-output.txt
          retention-days: 7
          if-no-files-found: warn

      # ────────────────────────────────────────────────────────────
      # Issue-driven path: comment back with status + close the issue.
      # Single step with if: always() so it fires even when a prior
      # always() step (audit-bundle, artifact upload, notify-SSH) fails
      # or when the job is cancelled (e.g. notify SSH hangs until
      # workflow timeout). EXIT_CODE from steps.exec.outputs.exit_code
      # is the authoritative success signal; job-level success()/failure()
      # are not used here because they can't survive post-exec step failures.
      # ────────────────────────────────────────────────────────────
      - name: Reply to issue with outcome
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.exec.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const exitCode = process.env.EXIT_CODE || '';
            const isSuccess = exitCode === '0';
            let output = '';
            try {
              output = fs.readFileSync('action-output.txt', 'utf8');
            } catch (_) {
              output = isSuccess
                ? '(no action-output.txt — unexpected; check the run page)'
                : '(no action-output.txt — failure happened before SSH ran)';
            }
            const MAX_BODY = 50_000;
            const tail = output.length > MAX_BODY ? output.slice(-MAX_BODY) : output;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const truncationNote = output.length > MAX_BODY
              ? `\n_(Showing last ${MAX_BODY} of ${output.length} bytes; full output on the run page.)_\n`
              : '';
            let body;
            if (isSuccess) {
              body =
                `✅ **system-action \`${process.env.ACTION}\`** completed.\n` +
                `Run: ${runUrl}\n` +
                `Wrapper exit code: ${exitCode}\n` +
                `Reason: ${process.env.REASON || '(none)'}\n` +
                truncationNote +
                `\n\`\`\`\n${tail}\n\`\`\``;
            } else {
              body =
                `❌ **system-action \`${process.env.ACTION || '(unresolved)'}\` failed.**\n` +
                `Run: ${runUrl}\n` +
                `Wrapper exit code: ${exitCode || '(set up failed before exec)'}\n` +
                `Reason: ${process.env.REASON || '(none)'}\n\n` +
                `Common causes: VM_SSH_KEY secret unset/corrupted; SSH host unreachable; ` +
                `wrapper script returned nonzero. The run page has the full audit bundle ` +
                `(audit-bundle.json + pre/post-state.json + action-output.txt).\n` +
                `\n\`\`\`\n${tail}\n\`\`\``;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: isSuccess ? 'completed' : 'not_planned'
            });
