name: vm-fix-devnull
# One-shot repair of a broken /dev/null on the live trader VM.
#
# Symptom (surfaced 2026-06-15): every command that redirects to /dev/null errors
# "bash: /dev/null: Permission denied" — /dev/null is a root-owned REGULAR FILE
# instead of the character device (major 1, minor 3). This silently breaks any
# process doing `2>/dev/null` (incl. shell tooling and possibly bot subprocess
# plumbing). It was likely created by a boot/cloud-init script writing to
# /dev/null before devtmpfs settled.
#
# Fix (fixed-form, narrow blast radius — touches ONLY /dev/null):
#   sudo rm -f /dev/null && sudo mknod /dev/null c 1 3 && sudo chmod 666 /dev/null
# then verify it's a char device and writable.
#
# NOTE: /dev is normally devtmpfs (kernel-recreated on boot), so a reboot would
# also restore it — UNLESS the offending boot script re-runs. If it recurs after
# a reboot, the root cause is that script (tracked as a follow-up).
#
# Trigger: workflow_dispatch, or an issue labeled `vm-fix-devnull`.
# Secrets: VM_SSH_KEY. Tier-2 (sudo on the live VM); operator-approved.

on:
  workflow_dispatch:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: vm-fix-devnull
  cancel-in-progress: false

jobs:
  fix:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'vm-fix-devnull'))
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
    steps:
      - name: Dedup — bail if a bot comment already exists
        if: github.event_name == 'issues'
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            });
            core.setOutput('skip',
              comments.some(c => c.user && c.user.login === 'github-actions[bot]') ? 'true' : 'false');

      - name: Set up SSH key
        if: steps.dedup.outputs.skip != 'true'
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          [ -z "${VM_SSH_KEY}" ] && { echo "::error::VM_SSH_KEY unset"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Repair /dev/null
        if: steps.dedup.outputs.skip != 'true'
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 "${VM_SSH_USER}@${VM_SSH_HOST}" 'bash -s' > out.txt 2>&1 <<'REMOTE'
          set +e
          echo "===== BEFORE ====="
          ls -l /dev/null
          echo "===== repair (rm + mknod c 1 3 + chmod 666) ====="
          sudo rm -f /dev/null && sudo mknod /dev/null c 1 3 && sudo chmod 666 /dev/null && echo "repair: applied" || echo "repair: FAILED"
          echo "===== AFTER ====="
          ls -l /dev/null
          echo "===== write test (no quotes trick; must print OK) ====="
          if echo testing > /dev/null; then echo "write-to-/dev/null: OK"; else echo "write-to-/dev/null: STILL BROKEN"; fi
          if printf 'x' 2>/dev/null; then echo "stderr-redirect: OK"; fi
          echo "(done)"
          REMOTE
          echo "ssh exit=$?"

      - name: Post result to issue
        if: github.event_name == 'issues' && steps.dedup.outputs.skip != 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let out = '(no output)';
            try { out = fs.readFileSync('out.txt','utf8'); } catch {}
            const body = ['**vm-fix-devnull** result', '', '```', out.slice(0,6000), '```'].join('\n');
            await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,body});
            await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,state:'closed'});

      - name: Summary (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.dedup.outputs.skip != 'true'
        run: |
          { echo '```'; cat out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
