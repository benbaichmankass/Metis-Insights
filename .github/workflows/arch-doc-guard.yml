name: arch-doc-guard

# Architecture-doc guard (S-AI-WS10). When a PR changes high-impact
# subsystems (pipeline, coordinator, ml/* model boundary, strategy
# units, web API, config schemas) without updating the architecture
# doc, this workflow emits a ::warning annotation visible on the
# PR's check summary.
#
# The job always exits 0. By design — see
# docs/architecture/ARCHITECTURE-CHANGE-CHECKLIST.md § "How the
# guard fires" for the rationale. A future workstream can upgrade
# to hard-fail once the team is fluent with the workflow.
#
# Heuristic + path patterns live in scripts/arch_doc_guard.py
# (pure Python, stdlib-only, no external deps).
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# NOT a required status check, so it's safe to trigger-filter with
# `paths:` mirroring scripts/arch_doc_guard.py's own
# HIGH_IMPACT_PATTERNS ∪ ARCH_DOC_PATTERNS — if a PR touches neither a
# high-impact subsystem nor an arch doc, the guard has nothing to check
# (it can only ever fire when a HIGH_IMPACT_PATTERNS file changed) so
# the job never needs to queue.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/pipeline/**"
      - "src/core/coordinator.py"
      - "src/core/dispatcher*.py"
      - "src/runtime/pipeline.py"
      - "src/runtime/shadow_adapter.py"
      - "src/runtime/health.py"
      - "src/units/strategies/**"
      - "src/units/dashboards/**"
      - "src/web/api/main.py"
      - "src/web/api/routers/**"
      - "ml/registry/**"
      - "ml/predictors/**"
      - "ml/promotion/**"
      - "ml/shadow/**"
      - "ml/trainers/**"
      - "ml/evaluators/**"
      - "ml/datasets/**"
      - "config/strategies.yaml"
      - "config/accounts.yaml"
      - "config/units.yaml"
      - "docs/ARCHITECTURE-CANONICAL.md"
      - "docs/architecture/**"
      - "docs/pipeline/stage-contracts.md"
      - "docs/CLAUDE-RULES-CANONICAL.md"
      - "CLAUDE.md"
      - "scripts/arch_doc_guard.py"
      - ".github/workflows/arch-doc-guard.yml"

permissions:
  contents: read

jobs:
  arch-doc-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed files
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files=$(git diff --name-only "$base" "$head" | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run guard
        run: |
          python scripts/arch_doc_guard.py \
            --changed-files="${{ steps.changed.outputs.files }}"
