name: System Health Check

on:
  schedule:
    # Every 6 hours, on the hour.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      skip_commit_back:
        description: "Don't commit the comms request artifact (dry-run)"
        type: boolean
        default: false

permissions:
  contents: write   # needed to commit comms/requests/REQ-*.json back

concurrency:
  group: system-health-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VM_HOST: 158.178.210.252
      VM_USER: ubuntu
      VM_REPO: /home/ubuntu/ict-trading-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full ref so we can commit-back without a fetch dance.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        # The bot's full requirements.txt is heavy (pandas, fastapi, …).
        # The action only needs the Anthropic SDK; src.runtime.notify
        # is stdlib-only.
        run: pip install --no-cache-dir 'anthropic>=0.40.0'

      - name: Configure SSH to VM
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Collect snapshot from VM
        id: collect
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=20 \
              "$VM_USER@$VM_HOST" \
              "bash $VM_REPO/scripts/collect_health_snapshot.sh" \
              > health_snapshot.txt
          echo "snapshot_bytes=$(wc -c < health_snapshot.txt)" >> "$GITHUB_OUTPUT"

      - name: Run automated health analysis (layer 1)
        id: analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          PYTHONPATH=. python scripts/run_health_check.py health_snapshot.txt

      - name: Emit Claude review request (layer 2)
        id: review_request
        run: |
          set -euo pipefail
          PYTHONPATH=. python scripts/write_health_review_request.py \
            --report runtime_logs/health_checks/latest.json \
            --snapshot-path health_snapshot.txt \
            --report-path runtime_logs/health_checks/latest.json

      - name: Notify operator that a Claude review is pending
        if: always() && steps.review_request.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -eu
          REQ_ID="${{ steps.review_request.outputs.request_id }}"
          STATUS="${{ steps.analyze.outputs.status }}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PYTHONPATH=. python scripts/notify_session.py alert \
            --summary "Health review pending — ${REQ_ID} (machine: ${STATUS:-UNKNOWN})" \
            --link "$RUN_URL" \
            || echo "telegram alert failed (non-fatal)"

      - name: Commit comms request to default branch
        if: |
          steps.review_request.outcome == 'success'
          && github.event_name == 'schedule'
          && !inputs.skip_commit_back
        env:
          REQ_PATH: ${{ steps.review_request.outputs.request_path }}
        run: |
          set -euo pipefail
          # Only commit on schedule (i.e. running on default branch).
          # workflow_dispatch on a feature branch stays dry-run unless
          # the operator opts in.
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$REQ_PATH"
          if git diff --cached --quiet; then
            echo "no comms request to commit (file unchanged)"
            exit 0
          fi
          REQ_ID="${{ steps.review_request.outputs.request_id }}"
          git commit -m "chore(health): emit Claude review request ${REQ_ID}"
          # Retry push up to 4 times with backoff (per repo convention).
          for delay in 0 2 4 8; do
            sleep "$delay"
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              exit 0
            fi
          done
          echo "::error::failed to push comms request after retries"
          exit 1

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            health_snapshot.txt
            runtime_logs/health_checks/health_check_*.json
            runtime_logs/health_checks/latest.json
