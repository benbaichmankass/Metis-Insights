name: secret-scan

# Scans every tracked file in the repo for likely secret patterns
# (Telegram bot tokens, API key/secret literal assignments, etc.).
# Backed by scripts/secret_scan.py — exit 0 = clean, exit 1 = finding.
#
# Allow-list policy: this workflow does NOT add an allow-list on top
# of the script's own ALLOW_WORDS. If a tracked file legitimately
# matches a pattern, fix it in the script (a separate PR) rather
# than silencing the workflow here.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES
# survey):** deliberately NOT given a changed-files short-circuit like
# the other required checks. A secret can land in ANY tracked file type
# (docs, YAML, JSON, workflow files, not just `.py`), so narrowing the
# scan to a path pattern would defeat its purpose. It's also already the
# cheapest job in the required set (no pip install — `scripts/secret_scan.py`
# is stdlib-only), so the billing win from touching it would be near zero
# next to the risk of a missed-secret false negative.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret scan
        run: python scripts/secret_scan.py
