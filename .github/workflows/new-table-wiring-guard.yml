name: New-table wiring guard

# Fails a PR (and pings the operator) when it adds a persistent table
# (CREATE TABLE ...) in production code WITHOUT a `# data-wiring: <relationship>`
# annotation declaring where the data's source of truth lives. The mechanical
# backstop for docs/CLAUDE-RULES-CANONICAL.md § Generation Discipline Rule 3 +
# the db-wiring skill — prevents the parallel-empty-store bug class
# (2026-06-21 prop-tickets incident). See scripts/check_new_table_wiring.py.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# NOT a required status check, so it's safe to trigger-filter with
# `paths:` — a `CREATE TABLE` can only appear in a `.py` or `.sql` file.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.sql"
      - "scripts/check_new_table_wiring.py"
      - ".github/workflows/new-table-wiring-guard.yml"

permissions:
  contents: read

jobs:
  new-table-wiring-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff against base
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}"...HEAD > /tmp/pr.diff
          wc -l /tmp/pr.diff

      - name: Scan for new tables without a data-wiring annotation
        id: scan
        run: |
          set +e
          python scripts/check_new_table_wiring.py /tmp/pr.diff
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Notify operator on hit
        if: steps.scan.outputs.exit != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Telegram secrets not configured; skipping ping."
            exit 0
          fi
          MESSAGE=$(cat <<EOF
          🚨 new-table wiring guard: PR #${{ github.event.pull_request.number }}
          ${{ github.event.pull_request.html_url }}
          A new persistent table was added without a \`# data-wiring:\` annotation.
          Prefer projecting over the canonical store; if a new table is justified,
          declare its source-of-truth relationship + backfill. See § Generation
          Discipline Rule 3 and the db-wiring skill.
          EOF
          )
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" >/dev/null

      - name: Fail the check on hit
        if: steps.scan.outputs.exit != '0'
        run: |
          echo "::error::new-table wiring guard tripped — see job output."
          exit 1
