name: sync-vm-secrets

# Canonical broker-credential propagation path (2026-06-02) —
# replaces rotate-account-keys.yml (per-account Bybit-only) with a
# generic mirror Actions secrets → VM .env file.
#
# Design (per the credentials-and-vm-mutations skill, operator-approved
# 2026-06-02):
#   * Single workflow that propagates the full declared set of broker-
#     credential env vars from GitHub Actions secrets to the live VM's
#     .env file in one SSH session.
#   * Idempotent: re-running with no change is a no-op (the script
#     compares before patching). Restarting the trader is the only
#     observable side effect on a clean run.
#   * Adding a new broker = add the env-var names to KNOWN_SECRETS in
#     this workflow and to the same list in scripts/ops/sync_vm_secrets.sh.
#     No per-broker workflow file.
#
# Operator workflow:
#   1. Add / update secrets in Settings → Secrets and variables → Actions.
#      Names must match the per-broker config dataclass (e.g.
#   2. Tell Claude "<broker> secrets provisioned"; Claude dispatches this
#      workflow (Tier-2: one operator OK in chat).
#
# Security contract (preserved from rotate-account-keys.yml):
#   * Secret VALUES ride through SSH `SendEnv` — they never appear in
#     workflow run logs, the audit artifact, or `ps`-visible cmdlines.
#   * The ops script never echoes a value; on a verification failure it
#     logs the env-var NAME only.
#   * The audit bundle records which env-var names were synced and
#     whether each was present in Actions, but never the values.
#
# Required repo secrets (always present; trader won't start without them):
#   VM_SSH_KEY           — SSH key for the live VM
#   BYBIT_API_KEY_1      — bybit_1 (demo) API key
#   BYBIT_API_SECRET_1   — bybit_1 (demo) API secret
#   BYBIT_API_KEY_2      — bybit_2 (live) API key
#   BYBIT_API_SECRET_2   — bybit_2 (live) API secret
#   ALPACA_API_KEY_ID_LIVE / ALPACA_API_SECRET_KEY_LIVE — Alpaca REAL-MONEY
#                                                (alpaca_live account; strategies
#                                                are wired and balance() must
#                                                resolve — promoted to required
#                                                BL-20260625-ALPACA-ZB)
#   DIAG_READ_TOKEN      — bearer for post-action diag check (optional)
#
# Optional repo secrets (synced when present; trader degrades gracefully
# while absent — the corresponding account stays inert until set):
#   OANDA_API_TOKEN / OANDA_ACCOUNT_ID         — OANDA practice (M15 P2)
#   ALPACA_API_KEY_ID / ALPACA_API_SECRET_KEY  — Alpaca paper (M15 P2)
#   ALPACA_API_KEY_ID_OPTIONS / ALPACA_API_SECRET_KEY_OPTIONS — alpaca_options_paper's
#                                                dedicated paper login (2026-07-07,
#                                                BL-20260707-ALPACA-PAPER-NEGATIVE-EQUITY
#                                                follow-up — moved off the shared
#                                                alpaca_paper pair)
#   TELEGRAM_BOT_TOKEN                          — trader / "everything" bot
#   TELEGRAM_CLAUDE_BOT_TOKEN                   — repurposed comms bot, now the
#                                                PROP channel bot (prop tickets/
#                                                fills route here; everything
#                                                else → TELEGRAM_BOT_TOKEN)
#
# Optional repo variables:
#   VM_SSH_HOST          — defaults to 141.145.193.91 (Ampere live trader; was the
#                          x86 micro 158.178.210.252 pre-2026-06-14 cutover)
#   VM_SSH_USER          — defaults to ubuntu

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why the sync is being dispatched (audit trail)"
        required: true
        default: ""
  # Issue-label trigger — the Claude-dispatchable path (mirrors
  # system-actions.yml; the Tier-2 ack is the operator's in-conversation
  # approval, carried in the issue title/body). Label applied only by
  # collaborators (triage+), same trust model as system-action.
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write   # comment + close the request issue

concurrency:
  group: sync-vm-secrets
  cancel-in-progress: false

jobs:
  sync-secrets:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'sync-vm-secrets-request'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
      REASON: ${{ inputs.reason || github.event.issue.title }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # The single source of truth for which env vars get propagated.
      # REQUIRED secrets must be present or the workflow fails before
      # touching the VM. OPTIONAL secrets sync when present and are
      # skipped (warning) when absent — that's how a new broker lives
      # inert while the operator is still provisioning its creds.
      REQUIRED_SECRETS: "BYBIT_API_KEY_1 BYBIT_API_SECRET_1 BYBIT_API_KEY_2 BYBIT_API_SECRET_2 ALPACA_API_KEY_ID_LIVE ALPACA_API_SECRET_KEY_LIVE"
      # OANDA/Alpaca paper: M15 Phase 2 (skipped with a warning until provisioned;
      # Tradovate removed 2026-06-10). Telegram bot tokens (2026-06-22): the
      # trader/"everything" bot (TELEGRAM_BOT_TOKEN) AND the repurposed
      # comms/"claude" bot now serving the PROP channel (TELEGRAM_CLAUDE_BOT_TOKEN)
      # — both must be live in the VM .env so prop tickets/fills route to the
      # prop bot (src/prop/breakout_notify.py::_prop_bot_token) and everything
      # else to the trader bot. Folding them into the canonical sync prevents a
      # future cutover from stranding them again (the post-Ampere-cutover gap
      # that silently dropped prop + claude pings). TELEGRAM_CHAT_ID is shared
      # by both bots (it's the operator's user id) and already correct on the
      # VM, so it is intentionally NOT synced here.
      # Alpaca LIVE creds (ALPACA_API_KEY_ID_LIVE / ALPACA_API_SECRET_KEY_LIVE)
      # are in REQUIRED_SECRETS — alpaca_live has strategies wired and balance()
      # must resolve (BL-20260625-ALPACA-ZB).
      # Note: VM_GIT_DEPLOY_TOKEN (BL-20260706-GITSYNC-AUTH-BROKEN, the repo-
      # went-private git-fetch credential) is deliberately NOT synced here —
      # it lives ONLY in a global git config value set once by the one-shot
      # vm-git-credential-bootstrap.yml workflow (reading the GitHub Actions
      # secret directly), never in .env. An earlier version of this fix also
      # propagated it to .env for a per-invocation header in
      # deploy_pull_restart.sh; that duplicated the credential and caused git
      # to send two Authorization headers (GitHub 400s on that outright) —
      # reverted in favour of the single global-config source of truth.
      # GEMINI_API_KEY (2026-07-14): the Google Generative Language API key the
      # read-only AI-analyst (src/runtime/insights) uses when
      # INSIGHTS_MODEL_MODE=gemini. Optional — synced when present so the analyst
      # can run on the Gemini free tier (2.0-flash). Inert until the operator adds
      # the secret AND flips INSIGHTS_MODEL_MODE=gemini in the VM .env.
      # BYBIT_API_KEY_3 / _SECRET_3 (2026-07-16): the reutilized "bybit 3" demo
      # keys for the bybit_portfolio paper-portfolio account. OPTIONAL so a
      # not-yet-provisioned key never blocks the whole sync (the account stays
      # inert until set). ALPACA_API_KEY_PAPER_PORTFOLIO / _SECRET_KEY_PAPER_PORTFOLIO
      # (2026-07-16): the dedicated paper login for the alpaca_portfolio account.
      OPTIONAL_SECRETS: "OANDA_API_TOKEN OANDA_ACCOUNT_ID ALPACA_API_KEY_ID ALPACA_API_SECRET_KEY ALPACA_API_KEY_ID_OPTIONS ALPACA_API_SECRET_KEY_OPTIONS BYBIT_API_KEY_3 BYBIT_API_SECRET_3 ALPACA_API_KEY_PAPER_PORTFOLIO ALPACA_API_SECRET_KEY_PAPER_PORTFOLIO TELEGRAM_BOT_TOKEN TELEGRAM_CLAUDE_BOT_TOKEN DASHBOARD_API_TOKEN GEMINI_API_KEY"

    steps:
      - name: Checkout (for ops script path)
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "${REASON// }" ]; then
            echo "::error::reason is required — provide an audit-trail note."
            exit 1
          fi
          echo ">>> Syncing VM secrets"
          echo ">>> Reason: ${REASON}"

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify REQUIRED secrets are set
        env:
          BYBIT_API_KEY_1: ${{ secrets.BYBIT_API_KEY_1 }}
          BYBIT_API_SECRET_1: ${{ secrets.BYBIT_API_SECRET_1 }}
          BYBIT_API_KEY_2: ${{ secrets.BYBIT_API_KEY_2 }}
          BYBIT_API_SECRET_2: ${{ secrets.BYBIT_API_SECRET_2 }}
          ALPACA_API_KEY_ID_LIVE: ${{ secrets.ALPACA_API_KEY_ID_LIVE }}
          ALPACA_API_SECRET_KEY_LIVE: ${{ secrets.ALPACA_API_SECRET_KEY_LIVE }}
          OANDA_API_TOKEN: ${{ secrets.OANDA_API_TOKEN }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
        run: |
          set -euo pipefail
          missing=""
          for name in ${REQUIRED_SECRETS}; do
            # Indirect lookup: ${!name} expands the value of the env var
            # named in ${name}. Tests for empty without echoing it.
            if [ -z "${!name:-}" ]; then
              missing="${missing} ${name}"
            fi
          done
          if [ -n "${missing}" ]; then
            echo "::error::Required secrets unset:${missing}"
            echo "::error::Add them at Settings → Secrets and variables → Actions before dispatching."
            exit 1
          fi
          echo ">>> Required-secret presence check passed."

      - name: Report OPTIONAL secrets presence (names only, never values)
        env:
          OANDA_API_TOKEN: ${{ secrets.OANDA_API_TOKEN }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          ALPACA_API_KEY_ID_OPTIONS: ${{ secrets.ALPACA_API_KEY_ID_OPTIONS }}
          ALPACA_API_SECRET_KEY_OPTIONS: ${{ secrets.ALPACA_API_SECRET_KEY_OPTIONS }}
          BYBIT_API_KEY_3: ${{ secrets.BYBIT_API_KEY_3 }}
          BYBIT_API_SECRET_3: ${{ secrets.BYBIT_API_SECRET_3 }}
          ALPACA_API_KEY_PAPER_PORTFOLIO: ${{ secrets.ALPACA_API_KEY_PAPER_PORTFOLIO }}
          ALPACA_API_SECRET_KEY_PAPER_PORTFOLIO: ${{ secrets.ALPACA_API_SECRET_KEY_PAPER_PORTFOLIO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CLAUDE_BOT_TOKEN: ${{ secrets.TELEGRAM_CLAUDE_BOT_TOKEN }}
          DASHBOARD_API_TOKEN: ${{ secrets.DASHBOARD_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          present=""
          absent=""
          for name in ${OPTIONAL_SECRETS}; do
            if [ -n "${!name:-}" ]; then
              present="${present} ${name}"
            else
              absent="${absent} ${name}"
            fi
          done
          echo ">>> OPTIONAL present:${present:- (none)}"
          echo ">>> OPTIONAL absent: ${absent:- (none)}"
          # Record for the audit bundle. Names only — values stay scrubbed.
          printf '%s\n' "${present# }" > optional-present.txt
          printf '%s\n' "${absent# }" > optional-absent.txt

      - name: Capture pre-sync service state
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN:-}" ]; then
            echo '{"diag_skipped": true}' > pre-state.json
            exit 0
          fi
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "curl -sS --fail --max-time 15 \
                    -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' \
                    'http://127.0.0.1:8001/api/diag/status'" \
              > pre-state.json \
            || echo '{"diag_unreachable": true}' > pre-state.json

      - name: Sync secrets to VM
        id: sync
        env:
          # REQUIRED — verified present above.
          BYBIT_API_KEY_1: ${{ secrets.BYBIT_API_KEY_1 }}
          BYBIT_API_SECRET_1: ${{ secrets.BYBIT_API_SECRET_1 }}
          BYBIT_API_KEY_2: ${{ secrets.BYBIT_API_KEY_2 }}
          BYBIT_API_SECRET_2: ${{ secrets.BYBIT_API_SECRET_2 }}
          OANDA_API_TOKEN: ${{ secrets.OANDA_API_TOKEN }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          ALPACA_API_KEY_ID_LIVE: ${{ secrets.ALPACA_API_KEY_ID_LIVE }}
          ALPACA_API_SECRET_KEY_LIVE: ${{ secrets.ALPACA_API_SECRET_KEY_LIVE }}
          ALPACA_API_KEY_ID_OPTIONS: ${{ secrets.ALPACA_API_KEY_ID_OPTIONS }}
          ALPACA_API_SECRET_KEY_OPTIONS: ${{ secrets.ALPACA_API_SECRET_KEY_OPTIONS }}
          # bybit_portfolio + alpaca_portfolio paper-portfolio logins (2026-07-16).
          BYBIT_API_KEY_3: ${{ secrets.BYBIT_API_KEY_3 }}
          BYBIT_API_SECRET_3: ${{ secrets.BYBIT_API_SECRET_3 }}
          ALPACA_API_KEY_PAPER_PORTFOLIO: ${{ secrets.ALPACA_API_KEY_PAPER_PORTFOLIO }}
          ALPACA_API_SECRET_KEY_PAPER_PORTFOLIO: ${{ secrets.ALPACA_API_SECRET_KEY_PAPER_PORTFOLIO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CLAUDE_BOT_TOKEN: ${{ secrets.TELEGRAM_CLAUDE_BOT_TOKEN }}
          # DASHBOARD_API_TOKEN arms the bearer gate on the prop-report +
          # device write endpoints (BL-20260705-DASHBOARD-API-TOKEN-UNSET);
          # the web-api unit reads it from the repo .env EnvironmentFile.
          DASHBOARD_API_TOKEN: ${{ secrets.DASHBOARD_API_TOKEN }}
          # GEMINI_API_KEY — the AI-analyst's Gemini key (INSIGHTS_MODEL_MODE=gemini).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # OPTIONAL — may be empty; the ops script skips empty values.
        run: |
          set -euo pipefail

          # stdin transport: NAME=VALUE pairs ride the encrypted SSH channel
          # into the script's --stdin mode — never the command string, run
          # logs, or `ps` on either end. (SendEnv was silently dropped by
          # the VM's sshd AcceptEnv allowlist — 2026-06-11 fix; run
          # 27333260838 was the proof.)
          set +e
          for name in ${REQUIRED_SECRETS} ${OPTIONAL_SECRETS}; do
            if [ -n "${!name:-}" ]; then
              printf '%s=%s\n' "${name}" "${!name}"
            fi
          done | ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "SYNC_REQUIRED='${REQUIRED_SECRETS}' \
               SYNC_OPTIONAL='${OPTIONAL_SECRETS}' \
               bash /home/ubuntu/ict-trading-bot/scripts/ops/sync_vm_secrets.sh --stdin" \
              > action-output.txt 2>&1
          rc=$?
          set -e

          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"
          echo ">>> Sync exit code: ${rc}"
          cat action-output.txt
          exit "${rc}"

      - name: Capture post-sync service state
        if: always()
        env:
          DIAG_READ_TOKEN: ${{ secrets.DIAG_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DIAG_READ_TOKEN:-}" ]; then
            echo '{"diag_skipped": true}' > post-state.json
            exit 0
          fi
          attempts=4
          while [ "${attempts}" -gt 0 ]; do
            if ssh -i ~/.ssh/id_rsa \
                   -o BatchMode=yes \
                   -o StrictHostKeyChecking=accept-new \
                   -o ConnectTimeout=10 \
                   "${VM_SSH_USER}@${VM_SSH_HOST}" \
                   "curl -sS --fail --max-time 15 \
                         -H 'Authorization: Bearer ${DIAG_READ_TOKEN}' \
                         'http://127.0.0.1:8001/api/diag/status'" \
                   > post-state.json 2>/dev/null; then
              break
            fi
            attempts=$(( attempts - 1 ))
            sleep 5
          done
          [ "${attempts}" -gt 0 ] \
            || echo '{"diag_unreachable_after_sync": true}' > post-state.json

      - name: Build audit bundle (no secret values)
        if: always()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, pathlib
          def load_json(p):
              try: return json.loads(pathlib.Path(p).read_text())
              except Exception as e: return {"_load_error": str(e)}
          def load_text(p):
              try: return pathlib.Path(p).read_text().strip()
              except Exception: return ""
          bundle = {
              "action": "sync-vm-secrets",
              "reason": os.environ.get("REASON", ""),
              "run_url": os.environ["RUN_URL"],
              "exit_code": os.environ.get("EXIT_CODE", ""),
              "required_secrets": os.environ["REQUIRED_SECRETS"].split(),
              "optional_present": load_text("optional-present.txt").split(),
              "optional_absent": load_text("optional-absent.txt").split(),
              "pre_state": load_json("pre-state.json"),
              "post_state": load_json("post-state.json"),
              # secret values intentionally absent — only env-var NAMES land here
              "action_output": pathlib.Path("action-output.txt").read_text()[-4000:]
                  if pathlib.Path("action-output.txt").exists() else "",
          }
          pathlib.Path("audit-bundle.json").write_text(json.dumps(bundle, indent=2, default=str))
          print("Audit bundle bytes:", pathlib.Path("audit-bundle.json").stat().st_size)
          PY
        env:
          EXIT_CODE: ${{ steps.sync.outputs.exit_code }}

      - name: Notify operator via Telegram
        if: always()
        continue-on-error: true
        env:
          NOTIFY_EXIT_CODE: ${{ steps.sync.outputs.exit_code }}
        run: |
          set -uo pipefail
          exit_code="${NOTIFY_EXIT_CODE:-99}"
          [ -n "${exit_code}" ] || exit_code=99
          reason_b64="$(printf '%s' "sync-vm-secrets | ${REASON}" | base64 -w0):b64"
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "bash /home/ubuntu/ict-trading-bot/scripts/ops/notify_run.sh \
                    'sync-vm-secrets' \
                    '${exit_code}' \
                    '${RUN_URL}' \
                    '${reason_b64}'" \
            || echo "::warning::notify_run.sh failed — Telegram ping not delivered."

      - name: Comment + close request issue
        if: always() && github.event_name == 'issues'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          SYNC_EXIT_CODE: ${{ steps.sync.outputs.exit_code }}
        with:
          script: |
            const rc = process.env.SYNC_EXIT_CODE || 'unknown';
            const ok = rc === '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${ok ? '✅' : '❌'} **sync-vm-secrets** exit code ${rc}.\nRun: ${runUrl}\n(Audit bundle in the run artifacts; env-var names only, never values.)`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: ok ? 'completed' : 'not_planned',
            });

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-vm-secrets-audit-${{ github.run_id }}
          path: |
            audit-bundle.json
            action-output.txt
            pre-state.json
            post-state.json
            optional-present.txt
            optional-absent.txt
          retention-days: 7
