name: Canonical DB resolver

# Fails the PR check when a new system-action wrapper introduces an
# inline `${TRADE_JOURNAL_DB:-${REPO_DIR}/trade_journal.db}` fallback
# instead of calling the canonical `runtime_db_path` helper from
# scripts/ops/_lib.sh.
#
# Motivation: the 2026-05-16 orphan-backfill failure (issue #1308 —
# 14 candidates processed against a stale repo-local DB while the
# live trader writes to /data/bot-data/trade_journal.db per the
# systemd drop-in) was caused by every operator wrapper rolling its
# own DB-path resolution. This guard freezes the count at zero.

# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# this is a REQUIRED status check, so its trigger can NEVER carry a
# `paths:` filter (would leave the check permanently "pending" on a
# non-matching PR). Instead the job always runs (cheap: checkout +
# `git diff --name-only`) but skips the guard script itself when no
# `.py`/`.sh` file changed — the fallback pattern this guards against
# can only appear in a script.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  canonical-db-resolver:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine relevant changed files
        id: changed
        run: |
          set -e
          git fetch origin "${{ github.base_ref }}" --quiet
          RANGE="origin/${{ github.base_ref }}...HEAD"
          FILES=$(git diff --name-only $RANGE || true)
          echo "Changed files ($RANGE):"
          echo "$FILES"
          if echo "$FILES" | grep -Eq '\.py$|\.sh$|\.github/workflows/canonical-db-resolver\.yml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .py/.sh files changed — skipping the guard (short-circuit, MB-20260706-CI-MINUTES)."
          fi

      - name: Set up Python
        if: steps.changed.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run guard
        if: steps.changed.outputs.relevant == 'true'
        run: python scripts/check_canonical_db_resolver.py --list
