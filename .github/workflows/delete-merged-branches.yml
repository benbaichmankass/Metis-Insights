name: delete-merged-branches

# Autonomous stale-branch cleanup. A PM-side/web session cannot delete
# remote refs (the sandbox proxy blocks `git push --delete`, and the
# GitHub MCP tools can create but not delete branches). This runner-side
# workflow does it where deletion actually works.
#
# Trigger: open an issue titled "[delete-merged-branches] ..." (same
# relay pattern as the diag / bp-report relays). The job computes the set
# of branches that are the head of a MERGED PR, subtracts main + the head
# of any OPEN PR, deletes the rest via the refs API, then comments a
# summary on the issue and closes it.
#
# Explicit list (optional): any branch names in the issue BODY are also
# deleted — for abandoned branches that never had a merged PR. Only names
# matching an existing remote branch are acted on; main + open-PR heads
# are still excluded. The body is read via env, so it can't smuggle shell.
#
# SAFE by construction: deletes only merged-PR heads or explicitly-named
# existing branches, never main, never an open-PR head. Re-runnable.

on:
  issues:
    types: [opened]

permissions:
  contents: write        # delete refs
  pull-requests: read
  issues: write          # comment + close the trigger issue

jobs:
  cleanup:
    # Actor-guard: owner (or repo automation) only. A title gate alone is
    # author-controlled — on a public repo any user could fire this ref-deleting
    # run and name arbitrary feature branches in the body. AND-ed onto the title
    # gate (restrict-only). (Security audit 2026-06-28:
    # docs/security/intrusion-surface-audit-2026-06-28.md.)
    if: >-
      (github.event.issue.user.login == github.repository_owner ||
       github.event.issue.user.login == 'github-actions[bot]') &&
      startsWith(github.event.issue.title, '[delete-merged-branches]')
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged-PR branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -uo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          echo "Default (protected) branch: ${DEFAULT_BRANCH}"

          # Heads of MERGED PRs (work is in main → safe to delete).
          gh pr list --repo "$REPO" --state merged --limit 5000 \
            --json headRefName --jq '.[].headRefName' | sort -u > /tmp/merged.txt
          # Heads of OPEN PRs (never delete these).
          gh pr list --repo "$REPO" --state open --limit 5000 \
            --json headRefName --jq '.[].headRefName' | sort -u > /tmp/open.txt
          # Branches that actually still exist on the remote.
          gh api "repos/$REPO/branches" --paginate --jq '.[].name' \
            | sort -u > /tmp/existing.txt

          # delete = merged ∩ existing − open − default
          comm -12 /tmp/merged.txt /tmp/existing.txt > /tmp/cand.txt
          comm -23 /tmp/cand.txt /tmp/open.txt > /tmp/cand2.txt
          grep -vxF "$DEFAULT_BRANCH" /tmp/cand2.txt > /tmp/to_delete.txt || true

          # Explicit list (optional): branch names in the issue body. Lets a
          # session delete abandoned branches that never had a merged PR.
          # Robust by construction — only names that match an EXISTING remote
          # branch are considered (typos/prose are ignored), and open-PR
          # heads + the default branch are still excluded. The body is read
          # via env (not inline interpolation) so it can't smuggle shell.
          printf '%s\n' "${ISSUE_BODY:-}" | tr ' ,;\t' '\n\n\n\n' \
            | sed 's/^[*-] //; s/`//g; s#[^A-Za-z0-9._/-]##g' \
            | grep -E '.' | sort -u > /tmp/req.txt
          comm -12 /tmp/req.txt /tmp/existing.txt > /tmp/req_exist.txt
          comm -23 /tmp/req_exist.txt /tmp/open.txt > /tmp/req_safe.txt
          grep -vxF "$DEFAULT_BRANCH" /tmp/req_safe.txt >> /tmp/to_delete.txt || true
          explicit_n=$(wc -l < /tmp/req_safe.txt | tr -d ' ')
          sort -u /tmp/to_delete.txt -o /tmp/to_delete.txt

          total=$(wc -l < /tmp/to_delete.txt | tr -d ' ')
          echo "Branches to delete: ${total}"

          deleted=0; failed=0
          while IFS= read -r b; do
            [ -z "$b" ] && continue
            if gh api -X DELETE "repos/$REPO/git/refs/heads/$b" >/dev/null 2>&1; then
              deleted=$((deleted+1))
            else
              failed=$((failed+1))
              echo "::warning::failed to delete $b"
            fi
          done < /tmp/to_delete.txt

          merged_n=$(wc -l < /tmp/merged.txt | tr -d ' ')
          open_n=$(wc -l < /tmp/open.txt | tr -d ' ')
          existing_n=$(wc -l < /tmp/existing.txt | tr -d ' ')
          {
            echo "REPORT<<EOF"
            echo "Stale-branch cleanup (merged-PR heads + explicit list):"
            echo "- remote branches before: ${existing_n}"
            echo "- merged-PR heads: ${merged_n}; open-PR heads (protected): ${open_n}"
            echo "- explicit-list branches matched: ${explicit_n}"
            echo "- targeted for deletion: ${total}"
            echo "- deleted: ${deleted}; failed: ${failed}"
            echo "- never touched: ${DEFAULT_BRANCH} + all open-PR heads"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Comment summary and close
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REPORT || "(cleanup step produced no summary — check the run log)";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "**delete-merged-branches**\n\n```\n" + report + "\n```",
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
