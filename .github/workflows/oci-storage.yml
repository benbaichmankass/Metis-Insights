name: oci-storage

# Fully automated OCI block-storage setup for the live trading VM.
# Every mutating step is gated by the production-oci environment, which
# the repo admin configures to require manual approval. The default
# mode is dry-run so accidental dispatches do not change OCI state.
#
# See docs/automation/oci-storage-setup.md for the operator runbook.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: "dry-run" prints planned commands; "execute" creates/attaches/mounts.'
        type: choice
        options: [dry-run, execute]
        default: dry-run
      volume_size_gb:
        description: 'Volume size (GB)'
        type: string
        default: '100'

permissions:
  contents: read

concurrency:
  group: oci-storage
  cancel-in-progress: false

env:
  OCI_VOLUME_NAME: ict-bot-data-vol
  OCI_AVAILABILITY_DOMAIN: Eu-Paris-1-AD-3
  # Pin the target by OCID (display-names can drift / be wrong); the
  # script honors VM_INSTANCE_OCID first, VM_INSTANCE_NAME as fallback.
  # TODO(operator, BL-20260707-WORKFLOW-STALE-MICRO-DEFAULTS): the OCID below is
  # the RETIRED x86 micro `ict-bot` (terminated 2026-06-16) — a volume op against
  # it now fails "instance not found". Replace with the live Ampere `ict-bot-arm`
  # OCID (I can't resolve it from a session; use `oci compute instance list` or
  # the OCI console). ALSO reassess whether this block-volume workflow still
  # applies: on the Ampere box `/data/bot-data` is a DIRECTORY on the 45 GB boot
  # volume, not the separate `ict-bot-data-vol` block volume this manages
  # (a dedicated /data block volume is a documented optional follow-up).
  VM_INSTANCE_OCID: ocid1.instance.oc1.eu-paris-1.anrwiljrnpsiupacbpuojiksc3dl4twmqlxndtc36jgx5sjq3452vflqr32q
  # SSH host swapped to the live Ampere trader (the read paths — uname/lsblk/git
  # — must hit the running box, not the terminated micro). Was 158.178.210.252.
  VM_HOST: 141.145.193.91
  VM_USER: ubuntu
  REPO_DIR: /home/ubuntu/ict-trading-bot

jobs:
  preflight:
    name: preflight (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # OCI CLI reads these env vars natively (since 2.5.x); no
      # ~/.oci/config file needed.
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_CLI_TENANCY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install oci-cli
          oci --version

      - name: List volumes
        run: bash scripts/oci_volume_status.sh

  storage-setup:
    name: create / attach / mount / migrate
    needs: preflight
    runs-on: ubuntu-latest
    environment: production-oci
    timeout-minutes: 30
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_COMPARTMENT_OCID: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_VOLUME_SIZE_GB: ${{ inputs.volume_size_gb }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCI CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install oci-cli
          oci --version

      - name: Install VM SSH key
        env:
          KEY_CONTENT: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${KEY_CONTENT:-}" ]]; then
            echo "::error::VM_SSH_PRIVATE_KEY secret is empty. Add it to the production-oci environment (same key as ict-bot-ovm-private.key)."
            exit 1
          fi
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$KEY_CONTENT" > "$HOME/.ssh/ict-bot-ovm-private.key"
          chmod 0600 "$HOME/.ssh/ict-bot-ovm-private.key"
          echo "VM_SSH_KEY_PATH=$HOME/.ssh/ict-bot-ovm-private.key" >> "$GITHUB_ENV"

      - name: Create volume
        id: create
        run: |
          if [[ "${{ inputs.mode }}" == 'dry-run' ]]; then
            bash scripts/oci_create_volume.sh --dry-run
          else
            bash scripts/oci_create_volume.sh
          fi

      - name: Attach volume
        run: |
          if [[ "${{ inputs.mode }}" == 'dry-run' ]]; then
            bash scripts/oci_attach_volume.sh --dry-run
          else
            bash scripts/oci_attach_volume.sh
          fi

      - name: Probe VM connectivity
        run: bash scripts/oci_vm_ssh.sh 'uname -a && lsblk'

      - name: Sync VM repo to current main
        # The ict-git-sync.timer eventually pulls new commits, but the
        # cadence is on the order of minutes and a freshly-merged
        # workflow change (e.g. a new migration script) can otherwise
        # race ahead of the timer — the VM-side script wouldn't exist
        # yet, and the step would fail with `No such file or directory`.
        # Force a fast-forward pull up front so every subsequent
        # VM-side step sees the same code as this workflow file.
        run: |
          bash scripts/oci_vm_ssh.sh "cd $REPO_DIR && git fetch --quiet origin main && git reset --quiet --hard origin/main && git --no-pager log -1 --oneline"

      - name: Format + mount + fstab
        if: ${{ inputs.mode == 'execute' }}
        run: |
          bash scripts/oci_vm_ssh.sh 'bash -s' <<'REMOTE'
          set -euo pipefail
          # Prefer the stable OCI symlink; fall back to /dev/sdb if the
          # iSCSI/paravirt naming differs on this kernel.
          DEV=""
          for candidate in /dev/oracleoci/oraclevdb /dev/sdb /dev/sdc; do
              if [[ -b "$candidate" ]]; then DEV="$candidate"; break; fi
          done
          if [[ -z "$DEV" ]]; then
              echo "ERROR: no candidate block device found" >&2
              lsblk >&2
              exit 1
          fi
          echo "device: $DEV"
          if ! sudo blkid "$DEV" >/dev/null 2>&1; then
              echo "formatting $DEV ext4"
              sudo mkfs.ext4 -F -L bot-data "$DEV"
          else
              echo "$DEV already has a filesystem; reusing."
          fi
          sudo mkdir -p /data
          if ! mountpoint -q /data; then
              sudo mount "$DEV" /data
          fi
          UUID=$(sudo blkid -s UUID -o value "$DEV")
          if ! grep -q "$UUID" /etc/fstab; then
              echo "UUID=$UUID /data ext4 defaults,nofail,x-systemd.device-timeout=30 0 2" | sudo tee -a /etc/fstab
          fi
          sudo install -d -m 2775 -o ubuntu -g ubuntu /data/bot-data
          df -h /data
          REMOTE

      - name: Repo migration (rsync repo data -> /data/bot-data)
        if: ${{ inputs.mode == 'execute' }}
        run: |
          bash scripts/oci_vm_ssh.sh "cd $REPO_DIR && bash scripts/migrate_to_data_dir.sh --execute"

      - name: Migrate journal DB (stops services, copies, leaves stopped)
        if: ${{ inputs.mode == 'execute' }}
        run: |
          # Idempotent: no-op if destination DB is newer than source
          # (re-runs after a successful migration just pass through).
          # On integrity_check failure the script restarts services on
          # the old path so the trader stays alive.
          bash scripts/oci_vm_ssh.sh "cd $REPO_DIR && sudo -E bash scripts/migrate_journal_db.sh"

      - name: Install systemd DATA_DIR drop-ins
        if: ${{ inputs.mode == 'execute' }}
        run: |
          bash scripts/oci_vm_ssh.sh 'bash -s' <<'REMOTE'
          set -euo pipefail
          SRC=/home/ubuntu/ict-trading-bot/deploy/dropins/data-dir.conf
          # Gate on the unit file existing on disk (matches the same
          # gate migrate_journal_db.sh uses to decide whether to stop
          # the service). Do NOT gate on `systemctl is-enabled` —
          # `is-enabled` returns exit 1 for "linked" units (those
          # installed via `systemctl link <abs-path>` rather than
          # `enable`), which on this VM applies to ict-web-api and
          # ict-claude-bridge. Run #6 silently skipped them, leaving
          # both inactive after migrate_journal_db.sh stopped them
          # for the DB copy. The list-unit-files gate is the right
          # one — if the unit file exists at all, it's installed enough
          # to be the target of a restart.
          for svc in ict-trader-live ict-web-api ict-claude-bridge; do
              if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
                  sudo install -d "/etc/systemd/system/${svc}.service.d"
                  sudo install -m 0644 "$SRC" "/etc/systemd/system/${svc}.service.d/data-dir.conf"
              fi
          done
          sudo systemctl daemon-reload
          # Restart picks up the new env vars (DATA_DIR + TRADE_JOURNAL_DB).
          # If migrate_journal_db.sh just stopped these services, the
          # restart is a clean cold-start onto the new DB path.
          # `systemctl start` is idempotent — no-op on a running unit,
          # cold-start on a stopped one. `restart` is also fine but
          # `start` is the more conservative verb when we know some
          # units are intentionally stopped by the previous step.
          for svc in ict-trader-live ict-web-api ict-claude-bridge; do
              if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
                  sudo systemctl restart "$svc" || true
              fi
          done
          # Belt-and-braces: if any of the three is still inactive
          # after restart (e.g. unit refused to start), fail loudly
          # so the workflow doesn't quietly leave the trader half-up.
          for svc in ict-trader-live ict-web-api ict-claude-bridge; do
              if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
                  state=$(systemctl is-active "$svc" 2>&1 || true)
                  if [ "$state" != "active" ]; then
                      echo "::error::$svc is $state after restart attempt" >&2
                      systemctl status --no-pager "$svc" || true
                      journalctl -u "$svc" -n 50 --no-pager || true
                      exit 5
                  fi
              fi
          done
          REMOTE

      - name: Verify
        if: ${{ inputs.mode == 'execute' }}
        run: |
          bash scripts/oci_vm_ssh.sh "cd $REPO_DIR && bash scripts/verify_storage_setup.sh"

      - name: Summary
        if: always()
        run: |
          {
            echo "## oci-storage run"
            echo "- mode: \`${{ inputs.mode }}\`"
            echo "- volume: \`$OCI_VOLUME_NAME\` (${{ inputs.volume_size_gb }} GB, $OCI_AVAILABILITY_DOMAIN)"
            echo "- instance: \`$VM_INSTANCE_OCID\` ($VM_HOST)"
          } >> "$GITHUB_STEP_SUMMARY"
