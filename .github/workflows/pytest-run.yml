name: pytest-run

# Executes the test suite on every PR (and on push to main).
#
# This is the companion to `pytest-collect`, which only *imports* the
# test tree (`--collect-only`) and never runs a single assertion. That
# collect-only gate let real regressions through whenever the broken
# code still imported cleanly — e.g. the system-action allowlist guard
# silently drifting to 14/30 actions, the dead `_RUNTIME_LOGS` test
# fixture, and the shadow-prediction wiring gap (all had green CI).
# `pytest-run` closes that hole by actually executing the suite.
#
# **REQUIRED (blocking) as of 2026-05-22.** It shipped advisory first
# (the suite had never run in CI, so its pass/fail state on `main` was
# unknown — shipping advisory surfaced that without a wall of red), then
# was promoted by adding `"pytest-run"` to `branch-protection-sync.yml`'s
# `REQUIRED_CONTEXTS` (#1721) once the baseline went green on `main`:
# #1658-1667 cleared the failure backlog, #1681 the order-dependent +
# post-IB-merge regressions, #1717 the non-root sudo-stub fix that failed
# only on the CI runner. Same advisory→blocking path `pytest-collect`
# followed in S-045.
#
# `tests/test_main_loop.py` is excluded for the same reason
# `pytest-collect` excludes it: it imports the live trading entrypoint
# (`src.main`) and is not sandbox/CI-safe. See CLAUDE.md "Default
# verification". Any other module that proves CI-unsafe should be fixed,
# not blanket-ignored — add a narrow `--ignore` with a comment if truly
# unavoidable.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Real execution (no --collect-only, no `|| true`): the job
          # reports honest pass/fail so the advisory signal is truthful.
          # --ignore=tests/test_main_loop.py mirrors pytest-collect: that
          # module imports the live trading entrypoint.
          # --junitxml feeds the failure-summary step below so the failing
          # test names land in the GitHub job summary. The run log is not
          # readable from a web Claude session, so without this a failure is
          # a multi-round guess (the 2026-05-28 time-bomb-test incident: a
          # clock-relative insights test reddened pytest-run and it took a
          # full local-repro to name it).
          pytest -q tests/ \
            --ignore=tests/test_main_loop.py \
            --junitxml=pytest-report.xml

      - name: Summarize failing tests in the job summary
        if: failure()
        run: |
          # Parse the JUnit report into the Checks-tab job summary so the
          # culprit test(s) are visible in one click — no log-diving, no
          # local repro. Always exits 0 so it never masks the real failure.
          python3 - >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import glob, html, sys, xml.etree.ElementTree as ET

          print("### pytest-run failures\n")
          reports = glob.glob("pytest-report.xml")
          if not reports:
              print("_No JUnit report produced — the job failed before tests ran "
                    "(collection / import / dependency error). See the raw step log._")
              sys.exit(0)

          fails = []
          for path in reports:
              try:
                  root = ET.parse(path).getroot()
              except ET.ParseError:
                  continue
              for tc in root.iter("testcase"):
                  bad = tc.find("failure")
                  if bad is None:
                      bad = tc.find("error")
                  if bad is None:
                      continue
                  name = "::".join(p for p in (tc.get("classname"), tc.get("name")) if p)
                  lines = (bad.get("message") or "").strip().splitlines()
                  fails.append((name, lines[0] if lines else ""))

          if not fails:
              print("_JUnit report listed no failing testcases — the job likely "
                    "failed at a non-test step._")
          else:
              print(f"**{len(fails)} failing test(s):**\n")
              for name, msg in fails:
                  print(f"- `{name}` — {html.escape(msg)[:200]}")
          PY
