name: trainer-vm-logs

# One-shot diagnostic: SSHes into the trainer VM, collects backtest
# and system logs, and comments them on a target issue.
#
# Trigger: workflow_dispatch only.
# Required secret: VM_SSH_KEY

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to post logs on (default 1056)"
        default: "1056"

permissions:
  contents: read
  issues: write

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up SSH
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 158.178.209.121 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Collect logs from trainer VM
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              ubuntu@158.178.209.121 bash <<'REMOTE' > vm-logs.txt 2>&1
          set -x

          echo "=== ROLE MARKER ==="
          cat /etc/ict-trainer-vm.role 2>/dev/null || echo MISSING

          echo "=== GIT STATUS ==="
          cd /home/ubuntu/ict-trading-bot 2>/dev/null && git log --oneline -5 || echo "repo not found"

          echo "=== VENV CHECK ==="
          ls -la /home/ubuntu/ict-trading-bot/.venv/bin/python 2>/dev/null || echo "no .venv"

          echo "=== BACKTEST ERROR LOG ==="
          cat /tmp/vwap_bt_err.txt 2>/dev/null || echo "(not found)"

          echo "=== BACKTEST RESULT JSON ==="
          cat /tmp/backtest_result.json 2>/dev/null || echo "(not found)"

          echo "=== FRESH CSV STATUS ==="
          ls -lh /tmp/backtest_fresh.csv 2>/dev/null || echo "(not found)"

          echo "=== DISK SPACE ==="
          df -h /tmp /home 2>/dev/null

          echo "=== RECENT PYTHON PROCESSES ==="
          ps aux | grep python | grep -v grep || echo "none running"

          echo "=== LAST 30 LINES SYSLOG ==="
          tail -30 /var/log/syslog 2>/dev/null || journalctl -n 30 --no-pager 2>/dev/null || echo "no syslog"
          REMOTE

      - name: Post logs as issue comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const logs = fs.readFileSync('vm-logs.txt', 'utf8');
            const issueNum = parseInt('${{ inputs.issue_number }}', 10) || 1056;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `**Trainer VM diagnostic logs** (run: ${runUrl})\n\n\`\`\`\n${logs.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              body,
            });
