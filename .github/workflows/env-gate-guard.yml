name: Env-gate guard

# Pings the operator (and fails the PR check) when a pull request adds
# an env-var read in a protected source path whose name matches the
# BUG-039 suspect patterns (MULTI_ACCOUNT_*, MONITOR_*, DISPATCH_*,
# *_APPLY_TO_*, *_DRY_*, *_ENABLED) without an explicit
# `# allow-silent: <reason>` justification.
# See scripts/check_env_gate_in_diff.py and
# docs/audits/env-gate-purge-2026-05-10.md.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# REQUIRED status check — trigger can never carry `paths:` (would leave
# the check permanently "pending" on a non-matching PR). A PR touching
# no `.py`/`.sh` file skips the scan step below (no pip install here to
# save, so the win is small — see PR body).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  env-gate-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff against base
        # See note in dry-run-guard.yml — the previous `--depth=1`
        # shallowed origin/main and broke the three-dot merge-base.
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}"...HEAD > /tmp/pr.diff
          wc -l /tmp/pr.diff

      - name: Determine relevance
        id: changed
        run: |
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if echo "$FILES" | grep -Eq '\.py$|\.sh$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .py/.sh changes — skipping the scan (short-circuit, MB-20260706-CI-MINUTES)."
          fi

      - name: Scan for new env-gates in protected paths
        id: scan
        if: steps.changed.outputs.relevant == 'true'
        run: |
          set +e
          python scripts/check_env_gate_in_diff.py /tmp/pr.diff
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Notify operator on hit
        if: steps.changed.outputs.relevant == 'true' && steps.scan.outputs.exit != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Telegram secrets not configured; skipping ping."
            exit 0
          fi
          MESSAGE=$(cat <<EOF
          🚨 env-gate guard: PR #${{ github.event.pull_request.number }}
          ${{ github.event.pull_request.html_url }}
          An env-var matching the BUG-039 suspect patterns was added.
          Either remove it (RiskManager.dry_run is the only switch),
          or add an explicit \`# allow-silent: <reason>\` comment.
          See docs/audits/env-gate-purge-2026-05-10.md.
          EOF
          )
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" >/dev/null

      - name: Fail the check on hit
        if: steps.changed.outputs.relevant == 'true' && steps.scan.outputs.exit != '0'
        run: |
          echo "::error::env-gate guard tripped — see job output."
          exit 1
