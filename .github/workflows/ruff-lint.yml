name: ruff-lint

# Lints the repo with ruff. As of S-045 (PR #438) the workflow uses
# ruff's default rule set against everything not excluded in
# `ruff.toml` (currently: `*.ipynb`).
#
# **Pre-S-045**: workflow ran `ruff check . --select E9,F63,F7` because
# main carried 286 hits across the broader rule set. S-045 walked the
# rules one-per-commit (T3a F541 → T3b E401 → T3c F811 → T3d F841 →
# T3e F401 → T3f E402 → T3g E741 → T3h F821 → T3 cleanup E731+E701)
# and brought the count to zero on every non-operator-hold path.
# Operator-hold residuals are explicitly suppressed via
# `[lint.per-file-ignores]` in `ruff.toml`, with a comment block
# tracking the ping-PR backlog.
#
# When the operator approves the residual fixes, remove the
# matching entries from `ruff.toml` in the same PR.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff (default rule set)
        run: ruff check .
