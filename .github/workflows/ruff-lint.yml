name: ruff-lint

# Lints the repo with ruff. As of S-045 (PR #438) the workflow uses
# ruff's default rule set against everything not excluded in
# `ruff.toml` (currently: `*.ipynb`).
#
# **Pre-S-045**: workflow ran `ruff check . --select E9,F63,F7` because
# main carried 286 hits across the broader rule set. S-045 walked the
# rules one-per-commit (T3a F541 → T3b E401 → T3c F811 → T3d F841 →
# T3e F401 → T3f E402 → T3g E741 → T3h F821 → T3 cleanup E731+E701)
# and brought the count to zero on every non-operator-hold path.
# Operator-hold residuals are explicitly suppressed via
# `[lint.per-file-ignores]` in `ruff.toml`, with a comment block
# tracking the ping-PR backlog.
#
# When the operator approves the residual fixes, remove the
# matching entries from `ruff.toml` in the same PR.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# this is a REQUIRED status check, so its trigger can NEVER carry a
# `paths:` filter (would leave the check permanently "pending" on a
# non-matching PR). Instead the job always runs (cheap: checkout +
# `git diff --name-only`) but skips the dev-dependency install + the
# `ruff check` itself when no `.py` file changed — ruff has nothing new
# to say about a docs-only / config-only diff. See "Determine relevant
# changed files" below.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine relevant changed files
        id: changed
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --quiet
            RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "relevant=true" >> "$GITHUB_OUTPUT"
              echo "::notice::No prior commit to diff against — running the full check."
              exit 0
            fi
            RANGE="$BEFORE...${{ github.sha }}"
          fi
          FILES=$(git diff --name-only $RANGE || true)
          echo "Changed files ($RANGE):"
          echo "$FILES"
          if echo "$FILES" | grep -Eq '\.py$|ruff\.toml$|requirements-dev\.txt$|\.github/workflows/ruff-lint\.yml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .py files / ruff config changed — skipping ruff (short-circuit, MB-20260706-CI-MINUTES)."
          fi

      - name: Set up Python 3.11
        if: steps.changed.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        if: steps.changed.outputs.relevant == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff (default rule set)
        if: steps.changed.outputs.relevant == 'true'
        run: ruff check .
