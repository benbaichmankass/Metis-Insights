name: gpu-burst-train
# M19 Tier-1 — ledger-gated, teardown-guaranteed spot-GPU burst training.
#
# Trigger: open an issue labelled `gpu-burst-train` whose body is:
#     experiment: T1.1 deep-head bake-off
#     est_cost: 0.40
#     train_cmd: python -m ml train <manifest> ...
#     max_minutes: 90
#
# Safety (why this cannot spend by accident):
#   1. PREFLIGHT — reads comms/gpu_spend_ledger.json; ABORTS if
#      month-to-date + est_cost > the $10 monthly cap.
#   2. ARM GATE — even past preflight, nothing launches unless the repo variable
#      GPU_BURST_ARMED == '1'. Unarmed = a **dry preflight only** (budget check +
#      comment, ZERO spend). Set it to 1 only after a provider adapter is verified.
#   3. run_burst.sh launches the ONLY pod, tears it down in a bash EXIT trap, and
#      currently aborts (adapter pending) — so it can't spend even if armed early.
#   4. RECORD — the actual billed cost is appended to the ledger + committed, so
#      the dashboard GPU-spend panel shows every session's cost.
#
# Required (when armed): a provider API key secret (e.g. RUNPOD_API_KEY) + the repo
# var GPU_PROVIDER. Required label: gpu-burst-train (bootstrap-labels.yml).
on:
  issues:
    types: [opened]

permissions:
  contents: write   # commit the updated ledger
  issues: write     # comment back on the issue

# Concurrency is evaluated at the WORKFLOW level, BEFORE the job `if` label
# filter — so a naive fixed group put EVERY issues.opened event (diag-relay,
# system-action, trainer-diag, …) into the same group. With only one pending
# slot per group, an unrelated issue opening while a real burst was queued
# silently CANCELLED the queued burst (BL-20260706-GPU-BURST-CONCURRENCY-CANCEL:
# arm B #5642 cancelled by the #5643 trainer-diag skip-run). Fix: only actual
# gpu-burst-train-labelled runs share the serializing group (so two real bursts
# still can't run at once); every other issue gets a unique throwaway group
# (its own run id) and can never touch a queued burst.
concurrency:
  group: ${{ contains(github.event.issue.labels.*.name, 'gpu-burst-train') && 'gpu-burst-train' || format('gpu-burst-skip-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  burst:
    if: contains(github.event.issue.labels.*.name, 'gpu-burst-train')
    runs-on: ubuntu-latest
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
      GPU_PROVIDER: ${{ vars.GPU_PROVIDER }}
      GPU_BURST_ARMED: ${{ vars.GPU_BURST_ARMED }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue body
        id: parse
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, re
          body = os.environ.get("ISSUE_BODY", "") or ""
          def field(name, default=""):
              m = re.search(rf"^\s*{name}\s*:\s*(.+?)\s*$", body, re.MULTILINE | re.IGNORECASE)
              return m.group(1).strip() if m else default
          exp = field("experiment", "(unnamed)")
          est = field("est_cost", "0")
          try:
              est_f = max(0.0, float(est))
          except ValueError:
              est_f = 0.0
          verify = field("verify", "false").lower() in ("1", "true", "yes")
          probe = field("probe", "false").lower() in ("1", "true", "yes")
          print(f"experiment={exp}")
          print(f"est_cost={est_f}")
          print(f"max_minutes={field('max_minutes', '90')}")
          print(f"manifest={field('manifest', '')}")
          print(f"verify={'1' if verify else ''}")
          print(f"probe={'1' if probe else ''}")
          PY

      - name: Preflight — ledger spend-gate (no spend)
        id: preflight
        run: |
          python -m scripts.ml.gpu_burst.preflight \
            --est-cost "${{ steps.parse.outputs.est_cost }}" \
            --experiment "${{ steps.parse.outputs.experiment }}"

      - name: Arm gate
        id: arm
        run: |
          if [ "${GPU_BURST_ARMED:-}" = "1" ] && [ -n "${GPU_PROVIDER:-}" ]; then
            echo "armed=true" >> "$GITHUB_OUTPUT"
            echo "Armed (provider=$GPU_PROVIDER) — proceeding to launch."
          else
            echo "armed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GPU_BURST_ARMED != 1 (or GPU_PROVIDER unset) — DRY PREFLIGHT ONLY. No pod launched, no spend."
          fi

      - name: Burst — launch → build → train → return → teardown
        id: burst
        if: steps.arm.outputs.armed == 'true'
        env:
          EXPERIMENT: ${{ steps.parse.outputs.experiment }}
          EST_COST: ${{ steps.parse.outputs.est_cost }}
          MAX_MINUTES: ${{ steps.parse.outputs.max_minutes }}
          MANIFEST: ${{ steps.parse.outputs.manifest }}
          VERIFY: ${{ steps.parse.outputs.verify }}
          PROBE: ${{ steps.parse.outputs.probe }}
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_SSH_KEY: ${{ secrets.RUNPOD_SSH_KEY }}
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
        run: bash scripts/ml/gpu_burst/run_burst.sh

      # Persist the trained model bundle (model_state + metrics) WITHOUT committing
      # a multi-MB blob to git — an on-pod train writes it under the mirror dir.
      - name: Upload trained model bundle
        if: steps.arm.outputs.armed == 'true' && steps.burst.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gpu-burst-model-${{ github.run_id }}
          path: runtime_logs/trainer_mirror/gpu_burst/
          if-no-files-found: ignore
          retention-days: 30

      # Deliver the trained bundle to the TRAINER VM (the canonical registry-store
      # owner) and register it there at `candidate` stage, so it shows up on the
      # dashboard Models page via the trainer's ~2-min mirror publish. Bundle rides
      # SSH (git stays clean); the ingest FORCES candidate — never shadow — so a
      # burst model influences nothing until an operator promotes it. Best-effort:
      # a delivery failure never fails the burst (the model is already trained + the
      # bundle is uploaded as an artifact for a manual retry).
      - name: Deliver + register bundle on the trainer
        if: steps.arm.outputs.armed == 'true' && steps.burst.outcome == 'success'
        continue-on-error: true
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          TRAINER_IP: ${{ vars.TRAINER_VM_IP || '158.178.209.121' }}
          TRAINER_USER: ${{ vars.TRAINER_VM_USER || 'ubuntu' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          shopt -s nullglob
          bundles=(runtime_logs/trainer_mirror/gpu_burst/*.bundle.json)
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "::notice::no model bundle produced (verify/probe run?) — nothing to register."
            exit 0
          fi
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::warning::VM_SSH_KEY unset — bundle uploaded as artifact only, not registered."
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/trainer_key && chmod 600 ~/.ssh/trainer_key
          ssh-keyscan -t ed25519,ecdsa,rsa "${TRAINER_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSHOPTS="-i $HOME/.ssh/trainer_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
          REPO="/home/ubuntu/ict-trading-bot"
          INBOX="${REPO}/runtime_logs/gpu_burst_inbox"
          # shellcheck disable=SC2086
          ssh $SSHOPTS "${TRAINER_USER}@${TRAINER_IP}" "mkdir -p ${INBOX}"
          for b in "${bundles[@]}"; do
            name="$(basename "$b")"
            # shellcheck disable=SC2086
            scp $SSHOPTS "$b" "${TRAINER_USER}@${TRAINER_IP}:${INBOX}/${name}"
            # shellcheck disable=SC2086
            ssh $SSHOPTS "${TRAINER_USER}@${TRAINER_IP}" \
              "cd ${REPO} && { [ -f .venv/bin/activate ] && . .venv/bin/activate || true; } && \
               GITHUB_SHA='${GITHUB_SHA}' python -m scripts.ml.gpu_burst.ingest_bundle \
                 --bundle '${INBOX}/${name}' \
                 --registry-root '${REPO}/ml/registry-store' \
                 --experiments-root '${REPO}/ml/experiments-runs' \
                 --code-revision '${GITHUB_SHA}'" \
              && echo "registered ${name} on the trainer (candidate)" \
              || echo "::warning::trainer-side ingest of ${name} failed — see artifact for manual retry."
          done
          rm -f ~/.ssh/trainer_key

      - name: Record cost + commit ledger
        id: ledger
        if: steps.arm.outputs.armed == 'true' && steps.burst.outcome == 'success'
        run: |
          python -m scripts.ml.gpu_burst.record_run \
            --run-id "gpu-${{ github.run_id }}" \
            --experiment "${{ steps.parse.outputs.experiment }}" \
            --gpu-type "${{ steps.burst.outputs.gpu_type }}" \
            --gpu-hours "${{ steps.burst.outputs.gpu_hours }}" \
            --rate "${{ steps.burst.outputs.rate }}" \
            --cost "${{ steps.burst.outputs.cost }}" \
            --ended "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --status completed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comms/gpu_spend_ledger.json
          git commit -m "chore(gpu-spend): record burst gpu-${{ github.run_id }} (${{ steps.parse.outputs.experiment }})" \
            || { echo "no ledger change"; echo "pushed=noop" >>"$GITHUB_OUTPUT"; exit 0; }
          # Robust push (BL-20260706-GPU-BURST-LEDGER-PUSH-RACE). Two failure
          # modes were dropping billed rows — the ledger is the SPEND-GATE input,
          # so a silent drop under-counts spend and defeats the $10 cap:
          #   (a) non-fast-forward RACE when main advanced mid-burst → rebase our
          #       single ledger commit onto the fresh main and retry;
          #   (b) GH006 protected-branch block (main requires status checks even
          #       for github-actions[bot]) → NOT retryable from here; preserve the
          #       row as an artifact (next step) so it's recoverable, never lost.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main 2>push.err; then pushed=true; break; fi
            echo ">>> push attempt ${attempt} failed:"; cat push.err
            if grep -qiE 'fetch first|non-fast-forward|rejected.*(fetch|remote)' push.err; then
              git fetch origin main || true
              git rebase origin/main || { git rebase --abort || true; break; }
              continue
            fi
            # Non-race failure (branch protection / auth) — no point retrying.
            break
          done
          if [ "$pushed" = true ]; then
            echo "pushed=true" >>"$GITHUB_OUTPUT"
            echo ">>> ledger row pushed to main."
          else
            echo "pushed=false" >>"$GITHUB_OUTPUT"
            echo "::warning::ledger push to main failed (branch protection GH006 or persistent race). Preserving the row as an artifact for recovery — see BL-20260706-GPU-BURST-LEDGER-PUSH-RACE. Terminal fix needs the operator to add this workflow's actor to the main branch-protection bypass allowlist (or relocate the ledger off protected main)."
            cp comms/gpu_spend_ledger.json gpu_spend_ledger_unpushed.json
          fi

      - name: Preserve unpushed ledger row (recovery artifact)
        if: steps.ledger.outputs.pushed == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: gpu-spend-ledger-unpushed-${{ github.run_id }}
          path: gpu_spend_ledger_unpushed.json
          retention-days: 90
          if-no-files-found: warn

      - name: Comment back
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const armed = "${{ steps.arm.outputs.armed }}" === "true";
            const exp = "${{ steps.parse.outputs.experiment }}";
            const est = "${{ steps.parse.outputs.est_cost }}";
            const cost = "${{ steps.burst.outputs.cost }}" || "—";
            const body = armed
              ? `🖥️ **GPU burst** — \`${exp}\`\nOutcome: \`${{ steps.burst.outcome }}\` · billed: **$${cost}** (est $${est}). Cost appended to the ledger — see the dashboard GPU-spend panel.`
              : `🧮 **GPU burst — dry preflight only** for \`${exp}\` (est $${est}).\nBudget gate passed; **no pod launched, no spend** (GPU_BURST_ARMED≠1 or GPU_PROVIDER unset). Arm it once a provider adapter is verified.`;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, state: "closed" });
