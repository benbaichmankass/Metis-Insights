name: macro-valuation-snapshot

# M28 P1 — the off-VM FRED valuation-snapshot PRODUCER runner.
#
# Runs scripts/macro/valuation_snapshot_produce.py on a GitHub-hosted runner on a
# daily cadence and appends the point-in-time log
# (comms/macro/valuation_snapshots.jsonl) to `main`. The live sleeve reads it via
# `valuation_store.read_latest_snapshots()` (git-synced onto the live VM); the M28
# P4 value-thesis gate replays the accrued history from `main`.
#
# HOW IT LANDS ON PROTECTED main (BL-20260723-WORKFLOW-COMMIT-TO-PROTECTED-MAIN /
# BL-20260706-GPU-BURST-LEDGER-PUSH-RACE):
#   `main` is branch-protected with required status checks and rejects a direct
#   workflow push (`GH006`). This job checks out with the BRANCH_PROTECTION_TOKEN
#   PAT and hands off to the reusable `./.github/actions/commit-to-main` composite
#   action, which opens a PAT-authored auto-merge PR — the PAT makes the required
#   on:pull_request checks actually run (a GITHUB_TOKEN-opened PR would not), they
#   pass, and the PR squash-merges. `main` protection stays fully intact.
#
# HOW THE P4 GATE CONSUMES IT (once history accrues):
#   python scripts/macro/thesis_backtest_run.py \
#     --snapshots comms/macro/valuation_snapshots.jsonl --candles-dir ...
#
# Why off-VM (not the live trader or a VM timer):
#   - The FRED fetch is off-VM-guarded (fred_adapter refuses the network unless
#     ICT_OFFVM_BUILD_HOST is set) precisely so the money box never opens a FRED
#     socket. This runner sets ICT_OFFVM_BUILD_HOST=1 on a hosted runner — no SSH
#     to the live VM, no live-VM network touch.
#   - FRED fredgraph.csv is FREE + KEYLESS — no secret needed (the PAT is only for
#     the auto-merge PR, not for FRED).
#
# Point-in-time discipline: the log is append-only. Each run checks out main's
# current file and appends one line per (symbol, metric) stamped with the run's
# observed_at (a revised macro value is a NEW line, never an overwrite). The
# concurrency group serializes runs so two appends can't race the same base.
#
# Triggers:
#   1. schedule          — daily 07:30 UTC (after FRED's daily series publish; a
#                          cadence-daily macro read is plenty for a weeks-horizon
#                          value sleeve).
#   2. workflow_dispatch — operator "Run workflow" (seed the first snapshots / a
#                          manual top-up).
#   3. issues.opened w/ label `macro-valuation-snapshot-now` — the Claude-driven
#      path (a web session can't dispatch a workflow, but can open a labelled
#      issue). Owner-authored only.
#
# Tier-1: observability producer, no order path, no live-VM mutation, no secret.

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: macro-valuation-snapshot
  cancel-in-progress: false

jobs:
  produce:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.login == github.repository_owner &&
       contains(github.event.issue.labels.*.name, 'macro-valuation-snapshot-now'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # PAT so the auto-merge PR opened below triggers the required checks.
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip "pyyaml>=6.0"

      - name: Produce valuation snapshots (off-VM FRED fetch)
        id: produce
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -euo pipefail
          # Appends to main's current comms/macro/valuation_snapshots.jsonl (the
          # producer creates the dir/file on the first run).
          python scripts/macro/valuation_snapshot_produce.py \
            --path comms/macro/valuation_snapshots.jsonl \
            --json /tmp/valuation_produce_summary.json
          {
            echo "summary<<EOF"
            cat /tmp/valuation_produce_summary.json
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Land the appended log on main (auto-merge PR)
        id: commit
        uses: ./.github/actions/commit-to-main
        with:
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          paths: comms/macro/valuation_snapshots.jsonl
          message: "chore(m28): valuation snapshots"
          pr-title: "chore(m28): valuation snapshots (auto)"
          pr-body: "Automated point-in-time valuation-snapshot append (macro-valuation-snapshot producer). Data-only; auto-merge."
          branch-prefix: automation/valuation-snapshots

      - name: Comment + close issue (issue-driven path)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = process.env.SUMMARY || '(no summary captured)';
            const committed = process.env.COMMITTED || 'unknown';
            const pr = process.env.PR || '';
            const body = [
              '🟢 **macro-valuation-snapshot** run complete.',
              '',
              '```json',
              summary.trim(),
              '```',
              '',
              committed === 'true'
                ? `landed via auto-merge PR: ${pr}`
                : 'no snapshot change this run (nothing to commit).',
              '',
              '---',
              '_Generated by [Claude Code](https://claude.ai/code)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed',
            });
        env:
          SUMMARY: ${{ steps.produce.outputs.summary }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
          PR: ${{ steps.commit.outputs.pr }}
