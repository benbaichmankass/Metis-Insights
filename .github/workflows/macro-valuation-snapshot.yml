name: macro-valuation-snapshot

# M28 P1 — the off-VM FRED valuation-snapshot PRODUCER runner.
#
# Runs scripts/macro/valuation_snapshot_produce.py on a GitHub-hosted runner on a
# daily cadence and accumulates the append-only point-in-time log
# (comms/macro/valuation_snapshots.jsonl) on the dedicated, UNPROTECTED data branch
# `automation/valuation-snapshots`. The M28 P4 value-thesis gate replays the
# accrued history from that branch (`--snapshots`, see below).
#
# WHY A DATA BRANCH, NOT main (BL-20260706-GPU-BURST-LEDGER-PUSH-RACE):
#   `main` is branch-protected with required status checks, so a GitHub-hosted
#   workflow CANNOT direct-push to it (`GH006: N of N required status checks are
#   expected`) — the same wall that silently drops the gpu-burst spend-ledger row.
#   So this producer accrues its data on an unprotected branch (a direct force-push
#   there is allowed) instead. Landing the snapshots on `main` itself — which the
#   live sleeve's `valuation_store.read_latest_snapshots()` reads via `ict-git-sync`
#   — is the deferred durable fix (needs an operator/admin action: a branch-protection
#   push-allowance for Actions-bot `comms/**` data commits, or a write-scoped PAT so
#   the workflow can open an auto-merging PR whose checks trigger). That fix ALSO
#   resolves the gpu-burst ledger bug; tracked in the health-review backlog. Until
#   then the live macro-thesis sleeve is observe-only (no order path), so deferring
#   the main path strands no live capability — the P4 research gate is the consumer.
#
# HOW THE P4 GATE CONSUMES IT (once history accrues):
#   git fetch origin automation/valuation-snapshots
#   git show origin/automation/valuation-snapshots:comms/macro/valuation_snapshots.jsonl > /tmp/snap.jsonl
#   python scripts/macro/thesis_backtest_run.py --snapshots /tmp/snap.jsonl --candles-dir ...
#
# Why off-VM (not the live trader or a VM timer):
#   - The FRED fetch is off-VM-guarded (fred_adapter refuses the network unless
#     ICT_OFFVM_BUILD_HOST is set) precisely so the money box never opens a FRED
#     socket. This runner sets ICT_OFFVM_BUILD_HOST=1 on a hosted runner — no SSH
#     to the live VM, no live-VM network touch.
#   - FRED fredgraph.csv is FREE + KEYLESS — no secret needed.
#
# Point-in-time discipline: the log is append-only. Each run restores the branch's
# accumulated file, appends one line per (symbol, metric) stamped with the run's
# observed_at (a revised macro value is a NEW line, never an overwrite), and
# force-pushes the branch — history is preserved by the restore-then-append, so the
# force-push only rewrites the carrier commit, never drops accrued rows.
#
# Triggers:
#   1. schedule          — daily 07:30 UTC (after FRED's daily series publish; a
#                          cadence-daily macro read is plenty for a weeks-horizon
#                          value sleeve).
#   2. workflow_dispatch — operator "Run workflow" (seed the first snapshots / a
#                          manual top-up).
#   3. issues.opened w/ label `macro-valuation-snapshot-now` — the Claude-driven
#      path (a web session can't dispatch a workflow, but can open a labelled
#      issue). Owner-authored only.
#
# Tier-1: observability producer, no order path, no live-VM mutation, no secret.

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: macro-valuation-snapshot
  cancel-in-progress: false

jobs:
  produce:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.login == github.repository_owner &&
       contains(github.event.issue.labels.*.name, 'macro-valuation-snapshot-now'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip "pyyaml>=6.0"

      - name: Restore accumulated history from the data branch
        env:
          DATA_BRANCH: automation/valuation-snapshots
          SNAP: comms/macro/valuation_snapshots.jsonl
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$SNAP")"
          # Seed the working file from the data branch's accumulated log so the
          # producer APPENDS to full history (not to main's empty file). First run:
          # the branch/file doesn't exist yet → start fresh.
          git fetch origin "$DATA_BRANCH" || true
          if git show "origin/${DATA_BRANCH}:${SNAP}" > "$SNAP" 2>/dev/null; then
            echo "restored $(wc -l < "$SNAP") accumulated record(s) from ${DATA_BRANCH}"
          else
            : > "$SNAP"
            echo "no existing ${DATA_BRANCH} history — starting fresh"
          fi

      - name: Produce valuation snapshots (off-VM FRED fetch)
        id: produce
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -euo pipefail
          python scripts/macro/valuation_snapshot_produce.py \
            --path comms/macro/valuation_snapshots.jsonl \
            --json /tmp/valuation_produce_summary.json
          {
            echo "summary<<EOF"
            cat /tmp/valuation_produce_summary.json
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit + push to the data branch
        id: commit
        env:
          DATA_BRANCH: automation/valuation-snapshots
          SNAP: comms/macro/valuation_snapshots.jsonl
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$SNAP"
          if git diff --cached --quiet; then
            echo "no snapshot change to commit"
            echo "pushed=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git commit -m "chore(m28): valuation snapshots ${TS} [skip ci]"
          # Force-push to the UNPROTECTED data branch. `main` is branch-protected
          # (required checks) so a workflow can't direct-push there — see the header.
          # The restore-then-append step above rebuilds full history first, so the
          # force-push only rewrites the single carrier commit, never drops rows.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push --force origin "HEAD:${DATA_BRANCH}" 2>push.err; then pushed=true; break; fi
            echo ">>> push attempt ${attempt} failed:"; cat push.err
            sleep "$attempt"
          done
          if [ "$pushed" = true ]; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "::error::failed to push valuation snapshots to ${DATA_BRANCH} after retries"
            exit 1
          fi

      - name: Comment + close issue (issue-driven path)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = process.env.SUMMARY || '(no summary captured)';
            const pushed = process.env.PUSHED || 'unknown';
            const body = [
              '🟢 **macro-valuation-snapshot** run complete.',
              '',
              '```json',
              summary.trim(),
              '```',
              '',
              `push: \`${pushed}\``,
              '',
              '---',
              '_Generated by [Claude Code](https://claude.ai/code)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed',
            });
        env:
          SUMMARY: ${{ steps.produce.outputs.summary }}
          PUSHED: ${{ steps.commit.outputs.pushed }}
