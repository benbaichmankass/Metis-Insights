name: stop-micro-zombie
# Stop the ZOMBIE bot still running on the retired x86 micro (158.178.210.252).
#
# After the 2026-06-14 live→Ampere cutover the micro's services were left
# running. The micro still ticks ict-trader-live with the real bybit_2 key, but
# its egress IP (158.178.210.252) was dropped from the Bybit API-key allowlist,
# so every authed bybit_2 call fails with ErrCode 10010 "Unmatched IP" and the
# micro spams the shared Telegram channel. The new Ampere VM (141.145.193.91) is
# the real, healthy live trader; the micro is a duplicate to silence.
#
# This SSHes to the micro and STOPS + DISABLES the bot units (incl. the
# liveness-watchdog + git-sync timers that would otherwise resurrect the
# trader), then reports each unit's is-active state. The micro VM itself is left
# RUNNING as the rollback target (operator decision). Rollback = re-enable the
# units + re-add 158.178.210.252 to the Bybit allowlist.
#
# Trigger: workflow_dispatch, or an issue labeled `stop-micro-zombie`.
# Secrets: VM_SSH_KEY. Result posted as an issue comment.

on:
  workflow_dispatch:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: stop-micro-zombie
  cancel-in-progress: false

jobs:
  stop:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'stop-micro-zombie'))
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      MICRO_HOST: 158.178.210.252
      MICRO_USER: ubuntu
    steps:
      - name: Dedup — bail if a bot comment already exists
        if: github.event_name == 'issues'
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100,
            });
            core.setOutput('skip',
              comments.some(c => c.user && c.user.login === 'github-actions[bot]') ? 'true' : 'false');

      - name: Set up SSH key
        if: steps.dedup.outputs.skip != 'true'
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          [ -z "${VM_SSH_KEY}" ] && { echo "::error::VM_SSH_KEY unset"; exit 1; }
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${MICRO_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Stop + disable the zombie bot units on the micro
        if: steps.dedup.outputs.skip != 'true'
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 "${MICRO_USER}@${MICRO_HOST}" 'bash -s' > out.txt 2>&1 <<'REMOTE'
          set +e
          echo "host: $(hostname)  ip(self): $(curl -4 -sS --max-time 6 https://api.ipify.org || echo '?')"
          echo

          # Timers first so they can't auto-restart the trader, then the services.
          UNITS="ict-liveness-watchdog.timer ict-git-sync.timer ict-trader-live.service ict-web-api.service ict-telegram-bot.service ict-claude-bridge.service"

          echo "===== BEFORE ====="
          for u in $UNITS; do printf '%-34s %s\n' "$u" "$(systemctl is-active "$u" 2>&1)"; done
          echo

          echo "===== stop + disable ====="
          for u in $UNITS; do
            echo "--- $u ---"
            sudo systemctl disable --now "$u" 2>&1 | sed 's/^/  /'
          done
          echo

          echo "===== AFTER (should all be inactive/dead) ====="
          for u in $UNITS; do printf '%-34s %s\n' "$u" "$(systemctl is-active "$u" 2>&1)"; done
          echo "(done)"
          REMOTE
          echo "exit=$?"

      - name: Post result to issue
        if: github.event_name == 'issues' && steps.dedup.outputs.skip != 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let out = '(no output)';
            try { out = fs.readFileSync('out.txt','utf8'); } catch {}
            const body = ['**stop-micro-zombie** result', '', '```', out.slice(0,6000), '```'].join('\n');
            await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,body});
            await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:context.issue.number,state:'closed'});

      - name: Summary (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.dedup.outputs.skip != 'true'
        run: |
          { echo '```'; cat out.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
