name: Canonical config loaders

# Fails the PR check when a new hand-rolled parser for
# `config/accounts.yaml` is introduced outside the canonical module.
# See scripts/check_canonical_config_loaders.py for the detection
# logic and src/config/accounts_loader.py for the canonical reader.
#
# Motivation: the 2026-05-16 backfill bug (orphan recovery returned
# 0 rows because the script's hand-rolled YAML loader expected a
# list shape when the file is a dict) was the latest casualty of
# having nine independent parsers for one config file. This guard
# freezes the count at the two allowlisted readers.

# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# this is a REQUIRED status check, so its trigger can NEVER carry a
# `paths:` filter (would leave the check permanently "pending" on a
# non-matching PR). Instead the job always runs (cheap: checkout +
# `git diff --name-only`) but skips the guard script itself when no
# `.py` file / `config/accounts.yaml` changed — there can be no new
# hand-rolled parser without a changed `.py` file.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  canonical-config-loaders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine relevant changed files
        id: changed
        run: |
          set -e
          git fetch origin "${{ github.base_ref }}" --quiet
          RANGE="origin/${{ github.base_ref }}...HEAD"
          FILES=$(git diff --name-only $RANGE || true)
          echo "Changed files ($RANGE):"
          echo "$FILES"
          if echo "$FILES" | grep -Eq '\.py$|config/accounts\.yaml$|\.github/workflows/canonical-config-loaders\.yml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .py files / config/accounts.yaml changed — skipping the guard (short-circuit, MB-20260706-CI-MINUTES)."
          fi

      - name: Set up Python
        if: steps.changed.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run guard
        if: steps.changed.outputs.relevant == 'true'
        run: python scripts/check_canonical_config_loaders.py --list
