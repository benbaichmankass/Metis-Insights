name: Canonical config loaders

# Fails the PR check when a new hand-rolled parser for
# `config/accounts.yaml` is introduced outside the canonical module.
# See scripts/check_canonical_config_loaders.py for the detection
# logic and src/config/accounts_loader.py for the canonical reader.
#
# Motivation: the 2026-05-16 backfill bug (orphan recovery returned
# 0 rows because the script's hand-rolled YAML loader expected a
# list shape when the file is a dict) was the latest casualty of
# having nine independent parsers for one config file. This guard
# freezes the count at the two allowlisted readers.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  canonical-config-loaders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run guard
        run: python scripts/check_canonical_config_loaders.py --list
