name: vwap-backtest

# Issue-driven / dispatch trigger that SSHes into the TRAINER VM,
# fetches fresh 5m BTCUSDT data, runs the VWAP HTF-filter comparison
# backtest, and comments results back on the issue.
#
# Runs on the TRAINER VM (ict-trainer-vm, 158.178.209.121) — NOT the
# live trader VM — to avoid compute contention and keep backtest
# workloads isolated from live trading. A role-marker check
# (/etc/ict-trainer-vm.role == "training-center") guards every run.
#
# IMPORTANT: the data fetch step always pulls fresh candles from Bybit
# so results reflect current market conditions, not a stale historical
# CSV.  Default pool is the last 365 days (wide enough for random-
# window sampling across multiple market regimes).
#
# Two trigger paths:
#   1. issues.opened with label `vwap-backtest-trigger` (session-driven)
#   2. issues.opened with title starting `[vwap-backtest]` (label-free fallback)
#   3. workflow_dispatch (operator-click, produces artifact)
#
# Issue body (optional, all keys have defaults):
#   compare: true          # default true — run all configs
#   param_sweep: true      # 4×3 ENTRY×SL grid sweep (overrides compare/threshold_sweep)
#   days: 365              # trailing days of 5m data to fetch
#   start_date: 2026-02-01 # explicit start (overrides days)
#   end_date: 2026-05-13   # explicit end (default: today)
#   num_windows: 8         # random windows per config (0 = full range)
#   window_days: 30        # calendar days per window
#   htf_timeframe: 1h      # used only when compare: false
#   ema_period: 50         # used only when compare: false
#   band_pct: 0.02         # used only when compare: false
#
# Required secrets:
#   VM_SSH_KEY   — SSH private key (same key authorised on both VMs)
#
# Optional repo variables:
#   TRAINER_VM_SSH_HOST  — defaults to 158.178.209.121

on:
  workflow_dispatch:
    inputs:
      compare:
        description: "Run all HTF configs side-by-side"
        type: boolean
        default: true
      days:
        description: "Trailing days of 5m data to fetch (default 365)"
        default: "365"
      start_date:
        description: "Backtest start date YYYY-MM-DD (overrides days)"
        default: ""
      end_date:
        description: "Backtest end date YYYY-MM-DD (default: today)"
        default: ""
      num_windows:
        description: "Random windows per config (0 = full range, no sampling)"
        default: "8"
      window_days:
        description: "Calendar days per random window"
        default: "30"
      htf_timeframe:
        description: "HTF timeframe (15m, 1h, 4h, 1d) — used only when compare=false"
        default: "1h"
      ema_period:
        description: "EMA period — used only when compare=false"
        default: "50"
      band_pct:
        description: "Band pct (e.g. 0.02) — used only when compare=false"
        default: "0.02"
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: vwap-backtest-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  backtest:
    # Actor-guard on the issue path: owner (or repo automation) only. The title
    # fallback below is author-controlled, so without this any public user could
    # fire this SSH/secret-bearing job. AND-ed (restrict-only). (Security audit
    # 2026-06-28: docs/security/intrusion-surface-audit-2026-06-28.md.)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') && (
        contains(github.event.issue.labels.*.name, 'vwap-backtest-trigger') ||
        startsWith(github.event.issue.title, '[vwap-backtest]')
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Parse issue body
        if: github.event_name == 'issues'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          COMPARE=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^compare:' | awk '{print $2}' || true)
          DAYS=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^days:' | awk '{print $2}' || true)
          START_DATE=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^start_date:' | awk '{print $2}' || true)
          END_DATE=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^end_date:' | awk '{print $2}' || true)
          NUM_WINDOWS=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^num_windows:' | awk '{print $2}' || true)
          WINDOW_DAYS=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^window_days:' | awk '{print $2}' || true)
          HTF_TF=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^htf_timeframe:' | awk '{print $2}' || true)
          EMA_PERIOD=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^ema_period:' | awk '{print $2}' || true)
          BAND_PCT=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^band_pct:' | awk '{print $2}' || true)
          THRESHOLD_SWEEP=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^threshold_sweep:' | awk '{print $2}' || true)
          PARAM_SWEEP=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^param_sweep:' | awk '{print $2}' || true)
          ANCHOR_COMPARE=$(printf '%s' "${ISSUE_BODY}" | grep -m1 -i '^anchor_compare:' | awk '{print $2}' || true)

          [ -z "${COMPARE}" ]     && COMPARE="true"
          [ -z "${DAYS}" ]        && DAYS="365"
          [ -z "${START_DATE}" ]  && START_DATE=""
          [ -z "${END_DATE}" ]    && END_DATE=""
          [ -z "${NUM_WINDOWS}" ] && NUM_WINDOWS="8"
          [ -z "${WINDOW_DAYS}" ] && WINDOW_DAYS="30"
          [ -z "${HTF_TF}" ]      && HTF_TF="1h"
          [ -z "${EMA_PERIOD}" ]  && EMA_PERIOD="50"
          [ -z "${BAND_PCT}" ]    && BAND_PCT="0.02"
          [ -z "${THRESHOLD_SWEEP}" ] && THRESHOLD_SWEEP="false"
          [ -z "${PARAM_SWEEP}" ]     && PARAM_SWEEP="false"
          [ -z "${ANCHOR_COMPARE}" ]  && ANCHOR_COMPARE="false"

          if ! printf '%s' "${COMPARE}" | grep -qiE '^(true|false)$'; then COMPARE="true"; fi
          if ! printf '%s' "${DAYS}" | grep -qE '^[0-9]+$'; then DAYS="365"; fi
          if ! printf '%s' "${START_DATE}" | grep -qE '^([0-9]{4}-[0-9]{2}-[0-9]{2})?$'; then START_DATE=""; fi
          if ! printf '%s' "${END_DATE}" | grep -qE '^([0-9]{4}-[0-9]{2}-[0-9]{2})?$'; then END_DATE=""; fi
          if ! printf '%s' "${NUM_WINDOWS}" | grep -qE '^[0-9]+$'; then NUM_WINDOWS="8"; fi
          if ! printf '%s' "${WINDOW_DAYS}" | grep -qE '^[0-9]+$'; then WINDOW_DAYS="30"; fi
          if ! printf '%s' "${HTF_TF}" | grep -qE '^[0-9]+[hmHMdD]$'; then HTF_TF="1h"; fi
          if ! printf '%s' "${EMA_PERIOD}" | grep -qE '^[0-9]+$'; then EMA_PERIOD="50"; fi
          if ! printf '%s' "${BAND_PCT}" | grep -qE '^0?\.[0-9]+$'; then BAND_PCT="0.02"; fi
          if ! printf '%s' "${THRESHOLD_SWEEP}" | grep -qiE '^(true|false)$'; then THRESHOLD_SWEEP="false"; fi
          if ! printf '%s' "${PARAM_SWEEP}" | grep -qiE '^(true|false)$'; then PARAM_SWEEP="false"; fi
          if ! printf '%s' "${ANCHOR_COMPARE}" | grep -qiE '^(true|false)$'; then ANCHOR_COMPARE="false"; fi

          # param_sweep, threshold_sweep, and anchor_compare are mutually exclusive with compare.
          if [ "${THRESHOLD_SWEEP}" = "true" ]; then COMPARE="false"; fi
          if [ "${PARAM_SWEEP}" = "true" ]; then COMPARE="false"; THRESHOLD_SWEEP="false"; fi
          if [ "${ANCHOR_COMPARE}" = "true" ]; then COMPARE="false"; THRESHOLD_SWEEP="false"; PARAM_SWEEP="false"; fi

          echo "bt_compare=${COMPARE}" >> "$GITHUB_ENV"
          echo "bt_days=${DAYS}" >> "$GITHUB_ENV"
          echo "bt_start_date=${START_DATE}" >> "$GITHUB_ENV"
          echo "bt_end_date=${END_DATE}" >> "$GITHUB_ENV"
          echo "bt_num_windows=${NUM_WINDOWS}" >> "$GITHUB_ENV"
          echo "bt_window_days=${WINDOW_DAYS}" >> "$GITHUB_ENV"
          echo "bt_htf_tf=${HTF_TF}" >> "$GITHUB_ENV"
          echo "bt_ema_period=${EMA_PERIOD}" >> "$GITHUB_ENV"
          echo "bt_band_pct=${BAND_PCT}" >> "$GITHUB_ENV"
          echo "bt_threshold_sweep=${THRESHOLD_SWEEP}" >> "$GITHUB_ENV"
          echo "bt_param_sweep=${PARAM_SWEEP}" >> "$GITHUB_ENV"
          echo "bt_anchor_compare=${ANCHOR_COMPARE}" >> "$GITHUB_ENV"

      - name: Set params from dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "bt_compare=${{ inputs.compare }}" >> "$GITHUB_ENV"
          echo "bt_days=${{ inputs.days }}" >> "$GITHUB_ENV"
          echo "bt_start_date=${{ inputs.start_date }}" >> "$GITHUB_ENV"
          echo "bt_end_date=${{ inputs.end_date }}" >> "$GITHUB_ENV"
          echo "bt_num_windows=${{ inputs.num_windows }}" >> "$GITHUB_ENV"
          echo "bt_window_days=${{ inputs.window_days }}" >> "$GITHUB_ENV"
          echo "bt_htf_tf=${{ inputs.htf_timeframe }}" >> "$GITHUB_ENV"
          echo "bt_ema_period=${{ inputs.ema_period }}" >> "$GITHUB_ENV"
          echo "bt_band_pct=${{ inputs.band_pct }}" >> "$GITHUB_ENV"

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          TRAINER_VM_SSH_HOST: ${{ vars.TRAINER_VM_SSH_HOST || '158.178.209.121' }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${TRAINER_VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify trainer VM role marker
        env:
          TRAINER_VM_SSH_HOST: ${{ vars.TRAINER_VM_SSH_HOST || '158.178.209.121' }}
        run: |
          set -euo pipefail
          role=$(ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              "ubuntu@${TRAINER_VM_SSH_HOST}" \
              "head -n1 /etc/ict-trainer-vm.role 2>/dev/null || echo MISSING")
          if [ "${role}" != "training-center" ]; then
            echo "::error::Role marker mismatch: expected 'training-center', got '${role}'"
            echo "::error::Refusing to run backtest — ensure TRAINER_VM_SSH_HOST points to the trainer VM, not the live VM."
            exit 1
          fi
          echo "Trainer VM role verified: ${role}"

      - name: Pull latest code on trainer VM
        env:
          TRAINER_VM_SSH_HOST: ${{ vars.TRAINER_VM_SSH_HOST || '158.178.209.121' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              "ubuntu@${TRAINER_VM_SSH_HOST}" \
              "cd /home/ubuntu/ict-trading-bot && \
               git fetch --quiet origin main && \
               git reset --hard origin/main && \
               echo \"pulled: \$(git rev-parse --short HEAD)\""

      - name: Fetch fresh 5m backtest data on trainer VM
        env:
          TRAINER_VM_SSH_HOST: ${{ vars.TRAINER_VM_SSH_HOST || '158.178.209.121' }}
        run: |
          set -euo pipefail

          if [ -n "${bt_start_date}" ]; then
            FETCH_ARGS="--start-date ${bt_start_date}"
            [ -n "${bt_end_date}" ] && FETCH_ARGS="${FETCH_ARGS} --end-date ${bt_end_date}"
          else
            FETCH_ARGS="--days ${bt_days:-365}"
            [ -n "${bt_end_date}" ] && FETCH_ARGS="${FETCH_ARGS} --end-date ${bt_end_date}"
          fi

          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              "ubuntu@${TRAINER_VM_SSH_HOST}" \
              "cd /home/ubuntu/ict-trading-bot && \
               source .venv/bin/activate && \
               python scripts/ops/fetch_backtest_candles.py ${FETCH_ARGS} \
                 --output /tmp/backtest_fresh.csv 2>&1"

      - name: Run VWAP backtest on trainer VM
        env:
          TRAINER_VM_SSH_HOST: ${{ vars.TRAINER_VM_SSH_HOST || '158.178.209.121' }}
        run: |
          set -euo pipefail

          if [ "${bt_anchor_compare:-false}" = "true" ]; then
            CLI_ARGS="--vwap-anchor compare --no-htf"
          elif [ "${bt_param_sweep:-false}" = "true" ]; then
            CLI_ARGS="--param-sweep"
          elif [ "${bt_threshold_sweep:-false}" = "true" ]; then
            CLI_ARGS="--threshold-sweep"
          elif [ "${bt_compare}" = "true" ]; then
            CLI_ARGS="--compare"
          else
            CLI_ARGS="--htf-timeframe ${bt_htf_tf} --ema-period ${bt_ema_period} --band-pct ${bt_band_pct}"
          fi

          if [ "${bt_num_windows:-0}" -gt 0 ]; then
            CLI_ARGS="${CLI_ARGS} --windows ${bt_num_windows} --window-days ${bt_window_days:-30}"
          fi

          [ -n "${bt_start_date}" ] && CLI_ARGS="${CLI_ARGS} --start-date ${bt_start_date}"
          [ -n "${bt_end_date}" ]   && CLI_ARGS="${CLI_ARGS} --end-date ${bt_end_date}"
          [ -z "${bt_start_date}" ] && CLI_ARGS="${CLI_ARGS} --days ${bt_days:-365}"

          # Write JSON to a file on the trainer VM rather than piping through SSH stdout.
          # This survives NAT connection drops that occur on long-running SSH sessions.
          # ServerAliveInterval keeps the connection alive during computation.
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              "ubuntu@${TRAINER_VM_SSH_HOST}" \
              "cd /home/ubuntu/ict-trading-bot && \
               source .venv/bin/activate && \
               BACKTEST_DATA_PATH=/tmp/backtest_fresh.csv \
               python -m src.backtest.run_backtest_vwap ${CLI_ARGS} \
                 > /tmp/backtest_result.json \
                 2>/tmp/vwap_bt_err.txt; \
               EXIT=\$?; \
               cat /tmp/vwap_bt_err.txt >&2; \
               exit \$EXIT"

      - name: Fetch backtest result from trainer VM
        env:
          TRAINER_VM_SSH_HOST: ${{ vars.TRAINER_VM_SSH_HOST || '158.178.209.121' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              "ubuntu@${TRAINER_VM_SSH_HOST}" \
              "cat /tmp/backtest_result.json" > backtest-result.json
          python3 -c "import json,os,sys; d=json.load(open('backtest-result.json')); print('valid JSON,', os.path.getsize('backtest-result.json'), 'bytes', file=sys.stderr)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vwap-backtest-${{ github.run_id }}
          path: backtest-result.json
          retention-days: 7
          if-no-files-found: warn

      - name: Comment results on issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('backtest-result.json', 'utf8'));
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `**VWAP HTF Backtest Results**\nRun: ${runUrl}\n\n`;

            if (data.param_sweep_window) {
              const configs = data.param_sweep_window;
              const nwin  = configs[0]?.n_windows ?? '?';
              const wdays = configs[0]?.window_days ?? '?';
              body += `ENTRY×SL param sweep — ${nwin} windows × ${wdays} days each\n\n`;
              body += `| ENTRY σ | SL σ | Mean Total R | L R | S R | Mean Win% | Pos/${nwin} |\n`;
              body += `|---------|------|-------------|-----|-----|-----------|------------|\n`;
              const sorted = [...configs].sort((a, b) => (b.mean_total_r ?? 0) - (a.mean_total_r ?? 0));
              for (const r of sorted) {
                body += `| ${r.entry_std_threshold} | ${r.sl_std_mult ?? '-'} | ${r.mean_total_r} | ${r.mean_total_r_long ?? '-'} | ${r.mean_total_r_short ?? '-'} | ${r.mean_win_rate_pct}% | ${r.positive_windows}/${r.n_windows} |\n`;
              }
              body += `\n<details><summary>Full JSON</summary>\n\n\`\`\`json\n`;
              const full = JSON.stringify(data, null, 2);
              body += full.length <= 40000 ? full : full.slice(0, 40000) + '\n... (truncated)';
              body += `\n\`\`\`\n</details>`;
            } else if (data.threshold_window_comparison) {
              const wdays = data.threshold_window_comparison[0]?.window_days ?? '?';
              const nwin  = data.threshold_window_comparison[0]?.n_windows ?? '?';
              body += `Entry-threshold sweep — random-window comparison (${nwin} windows × ${wdays} days each, no HTF gate)\n\n`;
              body += `| Threshold | Mean Sharpe | ±Std | Min | Max | Mean Total R | Mean Win% | Positive/${nwin} |\n`;
              body += `|-----------|------------|------|-----|-----|-------------|-----------|-------------------|\n`;
              for (const r of data.threshold_window_comparison) {
                body += `| ${r.entry_std_threshold}σ | ${r.mean_sharpe} | ±${r.std_sharpe} | ${r.min_sharpe} | ${r.max_sharpe} | ${r.mean_total_r} | ${r.mean_win_rate_pct}% | ${r.positive_windows}/${r.n_windows} |\n`;
              }
              body += `\n<details><summary>Full JSON</summary>\n\n\`\`\`json\n`;
              const full = JSON.stringify(data, null, 2);
              body += full.length <= 40000 ? full : full.slice(0, 40000) + '\n... (truncated)';
              body += `\n\`\`\`\n</details>`;
            } else if (data.anchor_window_comparison) {
              const variants = data.anchor_window_comparison;
              const nwin  = variants[0]?.n_windows ?? '?';
              const wdays = variants[0]?.window_days ?? '?';
              body += `VWAP anchor comparison — ${nwin} windows × ${wdays} days each\n\n`;
              body += `| Anchor | Mean Total R | L R | S R | Mean Win% | Pos/${nwin} |\n`;
              body += `|--------|-------------|-----|-----|-----------|------------|\n`;
              for (const r of variants) {
                const wr = r.mean_win_rate_pct !== null && r.mean_win_rate_pct !== undefined ? r.mean_win_rate_pct + '%' : '-';
                body += `| ${r.label} | ${r.mean_total_r} | ${r.mean_total_r_long ?? '-'} | ${r.mean_total_r_short ?? '-'} | ${wr} | ${r.positive_windows}/${r.n_windows} |\n`;
              }
              body += `\n<details><summary>Full JSON</summary>\n\n\`\`\`json\n`;
              const full = JSON.stringify(data, null, 2);
              body += full.length <= 40000 ? full : full.slice(0, 40000) + '\n... (truncated)';
              body += `\n\`\`\`\n</details>`;
            } else if (data.window_comparison) {
              const wdays = data.window_comparison[0]?.window_days ?? '?';
              const nwin  = data.window_comparison[0]?.n_windows ?? '?';
              body += `Random-window comparison (${nwin} windows × ${wdays} days each)\n\n`;
              body += `| Config | Mean Sharpe | ±Std | Min | Max | Mean Total R | Mean Win% | Positive/${nwin} |\n`;
              body += `|--------|------------|------|-----|-----|-------------|-----------|-------------------|\n`;
              for (const r of data.window_comparison) {
                body += `| ${r.label} | ${r.mean_sharpe} | ±${r.std_sharpe} | ${r.min_sharpe} | ${r.max_sharpe} | ${r.mean_total_r} | ${r.mean_win_rate_pct}% | ${r.positive_windows}/${r.n_windows} |\n`;
              }
              body += `\n<details><summary>Full JSON</summary>\n\n\`\`\`json\n`;
              const full = JSON.stringify(data, null, 2);
              body += full.length <= 40000 ? full : full.slice(0, 40000) + '\n... (truncated)';
              body += `\n\`\`\`\n</details>`;
            } else if (data.comparison) {
              body += `| Config | Trades | Win% | Total R | Avg R/trade | Blocked |\n`;
              body += `|--------|--------|------|---------|-------------|---------|\n`;
              for (const r of data.comparison) {
                const blocked = r.htf_blocked_count ?? 0;
                body += `| ${r.label} | ${r.total_trades} | ${r.win_rate_pct}% | ${r.total_r} | ${r.avg_r_per_trade} | ${blocked} |\n`;
              }
              body += `\n<details><summary>Full JSON</summary>\n\n\`\`\`json\n`;
              const full = JSON.stringify(data, null, 2);
              body += full.length <= 40000 ? full : full.slice(0, 40000) + '\n... (truncated)';
              body += `\n\`\`\`\n</details>`;
            } else {
              body += `\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000),
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Comment failure on issue
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **VWAP backtest failed.**\nRun: ${runUrl}\n\nCommon causes: VM_SSH_KEY secret unset; TRAINER_VM_SSH_HOST points to wrong VM (role marker check will catch this); fetch_backtest_candles.py failed (network/Bybit outage); Python environment issue.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
