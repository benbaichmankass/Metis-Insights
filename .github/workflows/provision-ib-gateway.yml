name: provision-ib-gateway

# Installs / re-provisions the headless IB Gateway (IBC) on the live VM for
# the MES / Interactive Brokers integration.
#
# Two dispatch paths (per CLAUDE.md "THERE IS NO MANUAL" — Claude drives it):
#   1. Issue-driven (Claude self-dispatch): open an issue labelled
#      `provision-ib-gateway`. Optional body lines `mode: paper|live` and
#      `port: 7497|7496` (defaults: paper / 7497). The workflow runs,
#      comments the result back, and closes the issue.
#   2. workflow_dispatch: manual run with the same inputs.
#
# The workflow renders the IB_USERNAME / IB_PASSWORD repo secrets into an
# env file ON THE RUNNER, scps it to the VM over the encrypted SSH channel,
# then runs the idempotent Docker installer (install_ib_gateway_docker.sh
# via provision_ib_gateway.sh) + (re)starts the ib-gateway container.
#
# Security contract (mirrors rotate-account-keys):
#   * Credentials never appear in argv or run logs — they ride in a file
#     transferred over scp and are shredded after install.
#   * The Gateway runs independently of ict-trader-live, so this never
#     restarts the live crypto trader.
#   * After login the operator approves the IBKR-Mobile 2FA tap (the one
#     irreducible physical step).
#
# Required repo secrets: VM_SSH_KEY, IB_USERNAME, IB_PASSWORD
# Optional repo variables: VM_SSH_HOST (default 141.145.193.91 — live VM since the 2026-06-14 Ampere cutover), VM_SSH_USER (default ubuntu)

on:
  workflow_dispatch:
    inputs:
      trading_mode:
        description: "IB trading mode"
        required: true
        type: choice
        default: paper
        options:
          - paper
          - live
      ib_port:
        description: "Gateway API port (7497 paper / 7496 live)"
        required: true
        default: "7497"
      reason:
        description: "Audit-trail note"
        required: true
        default: ""
      host:
        description: "Target VM IP (default: the live micro VM_SSH_HOST). Set to the dedicated gateway VM for gateway-isolation."
        required: false
        default: ""
      bind_addr:
        description: "Host interface to publish the gateway API on (default 127.0.0.1). Set to the gateway VM's private IP (e.g. 10.0.0.251) so the bind survives a re-install."
        required: false
        default: ""
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: provision-ib-gateway
  cancel-in-progress: false

jobs:
  provision:
    # Run for a manual dispatch, or an issue carrying the provision label.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'provision-ib-gateway'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve params (both triggers)
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_MODE: ${{ inputs.trading_mode }}
          IN_PORT: ${{ inputs.ib_port }}
          IN_REASON: ${{ inputs.reason }}
          IN_HOST: ${{ inputs.host }}
          IN_BIND_ADDR: ${{ inputs.bind_addr }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            MODE="${IN_MODE}"; PORT="${IN_PORT}"; REASON="${IN_REASON}"; HOST="${IN_HOST}"; BIND_ADDR="${IN_BIND_ADDR}"
          else
            MODE=$(printf '%s\n' "${ISSUE_BODY}" | grep -iE '^[[:space:]]*mode[[:space:]]*:' | head -1 | cut -d: -f2- | tr -d '[:space:]' || true)
            PORT=$(printf '%s\n' "${ISSUE_BODY}" | grep -iE '^[[:space:]]*port[[:space:]]*:' | head -1 | cut -d: -f2- | tr -d '[:space:]' || true)
            HOST=$(printf '%s\n' "${ISSUE_BODY}" | grep -iE '^[[:space:]]*host[[:space:]]*:' | head -1 | cut -d: -f2- | tr -d '[:space:]' || true)
            BIND_ADDR=$(printf '%s\n' "${ISSUE_BODY}" | grep -iE '^[[:space:]]*bind(_addr)?[[:space:]]*:' | head -1 | cut -d: -f2- | tr -d '[:space:]' || true)
            REASON="issue-driven provision: ${ISSUE_TITLE}"
          fi
          MODE="${MODE:-paper}"; PORT="${PORT:-7497}"
          case "${MODE}" in paper|live) ;; *) echo "::error::mode must be paper|live"; exit 1 ;; esac
          case "${PORT}" in 7496|7497) ;; *) echo "::error::port must be 7496|7497"; exit 1 ;; esac
          # The bind address must never be the all-interfaces wildcard — that
          # would expose the unauthenticated broker socket on every NIC.
          case "${BIND_ADDR:-}" in
            0.0.0.0|"::") echo "::error::bind_addr must not be 0.0.0.0/:: (would expose the IB API on all interfaces). Use loopback or the private IP."; exit 1 ;;
          esac
          {
            echo "TRADING_MODE=${MODE}"
            echo "IB_PORT=${PORT}"
            echo "REASON=${REASON}"
          } >> "$GITHUB_ENV"
          # Gateway-isolation: a `host:` (issue body) / host input retargets the
          # install at the dedicated gateway VM, overriding the job-level
          # VM_SSH_HOST default (the live micro) for the SSH steps below.
          if [ -n "${HOST:-}" ]; then
            echo "VM_SSH_HOST=${HOST}" >> "$GITHUB_ENV"
            echo ">>> target host overridden -> ${HOST}"
          fi
          # IB_BIND_ADDR makes the gateway's private-IP publish durable across a
          # re-install (installer default is 127.0.0.1 when unset).
          if [ -n "${BIND_ADDR:-}" ]; then
            echo "IB_BIND_ADDR=${BIND_ADDR}" >> "$GITHUB_ENV"
            echo ">>> gateway API will publish on ${BIND_ADDR}:4002"
          fi
          echo ">>> provisioning IB Gateway mode=${MODE} port=${PORT} host=${HOST:-<default micro>} bind=${BIND_ADDR:-127.0.0.1}"

      - name: Validate secret presence
        env:
          IB_USERNAME: ${{ secrets.IB_USERNAME }}
          IB_PASSWORD: ${{ secrets.IB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${IB_USERNAME}" ] || [ -z "${IB_PASSWORD}" ]; then
            echo "::error::IB_USERNAME and/or IB_PASSWORD secrets not set."
            exit 1
          fi

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then echo "::error::VM_SSH_KEY unset."; exit 1; fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Render credential env file (runner-local)
        env:
          IB_USERNAME: ${{ secrets.IB_USERNAME }}
          IB_PASSWORD: ${{ secrets.IB_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          {
            echo "IB_USERNAME=${IB_USERNAME}"
            echo "IB_PASSWORD=${IB_PASSWORD}"
            echo "TRADING_MODE=${TRADING_MODE}"
            echo "IB_PORT=${IB_PORT}"
          } > /tmp/ib-gateway.env.staged

      - name: Stage env file on VM (scp, encrypted; not in logs)
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            /tmp/ib-gateway.env.staged \
            "${VM_SSH_USER}@${VM_SSH_HOST}:/tmp/ib-gateway.env.staged"
          shred -u /tmp/ib-gateway.env.staged 2>/dev/null || rm -f /tmp/ib-gateway.env.staged

      - name: Provision + install + restart Gateway on VM
        id: provision
        run: |
          set -euo pipefail
          set +e
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              "TRADING_MODE=$(printf '%q' "${TRADING_MODE}") \
               IB_PORT=$(printf '%q' "${IB_PORT}") \
               IB_BIND_ADDR=$(printf '%q' "${IB_BIND_ADDR:-127.0.0.1}") \
               bash /home/ubuntu/ict-trading-bot/scripts/ops/provision_ib_gateway.sh" \
              > action-output.txt 2>&1
          rc=$?
          set -e
          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          echo ">>> provision exit code: ${rc}"
          cat action-output.txt
          # Don't hard-fail here on issue trigger — the comment-back step
          # reports the outcome and closes the issue regardless.
          if [ "${{ github.event_name }}" != "issues" ]; then exit "${rc}"; fi

      - name: Comment result + close issue (issue trigger)
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IB_USERNAME: ${{ secrets.IB_USERNAME }}
          IB_PASSWORD: ${{ secrets.IB_PASSWORD }}
        run: |
          set -euo pipefail
          # Defense-in-depth: redact the credential values from the captured
          # output before posting (GitHub masks secrets in run LOGS but not in
          # API-posted comment bodies). Fixed-string replace, not regex.
          OUT=$(tail -c 8000 action-output.txt 2>/dev/null || echo "(no output captured)")
          OUT=$(IB_USERNAME="${IB_USERNAME}" IB_PASSWORD="${IB_PASSWORD}" python3 - "${OUT}" <<'PY'
          import os, sys
          out = sys.argv[1]
          for secret in (os.environ.get("IB_PASSWORD",""), os.environ.get("IB_USERNAME","")):
              if secret and len(secret) >= 3:
                  out = out.replace(secret, "***REDACTED***")
          print(out)
          PY
          )
          {
            echo "**provision-ib-gateway** result (mode=${TRADING_MODE:-?} port=${IB_PORT:-?})"
            echo "Run: ${RUN_URL}"
            echo ""
            echo '```'
            echo "${OUT}"
            echo '```'
            echo ""
            echo "_If login is pending, approve the IBKR Mobile 2FA tap to complete it._"
          } > /tmp/comment.md
          gh issue comment "${ISSUE_NUMBER}" --repo "${{ github.repository }}" --body-file /tmp/comment.md
          gh issue close "${ISSUE_NUMBER}" --repo "${{ github.repository }}" --reason completed
