name: vm-cloud-fix

# Tier-3 mutating action: ensure an Oracle Cloud Security List ingress
# rule exists for the dashboard API port on the trading-bot VM's VNIC
# subnet. Auto-recovers from the class of outage tracked in #537 / #542
# / #545 / #549 / #551 where the bot service is healthy but cloud-side
# ingress was removed (deliberately or by drift).
#
# Triggers:
#   1. workflow_dispatch — operator clicks "Run workflow".
#   2. issues.opened with label `vm-cloud-fix-request`.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   * VM_SSH_KEY            — existing, contents of ict-bot-ovm-private.key
#   * OCI_CLI_USER          — User OCID, e.g. ocid1.user.oc1..aaaa...
#   * OCI_CLI_FINGERPRINT   — API key fingerprint, e.g. aa:bb:cc:dd:...
#   * OCI_CLI_TENANCY       — Tenancy OCID, ocid1.tenancy.oc1..aaaa...
#   * OCI_CLI_REGION        — Region identifier, e.g. eu-paris-1
#   * OCI_CLI_KEY_CONTENT   — PEM private key content (multi-line)
#
# IAM policy required for the API key user (or its group):
#   Allow group <ops-group> to use virtual-network-family in compartment <X>
# Specifically `inspect security-lists` + `manage security-lists` are
# the minimum verbs; `use virtual-network-family` is the simplest grant.
#
# Trust contract:
#   - Mutates Oracle Cloud Security List ingress rules. Reversible by
#     deleting the rule via console or by re-running with a removed rule
#     (not yet automated; this workflow only ADDS, idempotently).
#   - Does NOT mutate VM-local firewall (ufw / iptables); that's
#     vm-net-fix. Both are independent layers and the dashboard requires
#     both to allow 8001 for traffic to land.
#   - Idempotent: no-op if every SL on the subnet already has a TCP/8001
#     ingress rule.

on:
  workflow_dispatch:
    inputs:
      port:
        description: "Port to open (default 8001)"
        required: false
        default: "8001"
      reason:
        description: "Why this action is being run (audit trail)"
        required: true
        default: "open dashboard port at cloud SL — outage recovery"
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: vm-cloud-fix
  cancel-in-progress: false

jobs:
  fix:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'vm-cloud-fix-request'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
      DASHBOARD_PORT: ${{ inputs.port || '8001' }}
    steps:
      - name: Checkout (need scripts/ops/cloud_open_port.py)
        uses: actions/checkout@v4

      - name: Resolve target port (issue-body 'port:' line overrides)
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          # workflow_dispatch supplies inputs.port (job-env default). The issue
          # path has no inputs, so parse an optional `port: NNN` line from the
          # body (e.g. to open 443 for the Caddy HTTPS front), else keep 8001.
          port="${DASHBOARD_PORT}"
          if [ "${{ github.event_name }}" = "issues" ]; then
            parsed=$(printf '%s' "${ISSUE_BODY:-}" | grep -ioE '^[[:space:]]*port:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
            if [ -n "${parsed}" ]; then port="${parsed}"; fi
          fi
          if ! printf '%s' "${port}" | grep -qE '^[0-9]+$' || [ "${port}" -lt 1 ] || [ "${port}" -gt 65535 ]; then
            echo "::error::invalid port '${port}'"; exit 1
          fi
          echo "DASHBOARD_PORT=${port}" >> "$GITHUB_ENV"
          echo "Resolved target port: ${port}"

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Probe pre-fix public reachability from runner
        id: pre_probe
        run: |
          set +e
          curl -sS --max-time 8 \
            -o /dev/null \
            -w 'http_code=%{http_code} time=%{time_total}\n' \
            "http://${VM_SSH_HOST}:${DASHBOARD_PORT}/api/health" \
            > pre_probe.txt 2>&1
          rc=$?
          set -e
          echo "PRE_RC=$rc" >> "$GITHUB_ENV"
          cat pre_probe.txt

      - name: Read VM instance metadata via SSH + IMDS
        id: imds
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              'curl -sS -H "Authorization: Bearer Oracle" --max-time 5 http://169.254.169.254/opc/v2/instance/' \
              > imds.json
          instance_id=$(python3 -c 'import json,sys; print(json.load(open("imds.json"))["id"])')
          compartment_id=$(python3 -c 'import json,sys; print(json.load(open("imds.json"))["compartmentId"])')
          region=$(python3 -c 'import json,sys; print(json.load(open("imds.json"))["regionInfo"]["regionIdentifier"])')
          echo "instance_id=${instance_id}" >> "$GITHUB_OUTPUT"
          echo "compartment_id=${compartment_id}" >> "$GITHUB_OUTPUT"
          echo "region=${region}" >> "$GITHUB_OUTPUT"
          echo "Discovered: instance=${instance_id} compartment=${compartment_id} region=${region}"

      - name: Validate OCI secrets are configured
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
        run: |
          set -euo pipefail
          missing=0
          for v in OCI_CLI_USER OCI_CLI_FINGERPRINT OCI_CLI_TENANCY OCI_CLI_REGION OCI_CLI_KEY_CONTENT; do
            if [ -z "${!v}" ]; then
              echo "::error::repo secret ${v} is unset"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "::error::Add missing OCI_CLI_* secrets in Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "All OCI secrets present."

      - name: Set up Python + OCI SDK
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install oci sdk
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --quiet 'oci>=2.119,<3'

      - name: Apply Security List ingress rule via OCI API
        id: apply
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          # Region from secret takes precedence; if unset, fall back to
          # the IMDS-discovered region (handy for cross-region operators).
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION || steps.imds.outputs.region }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          DASHBOARD_PORT: ${{ env.DASHBOARD_PORT }}
        run: |
          set -uo pipefail
          python3 scripts/ops/cloud_open_port.py \
            "${{ steps.imds.outputs.instance_id }}" \
            "${{ steps.imds.outputs.compartment_id }}" \
            > apply.jsonl 2>apply.err
          rc=$?
          echo "APPLY_RC=${rc}" >> "$GITHUB_ENV"
          echo "==== apply.jsonl ===="
          cat apply.jsonl
          if [ -s apply.err ]; then
            echo "==== apply.err ===="
            cat apply.err
          fi
          exit "${rc}"

      - name: Probe post-fix public reachability from runner
        id: post_probe
        if: always()
        run: |
          set +e
          for i in 1 2 3; do
            curl -sS --max-time 8 \
              -o post_body.txt \
              -w 'http_code=%{http_code} time=%{time_total}\n' \
              "http://${VM_SSH_HOST}:${DASHBOARD_PORT}/api/health" \
              > "post_probe_${i}.txt" 2>&1
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "POST_RC=0" >> "$GITHUB_ENV"
              break
            fi
            sleep 2
          done
          [ -z "${POST_RC:-}" ] && echo "POST_RC=$rc" >> "$GITHUB_ENV"
          cat post_probe_1.txt 2>/dev/null
          cat post_probe_2.txt 2>/dev/null
          cat post_probe_3.txt 2>/dev/null

      - name: Reply to issue with combined result
        if: github.event_name == 'issues' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const safeRead = (p, max = 50_000) => {
              try { return fs.readFileSync(p, 'utf8').slice(0, max); } catch { return '(missing)'; }
            };
            const preProbe = safeRead('pre_probe.txt');
            const apply = safeRead('apply.jsonl', 12_000);
            const applyErr = safeRead('apply.err', 4_000);
            const post1 = safeRead('post_probe_1.txt');
            const post2 = safeRead('post_probe_2.txt');
            const post3 = safeRead('post_probe_3.txt');
            const postBody = safeRead('post_body.txt', 500);
            const preRc = process.env.PRE_RC;
            const applyRc = process.env.APPLY_RC;
            const postRc = process.env.POST_RC;
            const ok = postRc === '0';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const verdict = ok
              ? 'SUCCESS — port is reachable from the public internet (cloud SL rule in place).'
              : 'INCOMPLETE — apply step finished but post-probe still failing. If apply added a rule, OCI may need ~30 s to propagate; check the linked run before re-triggering.';
            const body = [
              `**vm-cloud-fix** ${ok ? 'SUCCESS' : 'INCOMPLETE'}. Run: ${runUrl}`,
              ``,
              `**Verdict:** ${verdict}`,
              ``,
              `### Pre-fix public probe (curl exit ${preRc})`,
              '```',
              preProbe,
              '```',
              ``,
              `### Apply (cloud_open_port.py exit ${applyRc})`,
              '```',
              apply,
              applyErr ? `--- stderr ---\n${applyErr}` : '',
              '```',
              ``,
              `### Post-fix public probe (curl exit ${postRc})`,
              '```',
              `attempt 1: ${post1}`,
              `attempt 2: ${post2}`,
              `attempt 3: ${post3}`,
              ``,
              `Body: ${postBody}`,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: ok ? 'completed' : 'not_planned',
            });

      - name: Fail the run if post-probe still failing
        if: env.POST_RC != '0'
        run: |
          echo "::error::Post-fix probe rc=${POST_RC}. Public reachability not restored."
          exit 1
