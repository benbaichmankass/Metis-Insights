# grade-order-packages.yml — the automated VM→repo bridge for trade grading.
#
# WHY THIS EXISTS (2026-06-23): the performance-review / system-report skills are
# required to grade every order-package decision (scripts/ops/score_order_packages.py
# → comms/claude_strategy_scores.jsonl) and COMMIT the result. But the scorer needs
# the trade journal, which lives on the VMs, while the commit must land in the repo —
# and a relay-based Claude session has no clean way to move ~1MB of grades from the VM
# into a git commit (piping it through the session hits the 55kB relay comment cap).
# For ~a week grading silently lapsed because of exactly this gap. This workflow closes
# it: the RUNNER (which has repo-write via GITHUB_TOKEN) SSHes the live VM, runs the
# scorer, captures all grades over SSH stdout (no comment-size cap), dedup-appends the
# new rows to the committed journal, and opens an auto-merging PR.
#
# Targets the LIVE VM, not the trainer (changed 2026-06-23): the scorer must read the
# FRESH canonical trade_journal.db. The trainer only holds a periodic db_pull copy, so
# scoring it left every package created since the last pull ungraded (the dashboard's
# "0 Claude-graded" for the current day). The scorer opens the DB read-only (mode=ro)
# and imports only stdlib (no `src`, no venv), so this is a Tier-1 read on the live box.
#
# Trigger: workflow_dispatch (operator) OR an issue labelled `grade-order-packages`
# (Claude-driven, like the other relays). Append-only, idempotent: a run with no new
# packages is a clean no-op.
#
# Secrets/vars (reused from vm-diag-snapshot.yml — the live-VM relay):
#   * VM_SSH_KEY        — SSH private key authorized on the live VM
#   * VM_SSH_HOST       — defaults to 141.145.193.91 (Ampere live trader)
#   * VM_SSH_USER       — defaults to ubuntu
#   * GRADING_PAT (OPTIONAL) — fine-grained PAT with contents+pull-requests
#       write. When set, the grades branch is pushed with it so the opened PR
#       gets CI and auto-merges UNATTENDED. When unset, the PR still opens but
#       its checks won't run (a GITHUB_TOKEN-pushed PR doesn't trigger
#       `on: pull_request` workflows — the recursion guard), so a Claude session
#       must adopt the branch + re-push to get CI (the PR body explains how).
# Required label: grade-order-packages (created by bootstrap-labels.yml)
name: grade-order-packages

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: grade-order-packages
  cancel-in-progress: false

jobs:
  grade:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'grade-order-packages'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history, push-capable token)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Prefer an operator-provided PAT so the grades PR this job opens
          # actually gets CI: a branch pushed with GITHUB_TOKEN opens a PR that
          # does NOT trigger `on: pull_request` workflows (GitHub's recursion
          # guard), so its required checks never run and `--auto` can never
          # merge it. Pushing with a PAT removes the bot identity from the
          # push, so the PR's checks run and auto-merge completes unattended.
          # Falls back to GITHUB_TOKEN when GRADING_PAT is unset (the PR still
          # opens; a Claude session must adopt the branch + re-push to get CI —
          # see the "no-PAT" note in the PR step).
          token: ${{ secrets.GRADING_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Prepare SSH to the live VM
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
        run: |
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/live_key
          chmod 600 ~/.ssh/live_key
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run scorer on the live VM (fresh canonical DB), capture all grades
        env:
          VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
          VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
        run: |
          set -o pipefail
          # Score the LIVE VM's fresh canonical trade_journal.db (NOT the trainer's
          # midnight-lagged copy — the trainer's db_pull cadence left every package
          # created after the last pull ungraded, which read as "0 Claude-graded" on
          # the dashboard for the current day). The scorer opens the DB read-only
          # (mode=ro) and imports only stdlib (no `src`, no venv needed), so this is
          # a Tier-1 read on the live box. The DB path comes from the web-api env
          # (the canonical field) with the documented path as a validated fallback.
          # The scorer's own stdout → stderr so ONLY the gzip+base64 of the grades
          # file reaches the runner over SSH stdout (no comment-size cap).
          REMOTE='set -e; cd /home/ubuntu/ict-trading-bot; \
            if [ -x .venv/bin/python ]; then PY=.venv/bin/python; else PY=python3; fi; \
            ENVFILE=/etc/ict-trader/web-api.env; \
            if [ -f "$ENVFILE" ]; then set -a; . "$ENVFILE"; set +a; fi; \
            DB="${TRADE_JOURNAL_DB:-/data/bot-data/trade_journal.db}"; \
            test -f "$DB" || { echo "no trade_journal.db at $DB" >&2; exit 1; }; \
            "$PY" scripts/ops/score_order_packages.py "$DB" /tmp/all_scores.jsonl 1>&2; \
            gzip -c /tmp/all_scores.jsonl | base64 -w0'
          ssh -i ~/.ssh/live_key \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" "${REMOTE}" > /tmp/all_b64.txt
          test -s /tmp/all_b64.txt || { echo "::error::empty scorer output from live VM"; exit 1; }
          base64 -d /tmp/all_b64.txt | gunzip > /tmp/all_scores.jsonl
          echo "scorer rows: $(wc -l < /tmp/all_scores.jsonl)"

      - name: Dedup-append new grades to the committed journal
        id: merge
        run: |
          python3 - <<'PY'
          import json, os
          comms = "comms/claude_strategy_scores.jsonl"
          existing = set()
          if os.path.exists(comms):
              for line in open(comms):
                  try:
                      existing.add(json.loads(line).get("order_package_id"))
                  except Exception:
                      pass
          added = 0
          with open(comms, "a") as out:
              for line in open("/tmp/all_scores.jsonl"):
                  try:
                      opid = json.loads(line).get("order_package_id")
                  except Exception:
                      continue
                  if opid and opid not in existing:
                      out.write(line if line.endswith("\n") else line + "\n")
                      existing.add(opid)
                      added += 1
          print(f"added={added} total={len(existing)}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"added={added}\n")
              fh.write(f"total={len(existing)}\n")
          PY

      - name: Open auto-merging PR with the new grades
        if: steps.merge.outputs.added != '0'
        id: pr
        env:
          # Same token preference as checkout: a PAT lets the opened PR get CI
          # and lets `--auto` complete. GITHUB_TOKEN still opens the PR.
          GH_TOKEN: ${{ secrets.GRADING_PAT || secrets.GITHUB_TOKEN }}
          HAVE_PAT: ${{ secrets.GRADING_PAT != '' }}
        run: |
          git config user.email noreply@anthropic.com
          git config user.name Claude
          BR="automation/grade-order-packages-${{ github.run_id }}"
          git checkout -b "${BR}"
          git add comms/claude_strategy_scores.jsonl
          git commit -m "data(grading): commit ${{ steps.merge.outputs.added }} order-package decision grades [grade-order-packages]

          Automated VM→repo grading bridge: runner SSHes the live VM, runs the
          rule-based score_order_packages.py read-only over the fresh canonical
          journal, dedup-appends the new rows by order_package_id. Append-only
          observability data."
          git push -u origin "${BR}"
          NOPAT_NOTE=""
          if [ "${HAVE_PAT}" != "true" ]; then
            NOPAT_NOTE="

          > ⚠️ No \`GRADING_PAT\` secret is set, so this PR was opened with GITHUB_TOKEN and its required checks will NOT run (GitHub recursion guard) — it cannot auto-merge. A Claude session should adopt this branch: \`git checkout -B grades origin/main && git checkout origin/${BR} -- comms/claude_strategy_scores.jsonl && commit + push\` (a session push triggers CI). To make this fully unattended, add a repo \`GRADING_PAT\` secret (a fine-grained PAT with contents+pull-requests write)."
          fi
          gh pr create --base main --head "${BR}" \
            --title "data(grading): ${{ steps.merge.outputs.added }} order-package grades (automated)" \
            --body "Automated grading commit via \`grade-order-packages.yml\`. Append-only; ${{ steps.merge.outputs.added }} new decision grades (journal now ${{ steps.merge.outputs.total }} graded packages). Closes the VM→repo grading-commit gap.${NOPAT_NOTE}" \
            > /tmp/pr_url.txt
          cat /tmp/pr_url.txt
          if [ "${HAVE_PAT}" = "true" ]; then
            gh pr merge "${BR}" --squash --auto --delete-branch \
              || echo "auto-merge enable failed — PR left open for manual merge"
          else
            echo "GRADING_PAT unset — leaving PR open for a session to adopt (see PR body)."
          fi

      - name: Comment result on the trigger issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const added = '${{ steps.merge.outputs.added }}' || '0';
            const total = '${{ steps.merge.outputs.total }}' || '?';
            const havePat = '${{ secrets.GRADING_PAT != '' }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;
            if (added === '0') {
              body = `✅ **grade-order-packages**: no new grades — journal already current (${total} graded).\nRun: ${runUrl}`;
            } else {
              let pr = '';
              try { pr = require('fs').readFileSync('/tmp/pr_url.txt','utf8').trim(); } catch (e) {}
              const verb = havePat ? 'opened an auto-merging PR for' : 'opened a PR with';
              const tail = havePat
                ? ''
                : `\n\n⚠️ No \`GRADING_PAT\` secret — the PR's CI will not run (recursion guard), so it can't auto-merge. A session must adopt the branch (see the PR body), or add a \`GRADING_PAT\` secret for unattended merges.`;
              body = `✅ **grade-order-packages**: ${verb} **${added}** new decision grades (journal would be ${total}).\n${pr ? 'PR: ' + pr : ''}\nRun: ${runUrl}${tail}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed', state_reason: 'completed',
            });

      - name: Comment failure on the trigger issue
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **grade-order-packages failed.**\nRun: ${runUrl}\n\nCommon causes: VM_SSH_KEY unset, live-VM SSH timeout, missing trade_journal.db, or branch-protection blocking the PR.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed', state_reason: 'completed',
            });
