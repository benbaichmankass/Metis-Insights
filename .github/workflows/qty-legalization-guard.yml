name: qty-legalization guard

# Fails the PR check when a source file OUTSIDE the qty-legalization seam
# (src/units/accounts/qty_legalize.py) calls a venue-lot primitive
# (precision.get_lot_rule / quantize_qty) — the pattern that would seed a
# fifth private copy of "the venue minimum" and re-open the sub-lot-qty bug
# class (BL-20260628-CRYPTO-INSTRUMENT-MIN-FLOOR / PR #5700). Phases 1-3
# collapsed the four copies onto one seam; this guard (Phase 4) keeps it that
# way. See scripts/check_qty_legalization_guard.py and
# docs/sizing-legalization-DESIGN.md.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# NOT a required status check, so it's safe to trigger-filter with
# `paths:` — the guard statically scans `src/` for out-of-seam Python
# calls, so it can only ever change result on a `.py` diff.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "**/*.py"
      - ".github/workflows/qty-legalization-guard.yml"

permissions:
  contents: read

jobs:
  qty-legalization-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan src/ for out-of-seam venue-lot calls
        run: python scripts/check_qty_legalization_guard.py
