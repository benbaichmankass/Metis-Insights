name: Dry-run guard

# Pings the operator (and fails the PR check) when a pull request introduces
# a trading-mode DEMOTION out of live execution without explicit permission —
# BOTH per-account `mode: dry_run` (accounts.yaml) AND per-strategy
# `execution: shadow` (strategies.yaml), per the operator directive of
# 2026-06-02 ("never set shadow/dry_run without explicit permission"). The
# escape hatch is an inline `# dry-run-guard: allow` / `# shadow-guard: allow`
# marker recording the approval. See scripts/check_dry_run_in_diff.py and
# docs/claude/trading-mode-flags.md.
#
# **2026-07-06 (Actions-minutes billing cap, MB-20260706-CI-MINUTES):**
# REQUIRED status check — trigger can never carry `paths:` (would leave
# the check permanently "pending" on a non-matching PR). The job already
# computes the PR diff for the scan below; a docs/test-only PR touching
# neither config/accounts.yaml, config/strategies.yaml, nor a `.py` file
# skips the scan step (this guard has no pip install to save, so the win
# here is small — see PR body).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read

jobs:
  dry-run-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff against base
        # `git fetch --depth=1` would SHALLOW origin/main back to its
        # latest tip — overriding the full history that
        # `actions/checkout@v4 fetch-depth: 0` just gave us. Without
        # the merge base, `git diff origin/main...HEAD` fails with
        # "no merge base" and the step aborts under `bash -e`. We've
        # already fetched everything; the explicit fetch here is just
        # for freshness of the base ref tip, no depth limit needed.
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}"...HEAD > /tmp/pr.diff
          wc -l /tmp/pr.diff

      - name: Determine relevance
        id: changed
        run: |
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          if echo "$FILES" | grep -Eq '\.py$|config/accounts\.yaml$|config/strategies\.yaml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .py / accounts.yaml / strategies.yaml changes — skipping the scan (short-circuit, MB-20260706-CI-MINUTES)."
          fi

      - name: Scan for dry-run flag flips
        id: scan
        if: steps.changed.outputs.relevant == 'true'
        run: |
          set +e
          python scripts/check_dry_run_in_diff.py /tmp/pr.diff
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Notify operator on hit
        if: steps.changed.outputs.relevant == 'true' && steps.scan.outputs.exit != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Telegram secrets not configured; skipping ping."
            exit 0
          fi
          MESSAGE=$(cat <<EOF
          🚨 dry-run guard: PR #${{ github.event.pull_request.number }}
          ${{ github.event.pull_request.html_url }}
          A trading-mode flag flip was added that would put a service out
          of live mode. Review before merging.
          EOF
          )
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" >/dev/null

      - name: Fail the check on hit
        if: steps.changed.outputs.relevant == 'true' && steps.scan.outputs.exit != '0'
        run: |
          echo "::error::dry-run guard tripped — see job output."
          exit 1
