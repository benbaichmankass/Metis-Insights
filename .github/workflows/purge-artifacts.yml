name: purge-artifacts

# Reclaims Actions storage by deleting build artifacts. The free GitHub
# plan ships 0.5 GB of Actions storage; once it's full, GitHub starts
# billing for overage (or blocks if a $0 budget is set). Lowering
# `retention-days` on a workflow only affects FUTURE uploads — the
# already-uploaded artifacts keep their original retention. This
# workflow deletes them now.
#
# Three triggers:
#   - workflow_dispatch with `older_than_days=N` + `dry_run=BOOL`
#     (operator clicks "Run workflow" in the Actions UI).
#   - issues.opened with label `purge-artifacts-now` — Claude-driven
#     path (the hosted GitHub MCP can open labelled issues but cannot
#     dispatch workflows). Default behaviour is a one-shot total purge
#     (older_than_days=0, dry_run=false). Optional issue-body overrides:
#       older_than_days: <N>
#       dry_run: <true|false>
#   - schedule (daily 03:00 UTC) → delete artifacts older than 7 days
#     as a safety net so storage stays trimmed even if a workflow
#     re-introduces a long retention.
#
# The issue-driven path posts the result table back as an issue
# comment and closes the issue.

on:
  workflow_dispatch:
    inputs:
      older_than_days:
        description: "Delete artifacts older than this many days (0 = delete ALL)"
        required: true
        default: "7"
        type: string
      dry_run:
        description: "Log what would be deleted; do not call DELETE"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  issues:
    types: [opened]
  schedule:
    # Daily 03:00 UTC safety net — keeps storage at < ~7 days of uploads.
    - cron: "0 3 * * *"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: purge-artifacts
  cancel-in-progress: false

jobs:
  purge:
    # Issue trigger only fires for the dedicated label so that random
    # repo issues don't dispatch a destructive workflow.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'purge-artifacts-now'))
    runs-on: ubuntu-latest
    # Generous timeout — the first one-shot total purge on a full
    # storage cap deletes thousands of artifacts; serial DELETEs are
    # the bottleneck even with parallelism. Scheduled daily runs at
    # 7-day retention finish in seconds.
    timeout-minutes: 60
    outputs:
      summary_md: ${{ steps.purge.outputs.summary_md }}
    steps:
      - name: Purge artifacts
        id: purge
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          script: |
            // ----- Resolve parameters by trigger -----
            let olderThanDays;
            let dryRun;
            if (context.eventName === 'schedule') {
              olderThanDays = 7;
              dryRun = false;
            } else if (context.eventName === 'workflow_dispatch') {
              olderThanDays = Number(core.getInput('older_than_days') || '7');
              dryRun = (core.getInput('dry_run') || 'false').toLowerCase() === 'true';
            } else {
              // issues.opened — default to one-shot total purge; allow
              // body overrides for selective use.
              olderThanDays = 0;
              dryRun = false;
              const body = process.env.ISSUE_BODY || '';
              const mAge = body.match(/^\s*older_than_days\s*:\s*(\d+)\s*$/im);
              if (mAge) olderThanDays = Number(mAge[1]);
              const mDry = body.match(/^\s*dry_run\s*:\s*(true|false)\s*$/im);
              if (mDry) dryRun = mDry[1].toLowerCase() === 'true';
            }

            const cutoffMs =
              olderThanDays > 0
                ? Date.now() - olderThanDays * 24 * 60 * 60 * 1000
                : null;

            core.info(`mode=${context.eventName} olderThanDays=${olderThanDays} dryRun=${dryRun}`);
            core.info(`cutoff=${cutoffMs === null ? 'ALL' : new Date(cutoffMs).toISOString()}`);

            // ----- List + filter artifacts -----
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            let toDelete = artifacts;
            if (cutoffMs !== null) {
              toDelete = artifacts.filter(
                (a) => new Date(a.created_at).getTime() < cutoffMs
              );
            }

            const totalBytes = artifacts.reduce((s, a) => s + (a.size_in_bytes || 0), 0);
            const reclaimBytes = toDelete.reduce((s, a) => s + (a.size_in_bytes || 0), 0);
            const mib = (n) => (n / 1024 / 1024).toFixed(1);

            core.info(`found ${artifacts.length} artifact(s), total ${mib(totalBytes)} MiB`);
            core.info(`will ${dryRun ? 'NOT delete (dry-run)' : 'delete'} ${toDelete.length} artifact(s), reclaim ${mib(reclaimBytes)} MiB`);

            // ----- Delete (parallel chunks of CONCURRENCY) -----
            // Serial DELETEs at ~250ms each cap throughput at ~240/min;
            // a fresh purge on a full 500MB cap holds thousands of
            // artifacts. Parallel chunks 10x the throughput while
            // staying well under GitHub's REST secondary rate limits.
            const CONCURRENCY = 10;
            let deleted = 0;
            let failed = 0;
            let logged = 0;

            const deleteOne = async (a) => {
              const ageDays = ((Date.now() - new Date(a.created_at).getTime()) / 86400000).toFixed(1);
              const line = `id=${a.id} name=${a.name} size=${mib(a.size_in_bytes || 0)}MiB age=${ageDays}d`;
              if (dryRun) {
                if (logged < 50) core.info(`DRY ${line}`);
                logged += 1;
                return;
              }
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id,
                });
                deleted += 1;
                // Log only a sample — full per-artifact log is too noisy
                // for thousands and the totals row carries the real signal.
                if (deleted % 200 === 0) core.info(`progress: deleted=${deleted}/${toDelete.length}`);
              } catch (err) {
                core.warning(`ERR ${line} :: ${err.message}`);
                failed += 1;
              }
            };

            for (let i = 0; i < toDelete.length; i += CONCURRENCY) {
              const chunk = toDelete.slice(i, i + CONCURRENCY);
              await Promise.all(chunk.map(deleteOne));
            }
            core.info(`final: deleted=${deleted} failed=${failed} dryRun_listed=${dryRun ? logged : 0}`);

            // ----- Build result table + summary -----
            const rows = [
              [{ data: 'metric', header: true }, { data: 'value', header: true }],
              ['mode', context.eventName],
              ['olderThanDays', String(olderThanDays)],
              ['dryRun', String(dryRun)],
              ['artifacts found', String(artifacts.length)],
              ['total size (MiB)', mib(totalBytes)],
              ['matched for delete', String(toDelete.length)],
              ['reclaimable (MiB)', mib(reclaimBytes)],
              ['deleted', String(deleted)],
              ['failed', String(failed)],
            ];
            await core.summary.addHeading('purge-artifacts').addTable(rows).write();

            const md = [
              '| metric | value |',
              '|---|---|',
              ...rows.slice(1).map((r) => `| ${r[0]} | ${r[1]} |`),
            ].join('\n');
            core.setOutput('summary_md', md);

      # Reply step runs on ALL terminal states (success/failure/cancelled)
      # so an operator/Claude waiting on the issue always gets a signal.
      # The previous success()/failure() pair silently dropped the
      # cancelled case — when the original 10-min timeout cancelled the
      # first one-shot purge run, no comment was ever posted and the
      # issue looked indistinguishable from a wedge.
      - name: Reply to issue with result
        if: always() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          SUMMARY_MD: ${{ steps.purge.outputs.summary_md }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const status = process.env.JOB_STATUS || 'unknown';
            const icon = status === 'success' ? '✅' : status === 'cancelled' ? '⏱' : '❌';
            const summary = process.env.SUMMARY_MD || '_(no summary — purge step did not complete; check run logs)_';
            const body = [
              `${icon} **purge-artifacts** finished with status: \`${status}\``,
              '',
              summary,
              '',
              `Run: ${runUrl}`,
              status === 'cancelled' ? '\n_(Cancelled — likely the 60-min job timeout. The deletes that DID land are gone for good; re-open another `purge-artifacts-now` issue to continue.)_' : '',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: status === 'success' ? 'completed' : 'not_planned',
            });
