name: Health Snapshot PR

on:
  schedule:
    # Every 6 hours, on the hour.
    - cron: '0 */6 * * *'
  workflow_dispatch:
  # Issue-driven trigger so a Claude Code on the web sandbox session
  # (which lacks `actions:write` on the hosted GitHub MCP server) can
  # fire the smoke test autonomously by opening a labelled issue.
  # Mirrors the pattern used by vm-diag-snapshot.yml /
  # vm-web-api-recover.yml / operator-actions.yml. See
  # docs/runbooks/health-check.md § "Triggering from a sandbox session".
  issues:
    types: [opened]

permissions:
  contents: write        # commit artifacts to the auto/health-check-review branch
  pull-requests: write   # peter-evans/create-pull-request + auto-merge
  issues: write          # comment back on + close the trigger issue

concurrency:
  group: health-snapshot-pr
  cancel-in-progress: false

jobs:
  health-snapshot:
    # Schedule + workflow_dispatch always run. Issue events run only
    # when the opener tagged the issue with `health-snapshot-trigger`,
    # so unrelated issues don't kick off the VM-side collector.
    if: |
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'health-snapshot-trigger')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VM_HOST: 158.178.210.252
      VM_USER: ubuntu
      VM_REPO: /home/ubuntu/ict-trading-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anthropic SDK
        # Action only needs the Anthropic SDK; src.runtime.notify is
        # stdlib-only. Skipping requirements.txt keeps the runner fast.
        run: pip install --no-cache-dir 'anthropic>=0.40.0'

      - name: Set up SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip CRs defensively — if the secret was pasted from a
          # Windows clipboard or a UI that converted line endings,
          # libcrypto rejects \r inside the PEM body.
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Validate the key parses BEFORE any SSH attempt. Gives a
          # clear error message in the log instead of libcrypto's
          # "error in libcrypto" and SSH's "Permission denied".
          if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "::error::VM_SSH_KEY is not a parseable OpenSSH private key."
            echo "Most common causes:"
            echo "  1. CRLF line endings (already stripped above — rule out)"
            echo "  2. PuTTY .ppk format pasted instead of OpenSSH PEM"
            echo "  3. Public key (id_rsa.pub) pasted instead of the private key"
            echo "  4. Encrypted key with a passphrase (CI cannot unlock)"
            echo "  5. Truncated paste — missing -----BEGIN-----/-----END----- markers"
            echo "First and last lines of the written file (markers only, body not printed):"
            head -1 ~/.ssh/id_rsa 2>/dev/null || true
            tail -1 ~/.ssh/id_rsa 2>/dev/null || true
            echo "Verify locally with: ssh-keygen -y -f <your-key-file>"
            exit 1
          fi
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Collect snapshot from VM
        run: |
          set -euo pipefail
          mkdir -p artifacts/health
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=20 \
              "$VM_USER@$VM_HOST" "bash $VM_REPO/scripts/collect_health_snapshot.sh" \
              > artifacts/health/health_snapshot.txt
          echo "snapshot bytes: $(wc -c < artifacts/health/health_snapshot.txt)"

      - name: Run pipeline test on VM
        # Active pipeline check: invokes the live trader's smoke harness
        # (scripts/smoke_test_trade.py --dry-run) over SSH and writes
        # the structured result to artifacts/health/pipeline_test.json.
        # The smoke uses safe_place_order(client=None) so no live order
        # leaves the VM. Output is consumed by run_health_check.py
        # --pipeline-test on the next step, which merges it into
        # checks.pipeline of the layer-1 report.
        #
        # continue-on-error so a transient SSH blip / smoke timeout
        # doesn't block the rest of the workflow. The Python layer
        # records the absence as `warn` on checks.pipeline so the LLM
        # still grades the snapshot normally.
        id: pipeline_test
        continue-on-error: true
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=20 \
              "$VM_USER@$VM_HOST" "bash $VM_REPO/scripts/run_pipeline_health_test.sh" \
              > artifacts/health/pipeline_test.json
          echo "pipeline test result:"
          cat artifacts/health/pipeline_test.json

      - name: Run automated health analysis (layer 1)
        id: analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Route the action's Telegram pings through the Claude bot,
          # not the trader's bot. The chat id is shared across both bots.
          # The underlying helper still reads TELEGRAM_BOT_TOKEN /
          # TELEGRAM_CHAT_ID from env, so we alias here.
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          PYTHONPATH=. python scripts/run_health_check.py \
            artifacts/health/health_snapshot.txt \
            --out-dir artifacts/health \
            --pipeline-test artifacts/health/pipeline_test.json

      - name: Emit Claude review request (layer 2)
        id: review_request
        run: |
          set -euo pipefail
          PYTHONPATH=. python scripts/write_health_review_request.py \
            --report artifacts/health/latest.json \
            --snapshot-path artifacts/health/health_snapshot.txt \
            --report-path artifacts/health/latest.json

      # Upload BEFORE peter-evans/create-pull-request. That action does
      # `git reset --hard origin/main` after pushing the review branch,
      # which wipes artifacts/health/** from the working tree. If
      # upload-artifact runs after, it logs "No files were found" and
      # produces no forensic bundle. Uploading here guarantees the
      # bundle exists regardless of whether PR creation succeeds.
      - name: Upload run artifacts (forensic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/health/**

      - name: Create or update review PR
        id: cpr
        # peter-evans/create-pull-request@v7 — pinned major; updates the
        # same PR if auto/health-check-review is already open.
        #
        # Token resolution:
        #   1. HEALTH_REVIEW_PAT (if set) — a fine-grained PAT with
        #      Contents:write + Pull requests:write on this repo. Use
        #      this when the org/repo has "Allow GitHub Actions to
        #      create and approve pull requests" disabled (which makes
        #      the default GITHUB_TOKEN raise "GitHub Actions is not
        #      permitted to create or approve pull requests").
        #   2. Otherwise GITHUB_TOKEN, which requires the above
        #      Settings → Actions → General toggle to be on.
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HEALTH_REVIEW_PAT || secrets.GITHUB_TOKEN }}
          base: main
          branch: auto/health-check-review
          delete-branch: false
          commit-message: |
            chore(health-check): refresh review artifacts ${{ steps.review_request.outputs.request_id }}
          title: "Health check review request"
          body: |
            Automated health-check artifacts and Claude review request.

            - **Machine status**: `${{ steps.analyze.outputs.status }}`
            - **Pipeline test**: `${{ steps.analyze.outputs.pipeline_status }}` — ${{ steps.analyze.outputs.pipeline_note }}
            - **Request id**: `${{ steps.review_request.outputs.request_id }}`
            - **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **This PR is auto-merged by the workflow.** The Claude review
            routine subscribes to `pull_request closed` events filtered on
            `merged == true` and the `health-snapshot-routine` label, so
            merging here fires the routine without operator action. See
            [`docs/runbooks/health-check.md`](docs/runbooks/health-check.md)
            for the two-workflow design.

            Files in this PR:
            - `artifacts/health/health_snapshot.txt` — raw VM snapshot
            - `artifacts/health/pipeline_test.json` — active pipeline-test result
            - `artifacts/health/latest.json` — machine verdict (snapshot grade + pipeline-test escalation)
            - `artifacts/health/health_check_<ts>.json` — per-run verdict copy
            - `comms/requests/${{ steps.review_request.outputs.request_id }}.json` — schema-valid review request
          # `health-snapshot-routine` is the literal label the Claude
          # routine filter is configured for. Keep both sides in sync.
          labels: |
            health-snapshot-routine
            automated
          add-paths: |
            artifacts/health/**
            comms/requests/REQ-*.json

      - name: Auto-merge the review PR
        # Merging the labelled PR fires the Claude review routine
        # (configured to subscribe to PR-closed-with-label events).
        # Squash keeps main's history linear; --delete-branch is omitted
        # so auto/health-check-review survives for the next run (matches
        # `delete-branch: false` on the create-pr step). Token mirrors
        # the create-pr fallback chain.
        id: automerge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.HEALTH_REVIEW_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge --squash \
            --repo "${{ github.repository }}" \
            "${{ steps.cpr.outputs.pull-request-number }}"

      - name: Notify operator that the trigger fired
        id: notify
        if: always() && steps.cpr.outputs.pull-request-number != ''
        env:
          # Same alias as layer 1 — Claude bot token, shared chat id.
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MERGE_OUTCOME: ${{ steps.automerge.outcome }}
        run: |
          set -eu
          PR_NUM="${{ steps.cpr.outputs.pull-request-number }}"
          PR_URL="${{ steps.cpr.outputs.pull-request-url }}"
          STATUS="${{ steps.analyze.outputs.status }}"
          PIPELINE="${{ steps.analyze.outputs.pipeline_status }}"
          if [ "${MERGE_OUTCOME:-skipped}" = "success" ]; then
            phrase="auto-merged — Claude review routine fired"
          else
            phrase="open (auto-merge ${MERGE_OUTCOME:-skipped}) — manual merge required"
          fi
          # Capture the helper's exit code so the issue-driven path can
          # surface "Telegram ping arrived?" in the trigger-issue
          # comment without making telegram failure fatal to the run.
          set +e
          PYTHONPATH=. python scripts/notify_session.py alert \
            --summary "Health review PR #${PR_NUM} ${phrase} (machine: ${STATUS:-UNKNOWN}, pipeline: ${PIPELINE:-unknown})" \
            --link "$PR_URL"
          tg_rc=$?
          set -e
          echo "telegram_exit_code=${tg_rc}" >>"$GITHUB_OUTPUT"
          if [ "$tg_rc" -ne 0 ]; then
            echo "::warning::telegram alert failed (rc=${tg_rc}, non-fatal)"
          fi

      # ────────────────────────────────────────────────────────────
      # Issue-driven path: comment back on the trigger issue with the
      # run URL, the resulting PR URL, the layer-1 verdict, and
      # whether the Claude-bot Telegram ping fired. Then close the
      # issue. Only runs for `issues` events; schedule + dispatch
      # paths skip these steps.
      # ────────────────────────────────────────────────────────────

      - name: Reply to trigger issue with success
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_OPERATION: ${{ steps.cpr.outputs.pull-request-operation }}
          ANALYZE_STATUS: ${{ steps.analyze.outputs.status }}
          PIPELINE_STATUS: ${{ steps.analyze.outputs.pipeline_status }}
          MERGE_OUTCOME: ${{ steps.automerge.outcome }}
          TELEGRAM_EXIT: ${{ steps.notify.outputs.telegram_exit_code }}
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let verdict = process.env.ANALYZE_STATUS || 'UNKNOWN';
            let summary = '(no summary)';
            let layer1Error = '';
            let pipelineLine = '';
            try {
              const raw = fs.readFileSync('artifacts/health/latest.json', 'utf8');
              const j = JSON.parse(raw);
              verdict = j.status || verdict;
              summary = j.summary || summary;
              if (j.error) {
                layer1Error =
                  `\n⚠️ Layer-1 fallback fired — \`${j.error.type}\`: ${j.error.message}\n` +
                  `(verdict UNKNOWN means the Anthropic call did not succeed; ` +
                  `check ANTHROPIC_API_KEY secret + billing.)`;
              }
              const p = (j.checks && j.checks.pipeline) || null;
              if (p) {
                pipelineLine = `\nPipeline test: \`${p.status}\` — ${p.note}`;
              }
            } catch (e) {
              summary = `(could not parse artifacts/health/latest.json: ${e.message})`;
            }
            const tgExit = process.env.TELEGRAM_EXIT;
            let tgLine;
            if (tgExit === undefined || tgExit === '') {
              tgLine = 'ℹ️ Telegram step skipped (no PR was opened/updated).';
            } else if (tgExit === '0') {
              tgLine = '✅ Telegram ping (Claude bot) sent.';
            } else {
              tgLine = `⚠️ Telegram ping exited rc=${tgExit} (non-fatal).`;
            }
            const mergeOutcome = process.env.MERGE_OUTCOME || 'skipped';
            const mergeLine = mergeOutcome === 'success'
              ? '✅ PR auto-merged — Claude review routine fired.'
              : `⚠️ Auto-merge step ${mergeOutcome} — manual merge required to fire the Claude review routine.`;
            const prLine = process.env.PR_NUMBER
              ? `PR #${process.env.PR_NUMBER} (${process.env.PR_OPERATION || 'opened/updated'}): ${process.env.PR_URL}`
              : '⚠️ No PR was opened/updated (peter-evans step produced no number).';
            const body =
              `✅ **health-snapshot-pr** completed.\n` +
              `Run: ${runUrl}\n` +
              `${prLine}\n` +
              `${mergeLine}\n` +
              `Layer-1 verdict: \`${verdict}\`\n` +
              `Layer-1 summary: ${summary}` +
              pipelineLine +
              layer1Error +
              `\n${tgLine}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Reply to trigger issue with failure
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body =
              `❌ **health-snapshot-pr run failed.**\n` +
              `Run: ${runUrl}\n\n` +
              `Inspect the run logs to identify the failing step. Common causes:\n` +
              `- \`VM_SSH_KEY\` secret unset or unparseable (CRLF / .ppk / encrypted key).\n` +
              `- VM unreachable from the GitHub-hosted runner (network or sshd).\n` +
              `- \`scripts/collect_health_snapshot.sh\` returned non-zero on the VM.\n` +
              `- \`scripts/run_pipeline_health_test.sh\` missing on the VM (deploy via git pull) or smoke creds unset.\n` +
              `- peter-evans/create-pull-request denied: either enable Settings → Actions → General → ` +
              `"Allow GitHub Actions to create and approve pull requests", or set the \`HEALTH_REVIEW_PAT\` ` +
              `secret to a fine-grained PAT with Contents:write + Pull requests:write on this repo.\n` +
              `- Auto-merge step failed: same token requirements as create-pull-request; needs Pull requests:write.\n`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
