name: init-actions-secrets

# Create empty placeholder repository Actions secrets so the operator can
# fill them in later via the standard "Update" UI instead of clicking
# "New repository secret" once per name.
#
# Why this workflow exists:
#   When a new broker is being onboarded the operator typically has to
#   provision N env vars (e.g. Velotrade = 2 vars, a broker with a key+secret = 2, etc.). Without
#   this workflow that's N x "New repository secret" clicks. With it,
#   one dispatch creates all N as empty placeholders and the operator
#   pastes values into a pre-existing list — much faster, less error-
#   prone, and one fewer hand-off.
#
# Idempotent + safe:
#   * Already-set secrets are SKIPPED (never overwritten). An empty
#     placeholder is only ever created for a name that didn't exist.
#     This makes the workflow safe to dispatch multiple times or on a
#     partially-provisioned set.
#   * The workflow never reads, logs, or operates on secret VALUES —
#     only on names. The empty string is what's written.
#
# Auth:
#   Uses BRANCH_PROTECTION_TOKEN (already provisioned for the
#   branch-protection-sync workflow). That PAT has the `repo` scope,
#   which covers Actions-secret writes. If it isn't set yet, the
#   workflow fails fast with a pointer to the one-time setup in
#   .github/workflows/branch-protection-sync.yml § header.
#
# Dispatch — two paths, identical behaviour:
#
#   1. workflow_dispatch (UI / Actions API). Inputs:
#        names: BROKER_API_KEY,BROKER_API_SECRET,...
#
#   2. Issue-label trigger — the Claude-dispatchable path.
#      Open an issue labelled `init-actions-secrets` with body:
#        ```
#        names: BROKER_API_KEY,BROKER_API_SECRET,BROKER_APP_ID,...
#        reason: <one-line audit note>
#        ```
#      The workflow runs, comments back with created/skipped/rejected,
#      and closes the issue. Mirror of the vm-web-api-recover /
#      vm-diag-snapshot patterns. Label is created idempotently by
#      bootstrap-labels.yml.

on:
  workflow_dispatch:
    inputs:
      names:
        description: "Comma-separated secret names to create as empty placeholders. Already-set secrets are skipped. Names must match [A-Z_][A-Z0-9_]*."
        required: true
        default: ""
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write   # required to comment + close the request issue

concurrency:
  group: init-actions-secrets
  cancel-in-progress: false

jobs:
  create-placeholders:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'init-actions-secrets'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    outputs:
      created: ${{ steps.run.outputs.created }}
      skipped: ${{ steps.run.outputs.skipped }}
      rejected: ${{ steps.run.outputs.rejected }}
    steps:
      - name: Parse names from input or issue body
        id: parse
        env:
          # Carry the issue body through env, never inline — prevents
          # body content from being shell-interpolated. Mirrors the
          # ISSUE_BODY pattern in system-actions.yml.
          ISSUE_BODY: ${{ github.event.issue.body }}
          DISPATCH_NAMES: ${{ inputs.names }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NAMES="${DISPATCH_NAMES}"
          else
            # Issue-body parse: pull the first `names:` line. Tolerates
            # leading whitespace and any trailing comment after `#`.
            NAMES=$(printf '%s\n' "${ISSUE_BODY}" \
              | grep -m1 -E '^[[:space:]]*names:' \
              | sed -E 's/^[[:space:]]*names:[[:space:]]*//; s/#.*$//; s/[[:space:]]+$//')
          fi
          if [ -z "${NAMES// }" ]; then
            echo "::error::No secret names provided (workflow_dispatch input empty, or issue body missing 'names:' line)."
            exit 1
          fi
          echo "names=${NAMES}" >> "$GITHUB_OUTPUT"
          echo ">>> Names to process: ${NAMES}"

      - name: Validate auth + create placeholders
        id: run
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          NAMES: ${{ steps.parse.outputs.names }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::BRANCH_PROTECTION_TOKEN secret is not set."
            echo "::error::See .github/workflows/branch-protection-sync.yml header for the one-time PAT setup."
            exit 1
          fi

          # Read the current set of secret NAMES (never values). gh
          # returns one name per line in jq output.
          existing=$(gh secret list --repo "${REPO}" --json name --jq '.[].name' || true)

          created=""
          skipped=""
          rejected=""

          IFS=',' read -ra requested <<< "${NAMES}"
          for raw in "${requested[@]}"; do
            # Strip surrounding whitespace
            name=$(printf '%s' "${raw}" | tr -d '[:space:]')
            if [ -z "${name}" ]; then
              continue
            fi
            # GitHub Actions secret name rules: starts with letter or
            # underscore, then [A-Z0-9_]. We tighten to uppercase-first
            # to match the convention every other secret in this repo uses
            # and to reject obvious typos like lowercase names.
            if ! [[ "${name}" =~ ^[A-Z_][A-Z0-9_]*$ ]]; then
              rejected="${rejected} ${name}"
              continue
            fi
            if printf '%s\n' "${existing}" | grep -qx "${name}"; then
              skipped="${skipped} ${name}"
              continue
            fi
            # --body "" creates the secret with an empty value. The
            # workflow consumers (sync-vm-secrets.yml's OPTIONAL_SECRETS,
            # any future per-broker reader) treat empty values as
            # "not yet provisioned" and skip them with a warning, so
            # this is safe to leave in place until the operator fills
            # in the real value via Settings → Secrets → Update.
            gh secret set "${name}" --body "" --repo "${REPO}"
            created="${created} ${name}"
          done

          echo ">>> Created (empty placeholder):${created:- (none)}"
          echo ">>> Skipped (already existed):  ${skipped:- (none)}"
          echo "created=${created# }" >> "$GITHUB_OUTPUT"
          echo "skipped=${skipped# }" >> "$GITHUB_OUTPUT"
          echo "rejected=${rejected# }" >> "$GITHUB_OUTPUT"
          if [ -n "${rejected}" ]; then
            echo "::error::Rejected (bad name format, must match [A-Z_][A-Z0-9_]*):${rejected}"
            exit 1
          fi

      - name: Comment result on issue (issues trigger only)
        if: always() && github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CREATED: ${{ steps.run.outputs.created }}
          SKIPPED: ${{ steps.run.outputs.skipped }}
          REJECTED: ${{ steps.run.outputs.rejected }}
          OUTCOME: ${{ job.status }}
        run: |
          set -euo pipefail
          body=$(cat <<EOF
          **init-actions-secrets — ${OUTCOME}**

          - Created (empty placeholders): \`${CREATED:-(none)}\`
          - Skipped (already existed):    \`${SKIPPED:-(none)}\`
          - Rejected (bad name format):   \`${REJECTED:-(none)}\`

          Run: ${RUN_URL}

          Fill placeholder values in **Settings → Secrets and variables →
          Actions → Update** for each created name. The empty placeholder
          is functionally identical to "not set" — sync-vm-secrets.yml's
          OPTIONAL_SECRETS treats empty values as "not yet provisioned"
          and skips them with a warning, so nothing on the VM changes
          until the real value lands.
          EOF
          )
          gh issue comment "${ISSUE_NUMBER}" --repo "${{ github.repository }}" --body "${body}"
          if [ "${OUTCOME}" = "success" ]; then
            gh issue close "${ISSUE_NUMBER}" --repo "${{ github.repository }}"
          fi
