name: init-actions-secrets

# Create empty placeholder repository Actions secrets so the operator can
# fill them in later via the standard "Update" UI instead of clicking
# "New repository secret" once per name.
#
# Why this workflow exists:
#   When a new broker is being onboarded the operator typically has to
#   provision N env vars (Tradovate = 7, Velotrade = 2, etc.). Without
#   this workflow that's N x "New repository secret" clicks. With it,
#   one dispatch creates all N as empty placeholders and the operator
#   pastes values into a pre-existing list — much faster, less error-
#   prone, and one fewer hand-off.
#
# Idempotent + safe:
#   * Already-set secrets are SKIPPED (never overwritten). An empty
#     placeholder is only ever created for a name that didn't exist.
#     This makes the workflow safe to dispatch multiple times or on a
#     partially-provisioned set.
#   * The workflow never reads, logs, or operates on secret VALUES —
#     only on names. The empty string is what's written.
#
# Auth:
#   Uses BRANCH_PROTECTION_TOKEN (already provisioned for the
#   branch-protection-sync workflow). That PAT has the `repo` scope,
#   which covers Actions-secret writes. If it isn't set yet, the
#   workflow fails fast with a pointer to the one-time setup in
#   .github/workflows/branch-protection-sync.yml § header.
#
# Operator dispatch:
#   * UI: Actions → init-actions-secrets → "Run workflow" → paste
#     comma-separated names (e.g.
#     TRADOVATE_USERNAME,TRADOVATE_PASSWORD,TRADOVATE_APP_ID,
#     TRADOVATE_APP_VERSION,TRADOVATE_CID,TRADOVATE_SECRET,
#     TRADOVATE_DEVICE_ID).
#   * Claude can dispatch the same via the Actions API when the
#     `BRANCH_PROTECTION_TOKEN` is present.

on:
  workflow_dispatch:
    inputs:
      names:
        description: "Comma-separated secret names to create as empty placeholders. Already-set secrets are skipped. Names must match [A-Z][A-Z0-9_]*."
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: init-actions-secrets
  cancel-in-progress: false

jobs:
  create-placeholders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate auth + create placeholders
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          NAMES: ${{ inputs.names }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::BRANCH_PROTECTION_TOKEN secret is not set."
            echo "::error::See .github/workflows/branch-protection-sync.yml header for the one-time PAT setup."
            exit 1
          fi
          if [ -z "${NAMES// }" ]; then
            echo "::error::'names' input is empty — pass a comma-separated list."
            exit 1
          fi

          # Read the current set of secret NAMES (never values). gh
          # returns one name per line in jq output.
          existing=$(gh secret list --repo "${REPO}" --json name --jq '.[].name' || true)

          created=""
          skipped=""
          rejected=""

          IFS=',' read -ra requested <<< "${NAMES}"
          for raw in "${requested[@]}"; do
            # Strip surrounding whitespace
            name=$(printf '%s' "${raw}" | tr -d '[:space:]')
            if [ -z "${name}" ]; then
              continue
            fi
            # GitHub Actions secret name rules: starts with letter or
            # underscore, then [A-Z0-9_]. We tighten to uppercase-first
            # to match the convention every other secret in this repo uses
            # and to reject obvious typos like lowercase names.
            if ! [[ "${name}" =~ ^[A-Z_][A-Z0-9_]*$ ]]; then
              rejected="${rejected} ${name}"
              continue
            fi
            if printf '%s\n' "${existing}" | grep -qx "${name}"; then
              skipped="${skipped} ${name}"
              continue
            fi
            # --body "" creates the secret with an empty value. The
            # workflow consumers (sync-vm-secrets.yml's OPTIONAL_SECRETS,
            # any future per-broker reader) treat empty values as
            # "not yet provisioned" and skip them with a warning, so
            # this is safe to leave in place until the operator fills
            # in the real value via Settings → Secrets → Update.
            gh secret set "${name}" --body "" --repo "${REPO}"
            created="${created} ${name}"
          done

          echo ">>> Created (empty placeholder):${created:- (none)}"
          echo ">>> Skipped (already existed):  ${skipped:- (none)}"
          if [ -n "${rejected}" ]; then
            echo "::error::Rejected (bad name format, must match [A-Z_][A-Z0-9_]*):${rejected}"
            exit 1
          fi
