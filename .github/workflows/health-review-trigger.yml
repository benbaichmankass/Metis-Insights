name: Health Review Trigger

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  trigger-health-review:
    # Standard "merged PR" pattern: GitHub has no direct merged event,
    # so we filter on closed + merged == true. The label gates this to
    # PRs the snapshot workflow created.
    if: >
      github.event.pull_request.merged == true
      && contains(github.event.pull_request.labels.*.name, 'health-check-review')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 2

      - name: Show trigger context
        run: |
          set -eu
          echo "Merged PR #${{ github.event.pull_request.number }}"
          echo "Title:        ${{ github.event.pull_request.title }}"
          echo "Labels:       ${{ join(github.event.pull_request.labels.*.name, ', ') }}"
          echo "Merge commit: ${{ github.event.pull_request.merge_commit_sha }}"

      - name: List review requests landed by this merge
        id: requests
        run: |
          set -eu
          # Files added under comms/requests/ as part of this merge.
          added=$(git diff --name-only --diff-filter=A \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.merge_commit_sha }}" \
            | grep -E '^comms/requests/REQ-.*\.json$' || true)
          if [ -z "$added" ]; then
            echo "(no comms/requests/REQ-*.json files were added)"
          else
            echo "Review requests now on main:"
            echo "$added"
          fi
          # Persist as a multi-line action output for downstream steps.
          {
            echo "added<<__END__"
            echo "$added"
            echo "__END__"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Claude review routine (API)
        # Direct POST to the Claude routine's API endpoint replaces the
        # older delivery path (PR-closed webhook → Claude routine
        # listener → label filter). One hop, retried on transient
        # failure, with full context in the body — no payload scraping
        # needed on the receiving side.
        #
        # Both URL and bearer token live in repo secrets so the routine
        # can be rotated (or migrated to a new endpoint) without a code
        # change — just rotate the secret.
        env:
          CLAUDE_ROUTINE_URL: ${{ secrets.CLAUDE_ROUTINE_URL }}
          CLAUDE_ROUTINE_TOKEN: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_ROUTINE_URL:-}" ] || [ -z "${CLAUDE_ROUTINE_TOKEN:-}" ]; then
            echo "::error::CLAUDE_ROUTINE_URL and CLAUDE_ROUTINE_TOKEN must both be set as repo secrets."
            exit 1
          fi

          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          ADDED="${{ steps.requests.outputs.added }}"

          review_files_json=$(printf '%s' "$ADDED" \
            | jq -R -s 'split("\n") | map(select(length>0))')

          body=$(jq -n \
            --arg event       "health_review_pr_merged" \
            --arg repo        "${{ github.repository }}" \
            --arg pr_url      "$PR_URL" \
            --argjson pr_number "$PR_NUM" \
            --arg merge_sha   "$MERGE_SHA" \
            --arg branch      "main" \
            --argjson review_files "$review_files_json" \
            '{
              event: $event,
              repo: $repo,
              pr_url: $pr_url,
              pr_number: $pr_number,
              merge_sha: $merge_sha,
              branch: $branch,
              review_files: $review_files
            }')

          echo "Posting body:"
          echo "$body"

          # --fail-with-body so HTTP errors fail the step but still
          # surface the response body in the log for diagnosis.
          # --retry-all-errors absorbs transient flakes (curl 7.71+).
          curl --fail-with-body --silent --show-error \
               --retry 5 --retry-all-errors --retry-delay 5 \
               -X POST "$CLAUDE_ROUTINE_URL" \
               -H "Authorization: Bearer $CLAUDE_ROUTINE_TOKEN" \
               -H "Content-Type: application/json" \
               -d "$body"
          echo  # trailing newline for log readability

      - name: Notify operator that the Claude routine fired
        if: success()
        env:
          # Claude bot, shared chat id.
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -eu
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PYTHONPATH=. python scripts/notify_session.py alert \
            --summary "Claude health review routine fired — PR #${PR_NUM} merged with health-check-review label" \
            --link "$PR_URL" \
            || echo "telegram alert failed (non-fatal)"
