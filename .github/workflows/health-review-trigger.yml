name: Health Review Trigger

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  trigger-health-review:
    # Standard "merged PR" pattern: GitHub has no direct merged event,
    # so we filter on closed + merged == true. The label gates this to
    # PRs the snapshot workflow created — must match the label applied
    # in `.github/workflows/health-snapshot-pr.yml` and the Claude
    # routine UI's filter.
    if: >
      github.event.pull_request.merged == true
      && contains(github.event.pull_request.labels.*.name, 'health-snapshot-routine')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 2

      - name: Show trigger context
        run: |
          set -eu
          echo "Merged PR #${{ github.event.pull_request.number }}"
          echo "Title:        ${{ github.event.pull_request.title }}"
          echo "Labels:       ${{ join(github.event.pull_request.labels.*.name, ', ') }}"
          echo "Merge commit: ${{ github.event.pull_request.merge_commit_sha }}"

      - name: List review requests landed by this merge
        id: requests
        run: |
          set -eu
          # Files added under comms/requests/ as part of this merge.
          added=$(git diff --name-only --diff-filter=A \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.merge_commit_sha }}" \
            | grep -E '^comms/requests/REQ-.*\.json$' || true)
          if [ -z "$added" ]; then
            echo "(no comms/requests/REQ-*.json files were added)"
          else
            echo "Review requests now on main:"
            echo "$added"
          fi
          # Persist as a multi-line action output for downstream steps.
          {
            echo "added<<__END__"
            echo "$added"
            echo "__END__"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Claude review routine (API)
        # Optional backup delivery channel: a direct POST to the
        # Claude routine's API endpoint, running alongside the
        # routine UI's webhook subscription. Either path firing is
        # sufficient to start the review; running both gives
        # redundancy when an autonomous routine is in play.
        #
        # Operator decision 2026-05-10 — the routine UI subscription
        # is the single trigger and layer-2 reviews are produced
        # manually via /health-review. The CLAUDE_ROUTINE_URL/_TOKEN
        # secrets are intentionally unset; this step is a graceful
        # no-op until they are restored. To re-enable the API
        # backup, set both secrets and the curl call resumes.
        id: routine_post
        env:
          CLAUDE_ROUTINE_URL: ${{ secrets.CLAUDE_ROUTINE_URL }}
          CLAUDE_ROUTINE_TOKEN: ${{ secrets.CLAUDE_ROUTINE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLAUDE_ROUTINE_URL:-}" ] || [ -z "${CLAUDE_ROUTINE_TOKEN:-}" ]; then
            echo "::notice::CLAUDE_ROUTINE_URL/_TOKEN unset — routine API trigger skipped (operator decision 2026-05-10: routine UI subscription is the active trigger)."
            echo "posted=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          ADDED="${{ steps.requests.outputs.added }}"

          review_files_json=$(printf '%s' "$ADDED" \
            | jq -R -s 'split("\n") | map(select(length>0))')

          body=$(jq -n \
            --arg event       "health_review_pr_merged" \
            --arg repo        "${{ github.repository }}" \
            --arg pr_url      "$PR_URL" \
            --argjson pr_number "$PR_NUM" \
            --arg merge_sha   "$MERGE_SHA" \
            --arg branch      "main" \
            --argjson review_files "$review_files_json" \
            '{
              event: $event,
              repo: $repo,
              pr_url: $pr_url,
              pr_number: $pr_number,
              merge_sha: $merge_sha,
              branch: $branch,
              review_files: $review_files
            }')

          echo "Posting body:"
          echo "$body"

          # --fail-with-body so HTTP errors fail the step but still
          # surface the response body in the log for diagnosis.
          # --retry-all-errors absorbs transient flakes (curl 7.71+).
          curl --fail-with-body --silent --show-error \
               --retry 5 --retry-all-errors --retry-delay 5 \
               -X POST "$CLAUDE_ROUTINE_URL" \
               -H "Authorization: Bearer $CLAUDE_ROUTINE_TOKEN" \
               -H "Content-Type: application/json" \
               -d "$body"
          echo  # trailing newline for log readability
          echo "posted=true" >>"$GITHUB_OUTPUT"

      - name: Notify operator that the Claude routine fired
        # Only fires when the curl actually posted. When the secrets
        # are unset the upstream step exits cleanly with posted=false
        # and this notify step is skipped — no spurious "routine
        # fired" Telegram message lands.
        if: success() && steps.routine_post.outputs.posted == 'true'
        env:
          # Claude bot, shared chat id.
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -eu
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PYTHONPATH=. python scripts/notify_session.py alert \
            --summary "Claude health review routine API fired — PR #${PR_NUM} merged with health-snapshot-routine label" \
            --link "$PR_URL" \
            || echo "telegram alert failed (non-fatal)"
