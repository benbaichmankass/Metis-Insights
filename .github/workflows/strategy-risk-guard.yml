name: Strategy-risk guard

# Pings the operator (and fails the PR check) when a pull request re-introduces
# a per-strategy risk level — a `risk_pct:` key under config/strategies.yaml or
# a `strategy_risk_pct` reference under src/. Position sizing is the
# RiskManager's sole responsibility (account-level risk_pct basis × an internal
# confidence scalar); a strategy carries no risk level. Removed 2026-06-29.
# See scripts/check_strategy_risk_field_in_diff.py and
# docs/research/position-sizing-confidence-DESIGN.md.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  strategy-risk-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff against base
        run: |
          git fetch origin "${{ github.base_ref }}"
          git diff "origin/${{ github.base_ref }}"...HEAD > /tmp/pr.diff
          wc -l /tmp/pr.diff

      - name: Scan for re-introduced per-strategy risk
        id: scan
        run: |
          set +e
          python scripts/check_strategy_risk_field_in_diff.py /tmp/pr.diff
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Notify operator on hit
        if: steps.scan.outputs.exit != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Telegram secrets not configured; skipping ping."
            exit 0
          fi
          MESSAGE=$(cat <<EOF
          🚨 strategy-risk guard: PR #${{ github.event.pull_request.number }}
          ${{ github.event.pull_request.html_url }}
          A per-strategy risk level was re-introduced (risk_pct in
          config/strategies.yaml, or strategy_risk_pct in src/).
          Sizing is account-level only (RiskManager.risk_pct basis × confidence).
          Remove it, or add an explicit \`# allow-strategy-risk: <reason>\`.
          See docs/research/position-sizing-confidence-DESIGN.md.
          EOF
          )
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" >/dev/null

      - name: Fail the check on hit
        if: steps.scan.outputs.exit != '0'
        run: |
          echo "::error::strategy-risk guard tripped — see job output."
          exit 1
