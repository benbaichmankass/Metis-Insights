name: sysdyn-gas-calibrate

# M29 P1b — calibrate the gas_storage_price_v1 system-dynamics seed on REAL weekly
# Henry Hub natural-gas price (keyless FRED) through the src.sysdyn identify /
# walk-forward-stability harness, and land its scorecard on main. This is the
# SD analogue of the M28 P4 value gate: it produces its own scorecard (out-of-sample
# fit + structural-param identifiability) so the seed can be assessed on real data
# immediately instead of hand-tuning constants.
#
# Runs entirely off-VM on a GitHub-hosted runner (FRED fredgraph.csv is keyless;
# ICT_OFFVM_BUILD_HOST=1 gates the guarded fetcher). No SSH, no live-VM touch, no
# order path. src.sysdyn stays import-linter-pure — all IO/network is in scripts/.
#
# Lands on protected main via the shared ./.github/actions/commit-to-main (PAT
# auto-merge PR). Only the scorecard JSON is committed.
#
# Triggers:
#   1. workflow_dispatch — operator "Run workflow" (window/folds overrides).
#   2. issues.opened w/ label `sysdyn-gas-calibrate-now` — Claude-driven.

on:
  workflow_dispatch:
    inputs:
      window_years:
        description: "Last N years of price history to calibrate on (0 = all)"
        required: false
        default: "8"
      folds:
        description: "Walk-forward stability folds"
        required: false
        default: "4"
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: sysdyn-gas-calibrate
  cancel-in-progress: false

jobs:
  calibrate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.login == github.repository_owner &&
       contains(github.event.issue.labels.*.name, 'sysdyn-gas-calibrate-now'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip "pyyaml>=6.0" yfinance pandas

      - name: P1b — calibrate the gas seed on real NG price (price-only, calendar demand)
        id: calibrate
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -euo pipefail
          python scripts/macro/sysdyn_gas_calibrate.py \
            --mode price \
            --window-years "${{ github.event.inputs.window_years || '8' }}" \
            --folds "${{ github.event.inputs.folds || '4' }}" \
            --generated-at "$(date -u +%FT%TZ)" \
            --path comms/macro/sysdyn_gas_scorecard.json | tee /tmp/sysdyn_card.txt

      - name: P1c — DUAL-TARGET calibration (observed EIA storage + real weather HDD + price)
        id: calibrate_dual
        continue-on-error: true
        env:
          ICT_OFFVM_BUILD_HOST: "1"
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          set -uo pipefail
          python scripts/macro/sysdyn_gas_calibrate.py \
            --mode dual \
            --window-years "${{ github.event.inputs.window_years || '8' }}" \
            --folds "${{ github.event.inputs.folds || '4' }}" \
            --generated-at "$(date -u +%FT%TZ)" \
            --path comms/macro/sysdyn_gas_dual_scorecard.json | tee -a /tmp/sysdyn_card.txt || \
            echo "::warning::P1c dual calibration degraded (missing EIA_API_KEY or thin data) — the price-only scorecard still lands"

      - name: Fetch UNG proxy candles (Yahoo/Stooq) for the mispricing PnL grade
        continue-on-error: true
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -uo pipefail
          python scripts/macro/fetch_macro_candles.py \
            --out-dir data/macro_candles \
            --symbols UNG \
            --start "2010-01-01" || \
            echo "::warning::UNG candle fetch degraded — the mispricing S3 PnL grade will report the honest insufficient_data"

      - name: M28 Phase B — grade the sysdyn MISPRICING construction (S2 signal + S3 PnL)
        id: mispricing
        continue-on-error: true
        env:
          ICT_OFFVM_BUILD_HOST: "1"
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          set -uo pipefail
          python scripts/macro/sysdyn_mispricing.py \
            --candles-dir data/macro_candles --symbol UNG \
            --params-scorecard comms/macro/sysdyn_gas_dual_scorecard.json \
            --rebalance-every 7 --horizons 7,14,30,60,90 --pnl-horizon 30 \
            --json comms/macro/sysdyn_mispricing_scorecard.json | tee -a /tmp/sysdyn_card.txt || \
            echo "::warning::sysdyn mispricing grade degraded (missing EIA_API_KEY / thin data)"

      - name: Land scorecards on main
        id: commit
        uses: ./.github/actions/commit-to-main
        with:
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          paths: comms/macro/sysdyn_gas_scorecard.json comms/macro/sysdyn_gas_dual_scorecard.json comms/macro/sysdyn_mispricing_scorecard.json
          message: "chore(m29): gas-seed calibration scorecards (P1b price + P1c dual-target) + mispricing grade"
          pr-title: "chore(m29): sysdyn gas-seed calibration + mispricing scorecards (auto)"
          pr-body: "M29 P1b (price-only) + P1c (observed EIA storage anchor + real weather HDD + price readout) calibration scorecards, plus the M28 Phase-B sysdyn model-implied MISPRICING construction graded through the S2 signal + S3 PnL gate. Research data; auto-merge."
          branch-prefix: automation/sysdyn-gas-calibrate

      - name: Comment + close issue (issue-driven path)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          PR: ${{ steps.commit.outputs.pr }}
        with:
          script: |
            const fs = require('fs');
            let card = '(scorecard unavailable)';
            try { card = fs.readFileSync('/tmp/sysdyn_card.txt', 'utf8'); } catch (e) {}
            const pr = process.env.PR || '';
            const body = [
              '🧪 **sysdyn-gas-calibrate** — calibrated the M29 gas seed on real NG price.',
              '',
              '```', card.trim(), '```',
              '',
              pr ? `landed via auto-merge PR: ${pr}` : 'nothing to commit this run.',
              '',
              '---',
              '_Generated by [Claude Code](https://claude.ai/code)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed',
            });
