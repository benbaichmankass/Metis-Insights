name: cot-positioning-backfill

# M29 — reconstruct HISTORICAL point-in-time CFTC-COT positioning snapshots (weekly
# large-spec COT-index, valuation-snapshot schema), fetch the proxy candles, run the
# M28 P4 value-thesis gate + the horizon-IC scan over them, and land the snapshots +
# both scorecards on main. Because the positioning sleeve emits the SAME snapshot
# schema as the value sleeve, the P4 gate + horizon-IC scan grade it UNCHANGED.
#
# One-shot / occasional. Runs entirely off-VM on a GitHub-hosted runner (CFTC Socrata
# + Yahoo/Stooq are all keyless; ICT_OFFVM_BUILD_HOST=1 gates the guarded fetchers).
# No SSH, no live-VM touch, no order path.
#
# Lands on protected main via the shared ./.github/actions/commit-to-main (PAT
# auto-merge PR). Candle CSVs are regenerated each run and NOT committed; only the
# reconstructed snapshots + the scorecards land.
#
# Triggers:
#   1. workflow_dispatch — operator "Run workflow" (lookback override).
#   2. issues.opened w/ label `cot-positioning-backfill-now` — Claude-driven.

on:
  workflow_dispatch:
    inputs:
      lookback_weeks:
        description: "COT-index trailing window (weeks)"
        required: false
        default: "156"
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: cot-positioning-backfill
  cancel-in-progress: false

jobs:
  backfill:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.issue.user.login == github.repository_owner &&
       contains(github.event.issue.labels.*.name, 'cot-positioning-backfill-now'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip "pyyaml>=6.0" yfinance pandas

      - name: Reconstruct point-in-time COT positioning snapshots
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -euo pipefail
          python scripts/macro/cot_snapshot_backfill.py \
            --path comms/macro/cot_snapshots.jsonl \
            --lookback "${{ github.event.inputs.lookback_weeks || '156' }}"

      - name: Fetch proxy candles (Yahoo/Stooq) for the COT symbols
        continue-on-error: true
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -uo pipefail
          python scripts/macro/fetch_macro_candles.py \
            --out-dir data/macro_candles \
            --symbols USO,UNG,GLD,CPER,SPY,FXE,IEF \
            --start "2010-01-01" || \
            echo "::warning::candle fetch degraded — P4/horizon will report the honest n=0 for uncovered symbols"

      - name: Run the M28 P4 value-thesis gate over the COT snapshots
        id: gate
        run: |
          set -euo pipefail
          python scripts/macro/thesis_backtest_run.py \
            --snapshots comms/macro/cot_snapshots.jsonl \
            --candles-dir data/macro_candles \
            --rebalance-every 7 --horizon-days 30 \
            --json comms/macro/cot_p4_scorecard.json | tee /tmp/cot_card.txt

      - name: Horizon-IC scan over the COT snapshots
        id: horizon
        continue-on-error: true
        run: |
          set -uo pipefail
          python scripts/macro/horizon_ic_scan.py \
            --snapshots comms/macro/cot_snapshots.jsonl \
            --candles-dir data/macro_candles \
            --rebalance-every 7 \
            --non-overlapping \
            --generated-at "$(date -u +%FT%TZ)" \
            --json comms/macro/cot_horizon_ic_scorecard.json | tee -a /tmp/cot_card.txt || \
            echo "::warning::horizon-IC scan degraded"

      - name: Phase-B construction sweep (D1 change/divergence/detrend, S2+S3 grade)
        id: sweep
        continue-on-error: true
        env:
          ICT_OFFVM_BUILD_HOST: "1"
        run: |
          set -uo pipefail
          python scripts/macro/construction_sweep.py \
            --input cot --candles-dir data/macro_candles \
            --rebalance-every 7 --horizons 7,14,30,60,90 --pnl-horizon 30 \
            --json comms/macro/cot_construction_sweep.json | tee -a /tmp/cot_card.txt || \
            echo "::warning::construction sweep degraded"

      - name: Land COT snapshots + scorecards on main
        id: commit
        uses: ./.github/actions/commit-to-main
        with:
          token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          paths: comms/macro/cot_snapshots.jsonl comms/macro/cot_p4_scorecard.json comms/macro/cot_horizon_ic_scorecard.json comms/macro/cot_construction_sweep.json
          message: "chore(m29): CFTC-COT positioning snapshots + P4 + horizon-IC scorecards"
          pr-title: "chore(m29): CFTC-COT positioning backfill + scorecards (auto)"
          pr-body: "Reconstructed point-in-time CFTC-COT large-spec positioning snapshots (valuation schema) + the M28 P4 gate + horizon-IC scan graded over them. Research data; auto-merge."
          branch-prefix: automation/cot-positioning-backfill

      - name: Comment + close issue (issue-driven path)
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          PR: ${{ steps.commit.outputs.pr }}
        with:
          script: |
            const fs = require('fs');
            let card = '(scorecard unavailable)';
            try { card = fs.readFileSync('/tmp/cot_card.txt', 'utf8'); } catch (e) {}
            const pr = process.env.PR || '';
            const body = [
              '📊 **cot-positioning-backfill** — reconstructed CFTC-COT positioning history + graded it with the P4 + horizon-IC scans.',
              '',
              '```', card.trim(), '```',
              '',
              pr ? `landed via auto-merge PR: ${pr}` : 'nothing to commit this run.',
              '',
              '---',
              '_Generated by [Claude Code](https://claude.ai/code)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed',
            });
