name: _oneoff-remove-breaker

# One-off workflow: apply the targeted edits to coordinator.py that
# delete the in-process circuit-breaker auto-flip (Prime Directive
# enforcement, 2026-05-12). The wrapper has to live on the runner
# rather than in the sandbox session because the 78KB coordinator.py
# is too large to push via the inline-content tools.
#
# After this lands, delete the workflow + the issue-trigger label.

on:
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  apply:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'oneoff-remove-breaker'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/no-auto-dry-flip-and-margin-cap
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply targeted edits to coordinator.py
        run: |
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path('src/core/coordinator.py')
          lines = p.read_text().split('\n')

          # All edits applied bottom-up so indices above don't shift.

          # Edit #3: delete breaker except-clause auto-flip block.
          assert 'Circuit breaker: N consecutive' in lines[1047], lines[1047]
          assert lines[1073].strip() == ')', lines[1073]
          del lines[1047:1074]

          # Edit #2: delete reset-on-success counter pop.
          assert 'Reset the consecutive exchange-rejection' in lines[990], lines[990]
          assert '_EXCHANGE_REJECTION_COUNTS.pop' in lines[992], lines[992]
          del lines[990:993]

          # Edit #1: replace header constants + comment.
          assert lines[39].startswith('# Circuit breaker for exchange-side'), lines[39]
          assert lines[48] == '_EXCHANGE_REJECTION_COUNTS: Dict[str, int] = {}', lines[48]
          new_header = [
              '# 2026-05-12 (Prime Directive enforcement): the in-process',
              '# "circuit breaker" that auto-flipped accounts to dry_run after N',
              '# consecutive exchange_rejected results has been DELETED. Per the',
              '# operator directive in docs/CLAUDE-RULES-CANONICAL.md § Prime',
              '# Directive, the system never switches itself off; transient',
              '# exchange-side issues route through the RiskManager as per-trade',
              '# refusals + per-trade Telegram pings (already wired via',
              '# _emit_execution_failure_ping in multi_account_execute below).',
              '# Removed: the PAUSE_THRESHOLD constant, the COUNTS dict, the',
              '# reset-on-success pop, and the auto-flip + critical-alert block',
              '# in the except clause. set_account_dry_run() the method is',
              '# kept for the Telegram /accounts handler; the auto-call from the',
              '# breaker is what violated the Prime Directive.',
          ]
          lines[39:49] = new_header

          # Sanity: no residual breaker refs (other than the new header comment).
          for i, ln in enumerate(lines):
              if '_EXCHANGE_REJECTION_COUNTS' in ln or '_EXCHANGE_REJECTION_PAUSE_THRESHOLD' in ln:
                  if ln.strip().startswith('# Removed:') or 'reset-on-success' in ln or 'breaker' in ln:
                      continue
                  raise AssertionError(f'residual breaker ref at line {i+1}: {ln!r}')

          p.write_text('\n'.join(lines))
          print(f'applied edits; new line count: {len(lines)}')
          PY

      - name: bash -n + py_compile sanity
        run: |
          # Coordinator.py is Python, not bash, but py_compile catches
          # syntax errors before commit.
          python3 -m py_compile src/core/coordinator.py
          echo "OK: coordinator.py compiles"

      - name: Commit + push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/core/coordinator.py
          if git diff --cached --quiet; then
            echo "no changes to commit (already applied?)"
            exit 0
          fi
          git commit -m "coordinator: delete breaker auto-flip (Prime Directive)

Apply the three targeted edits enumerated in the workflow:
  1. Delete the except-clause auto-flip block (lines 1048-1074).
  2. Delete the reset-on-success counter pop (lines 991-993).
  3. Replace the header constants + comment (lines 40-49) with a
     Prime-Directive note explaining the removal.

The per-rejection Telegram via _emit_execution_failure_ping earlier
in the except clause stays — operator still gets every refusal as
its own ping. The (now-deleted) breaker would have auto-flipped
accounts to dry_run, which violated the Prime Directive in
docs/CLAUDE-RULES-CANONICAL.md (system never switches itself off).

Applied via _oneoff-remove-breaker.yml workflow because the 78KB
coordinator.py is too large to push via the inline-content sandbox
tools."
          git push origin claude/no-auto-dry-flip-and-margin-cap

      - name: Reply to issue + close
        if: github.event_name == 'issues' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = ok
              ? `✅ Breaker removal applied to coordinator.py on branch claude/no-auto-dry-flip-and-margin-cap.\nRun: ${runUrl}`
              : `❌ Workflow failed.\nRun: ${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: ok ? 'completed' : 'not_planned',
            });
