name: oci-storage-verify

# Read-only health check for the OCI block-storage setup. SSHes to the
# live VM, reports `df -h /data`, the bot-data directory contents, the
# fstab entry, mountpoint, and DATA_DIR resolution for each trader
# service. Writes the report to:
#   - the run summary (visible on the Actions page),
#   - a GitHub Issue tagged `oci-verify` (machine-readable, fetchable
#     by Claude via MCP without needing to scrape the rendered run
#     page).
#
# Not gated by an environment. Read-only checks shouldn't need
# manual approval. Reads `VM_SSH_KEY` from repository-scope secrets
# (same secret the health-snapshot workflow uses).

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  # Live trader (Ampere ict-bot-arm since the 2026-06-14 cutover; the old x86
  # micro 158.178.210.252 was terminated 2026-06-16). Full-system audit 2026-07-09.
  VM_HOST: 141.145.193.91
  VM_USER: ubuntu

jobs:
  verify:
    name: ssh and report /data state
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install VM SSH key
        env:
          KEY_CONTENT: ${{ secrets.VM_SSH_KEY }}
        run: |
          if [[ -z "${KEY_CONTENT:-}" ]]; then
            echo "::error::VM_SSH_KEY secret is empty at repository scope. Same secret used by health-snapshot-pr.yml."
            exit 1
          fi
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$KEY_CONTENT" | tr -d '\r' > "$HOME/.ssh/ict-bot-ovm-private.key"
          chmod 0600 "$HOME/.ssh/ict-bot-ovm-private.key"
          echo "VM_SSH_KEY_PATH=$HOME/.ssh/ict-bot-ovm-private.key" >> "$GITHUB_ENV"

      - name: SSH and capture VM state
        id: ssh
        continue-on-error: true
        run: |
          set +e
          bash scripts/oci_vm_ssh.sh 'bash -s' > /tmp/ssh-output.txt 2>&1 <<'REMOTE'
          set +e
          echo "===== df -h /data ====="
          df -h /data 2>&1 || echo "(df failed)"
          echo
          echo "===== ls -la /data/bot-data ====="
          ls -la /data/bot-data 2>&1 || echo "(ls failed)"
          echo
          echo "===== /etc/fstab (lines for /data) ====="
          grep -E "\s/data\s" /etc/fstab 2>&1 || echo "(no fstab entry)"
          echo
          echo "===== mountpoint /data ====="
          mountpoint /data 2>&1
          echo
          echo "===== systemd DATA_DIR for trader services ====="
          for svc in ict-trader-live ict-web-api ict-claude-bridge ict-telegram-bot; do
              if systemctl list-unit-files "${svc}.service" >/dev/null 2>&1; then
                  active=$(systemctl is-active "$svc" 2>&1)
                  data_dir=$(systemctl show -p Environment --value "$svc" 2>/dev/null | tr ' ' '\n' | grep '^DATA_DIR=' || echo 'DATA_DIR=(unset)')
                  printf '  %-20s active=%-10s %s\n' "$svc" "$active" "$data_dir"
              else
                  printf '  %-20s (not installed)\n' "$svc"
              fi
          done
          echo
          echo "===== /data size ====="
          du -sh /data /data/bot-data 2>&1 || true
          REMOTE
          rc=$?
          echo "ssh_rc=$rc" >> "$GITHUB_OUTPUT"
          echo "ssh exit code: $rc"
          exit 0

      - name: Build report
        id: report
        run: |
          rc="${{ steps.ssh.outputs.ssh_rc }}"
          {
            echo "## oci-storage verify ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            echo
            echo "- run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- commit: \`${GITHUB_SHA}\`"
            echo
            echo '```'
            cat /tmp/ssh-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo
            echo "ssh exit code: \`${rc:-?}\`"
          } | tee -a "$GITHUB_STEP_SUMMARY" > /tmp/verify-report.md

      - name: Open verify report issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh label create oci-verify \
            --color "0075ca" \
            --description "OCI storage verify report (auto-generated)" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          title="oci-storage verify $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ ! -s /tmp/verify-report.md ]]; then
            echo "(no report file; writing minimal placeholder)"
            printf 'verify run %s did not produce a report.\n' "$GITHUB_RUN_ID" > /tmp/verify-report.md
          fi
          url=$(gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --body-file /tmp/verify-report.md \
            --label oci-verify)
          echo "issue: $url"
          {
            echo
            echo "### report issue"
            echo "$url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if SSH errored
        if: steps.ssh.outputs.ssh_rc != '0'
        run: |
          echo "::error::SSH step exited with code ${{ steps.ssh.outputs.ssh_rc }}"
          exit 1
