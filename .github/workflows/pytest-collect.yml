name: pytest-collect

# Runs `pytest --collect-only` against the test tree on every PR.
# This is a structural check, not a test run: it fails if a PR breaks
# import resolution / pytest collection (mis-named fixture, syntax
# error, missing import target, etc.) without paying the cost of full
# test execution.
#
# The collect-only contract intentionally keeps this lightweight —
# full pytest runs (with markets/network fixtures) are deferred to a
# separate sprint. See docs/claude/ci-status-checks.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Collect tests (no execution)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # --ignore=tests/test_main_loop.py mirrors CLAUDE.md "Default
          # verification" + sprint-completion guidance: that module imports
          # the live trading entrypoint and is excluded from sandbox runs.
          pytest --collect-only -q tests/ --ignore=tests/test_main_loop.py
