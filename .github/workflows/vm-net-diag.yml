name: vm-net-diag

# Tier-1 read-only network diagnostics for the trading-bot VM.
#
# Confirms whether port 8001 is reachable from the public internet and
# what the VM-side network state looks like (without requiring sudo).
# Distinguishes "service down" (handled by vm-web-api-recover) from
# "service up but firewalled" (the latter requires a vm-net-fix follow-up).
#
# Triggers:
#   1. workflow_dispatch — operator clicks "Run workflow" in the UI.
#   2. issues.opened with label `vm-net-diag-request` — automated path
#      from a Claude session via the GitHub MCP.
#
# Trust contract: read-only. No sudo, no service mutation, no firewall
# changes. Output is posted as an issue comment on the labeled issue
# (or visible in the run log + step summary on workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      port:
        description: "Port to probe (default 8001)"
        required: false
        default: "8001"
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: vm-net-diag
  cancel-in-progress: false

jobs:
  diag:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'vm-net-diag-request'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
      DASHBOARD_PORT: ${{ inputs.port || '8001' }}
    steps:
      - name: Probe public reachability from GitHub runner
        id: public_probe
        run: |
          set +e
          curl -sS --max-time 10 \
            -o public_body.txt \
            -w 'http_code=%{http_code}\nexitcode=%{exitcode}\ntime_total=%{time_total}\nremote_ip=%{remote_ip}\nremote_port=%{remote_port}\n' \
            "http://${VM_SSH_HOST}:${DASHBOARD_PORT}/api/health" \
            > public_meta.txt 2>&1
          rc=$?
          set -e
          {
            echo "## Public reachability probe (GH runner -> ${VM_SSH_HOST}:${DASHBOARD_PORT})"
            echo ""
            echo '```'
            echo "curl exit: $rc"
            cat public_meta.txt
            echo ""
            echo "Body (first 500 bytes):"
            head -c 500 public_body.txt 2>/dev/null || echo '(empty)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "PUBLIC_RC=$rc" >> "$GITHUB_ENV"

      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset. Add it under Settings -> Secrets -> Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Collect VM-side network state (no sudo)
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" 'bash -s' <<'REMOTE' > vm_net.txt 2>&1
          set +e
          PORT=8001
          PUBLIC_IP=141.145.193.91

          echo "===== ss -tln (listening TCP) ====="
          ss -tln 2>&1
          echo

          echo "===== ss -tln | grep :$PORT ====="
          ss -tln | grep ":$PORT" || echo "(no socket bound to :$PORT)"
          echo

          echo "===== curl http://127.0.0.1:$PORT/api/health ====="
          curl -sS --max-time 5 -o /tmp/h_loop -w 'http=%{http_code} time=%{time_total}s\n' "http://127.0.0.1:$PORT/api/health" || echo "(curl exit $?)"
          head -c 500 /tmp/h_loop 2>/dev/null; echo
          echo

          echo "===== curl http://$PUBLIC_IP:$PORT/api/health (loopback via public IP) ====="
          curl -sS --max-time 8 -o /tmp/h_pub -w 'http=%{http_code} time=%{time_total}s\n' "http://$PUBLIC_IP:$PORT/api/health" || echo "(curl exit $?)"
          head -c 500 /tmp/h_pub 2>/dev/null; echo
          echo

          echo "===== ip -4 addr ====="
          ip -4 addr show 2>&1
          echo

          echo "===== ip route ====="
          ip route 2>&1
          echo

          echo "===== PUBLIC EGRESS IP (what Bybit + the internet see for OUTBOUND from this VM) ====="
          # NOTE: NO '2>/dev/null' here — /dev/null on this VM is a broken root-owned
          # regular file (Permission denied), which silently killed the first probe.
          # The SSH-level '2>&1' already captures stderr.
          echo "ipify:    $(curl -sS --max-time 8 https://api.ipify.org || echo '(failed)')"
          echo "ifconfig: $(curl -sS --max-time 8 https://ifconfig.me || echo '(failed)')"
          echo "aws:      $(curl -sS --max-time 8 https://checkip.amazonaws.com || echo '(failed)')"
          echo "icanhazip:$(curl -sS --max-time 8 https://icanhazip.com || echo '(failed)')"
          echo "dns-opendns: $(dig +short +time=5 myip.opendns.com @resolver1.opendns.com || echo '(failed)')"
          echo "bybit-reach: $(curl -sS --max-time 8 -w ' [http=%{http_code} remote_ip=%{remote_ip}]' https://api.bybit.com/v5/market/time || echo '(failed)')"
          echo "  (if these differ from the VM's inbound IP 141.145.193.91, egress is via a NAT gateway —"
          echo "   THIS egress address is the one that must be on the Bybit API-key allowlist.)"
          echo

          echo "===== IB Gateway reachability (trader -> 10.0.0.251:4002) ====="
          if timeout 6 bash -c '< /dev/tcp/10.0.0.251/4002'; then echo "TCP 10.0.0.251:4002 = OPEN (gateway reachable)"; else echo "TCP 10.0.0.251:4002 = CLOSED/UNREACHABLE"; fi
          echo "ping: $(ping -c1 -W2 10.0.0.251 | grep -oE 'time=[0-9.]+ ms' || echo '(no reply)')"
          echo "----- trader IB_* effective env (systemd, no secrets) -----"
          systemctl show ict-trader-live.service -p Environment | tr ' ' '\n' | grep -E 'IB_|IBKR' || echo "(no IB_ in unit Environment=)"
          echo "----- IB_* in .env (names+values are non-secret tuning knobs) -----"
          ENVF=.env; [ -f "$ENVF" ] || ENVF=/home/ubuntu/ict-trading-bot/.env
          grep -E '^[[:space:]]*IB_' "$ENVF" || echo "(no IB_ in .env)"
          echo "----- IB_ in systemd drop-ins -----"
          grep -rhE 'IB_' /etc/systemd/system/ict-trader-live.service.d/ 2>&1 || echo "(no drop-in IB_)"
          echo

          echo "===== iptables -L INPUT -n -v (best-effort, may need sudo) ====="
          iptables -L INPUT -n -v 2>&1 || echo "(iptables not permitted without sudo)"
          echo

          echo "===== nft list ruleset (best-effort, may need sudo) ====="
          nft list ruleset 2>&1 | head -200 || echo "(nft not available or not permitted)"
          echo

          echo "===== ufw status (best-effort) ====="
          ufw status 2>&1 || echo "(ufw not permitted without sudo)"
          echo

          echo "===== systemctl is-active firewalls ====="
          for u in ufw netfilter-persistent iptables nftables firewalld; do
            printf '%-25s %s\n' "$u" "$(systemctl is-active "$u" 2>/dev/null || echo unknown)"
          done
          echo

          echo "===== uptime / last boot ====="
          uptime -s 2>&1
          who -b 2>&1
          echo

          echo "===== ict-web-api.service ====="
          systemctl is-active ict-web-api.service 2>&1
          systemctl show ict-web-api.service --property=ActiveEnterTimestamp,MainPID 2>&1
          REMOTE

          {
            echo ""
            echo "## VM-side state (read-only, no sudo)"
            echo ""
            echo '```'
            head -c 8000 vm_net.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reply to issue with combined diag
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const publicMeta = fs.readFileSync('public_meta.txt', 'utf8');
            const publicBody = fs.existsSync('public_body.txt')
              ? fs.readFileSync('public_body.txt', 'utf8').slice(0, 500)
              : '(empty)';
            const vmNet = fs.readFileSync('vm_net.txt', 'utf8').slice(0, 50_000);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `**vm-net-diag** result. Run: ${runUrl}`,
              ``,
              `### Public reachability (GH runner -> 141.145.193.91:8001)`,
              '```',
              `curl exit: ${process.env.PUBLIC_RC}`,
              publicMeta,
              ``,
              `Body (first 500 bytes):`,
              publicBody || '(empty)',
              '```',
              ``,
              `### VM-side network state`,
              '```',
              vmNet,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Reply to issue with failure note
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `vm-net-diag run failed. Run: ${runUrl}\nCheck the run logs.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
