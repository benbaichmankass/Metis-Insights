              },
              {
                name: 'vm-fix-devnull',
                color: 'b60205',
                description: 'Triggers vm-fix-devnull — recreate a broken /dev/null char device on the live VM (rm + mknod c 1 3 + chmod 666).',
              },
              {
                name: 'vm-devnull-deploy-bootstrap',
                color: 'b60205',
                description: 'Triggers vm-devnull-deploy-bootstrap — chmod 0666 /dev/null then run the deploy in the same fresh window to install ict-devnull-guard.timer (breaks the auto-deploy chicken-and-egg).',
              },
              {
                name: 'vm-devnull-diagnose',
                color: 'b60205',
                description: 'Triggers vm-devnull-source-diagnose — identify what strips /dev/null perms (inspect agent logs / arm auditd watch / read captured chmod events) to kill the source (RISK-4).',
              },
              {
                name: 'vm-ib-gateway-live-login-test',
                color: 'b60205',
                description: 'Triggers vm-ib-gateway-live-login-test — throwaway read-only live-mode IBKR login + 2FA validation on the gateway VM (paper untouched, no trading).',
              },
              {
                name: 'vm-bybit-diag',
                color: '0e8a16',
                description: 'Triggers vm-bybit-diag — reproduce the bot bybit_2 authenticated call on the VM (masked key + egress v4/v6) to pinpoint ErrCode 10010.',
              },
              {
                name: 'vm-net-diag-request',
                color: '0e8a16',
                description: 'Triggers vm-net-diag workflow — read-only network diagnostics for VM port reachability.',
              },
              {
                name: 'vm-net-fix-request',
                color: 'b60205',
                description: 'Triggers vm-net-fix workflow — open VM-local firewall (ufw + iptables) for the dashboard API port.',
              },
              {
                name: 'health-snapshot-trigger',
                color: '0e8a16',
                description: 'Triggers health-snapshot-pr workflow from a sandbox session (issue-driven dispatch).',
              },
              {
                name: 'provision-training-vm',
                color: 'd73a4a',
                description: 'Triggers provision-training-vm workflow — Always Free Ampere A1 VM for the model training center (S-AI-WS9). Tier-3.',
              },
              {
                name: 'doc-audit-now',
                color: 'cfd3d7',
                description: 'Triggers doc-audit-weekly workflow on demand. Audits ARCHITECTURE-CANONICAL.md verification checklist for drift.',
              },
              {
                name: 'doc-drift',
                color: 'fbca04',
                description: 'Marker label on issues opened by doc-audit-weekly when the architecture doc references stale paths.',
              },
              {
                name: 'vwap-backtest-trigger',
                color: '0075ca',
                description: 'Triggers vwap-backtest workflow — HTF trend-filter comparison backtest on the live VM.',
              },
              {
                name: 'trainer-vm-diag-request',
                color: '5319e7',
                description: 'Triggers trainer-vm-diag workflow — full-visibility SSH command runner on the trainer VM (autonomous Claude).',
              },
              {
                name: 'gpu-burst-train',
                color: 'd93f0b',
                description: 'Triggers gpu-burst-train workflow — M19 Tier-1 ledger-gated spot-GPU burst (dry preflight until GPU_BURST_ARMED=1).',
              },
              {
                name: 'ict-scalp-backtest-request',
                color: '0075ca',
                description: 'Triggers ict-scalp-backtest workflow — self-contained pre-live gate for the ict_scalp_5m strategy.',
              },
              {
                name: 'set-diag-token',
                color: 'b60205',
                description: 'Triggers set-diag-token workflow — push the DIAG_READ_TOKEN repo secret onto the live VM + restart web-api.',
              },
              {
                name: 'get-diag-token',
                color: 'b60205',
                description: 'Triggers get-diag-token workflow — resolve the DIAG_READ_TOKEN value and deliver it to the repo owner.',
              },
              {
                name: 'reset-daily-risk-state',
                color: 'b60205',
                description: 'Clears today\'s daily_risk_state (INTRADAY_DRAWDOWN reset) for a given account or all accounts.',
              },
              {
                name: 'purge-artifacts-now',
                color: 'd93f0b',
                description: 'Triggers purge-artifacts workflow — delete build artifacts to reclaim Actions storage.',
              },
            ];
            // Resilient bootstrap: one bad label must not abort the rest.
            // GitHub caps label descriptions at 100 chars (422 otherwise), so
            // truncate defensively; collect failures and surface them at the
            // end instead of throwing mid-loop (the prior `throw e` left every
            // label after the first failure uncreated and the run chronically
            // red).
            const failures = [];
            for (const l of LABELS) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: l.name,
                });
                core.info(`label '${l.name}' exists — leaving as-is`);
                continue;
              } catch (e) {
                if (e.status !== 404) {
                  core.warning(`getLabel '${l.name}' failed: ${e.message}`);
                  failures.push(l.name);
                  continue;
                }
              }
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: l.name,
                  color: l.color,
                  description: (l.description || '').slice(0, 100),
                });
                core.info(`created label '${l.name}'`);
              } catch (ce) {
                core.warning(`createLabel '${l.name}' failed: ${ce.message}`);
                failures.push(l.name);
              }
            }
            if (failures.length) {
              core.setFailed(`label bootstrap failed for: ${failures.join(', ')}`);
            }
