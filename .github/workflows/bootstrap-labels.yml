name: bootstrap-labels

# Self-creates the repo labels that other workflows filter on.
#
# Why this exists:
#   - The `vm-diag-snapshot` workflow filters on `issues.opened` with
#     label `vm-diag-request`. The label has to exist before any
#     issue can be tagged with it.
#   - Claude Code on the web has no `mcp__github__create_label` tool,
#     so a sandbox session can't bootstrap the label itself. The
#     workflow's GITHUB_TOKEN (with `issues: write`) can.
#
# Triggers:
#   * push to main when this file itself changes — runs once on the
#     PR merge that adds / updates this workflow, no operator click.
#   * workflow_dispatch — re-run by hand if a label gets deleted.
#
# Adding labels:
#   Edit the LABELS array below and merge. The next run will create
#   any new entries idempotently; existing labels are left alone.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write     # required for /labels REST API

concurrency:
  group: bootstrap-labels
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Sync labels
        uses: actions/github-script@v7
        with:
          script: |
            const LABELS = [
              {
                name: 'vm-diag-request',
                color: '0e8a16',
                description: 'Triggers the vm-diag-snapshot workflow (PM-side diag relay).',
              },
              {
                name: 'vm-web-api-recover',
                color: 'b60205',
                description: 'Triggers vm-web-api-recover workflow — self-heal restart of ict-web-api.service when the diag relay is exit-7-ing.',
              },
              {
                name: 'operator-action',
                color: 'd93f0b',
                // GitHub caps label descriptions at 100 chars — keep this short or
                // the createLabel call returns 422 and the whole step fails.
                description: 'Issue-driven dispatch for operator-actions.yml allowlist (action: <name>, reason: <text>).',
              },
              {
                name: 'vm-cloud-fix-request',
                color: 'b60205',
                description: 'Triggers vm-cloud-fix workflow — Oracle Cloud Security List ingress for the dashboard API port.',
              },
              {
                name: 'vm-net-diag-request',
                color: '0e8a16',
                description: 'Triggers vm-net-diag workflow — read-only network diagnostics for VM port reachability.',
              },
              {
                name: 'vm-net-fix-request',
                color: 'b60205',
                description: 'Triggers vm-net-fix workflow — open VM-local firewall (ufw + iptables) for the dashboard API port.',
              },
              {
                name: 'health-snapshot-trigger',
                color: '0e8a16',
                description: 'Triggers health-snapshot-pr workflow from a sandbox session (issue-driven dispatch).',
              },
              {
                name: 'cf-worker-deploy',
                color: '1d76db',
                description: 'Triggers cf-worker-deploy workflow — wrangler deploy of cf-worker/ from CI.',
              },
              {
                name: 'provision-training-vm',
                color: 'd73a4a',
                description: 'Triggers provision-training-vm workflow — Always Free Ampere A1 VM for the model training center (S-AI-WS9). Tier-3.',
              },
              {
                name: 'doc-audit-now',
                color: 'cfd3d7',
                description: 'Triggers doc-audit-weekly workflow on demand. Audits ARCHITECTURE-CANONICAL.md verification checklist for drift.',
              },
              {
                name: 'doc-drift',
                color: 'fbca04',
                description: 'Marker label on issues opened by doc-audit-weekly when the architecture doc references stale paths.',
              },
              {
                name: 'vwap-backtest-trigger',
                color: '0075ca',
                description: 'Triggers vwap-backtest workflow — HTF trend-filter comparison backtest on the live VM.',
              },
              {
                name: 'trainer-vm-diag-request',
                color: '5319e7',
                description: 'Triggers trainer-vm-diag workflow — full-visibility SSH command runner on the trainer VM (autonomous Claude).',
              },
              {
                name: 'ict-scalp-backtest-request',
                color: '0075ca',
                description: 'Triggers ict-scalp-backtest workflow — self-contained pre-live gate for the ict_scalp_5m strategy.',
              },
            ];
            for (const l of LABELS) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: l.name,
                });
                core.info(`label '${l.name}' exists — leaving as-is`);
              } catch (e) {
                if (e.status !== 404) throw e;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: l.name,
                  color: l.color,
                  description: l.description,
                });
                core.info(`created label '${l.name}'`);
              }
            }
