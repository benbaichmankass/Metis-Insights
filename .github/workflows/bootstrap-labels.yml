name: bootstrap-labels

# Self-creates the repo labels that other workflows filter on.
#
# Why this exists:
#   - The `vm-diag-snapshot` workflow filters on `issues.opened` with
#     label `vm-diag-request`. The label has to exist before any
#     issue can be tagged with it.
#   - Claude Code on the web has no `mcp__github__create_label` tool,
#     so a sandbox session can't bootstrap the label itself. The
#     workflow's GITHUB_TOKEN (with `issues: write`) can.
#
# Triggers:
#   * push to main when this file itself changes — runs once on the
#     PR merge that adds / updates this workflow, no operator click.
#   * workflow_dispatch — re-run by hand if a label gets deleted.
#
# Adding labels:
#   Edit the LABELS array below and merge. The next run will create
#   any new entries idempotently; existing labels are left alone.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write     # required for /labels REST API

concurrency:
  group: bootstrap-labels
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Sync labels
        uses: actions/github-script@v7
        with:
          script: |
            const LABELS = [
              {
                name: 'claude-coordination',
                color: 'fbca04',
                description: 'The pinned live cross-session Claude Coordination Board (message board — NOT the merge queue). Post work-start/finish + questions; read at session start.',
              },
              {
                name: 'sync-vm-secrets-request',
                color: '1d76db',
                description: 'Dispatch sync-vm-secrets (Actions secrets -> live VM .env); Tier-2 ack rides in chat',
              },
              {
                name: 'vm-diag-request',
                color: '0e8a16',
                description: 'Triggers the vm-diag-snapshot workflow (PM-side diag relay).',
              },
              {
                name: 'prop-report',
                color: '1d76db',
                description: 'Triggers prop-report — POST a prop fill/close or account-status report to /api/bot/prop/report.',
              },
              {
                name: 'news-key-check',
                color: '1d76db',
                description: 'Triggers news-key-check — validate the NEWS_API_KEY secret through the bot news code (off-VM, read-only).',
              },
              {
                name: 'macro-valuation-snapshot-now',
                color: '0e8a16',
                description: 'Triggers macro-valuation-snapshot — off-VM FRED valuation-snapshot producer (appends comms/macro/valuation_snapshots.jsonl).',
              },
              {
                name: 'macro-valuation-backfill-now',
                color: '0e8a16',
                description: 'Triggers macro-valuation-backfill — reconstruct historical point-in-time snapshots from FRED + run the M28 P4 value-thesis gate.',
              },
              {
                name: 'sysdyn-gas-calibrate-now',
                color: '0e8a16',
                description: 'Triggers sysdyn-gas-calibrate — calibrate the M29 gas_storage_price_v1 seed on real weekly NG price (FRED) + emit its scorecard.',
              },
              {
                name: 'cot-positioning-backfill-now',
                color: '0e8a16',
                description: 'Triggers cot-positioning-backfill — reconstruct historical CFTC-COT positioning snapshots + grade them with the M28 P4 + horizon-IC scans.',
              },
              {
                name: 'cancel-queued-runs',
                color: 'cfd3d7',
                description: 'Triggers cancel-queued-runs — bulk-cancel stale queued Actions runs.',
              },
              {
                name: 'provision-ib-gateway',
                color: '5319e7',
                description: 'Triggers provision-ib-gateway workflow — headless IB Gateway (IBC) install/login on the live VM for MES.',
              },
              {
                name: 'provision-gateway-vm',
                color: '5319e7',
                description: 'Triggers provision-gateway-vm — provision the dedicated 1-OCPU Ampere IB-Gateway VM (gateway isolation, Plan B).',
              },
              {
                name: 'terminate-instance',
                color: 'b60205',
                description: 'Triggers terminate-instance — terminate an OCI instance by display_name (frees Ampere budget). Requires confirm: yes.',
              },
              {
                name: 'reset-instance',
                color: 'd93f0b',
                description: 'Triggers reset-instance — out-of-band OCI hard RESET of a hung/SSH-dead VM by display_name (preserves the box). Requires confirm: yes.',
              },
              {
                name: 'vm-resize-live',
                color: 'b60205',
                description: 'Triggers vm-resize-live workflow — stop/resize/start the live trader VM (Ampere A1.Flex OCPU/RAM) within the Always-Free pool. Operator-gated (brief live-trader outage).',
              },
              {
                name: 'provision-live-vm',
                color: 'b60205',
                description: 'Triggers provision-live-vm workflow — provision the Ampere A1.Flex candidate for the live-trader migration (2 OCPU / 12 GB, free-tier-safe). No live impact; boots into a verification state.',
              },
              {
                name: 'arm-candidate-diag',
                color: '5319e7',
                description: 'Triggers arm-candidate-diag — SSH verification relay for the migration candidate VM (host: + cmd: in the body). No live impact.',
              },
              {
                name: 'deploy-candidate',
                color: 'b60205',
                description: 'Triggers deploy-candidate — deploy + dry-boot the bot stack on the Ampere migration candidate (all accounts forced dry_run; parallel to the live micro).',
              },
              {
                name: 'cutover-live',
                color: 'b60205',
                description: 'Triggers cutover-live — migrate the live trader micro -> Ampere candidate. dry_run reports the IP type + plan (no outage); dry_run:false + confirm:yes does the live cutover (stop micro, replicate .env + data, move/handle IP, start candidate).',
              },
              {
                name: 'reserve-live-ip',
                color: 'b60205',
                description: 'Triggers reserve-live-ip — make the live trader public IP a RESERVED (static) IP so it survives VM moves. mode=describe/allocate are non-disruptive; mode=assign (confirm:yes) does the brief ephemeral->reserved swap.',
              },
              {
                name: 'vm-web-api-recover',
                color: 'b60205',
                description: 'Triggers vm-web-api-recover workflow — self-heal restart of ict-web-api.service when the diag relay is exit-7-ing.',
              },
              {
                name: 'init-actions-secrets',
                color: '0e8a16',
                description: 'Triggers init-actions-secrets workflow — pre-creates empty placeholder Actions secrets so the operator pastes into existing slots.',
              },
              {
                name: 'vm-ib-gateway-recover',
                color: 'b60205',
                description: 'Triggers vm-ib-gateway-recover — autonomous ib-gateway container restart (IBKR error 162).',
              },
              {
                name: 'vm-git-credential-bootstrap',
                color: 'b60205',
                description: 'Triggers vm-git-credential-bootstrap — one-time global git credential setup on the live VM so git fetch authenticates now that the repo is private (BL-20260706-GITSYNC-AUTH-BROKEN).',
              },
              {
                name: 'vm-ib-gateway-deploy',
                color: 'b60205',
                description: 'Triggers vm-ib-gateway-deploy — pull origin/main on the gateway VM, re-install systemd units, restart the watchdog timer (the gateway VM has no git-sync auto-deploy).',
              },
              {
                name: 'vm-caddy-deploy',
                color: 'b60205',
                description: 'Triggers vm-caddy-deploy — install/reload Caddy HTTPS front on the live VM (SPA Phase-0) + restart web-api for CORS.',
              },
              {
                name: 'vm-ib-gateway-selftest',
                color: 'b60205',
                description: 'Triggers vm-ib-gateway-selftest — controlled stop+auto-recover test of the reactive IB-Gateway watchdog + a restart-cadence read (safety net never leaves it down).',
              },
              {
                name: 'vm-ib-gateway-stop',
                color: 'b60205',
                description: 'Triggers vm-ib-gateway-stop — stop the ib-gateway container + disable its watchdog when it is up-but-unauthenticated and wedging the trader.',
              },
              {
                name: 'vm-ib-gateway-watchdog-enable',
                color: 'b60205',
                description: 'Triggers vm-ib-gateway-watchdog-enable — re-enables ict-ib-gateway-watchdog.timer after a stop.',
              },
              {
                name: 'system-action',
                color: 'd93f0b',
                // GitHub caps label descriptions at 100 chars — keep this short or
                // the createLabel call returns 422 and the whole step fails.
                description: 'Issue-driven dispatch for system-actions.yml allowlist (action: <name>, reason: <text>).',
              },
              {
                name: 'vm-cloud-fix-request',
                color: 'b60205',
