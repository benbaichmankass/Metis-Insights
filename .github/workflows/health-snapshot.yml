name: Health Snapshot

# Operator-driven flow (adopted 2026-05-12):
#   1. Cron / dispatch fires this workflow on a schedule.
#   2. It SSHes to the VM, runs collect_health_snapshot.sh, and runs
#      the pipeline-test smoke harness (active dry-run).
#   3. Both outputs land in the run's `artifacts/health/` uploaded
#      bundle. Operator downloads the bundle from the Actions UI and
#      pastes the contents into a Claude session for the manual
#      /health-review.
#
# What used to be here, and why it's gone:
#   - Layer-1 LLM call (scripts/run_health_check.py): the operator
#     decided to do reviews manually, so calling Anthropic on every
#     cron produced WARNING reports with no useful signal — every check
#     came back "layer-1 verdict unavailable" because --skip-llm was
#     set. The whole layer-1 path has been deleted.
#   - Layer-2 comms-request emission (scripts/write_health_review_request.py):
#     each run wrote a comms/requests/REQ-*.json that the bot delivered
#     to Telegram. With no autonomous reviewer wired up, the operator
#     got pinged every 6h about a request nobody was going to answer.
#     Each request then expired and pinged AGAIN. Two noise sources for
#     zero actionable signal. Removed.
#   - The auto-merging review PR (peter-evans/create-pull-request +
#     auto-merge): existed solely to commit the layer-1 verdict +
#     comms request to main so `/health-review` could read them from
#     HEAD. With layer-1 gone and the comms request gone, there's
#     nothing PR-worthy left; the snapshot lives as an Action artifact
#     instead.
#   - The Telegram "auto-merge queued — run /health-review NOW" ping:
#     also gone with the PR machinery.
#
# Net effect: this workflow is now a passive snapshot-collector. No
# noise emitted; no operator-facing Telegram; no merge required. The
# /health-review skill (.claude/skills/health-review/SKILL.md) was
# updated in the same PR to read pasted-by-operator inputs instead of
# repo-resident artifacts.

on:
  schedule:
    # Every 6 hours, on the hour. Operator wants the periodic status
    # ping but graded HONESTLY — see the "Compute status + notify"
    # step below for the deterministic ok/watch/concern classifier.
    # No more synthetic WARNING from a skipped Layer-1 LLM call.
    - cron: '0 */6 * * *'
  workflow_dispatch:
  # Issue-driven trigger so a Claude Code on the web sandbox session
  # (which lacks `actions:write` on the hosted GitHub MCP server) can
  # fire the snapshot autonomously by opening a labelled issue. Mirrors
  # vm-diag-snapshot.yml / vm-web-api-recover.yml / system-actions.yml.
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write   # for the issue-driven path: comment back + close

concurrency:
  group: health-snapshot
  cancel-in-progress: false

jobs:
  health-snapshot:
    if: |
      github.event_name != 'issues' ||
      ((github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'health-snapshot-trigger'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VM_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_USER: ubuntu
      VM_REPO: /home/ubuntu/ict-trading-bot
      TRAINER_HOST: ${{ vars.TRAINER_VM_IP || '158.178.209.121' }}
      TRAINER_USER: ubuntu
      TRAINER_REPO: /home/ubuntu/ict-trading-bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Strip CRs defensively — paste from a Windows clipboard or
          # a UI that converted line endings will otherwise wreck the
          # PEM body.
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1; then
            echo "::error::VM_SSH_KEY is not a parseable OpenSSH private key."
            exit 1
          fi
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Collect snapshot from VM
        run: |
          set -euo pipefail
          mkdir -p artifacts/health
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=20 \
              "$VM_USER@$VM_HOST" "bash $VM_REPO/scripts/collect_health_snapshot.sh" \
              > artifacts/health/health_snapshot.txt
          echo "snapshot bytes: $(wc -c < artifacts/health/health_snapshot.txt)"

      - name: Run pipeline test on VM
        # Active dry-run smoke via scripts/smoke_test_trade.py --dry-run
        # on the VM. Uses safe_place_order(client=None) — no live
        # order leaves the VM. continue-on-error so a transient SSH
        # blip / smoke timeout doesn't block the snapshot upload.
        id: pipeline_test
        continue-on-error: true
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=20 \
              "$VM_USER@$VM_HOST" "bash $VM_REPO/scripts/run_pipeline_health_test.sh" \
              > artifacts/health/pipeline_test.json
          echo "pipeline test result:"
          cat artifacts/health/pipeline_test.json

      - name: Collect snapshot from trainer VM
        # continue-on-error: trainer VM may not yet be provisioned.
        # A missing trainer snapshot degrades to trainer_service=skip in
        # /health-review — it does not block the live-VM snapshot upload.
        id: trainer_snapshot
        continue-on-error: true
        run: |
          set -euo pipefail
          # Default file so the artifact upload always finds something.
          echo "trainer_vm_not_reached: true" > artifacts/health/trainer_snapshot.txt
          # Write collection script locally; pipe via stdin so nothing in
          # the remote command string is shell-interpolated here.
          cat > /tmp/trainer_collect.sh <<'TRAINER_SCRIPT'
          set -u
          REPO=/home/ubuntu/ict-trading-bot
          echo "=== TRAINER META ==="
          echo "collected_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "hostname: $(hostname)"
          echo "git_head: $(git -C "$REPO" rev-parse --short HEAD 2>/dev/null || echo unknown)"
          echo "uptime: $(uptime -p 2>/dev/null || uptime)"
          echo "=== TRAINER SERVICE ==="
          echo "trainer_enabled: $(systemctl is-enabled ict-trainer.service 2>/dev/null || echo unknown)"
          echo "trainer_active: $(systemctl is-active ict-trainer.service 2>/dev/null || echo unknown)"
          echo "timer_enabled: $(systemctl is-enabled ict-trainer.timer 2>/dev/null || echo unknown)"
          echo "timer_active: $(systemctl is-active ict-trainer.timer 2>/dev/null || echo unknown)"
          systemctl show ict-trainer.service \
            --property=ExecMainStatus,ActiveEnterTimestamp,ActiveExitTimestamp 2>/dev/null || true
          systemctl show ict-trainer.timer \
            --property=NextElapseUSecRealtime,LastTriggerUSec 2>/dev/null || true
          echo "=== TRAINER RECENT LOG ==="
          journalctl -u ict-trainer.service -n 100 --no-pager 2>/dev/null \
            || echo "no journal entries"
          echo "=== TRAINER DATASETS ==="
          if [ -d "$REPO/ml/datasets/built" ]; then
            ls -la "$REPO/ml/datasets/built/" 2>/dev/null || true
            echo "family_count: $(ls "$REPO/ml/datasets/built/" 2>/dev/null | wc -l)"
          else
            echo "no_datasets_dir: true"
          fi
          if [ -f "$REPO/runtime_logs/trainer/dataset_builds.jsonl" ]; then
            echo "--- last 10 dataset build events ---"
            tail -n 10 "$REPO/runtime_logs/trainer/dataset_builds.jsonl"
          else
            echo "no_dataset_build_log: true"
          fi
          echo "=== TRAINER REGISTRY ==="
          if [ -f "$REPO/.venv/bin/python" ]; then
            cd "$REPO" && .venv/bin/python -m ml.registry list 2>/dev/null \
              || echo "registry_empty_or_error: true"
          else
            echo "no_venv: true"
          fi
          echo "=== TRAINER RESOURCES ==="
          df -h /home 2>/dev/null | tail -1 || true
          free -m 2>/dev/null | head -2 || true
          echo "=== TRAINER END ==="
          TRAINER_SCRIPT
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              "${TRAINER_USER}@${TRAINER_HOST}" 'bash -s' \
              < /tmp/trainer_collect.sh \
              > artifacts/health/trainer_snapshot.txt 2>&1
          echo "trainer snapshot bytes: $(wc -c < artifacts/health/trainer_snapshot.txt)"

      - name: Upload run artifacts
        # The artifact is the deliverable. Operator downloads it from
        # the Actions UI when they want to run /health-review.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-snapshot-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            artifacts/health/**

      - name: Compute status (deterministic, no LLM)
        # Honest status from facts that don't need an LLM:
        #   - heartbeat age < 180s (cadence × 3 with the 60s heartbeat)
        #   - snapshot file present + non-trivial in size
        #   - pipeline-test status in {ok, warn-plumbing}. "warn" with
        #     note "plumbing-on-rejection path exercised" is the
        #     EXPECTED outcome when no exchange client is wired into
        #     the smoke — it is NOT a concern, it is success.
        # Emits a single emoji + one-line summary. No fabricated
        # WARNING when the bot is genuinely fine.
        id: status
        if: always()
        run: |
          set -eu
          python3 - <<'PY' >>"$GITHUB_OUTPUT"
          import json, re
          from pathlib import Path

          snap = Path("artifacts/health/health_snapshot.txt")
          pt   = Path("artifacts/health/pipeline_test.json")

          # Default: ok. Downgrade to watch on soft anomalies; downgrade
          # to concern on actual brokenness.
          level = "ok"
          reasons: list[str] = []

          # 1. Snapshot present.
          if not snap.exists() or snap.stat().st_size < 256:
              level = "concern"
              reasons.append("snapshot missing or truncated")
          else:
              text = snap.read_text(encoding="utf-8", errors="replace")
              # 2. Heartbeat age.
              m = re.search(r"^age_seconds:\s*(\d+)", text, re.MULTILINE)
              if not m:
                  if level == "ok":
                      level = "watch"
                  reasons.append("heartbeat age not found")
              else:
                  age = int(m.group(1))
                  if age >= 600:
                      level = "concern"
                      reasons.append(f"heartbeat stale ({age}s)")
                  elif age >= 180:
                      if level == "ok":
                          level = "watch"
                      reasons.append(f"heartbeat aging ({age}s)")
              # 3. Pipeline test result.
              if pt.exists():
                  try:
                      pj = json.loads(pt.read_text(encoding="utf-8"))
                      st = (pj.get("status") or "").lower()
                      note = pj.get("note") or ""
                      if st == "fail":
                          level = "concern"
                          reasons.append(f"pipeline test fail: {note}")
                      elif st == "warn" and "plumbing-on-rejection" not in note:
                          # "warn" with the expected plumbing note is
                          # NOT a problem — it's the documented
                          # outcome when no exchange client is wired
                          # into the smoke.
                          if level == "ok":
                              level = "watch"
                          reasons.append(f"pipeline test warn: {note}")
                  except json.JSONDecodeError:
                      if level == "ok":
                          level = "watch"
                      reasons.append("pipeline_test.json unparseable")

          # Summary line: short, no jargon, no fake urgency on ok.
          if level == "ok":
              summary = "heartbeat fresh, pipeline test clean"
          else:
              summary = "; ".join(reasons) if reasons else level
          emoji = {"ok": "✅", "watch": "🟡", "concern": "🚨"}[level]
          print(f"level={level}")
          print(f"emoji={emoji}")
          # Wrap multiline-safe summary in a heredoc so it survives
          # GITHUB_OUTPUT serialisation.
          print("summary<<__SUMMARY__")
          print(summary)
          print("__SUMMARY__")
          PY

      - name: Notify operator (informational, only on schedule + dispatch)
        # ONE Telegram message per run, framed as an informational
        # status check — not a "review required" alert. Skip for the
        # issue-driven path because the issue comment-back is the
        # delivery channel there.
        if: |
          always()
          && steps.status.outputs.level != ''
          && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.CLAUDE_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS_EMOJI: ${{ steps.status.outputs.emoji }}
          STATUS_LEVEL: ${{ steps.status.outputs.level }}
          STATUS_SUMMARY: ${{ steps.status.outputs.summary }}
        run: |
          set +e
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # The summary line carries the level naturally — no extra
          # "ACTION REQUIRED" framing when the bot is fine. Operator
          # opens the run page only if they want the artifact.
          PYTHONPATH=. python scripts/notify_session.py alert \
            --summary "${STATUS_EMOJI} Health snapshot — ${STATUS_SUMMARY}" \
            --link "${RUN_URL}" \
            || echo "::warning::telegram notify failed (non-fatal)"

      # ────────────────────────────────────────────────────────────
      # Issue-driven path: comment the run URL + artifact link back
      # on the trigger issue, then close it. Schedule + dispatch paths
      # skip these steps.
      # ────────────────────────────────────────────────────────────

      - name: Reply to trigger issue with success
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body =
              `✅ **health-snapshot** completed.\n` +
              `Run: ${runUrl}\n\n` +
              `Snapshot + pipeline-test artifacts are uploaded under ` +
              `\`health-snapshot-${context.runId}\` on the run page. ` +
              `Download and paste into a Claude session for the manual ` +
              `\`/health-review\`.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Reply to trigger issue with failure
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body =
              `❌ **health-snapshot** failed.\n` +
              `Run: ${runUrl}\n\n` +
              `Common causes: VM_SSH_KEY secret unset/corrupted; VM ` +
              `unreachable from the GitHub-hosted runner; ` +
              `collect_health_snapshot.sh returned non-zero on the VM.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned',
            });
