name: cf-worker-deploy

# Deploy the cf-worker/ Cloudflare Worker via GitHub Actions, removing
# the operator-workstation requirement (no `wrangler login` locally).
#
# Two dispatch paths, both flowing through the same deploy + URL-capture
# logic:
#   1. workflow_dispatch — operator clicks "Run workflow" in Actions UI.
#   2. issues.opened (label `cf-worker-deploy`) — sandbox session opens
#      a labelled issue, this workflow runs, comments the deployed URL
#      back, and closes the issue. Mirrors the pattern used by
#      vm-diag-snapshot.yml / vm-web-api-recover.yml /
#      operator-actions.yml. The label is created idempotently by
#      bootstrap-labels.yml.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   * CLOUDFLARE_API_TOKEN  — fine-grained API token. Recommended scope:
#                             - Account: Workers Scripts:Edit
#                             (no Zone permissions needed for
#                             *.workers.dev deploys; add Zone:DNS:Edit
#                             only if/when we move to a custom domain).
#   * CLOUDFLARE_ACCOUNT_ID — found under Cloudflare dashboard → "right
#                             sidebar → Account ID".
#
# Why not auto-deploy on every push to cf-worker/**: the Worker fronts
# a live production surface; we want every deploy to be intentional.
# A future sprint may add the path-filtered push trigger once the
# Worker has been live for a cycle and the deploy story is stable.

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write   # required to comment + close issue-driven requests

concurrency:
  group: cf-worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'cf-worker-deploy'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets are set
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eu
          missing=""
          [ -n "${API_TOKEN}" ]  || missing="${missing} CLOUDFLARE_API_TOKEN"
          [ -n "${ACCOUNT_ID}" ] || missing="${missing} CLOUDFLARE_ACCOUNT_ID"
          if [ -n "${missing}" ]; then
            echo "::error::Missing required repo secrets:${missing}"
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cf-worker
          command: deploy

      - name: Probe deployed Worker
        id: probe
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          set -eu
          if [ -z "${DEPLOY_URL}" ]; then
            echo "::error::wrangler-action did not produce a deployment-url output."
            echo "Check the 'Deploy Worker' step log for the actual published URL."
            exit 1
          fi
          echo "Worker URL: ${DEPLOY_URL}"

          # Worker-internal health (does not bounce off VM)
          WORKER_HEALTH="$(curl -sS --max-time 10 "${DEPLOY_URL}/__worker/health" || echo 'probe_failed')"
          # End-to-end (Worker → VM → back)
          E2E_HEALTH="$(curl -sS --max-time 15 "${DEPLOY_URL}/api/health" || echo 'probe_failed')"

          {
            echo "url=${DEPLOY_URL}"
            echo "worker_health<<EOF"
            echo "${WORKER_HEALTH}"
            echo "EOF"
            echo "e2e_health<<EOF"
            echo "${E2E_HEALTH}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Cloudflare Worker deployed"
            echo ""
            echo "- **URL:** ${DEPLOY_URL}"
            echo "- **Worker-internal health (\`/__worker/health\`):** \`${WORKER_HEALTH}\`"
            echo "- **End-to-end health (\`/api/health\`, Worker → VM):** \`${E2E_HEALTH}\`"
            echo ""
            echo "### Next: update \`vercel.json\` in the dashboard repo(s)"
            echo ""
            echo "\`\`\`json"
            echo "{"
            echo "  \"rewrites\": ["
            echo "    { \"source\": \"/api/bot/(.*)\",  \"destination\": \"${DEPLOY_URL}/api/bot/\$1\" },"
            echo "    { \"source\": \"/api/pnl/(.*)\",  \"destination\": \"${DEPLOY_URL}/api/pnl/\$1\" },"
            echo "    { \"source\": \"/api/status\",    \"destination\": \"${DEPLOY_URL}/api/status\" },"
            echo "    { \"source\": \"/api/health\",    \"destination\": \"${DEPLOY_URL}/api/health\" }"
            echo "  ]"
            echo "}"
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment deployed URL on issue + close
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.probe.outputs.url }}
          WORKER_HEALTH: ${{ steps.probe.outputs.worker_health }}
          E2E_HEALTH: ${{ steps.probe.outputs.e2e_health }}
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            const workerHealth = process.env.WORKER_HEALTH;
            const e2eHealth = process.env.E2E_HEALTH;
            const issue_number = context.issue.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '## Cloudflare Worker deployed',
              '',
              `- **URL:** \`${url}\``,
              `- **Worker-internal health (\`/__worker/health\`):** \`${workerHealth}\``,
              `- **End-to-end health (\`/api/health\`, Worker → VM):** \`${e2eHealth}\``,
              '',
              '### Next steps (operator-side)',
              '',
              '1. Update `vercel.json` rewrites in both dashboard repos to point at the URL above.',
              '2. Redeploy both Vercel projects.',
              '3. Verify the dashboard loads live data.',
              '4. After one healthy cycle, retire the `*.trycloudflare.com` quick tunnel via the `teardown-cloudflare-tunnel` operator action.',
              '',
              `Run: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: 'closed',
            });

      - name: Comment failure back on issue
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              ':x: cf-worker-deploy run failed.',
              '',
              `Run: ${runUrl}`,
              '',
              'Common failure modes:',
              '- `CLOUDFLARE_API_TOKEN` / `CLOUDFLARE_ACCOUNT_ID` not set (see "Verify required secrets" step).',
              '- API token missing `Workers Scripts:Edit` permission.',
              '- Wrangler config error in `cf-worker/wrangler.toml`.',
              '',
              'Issue left open for triage.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
