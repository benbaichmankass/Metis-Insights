name: vm-ib-gateway-watchdog-enable

# Symmetric counterpart to vm-ib-gateway-stop.yml. When the stop workflow
# disabled ict-ib-gateway-watchdog.timer (so an auto-restart wouldn't revive a
# half-up gateway), the timer needs to be re-enabled once the gateway is
# logged in and serving so it can again auto-heal IBKR's nightly server
# reset. There is no inline path to flip a systemd timer back on through the
# system-actions allowlist, so this workflow handles only that one mutation.
#
# Blast radius: ict-ib-gateway-watchdog.timer only. The container, trader,
#   accounts.yaml, strategies.yaml, risk caps and order code are NOT touched.
#
# Required repo secrets:  VM_SSH_KEY
# The ict-ib-gateway-watchdog.timer runs ONLY on the dedicated IB-Gateway VM
# (private 10.0.0.251, no public IP; role=gateway) since the 2026-06-10
# gateway-isolation split — so this enable must land there, NOT on the trader.
# A GitHub runner can't reach the private gateway directly, so we SSH via
# ProxyJump through the live trader (141.145.193.91), which shares the
# 10.0.0.0/24 subnet — the same pattern as vm-ib-gateway-recover.yml.
# Optional repo variables: VM_SSH_HOST = ProxyJump bastion / live trader
# (default 141.145.193.91), IB_GATEWAY_HOST = gateway target (default
# 10.0.0.251), VM_SSH_USER (default ubuntu). Was defaulted at the terminated
# x86 micro 158.178.210.252 pre-2026-06-14 cutover (BL-20260707-WORKFLOW-STALE-MICRO-DEFAULTS).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this run is happening (audit only)."
        required: false
        default: "manual operator dispatch"
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: vm-ib-gateway-watchdog-enable
  cancel-in-progress: false

jobs:
  enable:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'vm-ib-gateway-watchdog-enable'))
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      # ProxyJump bastion (live trader, public) + the gateway VM (private).
      JUMP_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      GATEWAY_HOST: ${{ vars.IB_GATEWAY_HOST || '10.0.0.251' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
    steps:
      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Only the public jump host is keyscannable from the runner; the
          # private gateway is reached through it via ProxyJump.
          ssh-keyscan -t rsa,ecdsa,ed25519 "${JUMP_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Enable ict-ib-gateway-watchdog.timer
        id: exec
        run: |
          set -euo pipefail
          read -r -d '' REMOTE_SCRIPT <<'REMOTE' || true
          set -uo pipefail
          UNIT=ict-ib-gateway-watchdog.timer
          echo ">>> pre: enabled=$(systemctl is-enabled ${UNIT} 2>&1 || true) active=$(systemctl is-active ${UNIT} 2>&1 || true)"
          sudo systemctl enable --now "${UNIT}" 2>&1 || { echo "::error::enable --now ${UNIT} failed"; exit 1; }
          echo ">>> post: enabled=$(systemctl is-enabled ${UNIT} 2>&1 || true) active=$(systemctl is-active ${UNIT} 2>&1 || true)"
          systemctl list-timers --all "${UNIT}" 2>&1 | tail -5 || true
          REMOTE
          # Build the ssh invocation: ProxyJump through the trader unless the
          # gateway host IS the jump host (degenerate same-box config).
          SSH_ARGS=( -i ~/.ssh/id_rsa
                     -o BatchMode=yes
                     -o StrictHostKeyChecking=accept-new
                     -o ConnectTimeout=15 )
          if [ "${GATEWAY_HOST}" != "${JUMP_HOST}" ]; then
            SSH_ARGS+=( -o "ProxyJump=${VM_SSH_USER}@${JUMP_HOST}" )
            echo ">>> reaching gateway ${GATEWAY_HOST} via ProxyJump ${VM_SSH_USER}@${JUMP_HOST}"
          else
            echo ">>> gateway host == jump host; connecting directly to ${GATEWAY_HOST}"
          fi
          set +e
          ssh "${SSH_ARGS[@]}" \
              "${VM_SSH_USER}@${GATEWAY_HOST}" \
              "bash -s" <<<"$REMOTE_SCRIPT" \
              > action-output.txt 2>&1
          rc=$?
          set -e
          echo "exit_code=${rc}" >>"$GITHUB_OUTPUT"
          echo ">>> Remote exit code: ${rc}"
          cat action-output.txt
          exit "${rc}"

      - name: Reply to issue with success
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.exec.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('action-output.txt', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: `✅ **vm-ib-gateway-watchdog-enable** completed.\nRun: ${runUrl}\nExit code: ${process.env.EXIT_CODE}\n\n\`\`\`\n${output}\n\`\`\``
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              state: 'closed', state_reason: 'completed'
            });

      - name: Reply to issue with failure
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.exec.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('action-output.txt', 'utf8'); } catch (_) { output = '(no output — failure before SSH ran)'; }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: `❌ **vm-ib-gateway-watchdog-enable failed.**\nRun: ${runUrl}\nExit code: ${process.env.EXIT_CODE || '(setup failed)'}\n\nCommon causes: VM_SSH_KEY unset; SSH unreachable; systemctl perms.\n\n\`\`\`\n${output}\n\`\`\``
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              state: 'closed', state_reason: 'not_planned'
            });
