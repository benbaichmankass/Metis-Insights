name: vm-git-credential-bootstrap

# One-time bootstrap for BL-20260706-GITSYNC-AUTH-BROKEN's deploy deadlock.
#
# Why this exists (separate from system-actions.yml / sync-vm-secrets.yml):
#   The repo went private 2026-07-06. The live VM's `git fetch` (run by
#   ict-git-sync.timer / deploy_pull_restart.sh) had always been anonymous
#   and stopped authenticating. The FIX for that (deploy_pull_restart.sh
#   reading VM_GIT_DEPLOY_TOKEN) is itself a commit on `main` — but the copy
#   of that script already checked out on the VM's disk is the OLD,
#   pre-fix version, and the ONLY way it would normally get replaced is...
#   a successful `git fetch`. Classic bootstrap deadlock: the fix can't
#   reach the VM by the mechanism it fixes.
#
#   This workflow breaks the deadlock from the outside. It runs on a
#   GitHub-hosted runner, which authenticates to this (private) repo
#   automatically via the Actions token — no VM-side git state involved —
#   and sets a GLOBAL git credential on the VM directly over SSH. Once set,
#   the VM's EXISTING git fetch (even the old, unmodified line) just starts
#   authenticating immediately, without needing any code to land first. The
#   next ict-git-sync cycle then pulls the nicer explicit-token version
#   normally, and deploys proceed as usual from then on.
#
# Trust contract:
#   * Fixed-form: sets exactly one git config key
#     (http.https://github.com/.extraheader) globally for the ubuntu user,
#     using the same Basic-auth-header mechanism actions/checkout uses for
#     GITHUB_TOKEN. No other file, unit, or config is touched.
#   * The token rides the SSH channel via stdin only — never a command-line
#     argument, never a log line, never `ps`-visible on either end.
#   * Idempotent — re-running just overwrites the same single config value.
#   * One-time by design: once this + the VM_GIT_DEPLOY_TOKEN secret exist,
#     ordinary deploys never need this workflow again.
#
# Required repo secrets:
#   * VM_SSH_KEY          — same key as the other VM-facing workflows.
#   * VM_GIT_DEPLOY_TOKEN — fine-grained, Contents:Read-only PAT scoped to
#                           this repo (BL-20260706-GITSYNC-AUTH-BROKEN).
#
# Dispatch — issue labelled `vm-git-credential-bootstrap`, or workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this run is happening (audit only)."
        required: false
        default: "manual operator dispatch"
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: vm-git-credential-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (github.event.issue.user.login == github.repository_owner ||
        github.event.issue.user.login == 'github-actions[bot]') &&
       contains(github.event.issue.labels.*.name, 'vm-git-credential-bootstrap'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VM_SSH_HOST: ${{ vars.VM_SSH_HOST || '141.145.193.91' }}
      VM_SSH_USER: ${{ vars.VM_SSH_USER || 'ubuntu' }}
    steps:
      - name: Set up SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VM_SSH_KEY}" ]; then
            echo "::error::VM_SSH_KEY secret is unset."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${VM_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa,ecdsa,ed25519 "${VM_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Set global git credential on the VM
        id: exec
        env:
          VM_GIT_DEPLOY_TOKEN: ${{ secrets.VM_GIT_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VM_GIT_DEPLOY_TOKEN}" ]; then
            echo "::error::VM_GIT_DEPLOY_TOKEN secret is unset — create a fine-grained, Contents:Read-only PAT for this repo first."
            exit 1
          fi
          # Token rides stdin over the already-encrypted SSH channel — never
          # a command-line arg, never echoed, never ps-visible.
          printf '%s' "${VM_GIT_DEPLOY_TOKEN}" | ssh -i ~/.ssh/id_rsa \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${VM_SSH_USER}@${VM_SSH_HOST}" \
              'set -euo pipefail
               TOKEN="$(cat)"
               HEADER="AUTHORIZATION: basic $(printf "x-access-token:%s" "$TOKEN" | base64 -w0)"
               git config --global "http.https://github.com/.extraheader" "$HEADER"
               echo ">>> git credential configured for $(whoami)@$(hostname)"
               cd /home/ubuntu/ict-trading-bot
               echo ">>> verifying with a real fetch..."
               git fetch --prune origin
               echo ">>> fetch OK — HEAD after fetch: $(git rev-parse HEAD) / origin/main: $(git rev-parse origin/main)"' \
              > action-output.txt 2>&1
          rc=$?
          echo "exit_code=${rc}" >>"$GITHUB_OUTPUT"
          cat action-output.txt
          exit "${rc}"

      - name: Reply to issue
        if: github.event_name == 'issues' && always()
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.exec.outputs.exit_code }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('action-output.txt', 'utf8'); } catch (_) { output = '(no output — failure before SSH ran)'; }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ok = process.env.EXIT_CODE === '0';
            const head = ok
              ? `✅ **vm-git-credential-bootstrap** completed — the VM's git fetch now authenticates.`
              : `❌ **vm-git-credential-bootstrap failed.**`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              body: `${head}\nRun: ${runUrl}\nExit code: ${process.env.EXIT_CODE || '(setup failed)'}\n\n\`\`\`\n${output}\n\`\`\``
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
              state: 'closed', state_reason: ok ? 'completed' : 'not_planned'
            });
