{% extends "base.html" %}
{% block title %}Home — ICT Trading Bot{% endblock %}
{% block nav %}
<button id="logout-btn" type="button" class="ghost">Sign out</button>
{% endblock %}
{% block content %}
<section class="dashboard-grid">
  <article class="card" id="status-card"
           hx-get="/ui/fragments/status"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML">
    <header><h2>Runtime status</h2></header>
    <div class="card-body card-loading">Loading status…</div>
  </article>

  <article class="card" id="pnl-card"
           hx-get="/ui/fragments/pnl"
           hx-trigger="load, every 30s"
           hx-swap="innerHTML">
    <header><h2>P&amp;L</h2></header>
    <div class="card-body card-loading">Loading P&amp;L…</div>
  </article>

  <article class="card card-wide" id="equity-card">
    <header><h2>Equity (last 7 days)</h2></header>
    <div class="card-body">
      <canvas id="equity-chart" width="600" height="180"
              aria-label="Equity sparkline last 7 days"></canvas>
    </div>
  </article>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/js/chart.umd.js" defer></script>
{% endblock %}
