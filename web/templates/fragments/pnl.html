<div class="card-body" id="pnl-card-body">
  {% if accounts %}
  <ul class="pnl-list">
    {% for acc in accounts %}
    <li class="pnl-row" data-account="{{ acc.name }}">
      <span class="pnl-account">{{ acc.name }}</span>
      <span class="pnl-cell">
        <span class="muted">realised</span>
        <span class="metric {{ acc.realized_class }}">${{ "%.2f"|format(acc.realized) }}</span>
      </span>
      <span class="pnl-cell">
        <span class="muted">unrealised</span>
        <span class="metric {{ acc.unrealized_class }}">${{ "%.2f"|format(acc.unrealized) }}</span>
      </span>
      <span class="pnl-cell">
        <span class="muted">trades today</span>
        <span class="metric">{{ acc.trades_today }}</span>
      </span>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="muted">No accounts configured.</p>
  {% endif %}
  <p class="muted"><time datetime="{{ as_of_utc }}">as of {{ as_of_utc }}</time></p>
</div>
