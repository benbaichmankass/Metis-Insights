# Market-neutral cointegration pairs sleeve (M22 D2).
#
# The winner of the small-TF-directions research (docs/research/
# small-tf-directions-2026-07-15.md; proposal docs/research/
# pairs-sleeve-PROPOSAL-2026-07-15.md). Each entry is a long-spread /
# short-spread reverter on a cointegrated USDT-perp pair: log-spread
# s = logA - beta*logB, rolling hedge-beta, z-score entry/exit. Validated
# 3yr IS + 2025-26 OOS (net-positive, no expectancy decay), cointegration-
# stable (half-life ~12h, 100% valid windows), funding-negligible.
#
# This is an ISOLATED 2-leg sleeve — NOT loaded by the strategy roster. The
# once-per-tick src.units.strategies.pairs_executor.run_pairs_tick hook reads
# THIS file, decides per pair on fresh candles, and (only for execution: live)
# places/closes the two legs on the account. Legs are journalled with per-leg
# strategy names pairs_<name>_a / _b (resolved to pairs_executor's no-op
# monitor via pipeline.monitor_unit_for) and linked by a shared pairs_group_id.
#
# ── EXECUTION GATE (the sanctioned strategy-level shadow/live switch) ──
#   execution: shadow  → compute the would-be 2-leg trade + write the soak,
#                        place NOTHING (observe-only; confirm live == backtest).
#   execution: live    → place the two legs on `account_id` (bybit_1 = Bybit
#                        DEMO / paper venue — real order placement, paper money).
#
# SOL/ETH is `live` (operator-approved 2026-07-16) — placing on bybit_1 (paper);
# both its legs clear Bybit's min contract qty. The three BTC-quote pairs
# (SOL/BTC, BNB/BTC, ETH/BTC) are held at `shadow` (BL-20260716-PAIRS-MINQTY): the
# BTC leg sizes below the 0.001 BTC minimum, so the pair half-places (leg A only)
# and orphans a naked leg — they return to `live` once the min-qty-aware sizer
# (validate BOTH legs pre-placement -> skip_size, never half-place) lands. Flipping
# a pair to `shadow` is the rollback — a one-line change, no redeploy (config
# re-read each tick). Tier-3: flip only with operator approval.
#
# Rollback: set a pair back to `execution: shadow` (or delete this file → the
# sleeve is a complete no-op).

account_id: bybit_1                 # default account for all pairs (Bybit demo / paper)
# Per-pair $-risk-at-the-spread-stop is DERIVED from the account's canonical risk
# basis — live balance × the account's risk_pct (config/accounts.yaml::bybit_1.risk)
# × pairs_risk_fraction — NOT a hardcoded dollar literal. This is the same basis
# RiskManager.position_size uses for every other strategy (CLAUDE.md: "sizing is
# the per-account RiskManager's job; account basis × …"). The old hardcoded
# `risk_budget_usd: 20.0` was an architectural violation (BL-20260716-PAIRS-EXEC):
# a magic constant divorced from the account, which on the ~$166k paper balance
# under-sized every leg below the exchange minimum → the sleeve never traded.
# The executor reads the balance itself (execute._fetch_balance) each tick; a pair
# whose basis can't be read skips (skip_no_risk_basis) rather than sizing off a
# guessed number. Enforced by the pairs-sizing-basis CI guard.
pairs_risk_fraction: 1.0            # scale the sleeve's per-pair risk below the flat account basis (1.0 = full per-trade risk basis; e.g. 0.5 = half)
correlation_haircut_factor: 0.5     # per already-open correlated pair (shares a leg): 0.5**n
backstop_mult: 3.0                  # per-leg catastrophe SL/TP at 3x risk_spread in log-price (wide of the spread exit); the displacement is CLAMPED to +/-100%/-50% so a degenerate risk_spread can't explode the level (BL-20260716-PAIRS-BACKSTOP-EXPLODE, #6549). See pairs_sizing.leg_protective_levels.
min_leg_notional_usd: 10.0          # skip a pair whose sized leg notional is below this $ (would be sub-min / break the hedge if rounded up)

pairs:
  - name: pairs_sol_btc
    symbol_a: SOLUSDT
    symbol_b: BTCUSDT
    execution: shadow    # shadow-guard: allow — DEFENSIVE CONTAIN 2026-07-16 (BL-20260716-PAIRS-MINQTY): BTC leg sizes below Bybit min contract qty (0.001 BTC), so the pair half-places (leg A only) and orphans a naked leg. Held at shadow until the min-qty-aware sizer (validate BOTH legs pre-placement -> skip_size) lands. SOL/ETH stays live (both legs clear min-qty).
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling

  - name: pairs_bnb_btc
    symbol_a: BNBUSDT
    symbol_b: BTCUSDT
    execution: shadow    # shadow-guard: allow — DEFENSIVE CONTAIN 2026-07-16 (BL-20260716-PAIRS-MINQTY): BTC leg sizes below Bybit min contract qty (0.001 BTC), so the pair half-places (leg A only) and orphans a naked leg. Held at shadow until the min-qty-aware sizer (validate BOTH legs pre-placement -> skip_size) lands. SOL/ETH stays live (both legs clear min-qty).
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling

  - name: pairs_eth_btc
    symbol_a: ETHUSDT
    symbol_b: BTCUSDT
    execution: shadow    # shadow-guard: allow — DEFENSIVE CONTAIN 2026-07-16 (BL-20260716-PAIRS-MINQTY): BTC leg sizes below Bybit min contract qty (0.001 BTC), so the pair half-places (leg A only) and orphans a naked leg. Held at shadow until the min-qty-aware sizer (validate BOTH legs pre-placement -> skip_size) lands. SOL/ETH stays live (both legs clear min-qty).
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling

  - name: pairs_sol_eth
    symbol_a: SOLUSDT
    symbol_b: ETHUSDT
    execution: live      # RE-FLIP 2026-07-16 (operator-approved, Tier-3): executor bugs fixed — qty_override (#6554), bounded/clamped leg SL/TP (#6549), and risk-budget derived from balance x risk_pct (#6554). Places both legs on bybit_1 (paper). Rollback: set back to shadow.
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling
