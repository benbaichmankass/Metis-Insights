# Market-neutral cointegration pairs sleeve (M22 D2).
#
# The winner of the small-TF-directions research (docs/research/
# small-tf-directions-2026-07-15.md; proposal docs/research/
# pairs-sleeve-PROPOSAL-2026-07-15.md). Each entry is a long-spread /
# short-spread reverter on a cointegrated USDT-perp pair: log-spread
# s = logA - beta*logB, rolling hedge-beta, z-score entry/exit. Validated
# 3yr IS + 2025-26 OOS (net-positive, no expectancy decay), cointegration-
# stable (half-life ~12h, 100% valid windows), funding-negligible.
#
# This is an ISOLATED 2-leg sleeve — NOT loaded by the strategy roster. The
# once-per-tick src.units.strategies.pairs_executor.run_pairs_tick hook reads
# THIS file, decides per pair on fresh candles, and (only for execution: live)
# places/closes the two legs on the account. Legs are journalled with per-leg
# strategy names pairs_<name>_a / _b (resolved to pairs_executor's no-op
# monitor via pipeline.monitor_unit_for) and linked by a shared pairs_group_id.
#
# ── EXECUTION GATE (the sanctioned strategy-level shadow/live switch) ──
#   execution: shadow  → compute the would-be 2-leg trade + write the soak,
#                        place NOTHING (observe-only; confirm live == backtest).
#   execution: live    → place the two legs on `account_id` (bybit_1 = Bybit
#                        DEMO / paper venue — real order placement, paper money).
#
# PAPER-ONLY, edge-gated (operator directive 2026-07-16): "if it's not negative,
# trade it on paper, but not on real money." The whole sleeve routes to bybit_1
# (Bybit DEMO / paper) — there is NO pairs config on a real-money account, so the
# "not real money" constraint is structural. Per-pair live/shadow is now an
# ECONOMICS call, driven by the G2 $-and-lots evidence
# (docs/research/pairs-sleeve-real-money-readiness-2026-07-16.md § G2 FINDINGS,
# trainer-diag #6612/#6615): the fee-free fixed-β-hold edge is
#   SOL/ETH +$1279 · BNB/BTC +$357 · SOL/BTC −$295 · ETH/BTC −$855.
# → the two positive-edge pairs (SOL/ETH, BNB/BTC) run `live` on paper; the two
#   negative-edge pairs (SOL/BTC, ETH/BTC) stay `shadow`.
# NOTE the earlier min-qty HALF-PLACEMENT safety reason for shadowing the BTC-quote
# pairs is RESOLVED — the #6591 both-legs-or-nothing gate (deployed) skips a sub-min
# pair cleanly (skip_size), so a naked leg can no longer form; shadow here is purely
# "no edge", not "unsafe". CAVEAT: on the taker paper venue every pair is NET-negative
# (7.5bps × 2 legs sinks the thin gross edge); paper placement is for EXECUTION
# validation while the maker-fee + live-β-rehedge fix is built, NOT for paper PnL.
# Flipping a pair to `shadow` is the one-line rollback (config re-read each tick).
# Tier-3: flip only with operator approval.
#
# Rollback: set a pair back to `execution: shadow` (or delete this file → the
# sleeve is a complete no-op).

account_id: bybit_1                 # default account for all pairs (Bybit demo / paper)
# Per-pair $-risk-at-the-spread-stop is DERIVED from the account's canonical risk
# basis — live balance × the account's risk_pct (config/accounts.yaml::bybit_1.risk)
# × pairs_risk_fraction — NOT a hardcoded dollar literal. This is the same basis
# RiskManager.position_size uses for every other strategy (CLAUDE.md: "sizing is
# the per-account RiskManager's job; account basis × …"). The old hardcoded
# `risk_budget_usd: 20.0` was an architectural violation (BL-20260716-PAIRS-EXEC):
# a magic constant divorced from the account, which on the ~$166k paper balance
# under-sized every leg below the exchange minimum → the sleeve never traded.
# The executor reads the balance itself (execute._fetch_balance) each tick; a pair
# whose basis can't be read skips (skip_no_risk_basis) rather than sizing off a
# guessed number. Enforced by the pairs-sizing-basis CI guard.
pairs_risk_fraction: 1.0            # scale the sleeve's per-pair risk below the flat account basis (1.0 = full per-trade risk basis; e.g. 0.5 = half)
correlation_haircut_factor: 0.5     # per already-open correlated pair (shares a leg): 0.5**n
backstop_mult: 3.0                  # per-leg catastrophe SL/TP at 3x risk_spread in log-price (wide of the spread exit); the displacement is CLAMPED to +/-100%/-50% so a degenerate risk_spread can't explode the level (BL-20260716-PAIRS-BACKSTOP-EXPLODE, #6549). See pairs_sizing.leg_protective_levels.
min_leg_notional_usd: 10.0          # skip a pair whose sized leg notional is below this $ (would be sub-min / break the hedge if rounded up)

pairs:
  - name: pairs_sol_btc
    symbol_a: SOLUSDT
    symbol_b: BTCUSDT
    execution: shadow    # shadow-guard: allow — NO EDGE (G2 2026-07-16): fee-free fixed-β-hold $ is NEGATIVE (−$295), so it stays shadow even on paper per the "not negative → paper" rule. (The min-qty safety reason is resolved by the #6591 gate; this is now an economics hold.)
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling

  - name: pairs_bnb_btc
    symbol_a: BNBUSDT
    symbol_b: BTCUSDT
    execution: live      # PAPER (operator-approved 2026-07-16, Tier-3): fee-free fixed-β-hold $ is POSITIVE (+$357, marginal) so it qualifies for the "not negative → paper" rule. Places both legs on bybit_1 (paper); the #6591 min-qty gate skips cleanly if the BTC leg is sub-min (no naked leg). NET-negative on taker fees — paper is for execution validation, not PnL. Rollback: set back to shadow.
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling

  - name: pairs_eth_btc
    symbol_a: ETHUSDT
    symbol_b: BTCUSDT
    execution: shadow    # shadow-guard: allow — NO EDGE (G2 2026-07-16): fee-free fixed-β-hold $ is the MOST negative (−$855), so it stays shadow even on paper per the "not negative → paper" rule. (The min-qty safety reason is resolved by the #6591 gate; this is now an economics hold.)
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling

  - name: pairs_sol_eth
    symbol_a: SOLUSDT
    symbol_b: ETHUSDT
    execution: live      # PAPER (operator-approved 2026-07-16, Tier-3): fee-free fixed-β-hold $ is the BEST (+$1279) → qualifies for "not negative → paper". Places both legs on bybit_1 (paper); both legs clear Bybit min-qty. Executor bugs fixed: qty_override (#6554), clamped leg SL/TP (#6549), balance×risk_pct basis (#6554). NET-negative on taker fees — paper is for execution validation, not PnL. Rollback: set back to shadow.
    timeframe: 1h
    lookback: 15
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 2.0
    max_hold_bars: 20
    hedge_beta: rolling
