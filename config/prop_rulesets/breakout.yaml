# config/prop_rulesets/breakout.yaml
# Breakout "1-Step Classic" — $45, one-phase eval, 80/20 split.
# Values CONFIRMED from the Breakout FAQ Center (intercom.help/breakoutprop)
# + the plan card, 2026-06-16. Full sourcing + compliance analysis in
# docs/integrations/breakout-compliance-2026-06-16.md.
ruleset: breakout
plan: 1-step-classic
account_size_usd: 5000            # 1-Step Classic $5k account (per account details, 2026-06-16)
                                  # → 3% daily = $150, 6% static DD = $300
profit_split: 0.80               # 80/20 (90/10 upgrade = 0.90)
unconfirmed: false                # headline rules confirmed; only per-symbol
                                  # position caps remain (see limits.max_position_pct)

phases:
  evaluation:
    profit_target_pct: 0.10       # +10% to clear ($10k on $100k)   [CONFIRMED — FAQ + card]
    min_trading_days: 0           # NONE — can pass in 1 trade, paid next day [CONFIRMED — FAQ]
    max_eval_days: null           # no time limit on the evaluation [CONFIRMED — FAQ]
  funded:                         # one-phase: same limits continue post-pass
    profit_target_pct: null
    min_trading_days: 0

# Account-killers — breaching EITHER = instant breach: all positions
# auto-closed, account PERMANENTLY disabled. [CONFIRMED — FAQ]
limits:
  daily_loss_pct: 0.03            # 3% across all 1-Step variants   [CONFIRMED — FAQ]
  # Daily-loss mechanics: the limit AMOUNT is recalculated each day at
  # 00:30 UTC from the BALANCE at that time (excluding open positions);
  # the BREACH triggers when intraday EQUITY (including open positions)
  # falls to/through that limit. Evaluator buckets days on the 00:30-UTC
  # boundary and uses equity (mark-to-market), not realized-only.
  daily_loss_reset_utc: "00:30"
  daily_loss_basis: equity_vs_daystart_balance

  max_drawdown_pct: 0.06          # 6% for 1-Step Classic           [CONFIRMED — FAQ + card]
  drawdown_type: static           # STATIC, balance-based, off the STARTING balance;
                                  # NOT trailing and NOT locked/raised on payout [CONFIRMED — FAQ]
  max_position_pct: null          # per-INSTRUMENT cap, set in the Breakout Terminal
                                  # (breakoutprop.com/symbols) — not a single % we can
                                  # encode globally. [PARTIAL — pull per-symbol caps at wire time]

# Consistency rule — Breakout has NONE. No consistency rule, no profit cap,
# no risk-per-trade rule, no anti-gambling rule. [CONFIRMED — FAQ]
consistency:
  enabled: false
  max_single_day_profit_share: null

# Time restrictions — crypto trades 24/7; Breakout imposes no weekend/
# overnight flat rule. [CONFIRMED — no such rule in the FAQ]
restrictions:
  weekend_flat: false
  overnight_flat: false

# Funded-phase survival horizon (how long the "survives funded" check runs).
funded_soak_days: 30
