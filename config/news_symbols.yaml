# Per-symbol news configuration for the M9 news-augmented decision layer.
#
# WHY: the v1 news layer was Bitcoin-only — its relevance dictionary only knew
# crypto tickers and it always fetched the hardcoded "Bitcoin OR BTC" query. As
# the bot expands to index/commodity futures (MES, MNQ, MGC, MHG, MCL ...) that
# made the layer a silent no-op for everything except BTC (relevance ~ 0 -> all
# articles dropped). This file maps a traded symbol's BASE (the symbol with any
# USDT/PERP suffix and quote stripped, e.g. BTCUSDT -> BTC, MES -> MES) to:
#
#   query    : the NewsAPI search query used when that symbol is the signal symbol
#   keywords : relevance keywords (lower-cased substrings matched in headline+summary)
#
# Resolution / fallback (see src/news/news_symbols.py):
#   - Unknown base   -> `defaults.query` for the fetch, and the base's own
#                       lower-cased token as the sole relevance keyword (the
#                       pre-config behaviour — never strands a symbol).
#   - Missing file / parse error -> built-in crypto map in the normalizer only.
#
# This file changes NOTHING at runtime until the news layer is enabled
# (NEWS_ENABLED=true + NEWS_API_KEY set). It is config-only — adding a new
# instrument is an edit here, not a code change.

defaults:
  # Used when a traded symbol has no entry below. Broad macro query so a brand
  # new instrument still pulls market-moving headlines rather than nothing.
  query: "stock market OR federal reserve OR inflation OR economy OR interest rates"

  # Shared macro / cross-asset relevance keywords applied to EVERY traded symbol
  # (crypto included). A market-moving macro article (Fed, inflation, rates, the
  # dollar, risk sentiment) that doesn't mention an instrument's own ticker now
  # scores PARTIAL relevance (macro_relevance_weight) for that symbol, instead
  # of being dropped. This is what makes the layer consider general macro trends
  # for crypto — whose per-symbol keywords are ticker-only — not just
  # Bitcoin-specific headlines. Macro-only items inform the sentiment adjustment
  # and dashboard feed but are excluded from the adverse-news VETO (that stays
  # scoped to instrument-specific news; see src/news/news_score.py).
  # If this block is removed, the built-in list in src/news/news_symbols.py
  # (_BUILTIN_MACRO_KEYWORDS) is used instead — the layer never strands.
  macro_relevance_weight: 0.5
  macro_keywords:
    - "federal reserve"
    - fed
    - fomc
    - "jerome powell"
    - powell
    - "interest rate"
    - "interest rates"
    - "rate cut"
    - "rate hike"
    - "rate decision"
    - "monetary policy"
    - "quantitative"
    - liquidity
    - inflation
    - cpi
    - pce
    - deflation
    - stagflation
    - recession
    - gdp
    - economy
    - "economic growth"
    - "soft landing"
    - "jobs report"
    - payrolls
    - nonfarm
    - unemployment
    - "labor market"
    - treasury
    - "treasury yield"
    - "bond yield"
    - yields
    - "10-year"
    - "10 year"
    - dollar
    - "u.s. dollar"
    - "us dollar"
    - dxy
    - greenback
    - "risk-off"
    - "risk off"
    - "risk-on"
    - "risk on"
    - "risk appetite"
    - "risk sentiment"
    - "stock market"
    - "wall street"
    - equities
    - "s&p 500"
    - nasdaq
    - tariff
    - tariffs
    - "trade war"
    - sanctions
    - geopolitical
    - geopolitics
    - "central bank"
    - ecb
    - boj

