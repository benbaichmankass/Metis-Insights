# config/units.yaml — 9-unit architecture (S-008 PR #120)
#
# Managed by the TRANSLATOR (src/core/coordinator.py).
# Every inter-unit data flow goes through the Coordinator; no unit calls
# another unit directly.
#
# Adding a strategy: 1 line in units.strategies + the matching entry in
# config/strategies.yaml (registry source of truth for service/model/prefixes).

units:

  # 1. Strategies — generate order packages (entry, SL, TP, confidence)
  strategies:
    - name: ict
      enabled: true
      service: ict-trader-ict
      model: null
      signal_prefixes: [fvg, ob, ict]
    - name: vwap
      enabled: true
      service: ict-trader-vwap
      model: null
      signal_prefixes: [vwap]
    - name: breakout_confirmation
      enabled: false              # toggle example — disable without removing
      service: ict-trader-breakout
      model: btc_v1.joblib
      signal_prefixes: [ml_breakout, breakout]
    - name: killzone
      enabled: true
      service: ict-trader-live
      model: null
      signal_prefixes: [killzone, trade_signal]

  # 2. Accounts — per-account risk management + exchange execution
  accounts:
    - id: live
      exchange: bybit
      risk_pct: 0.01          # 1 % risk per trade
      env_path: .env
      strategies: [ict, vwap, breakout_confirmation, killzone]

  # 3. Dashboards — performance stats + live data for UI
  dashboards:
    db:
      trade_journal: trade_journal.db
      signals: data/trades.db
    alerts_enabled: true

  # 4. Return Commands — UI commands that flow back to accounts/risk manager
  return_commands:
    supported:
      - cmd: halt
        aliases: [killswitch, pause]
        action: pause_accounts
        scope: all
      - cmd: resume
        aliases: [unpause]
        action: resume_accounts
        scope: all

  # 5. Telegram Bot — pure consumer of dashboards + return commands
  telegram_bot:
    data_source: dashboards
    commands: [status, last5, strategies, killswitch, halt, resume]

  # 6. App — like Telegram bot but with config (API keys, new accounts)
  app:
    extends: telegram_bot
    config_enabled: true

  # 7. Trading School — auto-training/backtests → PRs updating strategies
  trading_school:
    auto_backtest: true
    pr_on_improvement: true

  # 8. DB — unified logs across all units
  db:
    trade_journal: trade_journal.db
    signals: data/trades.db

  # 9. Workflows — MDs for Claude/human protocols
  workflows:
    docs: docs/claude/
