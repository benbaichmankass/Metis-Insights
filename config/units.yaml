# config/units.yaml — 9-unit architecture (S-008 PR #120, S-012 PR B2 update)
#
# Managed by the TRANSLATOR (src/core/coordinator.py).
# Every inter-unit data flow goes through the Coordinator; no unit calls
# another unit directly.
#
# S-012 PR B2: strategies block reduced to turtle_soup + vwap to match
# config/strategies.yaml (PR B1). Account ID space reconciliation between
# this file and config/accounts.yaml is PR B3 (PM-blocked on § 8 #3).

units:

  # 1. Strategies — generate order packages (entry, SL, TP, confidence)
  #
  # S-012 PR C4 (PM § 8 #1): single-process architecture. Every strategy
  # runs inside ict-trader-live; per-strategy service: fields are gone.
  # src/strategy_registry.py defaults missing service entries to
  # "ict-trader-live" so any consumer that still asks gets a coherent answer.
  strategies:
    - name: turtle_soup
      enabled: true
      model: null
      signal_prefixes: [turtle_soup, sweep_reversal]
    - name: vwap
      enabled: true
      model: null
      signal_prefixes: [vwap]

  # 2. Accounts — per-account risk management + exchange execution
  #
  # S-012 PR B3 (PM § 8 #3): accounts moved to config/accounts.yaml as
  # the single source of truth. Kept here as an empty list to preserve
  # the documented 9-unit architecture shape. Coordinator.list_accounts()
  # reads accounts.yaml when present and falls back to this block only
  # for synthetic test fixtures that embed accounts in a tmp units.yaml.
  accounts: []

  # 3. Dashboards — performance stats + live data for UI
  dashboards:
    db:
      trade_journal: trade_journal.db
      signals: data/trades.db
    alerts_enabled: true

  # 4. Return Commands — UI commands that flow back to accounts/risk manager
  return_commands:
    supported:
      - cmd: halt
        aliases: [killswitch, pause]
        action: pause_accounts
        scope: all
      - cmd: resume
        aliases: [unpause]
        action: resume_accounts
        scope: all

  # 5. Telegram Bot — pure consumer of dashboards + return commands
  telegram_bot:
    data_source: dashboards
    commands: [status, last5, strategies, killswitch, halt, resume]

  # 6. App — like Telegram bot but with config (API keys, new accounts)
  app:
    extends: telegram_bot
    config_enabled: true

  # 7. Trading School — auto-training/backtests → PRs updating strategies
  trading_school:
    auto_backtest: true
    pr_on_improvement: true

  # 8. DB — unified logs across all units
  db:
    trade_journal: trade_journal.db
    signals: data/trades.db

  # 9. Workflows — MDs for Claude/human protocols
  workflows:
    docs: docs/claude/
