# Master secrets template — safe to commit; contains only placeholder values.
#
# CANONICAL KEY-ROTATION PATH (2026-05-18): GitHub Actions secrets + rotate-account-keys workflow.
# The SOPS/age-key/Colab encryption path (notebooks/setup/encrypt_google_drive_master_secrets.ipynb)
# is RETIRED. To provision or rotate keys:
#   1. Add BYBIT_API_KEY_1 / BYBIT_API_SECRET_1 (demo) and/or
#      BYBIT_API_KEY_2 / BYBIT_API_SECRET_2 (live) to GitHub Actions repo secrets
#      (Settings → Secrets and variables → Actions).
#   2. Dispatch rotate-account-keys workflow with account_id=bybit_1 and/or bybit_2.
#      The workflow SSHes to the VM, patches the .env, and restarts the bot.
#
# This file is kept as a reference template for any future SOPS-based deployments,
# but the master-secrets.sops.yaml / age-keys.txt / render_env_from_master.py path
# is no longer the canonical provisioning method.
#
# Never commit master-secrets.yaml, master-secrets.sops.yaml, or age-keys.txt.
#
# Note: bybit_1 is now a Bybit demo trading account (https://api-demo.bybit.com).
# bybit_2 is the live account. Both trade linear perpetuals at 3× leverage.

profiles:
  live:
    exchange: bybit
  vwap_btcusd_live:
    environment: "production"
    exchange: "bybit"
    mode: "live"
    dry_run: "false"
    allow_live_trading: "true"
    bybit_testnet: "false"
    telegram_profile: "prod"
    bybit_account: "vwap_strategy"
    strategy_profile: "vwap_btcusd"
    risk_profile: "vwap_btcusd"

telegram:
  dev:
    bot_token: REPLACE_ME
    chat_id: REPLACE_ME
  prod:
    bot_token: REPLACE_ME
    chat_id: REPLACE_ME

bybit:
  testnet:
    api_key: REPLACE_ME
    api_secret: REPLACE_ME
    base_url: https://api-testnet.bybit.com
  live:
    api_key: REPLACE_ME
    api_secret: REPLACE_ME
    base_url: https://api.bybit.com
  current_account:
    api_key: "REPLACE_ME_BYBIT_CURRENT_ACCOUNT_API_KEY"
    api_secret: "REPLACE_ME_BYBIT_CURRENT_ACCOUNT_API_SECRET"
    account_note: "Current/main Bybit account"
  vwap_strategy:
    api_key: "REPLACE_ME_BYBIT_VWAP_STRATEGY_SUBACCOUNT_API_KEY"
    api_secret: "REPLACE_ME_BYBIT_VWAP_STRATEGY_SUBACCOUNT_API_SECRET"
    account_note: "VWAP_STrategy subaccount"
  active_strategy_account: "vwap_strategy"
  # Per-account credential block — keyed by account_id from
  # config/accounts.yaml. The render script (S-023 PR1) reads
  # accounts.yaml to learn which account_ids exist and what env-var
  # name each one declares (`api_key_env:`), then writes
  # ``<api_key_env>=<key>`` and the matching ``..._SECRET`` for every
  # account. Account_ids here MUST match the keys in accounts.yaml.
  accounts:
    bybit_1:
      api_key: "REPLACE_ME_BYBIT_1_API_KEY"
      api_secret: "REPLACE_ME_BYBIT_1_API_SECRET"
      account_note: "Maps to accounts.yaml::bybit_1 (demo account — all strategies; canonical keys via rotate-account-keys workflow)"
    bybit_2:
      api_key: "REPLACE_ME_BYBIT_2_API_KEY"
      api_secret: "REPLACE_ME_BYBIT_2_API_SECRET"
      account_note: "Maps to accounts.yaml::bybit_2 (live account — vwap)"
    bybit_portfolio:
      api_key: "REPLACE_ME_BYBIT_3_API_KEY"
      api_secret: "REPLACE_ME_BYBIT_3_API_SECRET"
      account_note: "Maps to accounts.yaml::bybit_portfolio (paper-portfolio mirror of bybit_2 on the Bybit demo endpoint; reutilized 'bybit 3' demo keys BYBIT_API_KEY_3 / BYBIT_API_SECRET_3)."

# Interactive Brokers (MES futures). IB's TWS API uses NO API key/secret —
# authentication is the IB Gateway / TWS login session. These blocks exist
# only to satisfy the per-account drift guard (every accounts.yaml id must
# have a master-template entry); render_env_from_master.py SKIPS them
# because the accounts declare no `api_key_env`. There is nothing secret to
# render: connection identity (host/port/clientId/account code) lives in
# config/accounts.yaml, and the Gateway login is provided out-of-band on
# the host. See docs/runbooks/ib-integration.md.
interactive_brokers:
  accounts:
    ib_paper:
      no_secret: true
      account_note: "Maps to accounts.yaml::ib_paper (DUQ325724, paper gateway 7497). No API keys — IB Gateway login session."
    ib_live:
      no_secret: true
      account_note: "Maps to accounts.yaml::ib_live (U25907316, live gateway 7496, held dry_run). No API keys — IB Gateway login session."

strategies:
  vwap_btcusd:
    enabled: "true"
    strategy_name: "vwap"
    exchange: "bybit"
    symbol: "BTCUSD"
    timeframe: "1m"
    bybit_account: "vwap_strategy"

github:
  pat: REPLACE_ME

huggingface:
  username: REPLACE_ME
  token: REPLACE_ME
  dataset_repo: REPLACE_ME/ict-bot-data
  model_repo: REPLACE_ME/ict-bot-model

oracle:
  host: REPLACE_ME
  username: REPLACE_ME
  repo_path: /home/ubuntu/ict-trading-bot

runtime_defaults:
  symbol: BTCUSDT
  timeframe: 1m
  # DEPRECATED 2026-05-12: data_dir is NOT rendered to .env any more.
  # Deployment paths live in the systemd drop-ins at
  # deploy/*.service.d/data-dir.conf (canonical:
  # Environment=DATA_DIR=/data/bot-data). The .env layer would win over
  # the drop-in and re-create the path-bifurcation bug exposed by the
  # 2026-05-12 incident. The render script's _runtime_defaults mapping
  # has DATA_DIR removed; leaving this field here as historical record
  # only — it has no effect on what lands in .env. If you genuinely
  # need to override DATA_DIR for a non-VM deployment, add a per-
  # deployment systemd drop-in, not a .env override.
  data_dir: /data/bot-data      # canonical block-storage mount (informational only)
  model_dir: ml/models/
  log_dir: logs/
  db_path: data/trading.db

risk:
  live:
    max_position_usd: REPLACE_ME
    max_daily_loss_usd: REPLACE_ME
    max_open_positions: REPLACE_ME
    risk_per_trade: REPLACE_ME
  vwap_btcusd:
    max_position_usd: "50"
    max_daily_loss_usd: "25"
    risk_per_trade: "0.005"
    max_qty: "0.001"
    max_open_positions: "1"
  ict:
    # Risk-per-trade for the ICT FVG+OB strategy.
    # Validated by S-006 synthetic multi-symbol backtest: PF=2.04, 1048 trades.
    # Maps to ICT_RISK_PCT in .env (percentage, e.g. "0.4" = 0.4% of capital).
    risk_per_trade: "0.004"
    max_position_usd: REPLACE_ME
    max_open_positions: "1"

news:
  # News-augmented decision layer (M9). Default DISABLED — the runtime hook
  # in src/runtime/pipeline.py is wired but inert until both flags are set.
  # See docs/news_layer.md "Going live" section before enabling.
  enabled: "false"
  api_key: ""               # NewsAPI key — leave blank to keep disabled
  # Optional tuning knobs (uncomment to override defaults):
  # query: "Bitcoin OR BTC"
  # max_articles: "10"
  # cache_ttl: "300"
  # max_age_minutes: "120"
  # veto_enabled: "true"
  # veto_sentiment_threshold: "-0.6"
  # veto_impact_threshold: "0.7"
  # weighted_aggregation: "true"
  # positive_keywords: ""
  # negative_keywords: ""

# OANDA v20 (M15 Phase 2) — auth is a single bearer token + account id
# read directly from the environment (OANDA_API_TOKEN / OANDA_ACCOUNT_ID,
# propagated via sync-vm-secrets.yml). No per-account key+secret pair is
# rendered through the master loop, hence no_secret.
oanda:
  accounts:
    oanda_practice:
      no_secret: true
      account_note: "Maps to accounts.yaml::oanda_practice (inert until creds + Tier-3 assignment). Env: OANDA_API_TOKEN, OANDA_ACCOUNT_ID, OANDA_ENV=practice."

# Alpaca Trading API (M15 Phase 2b) — key pair at fixed env names shared
# with the data connector (ALPACA_API_KEY_ID / ALPACA_API_SECRET_KEY,
# propagated via sync-vm-secrets.yml). Not rendered through the
# per-account loop, hence no_secret.
alpaca:
  accounts:
    alpaca_paper:
      no_secret: true
      account_note: "Maps to accounts.yaml::alpaca_paper (inert until creds + Tier-3 assignment). Env: ALPACA_API_KEY_ID, ALPACA_API_SECRET_KEY, ALPACA_ENV=paper."
    alpaca_live:
      no_secret: true
      account_note: "Maps to accounts.yaml::alpaca_live (real-money, inert until creds + Tier-3 assignment). OWN key pair so it runs concurrently with paper. Env: ALPACA_API_KEY_ID_LIVE, ALPACA_API_SECRET_KEY_LIVE, ALPACA_ENV/alpaca_env=live."
    alpaca_options_paper:
      no_secret: true
      account_note: "Maps to accounts.yaml::alpaca_options_paper (Slice-3b — expresses equity signals as debit verticals; paper host). ACTIVE on the SHARED paper key pair (ALPACA_API_KEY_ID / ALPACA_API_SECRET_KEY, same login as alpaca_paper) — no dedicated keys; account_open_positions filters by asset_class so equity + option legs don't collide."
    alpaca_portfolio:
      no_secret: true
      account_note: "Maps to accounts.yaml::alpaca_portfolio (paper-portfolio mirror of alpaca_live's roster; paper host, DEDICATED login). Env: ALPACA_API_KEY_PAPER_PORTFOLIO, ALPACA_API_SECRET_KEY_PAPER_PORTFOLIO, alpaca_env=paper."

# Breakout PROP account — manual Telegram-ping bridge (PB-20260616-004). There
# is NO broker API or credential: a prop-routed strategy emits a prop_signal
# ticket (routed to the prop Telegram bot via the optional TELEGRAM_PROP_BOT_TOKEN)
# for a human/assistant to place on the DXTrade terminal. The account renders no
# per-account secret, hence no_secret.
breakout:
  accounts:
    breakout_1:
      no_secret: true
      account_note: "Maps to accounts.yaml::breakout_1 (Breakout 1-Step $5k prop, manual Telegram-ping bridge). No broker API/creds; prop_signal routes via TELEGRAM_PROP_BOT_TOKEN (optional, falls back to the existing bot)."
