# Master secrets template — safe to commit; contains only placeholder values.
# Copy this file to master-secrets.yaml, fill in real values, then encrypt it
# with notebooks/setup/encrypt_google_drive_master_secrets.ipynb.
# Never commit master-secrets.yaml, master-secrets.sops.yaml, or age-keys.txt.
#
# Note: this bot trades live on real exchange accounts. There is no
# paper-trading mode. Only `live` and `vwap_btcusd_live` profiles are
# supported by scripts/render_env_from_master.py.

profiles:
  live:
    exchange: bybit
  vwap_btcusd_live:
    environment: "production"
    exchange: "bybit"
    mode: "live"
    dry_run: "false"
    allow_live_trading: "true"
    bybit_testnet: "false"
    telegram_profile: "prod"
    bybit_account: "vwap_strategy"
    strategy_profile: "vwap_btcusd"
    risk_profile: "vwap_btcusd"

telegram:
  dev:
    bot_token: REPLACE_ME
    chat_id: REPLACE_ME
  prod:
    bot_token: REPLACE_ME
    chat_id: REPLACE_ME

bybit:
  testnet:
    api_key: REPLACE_ME
    api_secret: REPLACE_ME
    base_url: https://api-testnet.bybit.com
  live:
    api_key: REPLACE_ME
    api_secret: REPLACE_ME
    base_url: https://api.bybit.com
  current_account:
    api_key: "REPLACE_ME_BYBIT_CURRENT_ACCOUNT_API_KEY"
    api_secret: "REPLACE_ME_BYBIT_CURRENT_ACCOUNT_API_SECRET"
    account_note: "Current/main Bybit account"
  vwap_strategy:
    api_key: "REPLACE_ME_BYBIT_VWAP_STRATEGY_SUBACCOUNT_API_KEY"
    api_secret: "REPLACE_ME_BYBIT_VWAP_STRATEGY_SUBACCOUNT_API_SECRET"
    account_note: "VWAP_STrategy subaccount"
  active_strategy_account: "vwap_strategy"
  # Per-account credential block — keyed by account_id from
  # config/accounts.yaml. The render script (S-023 PR1) reads
  # accounts.yaml to learn which account_ids exist and what env-var
  # name each one declares (`api_key_env:`), then writes
  # ``<api_key_env>=<key>`` and the matching ``..._SECRET`` for every
  # account. Account_ids here MUST match the keys in accounts.yaml.
  accounts:
    bybit_1:
      api_key: "REPLACE_ME_BYBIT_1_API_KEY"
      api_secret: "REPLACE_ME_BYBIT_1_API_SECRET"
      account_note: "Maps to accounts.yaml::bybit_1 (turtle_soup)"
    bybit_2:
      api_key: "REPLACE_ME_BYBIT_2_API_KEY"
      api_secret: "REPLACE_ME_BYBIT_2_API_SECRET"
      account_note: "Maps to accounts.yaml::bybit_2 (vwap)"

# Prop-firm exchanges. Mirrors the bybit.accounts shape so the render
# script's per-account loop covers every non-Bybit account_id too.
#
# Velotrade (DXtrade) replaces the deprecated Breakout integration.
# The legacy ``breakout:`` block is preserved as a no-op alias for any
# environment that still references the old account_id; new operator
# work targets ``velotrade.accounts.prop_velotrade_1``.
velotrade:
  accounts:
    prop_velotrade_1:
      api_key: "REPLACE_ME_VELOTRADE_PROP_1_API_KEY"
      api_secret: "REPLACE_ME_VELOTRADE_PROP_1_API_SECRET"
      account_note: "Maps to accounts.yaml::prop_velotrade_1 (currently disabled)"
      enabled: false              # safety default — flip after SDK wiring

strategies:
  vwap_btcusd:
    enabled: "true"
    strategy_name: "vwap"
    exchange: "bybit"
    symbol: "BTCUSD"
    timeframe: "1m"
    bybit_account: "vwap_strategy"

github:
  pat: REPLACE_ME

huggingface:
  username: REPLACE_ME
  token: REPLACE_ME
  dataset_repo: REPLACE_ME/ict-bot-data
  model_repo: REPLACE_ME/ict-bot-model

oracle:
  host: REPLACE_ME
  username: REPLACE_ME
  repo_path: /home/ubuntu/ict-trading-bot

runtime_defaults:
  symbol: BTCUSDT
  timeframe: 1m
  # DEPRECATED 2026-05-12: data_dir is NOT rendered to .env any more.
  # Deployment paths live in the systemd drop-ins at
  # deploy/*.service.d/data-dir.conf (canonical:
  # Environment=DATA_DIR=/data/bot-data). The .env layer would win over
  # the drop-in and re-create the path-bifurcation bug exposed by the
  # 2026-05-12 incident. The render script's _runtime_defaults mapping
  # has DATA_DIR removed; leaving this field here as historical record
  # only — it has no effect on what lands in .env. If you genuinely
  # need to override DATA_DIR for a non-VM deployment, add a per-
  # deployment systemd drop-in, not a .env override.
  data_dir: /data/bot-data      # canonical block-storage mount (informational only)
  model_dir: ml/models/
  log_dir: logs/
  db_path: data/trading.db

risk:
  live:
    max_position_usd: REPLACE_ME
    max_daily_loss_usd: REPLACE_ME
    max_open_positions: REPLACE_ME
    risk_per_trade: REPLACE_ME
  vwap_btcusd:
    max_position_usd: "50"
    max_daily_loss_usd: "25"
    risk_per_trade: "0.005"
    max_qty: "0.001"
    max_open_positions: "1"
  ict:
    # Risk-per-trade for the ICT FVG+OB strategy.
    # Validated by S-006 synthetic multi-symbol backtest: PF=2.04, 1048 trades.
    # Maps to ICT_RISK_PCT in .env (percentage, e.g. "0.4" = 0.4% of capital).
    risk_per_trade: "0.004"
    max_position_usd: REPLACE_ME
    max_open_positions: "1"

news:
  # News-augmented decision layer (M9). Default DISABLED — the runtime hook
  # in src/runtime/pipeline.py is wired but inert until both flags are set.
  # See docs/news_layer.md "Going live" section before enabling.
  enabled: "false"
  api_key: ""               # NewsAPI key — leave blank to keep disabled
  # Optional tuning knobs (uncomment to override defaults):
  # query: "Bitcoin OR BTC"
  # max_articles: "10"
  # cache_ttl: "300"
  # max_age_minutes: "120"
  # veto_enabled: "true"
  # veto_sentiment_threshold: "-0.6"
  # veto_impact_threshold: "0.7"
  # weighted_aggregation: "true"
  # positive_keywords: ""
  # negative_keywords: ""
