# Regime-coverage exemptions + debt register
#
# Enforced by scripts/check_strategy_coverage.py (strategy-coverage-guard CI).
# Every execution:live strategy must be a regime_policy cell, an `exempt` entry,
# or a `coverage_debt` entry. `coverage_debt` may never exceed `debt_ceiling`,
# which only ratchets DOWN — so a NEW live strategy can never be parked here to
# dodge the gate; it must get a real cell or a reasoned exempt. The entries below
# are the roster that was already live-uncovered at the 2026-07-16 review; Phase-2
# (direction-aware regime cells) pays them down and lowers the ceiling.
#
# tracking: BL-20260717-REGIME-COVERAGE-DEBT

