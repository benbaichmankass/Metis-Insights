  # alpaca_options_paper: Phase-1 Slice-3b (Alpaca L3 options) — an Alpaca PAPER
  # account that EXPRESSES its equity signals as defined-risk DEBIT VERTICALS
  # instead of equity brackets. Account-scoped capability (the `options:` block
  # below); the GDX/SLV strategies stay pure signal generators. The overlay
  # pipeline (chain → select_debit_vertical → size_debit_structure → mleg
  # place_spread) lives in src/units/accounts/options_overlay.py and is invoked
  # from execute_pkg only for accounts carrying this block.
  #
  # ACTIVE on the SHARED paper login (operator decision 2026-06-27): it reuses the
  # existing ALPACA_API_KEY_ID / ALPACA_API_SECRET_KEY pair (no dedicated keys, no
  # second Alpaca account). Because the equity alpaca_paper account shares that
  # login, account_open_positions filters Alpaca positions by asset_class per
  # bot-account (clients.py::_alpaca_pos_in_scope) so the two never adopt each
  # other's legs as phantom orphans. PAPER account (no real money); routing GDX/SLV
  # here as options is the Slice-3b paper soak.
  #
  # max_loss_per_trade_usd is the REAL per-trade risk cap (paper accounts get
  # ~$100k of fake money, which would defeat the $150 test) — it mirrors the $150
  # real-money constraint and guarantees ≥1 contract fires. Slice-4 (poll-based
  # expiry/assignment monitor) and Slice-5 (options P&L surfacing) follow.
  alpaca_options_paper:
    exchange: alpaca
    account_class: paper               # PAPER money (Alpaca paper host).
    mode: live                         # paper host = paper money; executes.
    # DEDICATED paper login (2026-07-07, BL-20260707-ALPACA-PAPER-NEGATIVE-EQUITY
    # follow-up): moved OFF the shared alpaca_paper pair onto its own Alpaca
    # paper account. The shared login went deeply negative (~-$67,946 broker
    # equity, root cause still under investigation) and, because alpaca_paper
    # and alpaca_options_paper read the SAME account, one login's trouble
    # silently blocked BOTH bot-accounts' dispatch. A dedicated login makes
    # the isolation structural instead of filter-dependent (previously only
    # asset-class filtering in account_open_positions kept the two from
    # adopting each other's legs — see the 2026-06-27 orphan-adoption
    # incident). Secrets: ALPACA_API_KEY_ID_OPTIONS / ALPACA_API_SECRET_KEY_OPTIONS
    # (operator-provisioned in GitHub Actions secrets; propagate via sync-vm-secrets).
    api_key_env: ALPACA_API_KEY_ID_OPTIONS
    api_secret_env: ALPACA_API_SECRET_KEY_OPTIONS
    options:                           # account-scoped options-expression capability
      express_as: debit_vertical       # the only supported structure (memo §0: $150 cash)
      max_loss_per_trade_usd: 60       # REAL per-trade risk cap (mirrors $150 account;
                                       # ensures ≥1 contract within budget)
      target_dte: 35                   # preferred days-to-expiry
      min_dte: 21
      max_dte: 60
      data_feed: indicative            # free 15-min feed (OPRA $99/mo deferred to live)
      # max_iv_rank: omitted → IV-rank gate OFF for the v1 baseline (true IV-rank
      # needs a trailing-IV store not yet built; operator decision 2026-06-27).
    strategies:                        # budget-fit underlyings WITH existing signals
      - slv_trend_1h                   # (memo §4: GDX/SLV are the cheap chains the
      - slv_pullback_1d                # bot already trades; XLF isn't in the roster).
      - gdx_pullback_1d                # The signals fan out here as verticals.
    symbols: [SLV, GDX]                # instrument identity (routing by strategies above)
    risk:
      max_dd_pct: 0.05                 # 5% max intra-day drawdown
      daily_loss_pct: 0.05             # daily-loss cap = 5% of equity
      daily_usd: 200                   # absolute fallback
      risk_pct: 0.015                   # moot for the options path (sizing is by
                                       # options.max_loss_per_trade_usd), kept for
                                       # the account-level daily-loss gate basis.

  # breakout_1: Breakout 1-Step Classic $5k PROP account (PB-20260616-004).
  # POC = TELEGRAM-PING bridge ONLY (no DXTrade API integration). When a
  # prop-routed strategy fires, the bot emits a paste-ready trade-setup ticket
  # (Telegram/FCM `prop_signal`) — a human/assistant decides whether to place it
  # on the Breakout DXTrade terminal. `execute_pkg` returns a `prop-manual-<uuid>`
  # marker so the order package journals WITHOUT a phantom exchange position the
  # monitor would manage (design: docs/integrations/breakout-poc-manual-bridge-DESIGN.md;
  # executor: src/prop/breakout_executor.py).
  #
  # mode: live — ALWAYS LIVE from the system's perspective: the bot always emits
  # the ping; the operator decides per-signal whether to act on it. (There is no
  # programmatic order, so "live" here only means "emit the Telegram ping".) Both
  # routed strategies (trend_donchian_sol AND trend_donchian_eth) are
  # `execution: live` as of 2026-06-17 (PB-20260616-004), so both emit prop
  # tickets; the per-strategy `execution: shadow` gate would suppress emission,
  # so demote either back to shadow in strategies.yaml to halt its tickets.
  #
  # account_class: prop — a THIRD funding category (alongside paper/real_money):
  # a prop-firm sim account, NOT our custody. Tracked SEPARATELY — excluded from
  # BOTH the real-money and paper KPIs (routers' NOT-paper / paper predicates).
  #
  # type: prop — drives the mission-aware PropRiskManager, which tracks the
  # evaluation→funded lifecycle (account_state + phase_requirements below) and
  # persists progress to runtime_state/prop_state.json.
  breakout_1:
    exchange: breakout
    type: prop
    account_class: prop
    mode: live
    account_state: evaluation          # eval → funded lifecycle (PropRiskManager).
                                       # Flips to `funded` once the +10% target is
                                       # cleared; the operator/system updates it.
    phase_requirements:                # Breakout 1-Step Classic terms.
      target_profit_pct: 0.10          # +10% to clear the evaluation.
      min_active_days: 0               # no minimum trading days.
    backtest_ruleset: prop_rulesets/breakout.yaml   # the $5k 1-Step ruleset the
                                       # gate EV used (the EV engine reads it).
    account_size_usd: 5000             # 1-Step Classic $5k.
    strategies:                        # the validated alt variants (Tier-3):
      - trend_donchian_sol             #   SOL — robust gate PASS, execution: live
      - trend_donchian_eth             #   ETH — marginal, execution: shadow (soak)
      - eth_pullback_prop_2h           #   ETH pullback swap-robust variant,
                                       #   execution: live (operator-approved 2026-06-25).
                                       #   At Breakout's real 0.033%/day swap the funded-EV
                                       #   gate is strong (realised +$421, 12-mo EV +$603
                                       #   @75.9%, 4/4 folds, break-even swap 0.10%/day = 3x
                                       #   headroom). The lower-drag, bigger-margin sibling
                                       #   of eth_pullback_2h below.
                                       #   docs/research/eth-pullback-prop-swap-aware-2026-06-25.md
      - eth_pullback_2h                #   ETH pullback (live BTC exits) — routed to prop
                                       #   2026-06-25 (operator-approved Tier-3). Also +EV
                                       #   at the real 0.033%/day swap (+$166 realised, 4/4
                                       #   folds); overlaps eth_pullback_prop_2h (same
                                       #   entries) so it adds frequency, not diversification.
      - trend_donchian_sol_prop        #   SOL swap-robust EXIT variant (Unit C Phase 0,
                                       #   DRAFT Tier-3, 2026-06-29): trend_donchian_sol's
                                       #   entries with tightened exits (trail 3.5 / tp_r 6.0).
                                       #   execution: shadow (observe-only) until the prop
                                       #   EV/survival gate (account_compat_matrix -> montecarlo
                                       #   under breakout.yaml; sol +$696 / P0.79 ROUTE) graduates
                                       #   it shadow->live (operator-gated).
      - trend_donchian_eth_prop        #   ETH swap-robust EXIT variant (Unit C Phase 0,
                                       #   DRAFT Tier-3, 2026-06-29): trend_donchian_eth's
                                       #   two-sided entries with tightened exits (trail 3.5 /
                                       #   tp_r 6.0). execution: shadow (observe-only) until the
                                       #   prop EV/survival gate (eth +$1,205 / P0.87 ROUTE)
                                       #   graduates it shadow->live (operator-gated).
    symbols: [SOLUSDT, ETHUSDT]        # the validated prop instruments.
    risk:
      max_dd_pct: 0.06                 # Breakout STATIC 6% max-DD = $300.
      daily_loss_pct: 0.03             # Breakout 3% daily-loss = $150.
      daily_usd: 150                   # absolute fallback (= 3% of $5k).
      risk_pct: 0.015                  # 1.5% — the validated best-EV cell (the
                                       # ticket sizes from breakout_routing.yaml
                                       # risk_pct, in PERCENT; this fraction is
                                       # the PropRiskManager mirror).
