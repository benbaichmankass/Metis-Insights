# config/accounts.yaml — per-account risk + strategy configuration.
#
# S-012 PR B3: single source of truth for account identity, exchange,
# risk caps, and strategy assignment, per PM decision § 8 #3 (b).
# config/units.yaml no longer carries an `accounts:` block.
#
# Loaded by:
#   - src/units/accounts/__init__.py::load_accounts() (production wiring;
#     dict format with named keys).
#   - src/bot/data_loaders.py::_load_yaml_accounts() (Telegram bot listing).
#
# API keys are referenced by environment variable NAME only — never
# hardcoded. Each account starts in dry-run mode by default; the
# /accounts dry|live <name> Telegram command flips it. Per PM § 8 #4,
# default is dry for every new account; live only when explicitly set.
# Risk caps fire bidirectionally: pos_size, daily_usd, and (S-012 PR E3a)
# max_dd_pct (intra-day, UTC midnight reset).
#
# S-026 G2 sizing inputs (operator-confirmed defaults):
#   risk_pct         — fraction of balance risked per trade (1 % live).
#   min_balance_usd  — refuse to size below this balance ($50).
# These feed RiskManager.position_size(pkg, balance) — the single
# qty-deciding function in the codebase. There is no max-position
# notional cap on sizing per the operator directive; ``pos_size`` is
# kept only for the post-sizing approval gate
# (RiskManager.approve(order)).

accounts:
  # bybit_1: turtle_soup only — operator-confirmed wallet holds BTC + USDT
  # so the swept-and-reversal MTF strategy can size off either base asset.
  bybit_1:
    type: regular
    exchange: bybit
    api_key_env: BYBIT_API_KEY_1       # env var holding the actual key
    strategies: [turtle_soup]
    risk:
      max_dd_pct: 0.05                 # 5% max intra-day drawdown
      daily_usd: 100                   # $100 max daily loss
      pos_size: 500                    # $500 max single position (approval gate only)
      risk_pct: 0.01                   # 1% balance risked per trade (S-026 G2)
      min_balance_usd: 50              # refuse to size below $50 (S-026 G2)

  # bybit_2: vwap only — wallet holds USDT only, so vwap (mean-reversion
  # against perp pair, USDT-margined) is the right fit. turtle_soup
  # would have to size into BTC and would block on a missing base.
  bybit_2:
    type: regular
    exchange: bybit
    api_key_env: BYBIT_API_KEY_2
    strategies: [vwap]
    risk:
      max_dd_pct: 0.05
      daily_usd: 100
      pos_size: 500
      risk_pct: 0.01
      min_balance_usd: 50

  # prop_velotrade_1: NOT FULLY CONFIGURED — Velotrade DXtrade prop firm
  # scaffold. Phase-2 (this commit) wires the integration infrastructure
  # (DXtradeClient + velotrade_client_for + executor branch + coordinator
  # routing) but no specific live account is hooked up yet. The account
  # loads with ``configured: False`` because the env-var creds aren't
  # set, exists in /accounts_status so the operator can see it, and
  # any live action against it refuses + emits a diagnostic ping naming
  # the missing env var.
  #
  # Strategies list is intentionally empty so the coordinator's
  # ``account.strategies`` filter never routes a real signal here even
  # if creds get added before the operator is ready to trade.
  #
  # Hookup checklist (operator):
  #   1. Drop the DXtrade API contract under docs/integrations/ and
  #      fill in the four ``NotImplementedError`` method bodies in
  #      src/units/accounts/dxtrade_client.py (``place``, ``cancel``,
  #      ``status``, ``balance``).
  #   2. Provision VELOTRADE_API_KEY_1 + VELOTRADE_API_SECRET_1 on the
  #      VM via notebooks/operator/rotate_api_keys.ipynb.
  #   3. Set VELOTRADE_BASE_URL (or ``base_url:`` here) to the
  #      sandbox / prod URL from the contract.
  #   4. Add the assigned strategies (e.g. ``strategies: [vwap]``) so
  #      the coordinator's per-account filter routes signals here.
  #
  # See docs/claude/prop-account-state.md for the full state-machine
  # reference (evaluation vs funded, mission predicates, time windows).
  prop_velotrade_1:
    type: prop
    exchange: velotrade
    api_key_env: VELOTRADE_API_KEY_1
    strategies: []                     # empty: belt-and-braces — even
                                       # if creds land before strategies
                                       # are assigned, the per-account
                                       # filter blocks any live signal.

    # PropRiskManager-specific — drives the mission gate.
    account_state: evaluation          # 'evaluation' | 'funded'
    phase_requirements:
      target_profit_pct: 0.05          # +5% to clear the evaluation
      min_active_days: 4               # min trading days before pass
      min_daily_profit_pct: 0.005      # informational (v1: not gated)
    prop_state:                        # in-process counters seeded here
      cumulative_pnl_pct: 0.0
      active_days: 0
      entry_date: null

    # Overnight + weekend restrictions (UTC). Default window 22:00→06:00.
    overnight_restricted: true
    overnight_window: [22, 6]
    weekend_restricted: true

    risk:
      max_dd_pct: 0.02                 # stricter: 2% max drawdown
      daily_usd: 50                    # stricter: $50 max daily loss
      pos_size: 200                    # stricter: $200 max position
      risk_pct: 0.005                  # half-rate per trade for prop
      min_balance_usd: 50
