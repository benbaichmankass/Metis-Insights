# config/accounts.yaml — per-account risk + strategy configuration.
#
# S-012 PR B3: single source of truth for account identity, exchange,
# risk caps, and strategy assignment, per PM decision § 8 #3 (b).
# config/units.yaml no longer carries an `accounts:` block.
#
# Loaded by:
#   - src/units/accounts/__init__.py::load_accounts() (production wiring;
#     dict format with named keys).
#   - src/bot/data_loaders.py::_load_yaml_accounts() (Telegram bot listing).
#
# API keys are referenced by environment variable NAME only — never
# hardcoded.
#
# Single dry/live toggle (per operator directive 2026-05-03):
#   `mode: live`     → RiskManager approves and routes to the exchange.
#   `mode: dry_run`  → RiskManager.approve() returns
#                      reason="account_mode_dry_run"; the executor logs
#                      the rejection to the trade journal but does not
#                      call the exchange. Default is `live` per the
#                      Autonomous live-trading rule (see CLAUDE.md).
#
# This is the ONLY dry/live toggle in the repo. There is no
# process-level interlock. There is no strategy-level toggle. There is
# no .env / profile-level toggle. Per-account `mode` is authoritative;
# the Telegram /accounts command flips it at runtime via
# `set_account_dry_run()`.
#
# ------------------------------------------------------------------
# account_class — the paper-vs-real-money FUNDING CATEGORY (REQUIRED).
# ------------------------------------------------------------------
#   `account_class: paper | real_money`  — what KIND of money this
#     account trades. This is the SINGLE SOURCE OF TRUTH for the
#     paper/real reporting axis: it cascades into the
#     `trades.account_class` DB column and the dashboard/Android
#     `accountClass` field, and drives every "real-money only"
#     aggregate (stats / pnl-history / performance) and the
#     `include_paper` API filter. REQUIRED on every account; a CI
#     guard (scripts/check_account_class.py) fails the build if any
#     account omits it or sets an inconsistent value.
#
#   This axis is ORTHOGONAL to `mode:` (the technical execution gate):
#     * A paper account is normally `mode: live` — it trades paper
#       money against the broker's paper/demo venue (bybit_1 demo,
#       ib_paper, oanda_practice, alpaca_paper).
#     * A real-money account can be `mode: dry_run` — held safe with
#       no orders sent (ib_live).
#   So `account_class` answers "real or paper money?" and `mode:`
#   answers "are we actually sending orders?" — independently.
#
#   `demo: true` is NOT the category. It is a Bybit-ONLY TRANSPORT flag
#   that selects the api-demo.bybit.com endpoint (bybit_client_for()
#   passes demo=True to pybit). Only bybit_1 carries it. Do not use
#   `demo:` to mean "paper" on any non-Bybit account — use
#   `account_class: paper` instead.
#
# Bybit V5 category routing (operator directives 2026-05-06 + 2026-05-10):
#   `market_type: spot`         → Bybit spot cash market (place_order
#                                 category="spot", marketUnit="baseCoin").
#                                 Wallet holds real BTC + USDT and the
#                                 trader buys/sells the cash asset.
#   `market_type: linear`       → USDT-margined perpetual futures
#                                 (category="linear"). Wallet holds
#                                 USDT collateral and trades perp
#                                 contracts at configured leverage.
#                                 Bybit V5 requires `/v5/position/set-
#                                 leverage` to be called per (symbol,
#                                 account) before the first order;
#                                 main.py::_apply_per_account_leverage
#                                 handles this at boot. Idempotent on
#                                 retCode=110043.
#
# Default when the field is omitted is `spot`. Read by `_bybit_category()`
# in `src/units/accounts/execute.py`.
#
# PR 3 cutover (2026-05-10): bybit_2 migrated from spot-margin to linear
# perpetuals at 3× leverage. The spot-margin path is dormant — no
# account routes to it post-cutover — and scheduled for deletion in
# the follow-up cleanup PR once bybit_2 is confirmed trading reliably.
# See `commits` for the migration audit and cutover rationale.
#
# Risk caps fire bidirectionally: daily_usd / daily_loss_pct and (S-012 PR E3a)
# max_dd_pct (intra-day, UTC midnight reset). There is NO position-notional
# cap — pos_size was removed 2026-06-24 (operator directive: size is a pure
# function of available balance+margin and risk-per-trade, never an arbitrary
# max notional). A leftover pos_size value in any risk block is ignored.
#
# S-026 G2 sizing inputs (operator-confirmed defaults):
#   risk_pct         — fraction of balance risked per trade (1 % live).
#   (There is NO min_balance_usd floor — removed 2026-06-24. The only
#    balance floor is physics: a non-positive balance sizes to 0. A
#    leftover min_balance_usd value in any risk block is ignored.)
#   leverage         — per-account leverage for linear accounts (PR 3
#                      cutover). Read by RiskManager.leverage and
#                      applied via /v5/position/set-leverage at boot.
#                      0 (or missing) skips set-leverage; the exchange
#                      uses whatever leverage was last set. Cash spot
#                      accounts ignore this field.
# These feed RiskManager.position_size(pkg, balance) — the single
# qty-deciding function in the codebase. There is NO max-position notional
# cap and NO MAX_QTY anywhere in the sizing or order path (POSITION_SIZE_CAP /
# pos_size / MAX_QTY / MAX_POSITION_USD all removed 2026-06-24). The only
# bounds on a position are the risk budget (risk_pct × balance ÷ SL distance),
# the daily-loss budget, the margin/buying-power ceiling, and the exchange's
# own minimum lot size.

accounts:
  # bybit_1: Bybit demo trading account — the full demo mirror of bybit_2
  # (same six strategies, same order). Reconfigured 2026-05-18
  # (operator-approved): previously turtle_soup / spot / dry_run. Now
  # mirrors bybit_2's runtime profile (linear perps, 3× leverage, live
  # mode) but on the Bybit demo endpoint (https://api-demo.bybit.com) so
  # all strategies can be evaluated in a realistic execution environment
  # without real-money risk.
  #
  # Keys rotated via the rotate-account-keys GitHub Actions workflow
  # (the new canonical path — replaces the SOPS/Colab/age-key flow).
  # To update: add BYBIT_API_KEY_1 / BYBIT_API_SECRET_1 to repo secrets,
  # then dispatch rotate-account-keys with account_id=bybit_1.
  bybit_1:
    type: regular
    exchange: bybit
    account_class: paper               # paper money (Bybit demo venue). The
                                       # funding category — orthogonal to mode.
    api_key_env: BYBIT_API_KEY_1       # env var holding the actual key
    demo: true                         # Bybit demo trading endpoint
                                       # (https://api-demo.bybit.com).
                                       # bybit_client_for() passes demo=True
                                       # to pybit.unified_trading.HTTP.
    mode: live                         # 2026-05-18 operator approval: reconfigured
                                       # as demo account — live mode is correct
                                       # (demo accounts trade paper money, not dry_run
                                       # which suppresses all exchange calls).
    market_type: linear                # USDT-margined linear perpetuals — same
                                       # as bybit_2. set-leverage fires at boot
                                       # via _apply_per_account_leverage.
    strategies: [trend_donchian, ict_scalp_5m, fade_breakout_4h, squeeze_breakout_4h, fvg_range_15m, htf_pullback_trend_2h, trend_donchian_1h, eth_pullback_2h, trend_donchian_eth_4h, trend_donchian_sol_4h, trend_donchian_xrp_4h, trend_donchian_ada_4h, trend_donchian_avax_4h, sol_pullback_2h, xrp_pullback_2h, ada_pullback_2h, avax_pullback_2h, trend_donchian_sol, trend_donchian_eth, eth_pullback_prop_2h]
                                       # 2026-07-07 (Tier-3, operator-approved, routing-coverage
                                       # audit): added trend_donchian_sol (SOL 1h), trend_donchian_eth
                                       # (ETH 1h) + eth_pullback_prop_2h (ETH 2h prop-tuned exits).
                                       # These three were execution:live but routed ONLY to the prop
                                       # account breakout_1 — no paper soak, violating "every
                                       # non-downgraded strategy soaks on a paper account". bybit_1
                                       # trades SOL/ETH so it can host them; they keep their
                                       # breakout_1 prop route too (a strategy may route to both).
                                       # ROLLBACK: drop the three names above.
                                       # turtle_soup DE-ROUTED from bybit_1 2026-07-01
                                       # (Tier-3, operator-approved): the atr_stop_mult
                                       # sweep (BTCUSDT 2024-05→2026-05, net 7.5bps) showed
                                       # EVERY stop net-negative — current 0.30 worst
                                       # (-66.5%, 67% maxDD), least-bad 2.00 still -11%.
                                       # No stop makes it profitable; tuning only reduces
                                       # the bleed. Already dropped from real-money bybit_2
                                       # (net-negative). Removing it here stops the demo
                                       # bleed + journal noise. Evidence:
                                       # runtime_logs/turtle_stop_sweep_20260701_172434 (trainer).
                                       # SCOPE: bybit_1 (BTC demo) only — turtle_soup on
                                       # ib_paper (MES futures) is UNTOUCHED (not covered by
                                       # this BTC sweep). ROLLBACK: re-add `turtle_soup` above.
                                       # 9 alt cells added 2026-06-18 (Tier-3):
                                       # 5 trend_4h (ETH/SOL/XRP/ADA/AVAX) + 4
                                       # pullback_2h (SOL/XRP/ADA/AVAX). WS-C
                                       # k-fold paper_ready (net-of-fee positive +
                                       # 2x-fee headroom; fail only the strict
                                       # every-fold gate — SRQ-20260618-001/-002).
                                       # DEMO-ONLY (not on bybit_2); observe-for-soak,
                                       # NOT live-money-ready. Graduation to real
                                       # money is a separate Tier-3 gate.
                                       # eth_pullback_2h added 2026-06-11 (M15
                                       # WS-C alt sleeve, Tier-3 PR) — ETH/USDT
                                       # 2h HTF-pullback, DEMO-ONLY (not on
                                       # bybit_2); the demo book's first
                                       # non-BTC symbol. Graduation to real
                                       # money is a separate Tier-3 gate.
                                       # execution-priority order matches list order.
                                       # 2026-06-08 (operator-approved, Tier-3, /performance-review
                                       # PB-20260607-001): vwap REMOVED from bybit_1 routing.
                                       # vwap was firing ~7 rejections/hour (33 in a 48h window)
                                       # against the held htf_pullback short book — all
                                       # `intent_noop:flip_suppressed_hold_policy` noise on
                                       # the audit log. vwap has no live-money authority
                                       # anywhere (`execution: shadow` in config/strategies.yaml,
                                       # and regime-router policy table gates it OFF in every
                                       # regime per PERF-20260601-003 — net -10,724 R over 6y
                                       # multiyear backtest), so removing it from the demo
                                       # book has zero execution-quality cost and collapses
                                       # ~165 spurious rejections/24h of journal noise.
                                       # ROLLBACK: re-add `vwap` to the list above.
                                       # htf_pullback_trend_2h added 2026-06-01,
                                       # PROMOTED to execution: live 2026-06-02
                                       # (operator policy: paper/demo always executes);
                                       # DEMO-ONLY (not on bybit_2). Graduation to real
                                       # money is a separate Tier-3 gate.
                                       # 2026-05-25 (operator-approved): bybit_1 (demo)
                                       # mirrored bybit_2 at the time; SUPERSEDED 2026-06-02 —
                                       # bybit_1 demo now carries the FULL active roster
                                       # while bybit_2 real money is winners-only. trend_donchian
                                       # added so the demo mirrors the real account's
                                       # flagship; fade_breakout_4h + squeeze_breakout_4h
                                       # promoted to `execution: live` in
                                       # config/strategies.yaml the same date. Every live
                                       # strategy here trades PAPER money (demo endpoint)
                                       # — no real-money risk. vwap was REMOVED
                                       # from real-money bybit_2 on 2026-06-02 (no
                                       # net-of-fee edge), and from THIS demo account
                                       # on 2026-06-08 (PB-20260607-001 — vwap fired
                                       # ~7 rejections/hour against the held htf_pullback
                                       # short book, all flip_suppressed_hold_policy noise).
                                       # vwap stays `execution: shadow` in
                                       # config/strategies.yaml so shadow models continue
                                       # logging on the other accounts; this routing
                                       # removal only drops the demo-book journal noise.
                                       # fvg_range_15m added
                                       # 2026-05-30, PROMOTED to execution: live 2026-06-02
                                       # (operator policy: paper/demo always executes) —
                                       # DEMO account ONLY; NOT on bybit_2 (real money),
                                       # whose addition stays a separate Tier-3 gate.
    symbols: [BTCUSDT, ETHUSDT, SOLUSDT, XRPUSDT, ADAUSDT, AVAXUSDT]
                                       # instrument(s) this account trades. The
                                       # multi-symbol tick loop unions every
                                       # configured account's symbols, so this
                                       # is the source of truth for "trade BTCUSDT
                                       # here". Routing to the bybit exchange is
                                       # by symbol→exchange (coordinator gate).
                                       # ETHUSDT added 2026-06-11 (M15 WS-C alt
                                       # sleeve — eth_pullback_2h, demo-only).
                                       # SOLUSDT, XRPUSDT, ADAUSDT, AVAXUSDT added
                                       # 2026-06-18 (Tier-3) for the trend_4h +
                                       # pullback_2h alt-cell soak (paper_ready,
                                       # demo-only). All Bybit USDT linear perps.
    risk:
      max_dd_pct: 0.05                 # 5% max intra-day drawdown
      daily_loss_pct: 0.05             # daily-loss cap = 5% of equity
                                       # (operator-approved 2026-05-28; reuses the
                                       # max_dd_pct 5% figure). The demo wallet
                                       # holds a large paper balance, so the old
                                       # fixed daily_usd=100 tripped on essentially
                                       # every signal and size-refused all day; a
                                       # %-of-equity cap scales with the account.
      daily_usd: 100                   # absolute FALLBACK only — used when no
                                       # equity snapshot is available (cold start)
      risk_pct: 0.015                   # 1.5% balance risked per trade (S-026 G2)
      leverage: 3                      # 3× leverage — same as bybit_2; applied
                                       # via /v5/position/set-leverage at boot.

  # bybit_2: the real-money account on Bybit V5 USDT-margined linear
  # perpetuals at 3× leverage. REAL-MONEY ROSTER = passed-backtest
  # winners ONLY (operator directive 2026-06-02). See the `strategies:`
  # list below for the kept/added/dropped breakdown; the demo account
  # bybit_1 carries the full active roster for no-risk data generation.
  #
  # S8 go-live (2026-05-23, operator-approved straight-to-real, Tier-3):
  # the Donchian-breakout trend-follower took over real-money execution
  # on this account, replacing vwap as the primary. trend_donchian is the
  # first net-positive strategy in the program (+22.5R/3yr, robust
  # plateau) and runs at the conservative risk_pct 0.3 set in
  # config/strategies.yaml. turtle_soup + ict_scalp_5m were added live in
  # S9 (#1863); fade_breakout_4h + squeeze_breakout_4h were promoted from
  # shadow to live on 2026-05-25 (operator decision). vwap stays data-only
  # everywhere.
  # Rationale + plan: docs/sprint-plans/TREND-GOLIVE-PLAN-2026-05-23.md;
  # evidence: docs/audits/complementary-trend-strategy-2026-05-23.md.
  #
  # PR 3 cutover (2026-05-10) — migrated from spot-margin
  # because the spot-margin sizing path required client-side modelling of
  # Bybit's borrow-capacity flapping (`availableToBorrow=0` transient
  # zeros, S-056 / S-058), free-USDT-lock-in semantics on open positions,
  # and LTV-fallback math that produced cascading sized_qty=0 refusals
  # under perfectly normal market conditions. Linear perpetuals trade
  # one wallet number (`walletBalance` USDT) with explicit leverage —
  # the sizer reduces to standard risk-distance math, and the bot stops
  # tracking exchange-side margin state from the client side.
  #
  # Same wallet, same API key as the previous spot-margin config.
  # Operator runs unified trading account; set-leverage with
  # `category=linear` works directly.
  bybit_2:
    type: regular
    exchange: bybit
    account_class: real_money          # REAL MONEY (Bybit mainnet). Funding category.
    api_key_env: BYBIT_API_KEY_2
    mode: live                         # see header — ONLY dry/live toggle
    market_type: linear                # PR 3 — Bybit V5 USDT-margined
                                       # linear perpetuals. Was
                                       # spot-margin pre-cutover.
    strategies: [trend_donchian, ict_scalp_5m, fvg_range_15m, htf_pullback_trend_2h, eth_pullback_2h, xrp_pullback_2h, trend_donchian_eth_4h, trend_donchian_xrp_4h]
                                       # ada_pullback_2h DEMOTED from real money 2026-07-15
                                       # (Tier-3, operator-flagged + /performance-review confirmed):
                                       # worst real-money performer of the 2026-06-30 alt-pullback
                                       # live-test cohort — 5 closed, 20% win, -$10.25 (attribution).
                                       # Removed from bybit_2 only; STILL runs execution:live on
                                       # bybit_1 PAPER so the demo soak continues. ADAUSDT is left
                                       # in `symbols:` below (inert now — no ADA strategy is routed
                                       # to bybit_2 — but harmless, and avoids churn if ADA is
                                       # re-promoted later). ROLLBACK: re-add ada_pullback_2h here.
                                       # trend_donchian_eth_4h + trend_donchian_xrp_4h added
                                       # 2026-06-30 (Tier-3, OPERATOR-APPROVED 2026-06-30).
                                       # Both passed the M15 WS-C 3-fold k-fold @7.5bps with 2x fee
                                       # headroom (PB-20260611-M15-1: ETH +27.9R, XRP +45.8R; every
                                       # 3-fold positive) and have soaked demo-only on bybit_1. Their
                                       # symbols (ETHUSDT/XRPUSDT) are already live on bybit_2, so this
                                       # adds NO new real-money instrument — the lowest-footprint 4h-alt
                                       # promotion. CAVEAT/GATE (see PR): these cells "miss live only on
                                       # the recent chop regime" (SRQ-20260618-001) — the regime-gated
                                       # re-sweep is the precondition; account_compat_matrix NOT yet run
                                       # for bybit_2; crypto-4h correlates with the existing BTC/ETH book
                                       # (correlated exposure, not diversification). ROLLBACK: remove
                                       # both names here. The sol/avax 4h siblings (also k-fold PASS) are
                                       # a SEPARATE step — they'd additionally need SOLUSDT/AVAXUSDT added
                                       # to `symbols:` below (new real-money instruments).
                                       # ---
                                       # xrp_pullback_2h + ada_pullback_2h added 2026-06-30
                                       # (Tier-3, operator-approved) to build live track record.
                                       # Classified PAPER_READY by M15 WS-C k-fold (net-of-fee
                                       # positive overall; fails only the strict every-fold gate
                                       # on the recent regime — same caveat as other alt cells).
                                       # bybit_2 as live test account. ADX>=25 gate active.
                                       # ROLLBACK: remove both strategy names from this list.
                                       # eth_pullback_2h added to REAL MONEY 2026-06-18
                                       # (Tier-3, operator-directed — deliberate override
                                       # of the paper-first/account_compat gate: "bybit_2 is
                                       # a test account; I want to see how ETH performs there").
                                       # Runs the SAME ADX>=25-gated eth_pullback_2h config as
                                       # bybit_1 (OOP-holdout validated). CAVEAT: ETH ~0.7-0.9
                                       # correlated to BTC (adds correlated real-money exposure,
                                       # not diversification); no prior real-money track record;
                                       # account_compat_matrix NOT run (BTC/ROSTER-centric).
                                       # Governed by bybit_2's caps (risk_pct 1%, daily-loss 5%,
                                       # 3x leverage). ROLLBACK: remove eth_pullback_2h here.
                                       # 2026-06-02 (operator-approved, Tier-3):
                                       # REAL-MONEY ROSTER = passed-backtest winners
                                       # ONLY (operator directive). KEEP trend_donchian
                                       # (net-positive flagship) + ict_scalp_5m (passed
                                       # pre-live gate #1156). ADD fvg_range_15m +
                                       # htf_pullback_trend_2h (graduated from demo:
                                       # validated, OOS-robust, no overfit decay) at
                                       # risk_pct 0.3 (config/strategies.yaml). DROP
                                       # turtle_soup (net-negative), vwap (no net-of-
                                       # fee edge), fade_breakout_4h + squeeze_breakout_4h
                                       # (passed backtest but FAILED live: -86R / 0% WR).
                                       # All four stay active on bybit_1 demo (data only).
                                       # Open positions from dropped strategies close
                                       # normally via native Bybit SL/TP brackets (S3:
                                       # 96% native bracket fires) — de-routing stops
                                       # NEW entries + trail updates, not exits.
    symbols: [BTCUSDT, ETHUSDT, XRPUSDT, ADAUSDT]  # BTCUSDT + ETHUSDT (bybit perps). ETHUSDT added
                                       # 2026-06-18 (Tier-3) for eth_pullback_2h real-money
                                       # test. XRPUSDT + ADAUSDT added 2026-06-30 (Tier-3)
                                       # for xrp_pullback_2h + ada_pullback_2h live test.
                                       # Drives tick-loop union + per-account set-leverage
                                       # (3x applied to all bybit_2 symbols at boot).
    risk:
      max_dd_pct: 0.05
      daily_loss_pct: 0.05             # daily-loss cap = 5% of equity (real money;
                                       # operator-approved 2026-05-28). Scales with
                                       # the live balance instead of a fixed $100.
      daily_usd: 100                   # absolute FALLBACK only (no equity snapshot)
      risk_pct: 0.015
      # PR 3 cutover: 3× leverage on linear perps. main.py at boot
      # calls /v5/position/set-leverage with this value for every
      # symbol the account's strategies trade (BTCUSDT for trend_donchian).
      # Idempotent on retCode=110043 ("leverage not modified") so
      # restarts are safe. To change leverage live: edit this value,
      # restart the trader; the set-leverage call will apply the new
      # value at boot.
      leverage: 3

  # ------------------------------------------------------------------
  # Interactive Brokers — MES (Micro E-mini S&P 500) futures via CME.
  # ------------------------------------------------------------------
  # IB's TWS API uses NO API keys: authentication is the IB Gateway /
  # TWS login session the operator keeps running. Connection identity is
  # host + port + clientId + the IB account code — set per account below
  # (env overrides: IB_HOST / IB_PORT / IB_ACCOUNT / IB_CLIENT_ID). The
  # client wrapper lives in src/units/accounts/ib_client.py; the factory
  # is ib_client_for() in src/units/accounts/clients.py. No api_key_env
  # field, so these accounts always load configured=True.
  #
  # Mode policy (operator directive 2026-05-21): the same dry/live
  # contract as every other account applies — `mode:` is the ONLY toggle.
  #   * ib_paper → mode: live. "Live" means the trader executes against
  #     the IB *paper* gateway (port 4002) with paper money — exactly how
  #     bybit_1 runs mode: live against Bybit's demo endpoint. No real
  #     money is at risk.
  #   * ib_live  → mode: dry_run. The real-money account (port 7496) is
  #     held dry: RiskManager.evaluate() rejects with
  #     reason="account_mode_dry_run" and the coordinator never even
  #     constructs an IBClient for it, so no socket is opened against the
  #     live gateway. Promoting it to live is a Tier-3 change via the
  #     set-account-mode operator action.
  #
  # Strategy routing (multi-symbol): the crypto strategies (vwap,
  # turtle_soup, ict_scalp_5m) plus the MES sleeve (mes_trend_long_1d) and the
  # WS-A metals sleeve (mgc_pullback_1d on MGC, mhg_pullback_1d on MHG) run on
  # ib_paper. The symbol→exchange dispatch gate
  # (coordinator._eligible_for_dispatch) guarantees a BTCUSDT signal NEVER
  # reaches an IB account and an MES/MGC/MHG signal NEVER reaches a bybit
  # account — so assigning the crypto strategies here is safe: ib_paper only
  # ever receives MES/MGC/MHG packages, and each per-symbol strategy only
  # fires on its own instrument.
  #
  # Symbol set is config-driven (2026-05-22): the tick loop
  # (src/main.py::_resolve_tick_symbols) unions the ``symbols`` of every
  # configured account, so MES is GENERATED simply because ib_paper
  # declares ``symbols: [MES]`` + a non-empty ``strategies`` list. There
  # is NO separate enable flag — per the "one switch per account" rule,
  # ``mode:`` is the only runtime gate. (The removed ``MULTI_SYMBOL_ENABLED``
  # env was a forbidden second gate.) ib_live keeps ``strategies: []`` —
  # the real-money account stays fully inert (out of tick loop + dispatch)
  # until deliberately promoted. Activation runbook:
  # docs/runbooks/ib-integration.md.

  # ib_paper: IB paper account DUQ325724 on the paper gateway (host port 4002
  # → gnzsnz socat relay 4004 → Gateway 127.0.0.1:4002).
  # mode: live → executes against IB paper money (Gateway must be up).
  ib_paper:
    type: regular
    exchange: interactive_brokers
    account_class: paper               # PAPER money (IB paper gateway, port 4002).
                                       # Fixes the pre-2026-06-15 bug where ib_paper
                                       # carried no category stamp, so its paper
                                       # trades were journaled is_demo=0 (real money).
    mode: live                         # IB paper gateway — paper money (see header)
    market_type: futures                # static default for MES/MGC/MHG; since the
                                       # 2026-07-07 STK support build this account also
                                       # holds equity-ETF strategies (SPY/QQQ/IWM/TLT) —
                                       # Coordinator.multi_account_execute resolves the
                                       # EFFECTIVE market_type/whole_units PER ORDER via
                                       # ib_instruments.ib_order_market_type() (symbol-
                                       # aware), so an equity order is NOT sized as a
