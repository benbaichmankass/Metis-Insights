# config/strategies.yaml — strategy config (S-008 original + S-011 PR #4 additions)
#
# Original fields: service, model, signal_prefixes (S-008)
# New fields (S-011): enabled, risk_pct, timeframe, symbols, + strategy-specific params
#
# Edit via Streamlit UI (src/web/config_ui.py) or directly here.
# Reload at runtime: Coordinator.reload_strategy_config() or /reload_strats Telegram.

strategies:
  ict:
    service: ict-trader-ict
    model: null
    signal_prefixes: [fvg, ob, ict]
    enabled: true
    risk_pct: 1.0           # % of account to risk per trade
    timeframe: "5m"
    symbols:
      - BTCUSDT
      - ETHUSDT
    confidence_threshold: 0.6

  vwap:
    service: ict-trader-vwap
    model: null
    signal_prefixes: [vwap]
    enabled: true
    risk_pct: 1.0
    timeframe: "15m"
    symbols:
      - BTCUSDT
    threshold: 0.01         # VWAP deviation threshold

  killzone:
    service: ict-trader-live
    model: null
    signal_prefixes: [killzone, trade_signal]
    enabled: true
    risk_pct: 0.5
    timeframe: "5m"
    symbols:
      - BTCUSDT
      - ETHUSDT

  breakout_confirmation:
    service: ict-trader-breakout
    model: btc_v1.joblib
    signal_prefixes: [ml_breakout, breakout]
    enabled: false
    risk_pct: 1.0
    timeframe: "1h"
    symbols:
      - BTCUSDT
