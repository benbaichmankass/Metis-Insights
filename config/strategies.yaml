  ict_scalp_5m:
    # ICT scalp v2 — liquidity sweep + displacement + FVG wick-rejection
    # + HTF bias. See src/units/strategies/ict_scalp.py and
    # docs/strategies/ict_scalp_5m.md for the full ruleset.
    #
    # v1 → v2 (issue #1145 backtest): default mitigation gate
    # tightened from "any-overlap + matching-body" to wick-rejection
    # (wick into FVG, close back outside, matching body); HTF bias
    # filter (1h EMA-20) added, default enabled; displacement_atr_mult
    # raised 1.0 → 1.3. Set mitigation_mode: "body_inside_fvg" to
    # restore v1 behaviour for A/B comparisons.
    #
    # STATUS: live since 2026-05-14 (PR #1156, operator-approved
    # after the pre-live gate cleared: 59.3 % win rate, +0.301 R
    # expectancy, max DD 3.47R on 90 days of fresh BTCUSDT 5m
    # candles — issue #1153 single-variant + #1154 attribution).
    # The runtime signal builder honours the `enabled` field below
    # as the single source of truth; flipping `enabled: false`
    # short-circuits the builder to side="none" without code
    # changes. **Do not flip `enabled: false` on the basis of any
    # comment, doc, or audit finding that says this strategy is
    # disabled-by-default — that framing is leftover v1 boilerplate
    # and PR #1156 supersedes it. Disabling requires the same
    # Tier-3 operator approval path that PR #1156 used to enable.**
    #
    # The 1m variant is a config flip: copy this block under a new
    # name with timeframe: "1m", retune sweep_lookback_bars /
    # swing_lookback_bars to span a similar wall-clock window, and
    # re-backtest before enabling.
    model: null
    signal_prefixes: [ict_scalp]
    enabled: true
    execution: shadow        # shadow-guard: allow — operator-approved Unit B demotion; live
                             # real-money record −0.64R/trade over 15 trades
                             # (totalR −9.6; backtest −0.99R/trade, −467R) — wins
                             # small, lets losses run, net-negative at any size.
                             # Shadow keeps it observing (logs order packages) but
                             # sends NO live order, so the negative cell can't bleed
                             # 5× under the new uniform 1.5% basis. Revisit only after
                             # an exit-logic redesign fixes the R:R (re-backtested +
                             # operator-approved). A 5y sweep found no min_confidence
                             # floor salvages net_R — it's a structural R:R problem.
    timeframe: "5m"
    symbols:
      - BTCUSDT
    # Lookbacks
    sweep_lookback_bars: 12
    swing_lookback_bars: 20
    atr_period: 14
    # Gate thresholds (v2: displacement_atr_mult raised 1.0 → 1.3)
    sweep_buffer_bps: 5.0
    displacement_atr_mult: 1.3
    min_displacement_body_to_range: 0.55
    min_fvg_size_bps: 2.0
    # Mitigation gate (v2): wick_rejection | body_inside_fvg (legacy v1)
    mitigation_mode: "wick_rejection"
    # HTF bias filter (v2). Caller supplies htf_close + htf_ema (the
    # backtest CLI computes these by resampling the 5m feed; the
    # runtime signal builder fetches HTF candles separately).
    htf_trend_filter_enabled: true
    # HTF fetch parameters the runtime signal builder consumes. The
    # backtest CLI uses these too (via --htf-rule / --htf-ema-period
    # flags, default to the same values).
    htf_filter_timeframe: "1h"
    htf_filter_ema_period: 20
    # Risk
    atr_sl_buffer_mult: 0.20
    tp_at_r: 1.5
    # SL-to-break-even offset in basis points (2026-05-18, operator
    # directive). When the trail-to-break-even rule fires, the new SL
    # is set to entry × (1 ± be_offset_bps/10000) instead of exactly
    # at entry, so Bybit's round-trip taker fees don't turn the
    # protective close into a scratch loss. See vwap section above.
    be_offset_bps: 15
    # Session filter — disabled by default; crypto runs 24/7. Operator
    # can scope to London + NY kill-zones (07-17 UTC) by flipping
    # session_filter_enabled→true.
    session_filter_enabled: false
    session_start_hour: 7
    session_end_hour: 17
    # shadow_model_ids omitted (2026-05-19): auto-wire every model
    # whose target_deployment_stage == "shadow" on this strategy's
    # signals. Set `shadow_model_ids: []` to opt out entirely or
    # provide an explicit list to pin specific models.

  fvg_range_15m:
    # FVG range / mean-reversion (S-STRAT-IMPROVE, 2026-05-30) — the RANGE
    # member the roster was missing. Inside a confirmed STATIC horizontal
    # range (low ADX = chop, sane width, both boundaries touched >=4x), an
    # unfilled Fair Value Gap in the lower/upper third is a mean-reversion S/R
    # level: enter on a wick-rejection at the gap, stop beyond the gap/range
    # boundary (a range BREAK invalidates the thesis), target the OPPOSITE
    # boundary (full-range reversion). The DELIBERATE OPPOSITE of ict_scalp_5m,
    # which uses an FVG DIRECTIONALLY (sweep -> displacement -> continuation in
    # the breakout direction). Strategy code: src/units/strategies/fvg_range_15m.py;
    # validated harness: scripts/backtest_fvg_range.py.
    #
    # STATUS: execution: live (PROMOTED 2026-06-02 from shadow). Operator policy:
    # paper/demo accounts exist to TEST strategies, so a strategy routed only to a
    # paper/demo accounts execute first for no-risk data. GRADUATED to
    # real-money bybit_2 on 2026-06-02 (Tier-3, operator-approved:
    # validated, OOS-robust, no overfit decay). Runs on bybit_1 (DEMO)
    # AND bybit_2 (REAL money). Executes its order
    # packages on real demo ticks to collect the live confirmation. Evidence
    # (docs/audits/fvg-range-complement-2026-05-30.md), BTCUSDT 15m, net-of-fee,
    # 5.2y 2021-01..2026-02:
    #   * FULL 5y +24.4R, expectancy +0.363, win-rate 50.8%, max-DD 3.0R, 57%
    #     of months positive — BOTH long (+15.9R) and short (+8.5R) net-positive.
    #   * Walk-forward (train 2021-2023 / OOS 2024-2026): the train config HOLDS
    #     out-of-sample and is STRONGER (OOS +21.8R, exp +0.518, both sides
    #     positive) — no overfit decay (the opposite of fade_breakout_4h's OOS
    #     halving). Robust plateau across range_lookback 40-48 x touches 4-5 x
    #     ADX 18-22. Fee-robust: still +10.5R net at 15bps (2x the modelled 7.5).
    #   * CAVEAT (the residual live risk): low frequency (67 trades / 5.2y) and
    #     the edge is concentrated in the recent regime — train (2021-2023)
    #     expectancy is a modest +0.10R. This is exactly why it runs shadow.
    #
    # The runtime builder honours `enabled` below as the single source of
    # truth; `execution:` is the per-strategy execution gate (enforced in
    # Coordinator.multi_account_execute). NOTE: this gate is GLOBAL across the
    # accounts a strategy routes to — live on a paper/demo-only strategy is safe,
    # but DO NOT set live on any strategy that also routes to a real-money account
    # (it would execute there too). fvg_range_15m runs on bybit_1 (demo)
    # AND bybit_2 (real money) as of 2026-06-02.
    model: null
    signal_prefixes: [fvg_range, fvg_mr]
    enabled: true
    execution: live            # PROMOTED shadow -> live 2026-06-02; GRADUATED to
                               # real-money bybit_2 2026-06-02 (Tier-3, operator-
                               # approved). Runs on bybit_1 (demo) AND bybit_2 (real).
                              # STRATEGY_RISK_PCT fallback in src/runtime/pipeline.py.
                              # Now live on bybit_1 (demo) AND bybit_2 (real money).
    timeframe: "15m"          # served as Bybit 15m via CCXT.
    symbols:
      - BTCUSDT               # currently the only supported symbol
                              # (SUPPORTED_SYMBOLS gate). Like the other
                              # strategies this list documents intended
                              # applicability — the runtime traded-symbol set
                              # comes from config/accounts.yaml.
    # Strategy-specific — the validated walk-forward config (range_lookback 48
    # / touches 4 / ADX<20 / far-boundary target / stop 0.25xATR). The
    # touches=4 boundary-confirmation gate is the edge-defining lever (a
    # genuinely oscillating range, not a one-touch spike).
    range_lookback: 48        # prior bars defining support/resistance (~12h on 15m)
    atr_period: 14
    adx_period: 14
    adx_max: 20.0             # chop gate (mirrors fade_breakout_4h's ADX<20)
    min_width_pct: 0.015      # min range width / price (fee-clearance floor)
    max_width_pct: 0.12       # max range width / price (reject runaway 'ranges')
    touch_tol_pct: 0.002      # boundary-touch tolerance / price
    min_touches: 4            # each boundary touched >= this in the window
    third_frac: 0.34          # lower/upper fraction admitting long/short entries
    fvg_search: 24            # bars back to scan for an unfilled matching FVG
    min_fvg_size_bps: 2.0
    atr_stop_buffer: 0.25     # stop placed this many ATR beyond gap / boundary
    timeout_bars: 48          # time-decay backstop (consumed by monitor())
    # No min_confidence floor — a 5y sweep found none improves net_R (the
    # regime gates already do the filtering). Wired (default 0.0) for a future
    # regime warrant.
    min_confidence: 0.0
    # shadow_model_ids OMITTED 2026-06-18 (soak-everything): re-enabled ML shadow
    # auto-wiring (was `[]`). BTCUSDT → BTC shadow corpus is symbol-appropriate;
    # observe-only, zero order-path effect. Feeds the decision/meta models.

