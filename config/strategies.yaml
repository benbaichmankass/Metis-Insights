# config/strategies.yaml — strategy config (S-012).
#
# Roster: turtle_soup + vwap only (PR B1, per PM § 8 #7).
#
# Single-process architecture (PR C4, per PM § 8 #1): every strategy
# runs inside the ict-trader-live systemd unit. The `service:` field is
# no longer required; src/strategy_registry.py defaults missing/absent
# service entries to "ict-trader-live".
#
# Loaded by:
#   - src/strategy_registry.py (model / signal_prefixes)
#   - src/units/strategies/__init__.py::load_strategy_config (per-strategy
#     parameters: enabled, risk_pct, timeframe, symbols, strategy-specific)
#
# Edit via Streamlit UI (src/web/config_ui.py) or directly here.
# Reload at runtime: Coordinator.reload_strategy_config() or /reload_strats.

strategies:

  turtle_soup:
    # Turtle Soup MTF v1 — sweep + reversal at 15m, 1m entry. Ported from
    # strategies/turtle_soup_mtf_v1.py constants. Strategy code lives in
    # src/units/strategies/turtle_soup.py (PR C1).
    model: null
    signal_prefixes: [turtle_soup, sweep_reversal]
    enabled: true
    risk_pct: 0.5            # = risk_per_trade 0.005 from the legacy class
    timeframe: "15m"          # setup TF; entry TF is 1m
    symbols:
      - BTCUSDT
      # ETHUSDT dropped 2026-05-11 — the per-tick pipeline only iterates
      # one symbol from settings["SYMBOL"], so a multi-symbol list here
      # is currently aspirational, not active. Operator decision: not
      # needed yet. Re-add with a real multi-symbol multiplexer (see
      # FU-20260510-003 closure).
    # Strategy-specific (mirrors the legacy class defaults at
    # strategies/turtle_soup_mtf_v1.py:38-55)
    sweep_lookback_15m: 60
    min_sweep_buffer_bps: 10
    min_body_to_range: 0.60
    atr_period: 14
    atr_stop_mult: 0.30
    be_at_r: 0.75
    # SL-to-break-even offset in basis points (2026-05-18, operator
    # directive). When the trail-to-break-even rule fires, the new SL
    # is set to entry × (1 ± be_offset_bps/10000) instead of exactly
    # at entry, so Bybit's round-trip taker fees (~7.5 bps on linear
    # perps for this account) don't turn a break-even close into a
    # scratch loss. 15 bps ≈ 2× the round-trip fee rate, giving a
    # small profit margin on each BE close.
    be_offset_bps: 15
    tp1_at_r: 1.00
    tp2_at_r: 3.0
    partial_close_pct: 0.25
    trail_atr_mult: 1.2
    max_entry_wait_bars_1m: 20
    entry_tf: "1m"
    setup_lookback_bars: 4
    # shadow_model_ids omitted (2026-05-19): auto-wire every model
    # whose target_deployment_stage == "shadow" on this strategy's
    # signals. Set `shadow_model_ids: []` to opt out entirely or
    # provide an explicit list to pin specific models.

  vwap:
    model: null
    signal_prefixes: [vwap]
    enabled: true
    risk_pct: 1.0
    timeframe: "5m"
    symbols:
      - BTCUSDT
    threshold: 0.01
    monitor_hold_window_minutes: 240

    # vwap_cross close-path gates (2026-05-15). Block vwap_cross from
    # firing when the trade has captured < min_r_for_vwap_cross R OR
    # when the trade has been open < min_hold_minutes_for_vwap_cross
    # minutes. Both must pass for vwap_cross to fire.
    #
    # Rationale: on 2026-05-14, 3/6 closed VWAP trades exited via
    # vwap_cross at R-capture 0.009-0.085 — net loss after Bybit's
    # 0.055% taker fee. Mechanism: when VWAP drifts *to* price rather
    # than price reverting *to* VWAP, the cross fires at micro-edge
    # even though the mean-reversion thesis never played out. Gates
    # don't affect SL/TP/time_decay; only suppress the no-edge vwap
    # cross exits.
    #
    # Set either to 0 to disable that gate. Setting both to 0 restores
    # the v1 "any cross closes" behaviour.
    min_r_for_vwap_cross: 0.25
    min_hold_minutes_for_vwap_cross: 10

    # SL-to-break-even threshold (R multiples). When price moves >= be_at_r
    # x original_risk in the trade's favour and no close path (TP/SL/VWAP-
    # cross/time-decay) has fired, the strategy slides SL to entry. 1.0 is
    # the legacy hard-coded default (pre-2026-05-13). Lower values (e.g.
    # 0.5) protect faster on shallow mean-reversion runs that retrace
    # before reaching VWAP; higher (e.g. 1.5) lets the trade run further.
    be_at_r: 1.0
    # SL-to-break-even offset in basis points (2026-05-18, operator
    # directive). When the trail-to-break-even rule fires, the new SL
    # is set to entry × (1 ± be_offset_bps/10000) instead of exactly
    # at entry, so Bybit's round-trip taker fees (~7.5 bps on linear
    # perps for this account) don't turn a break-even close into a
    # scratch loss. 15 bps ≈ 2× the round-trip fee rate, giving a
    # small profit margin on each BE close (operator framing: "at
    # least net wins, not net scratches").
    be_offset_bps: 15

    # Recent-context filter (operator directive 2026-05-13).
    # Informational only — does not block entries.
    recent_context_filter:
      enabled: true
      timeframe: "1h"
      lookback_bars: 24
      neutral_band_pct: 0.003

    # HTF trend gate — disabled. Backtest #1090 (8 random 30-day windows,
    # May 2025-May 2026) showed no HTF config improves on the baseline:
    # all Sharpes clustered near zero with std 4x the mean. The 1h EMA-20
    # that was previously live was the worst tested config (Sharpe 0.009,
    # 4/8 positive vs baseline 5/8). Re-enable with a specific config if
    # future backtests on broader data show a clear edge.
    htf_trend_filter:
      enabled: false
      htf_timeframe: "1h"
      ema_period: 20
      band_pct: 0.02

    # Shadow-mode predictors (WS7 / S-AI-WS7-PART-4). Each id is resolved
    # via ml/shadow/factory.resolve_predictors against ml/registry-store/.
    # Predictions are logged to runtime_logs/shadow_predictions.jsonl on
    # every signal — they have **zero effect** on the order package per
    # the WS7 non-negotiable. Use for data gathering and offline analysis
    # before promoting a model from shadow → advisory → limited_live →
    # live_approved.
    #
    # regime-classifier-baseline-v0 (added 2026-05-15) — promoted to
    # `shadow` stage via trainer-vm-diag #1203 after the HTF backtest
    # ruled out HTF gates. Model metrics: macro_f1=0.33 on n=4147,
    # f1_range=0.62 (real signal on the regime where VWAP fades work),
    # f1_trend=0.0 (degenerate trend class — model never predicts trend).
    # The "range" prediction is the useful one — gathering 30 days of
    # data to correlate model-says-range with VWAP winners, then decide
    # whether to promote to gate.
    shadow_model_ids: ["regime-classifier-baseline-v0"]

  ict_scalp_5m:
    # ICT scalp v2 — liquidity sweep + displacement + FVG wick-rejection
    # + HTF bias. See src/units/strategies/ict_scalp.py and
    # docs/strategies/ict_scalp_5m.md for the full ruleset.
    #
    # v1 → v2 (issue #1145 backtest): default mitigation gate
    # tightened from "any-overlap + matching-body" to wick-rejection
    # (wick into FVG, close back outside, matching body); HTF bias
    # filter (1h EMA-20) added, default enabled; displacement_atr_mult
    # raised 1.0 → 1.3. Set mitigation_mode: "body_inside_fvg" to
    # restore v1 behaviour for A/B comparisons.
    #
    # STATUS: live since 2026-05-14 (PR #1156, operator-approved
    # after the pre-live gate cleared: 59.3 % win rate, +0.301 R
    # expectancy, max DD 3.47R on 90 days of fresh BTCUSDT 5m
    # candles — issue #1153 single-variant + #1154 attribution).
    # The runtime signal builder honours the `enabled` field below
    # as the single source of truth; flipping `enabled: false`
    # short-circuits the builder to side="none" without code
    # changes. **Do not flip `enabled: false` on the basis of any
    # comment, doc, or audit finding that says this strategy is
    # disabled-by-default — that framing is leftover v1 boilerplate
    # and PR #1156 supersedes it. Disabling requires the same
    # Tier-3 operator approval path that PR #1156 used to enable.**
    #
    # The 1m variant is a config flip: copy this block under a new
    # name with timeframe: "1m", retune sweep_lookback_bars /
    # swing_lookback_bars to span a similar wall-clock window, and
    # re-backtest before enabling.
    model: null
    signal_prefixes: [ict_scalp]
    enabled: true
    risk_pct: 0.3
    timeframe: "5m"
    symbols:
      - BTCUSDT
    # Lookbacks
    sweep_lookback_bars: 12
    swing_lookback_bars: 20
    atr_period: 14
    # Gate thresholds (v2: displacement_atr_mult raised 1.0 → 1.3)
    sweep_buffer_bps: 5.0
    displacement_atr_mult: 1.3
    min_displacement_body_to_range: 0.55
    min_fvg_size_bps: 2.0
    # Mitigation gate (v2): wick_rejection | body_inside_fvg (legacy v1)
    mitigation_mode: "wick_rejection"
    # HTF bias filter (v2). Caller supplies htf_close + htf_ema (the
    # backtest CLI computes these by resampling the 5m feed; the
    # runtime signal builder fetches HTF candles separately).
    htf_trend_filter_enabled: true
    # HTF fetch parameters the runtime signal builder consumes. The
    # backtest CLI uses these too (via --htf-rule / --htf-ema-period
    # flags, default to the same values).
    htf_filter_timeframe: "1h"
    htf_filter_ema_period: 20
    # Risk
    atr_sl_buffer_mult: 0.20
    tp_at_r: 1.5
    # SL-to-break-even offset in basis points (2026-05-18, operator
    # directive). When the trail-to-break-even rule fires, the new SL
    # is set to entry × (1 ± be_offset_bps/10000) instead of exactly
    # at entry, so Bybit's round-trip taker fees don't turn the
    # protective close into a scratch loss. See vwap section above.
    be_offset_bps: 15
    # Session filter — disabled by default; crypto runs 24/7. Operator
    # can scope to London + NY kill-zones (07-17 UTC) by flipping
    # session_filter_enabled→true.
    session_filter_enabled: false
    session_start_hour: 7
    session_end_hour: 17
    # shadow_model_ids omitted (2026-05-19): auto-wire every model
    # whose target_deployment_stage == "shadow" on this strategy's
    # signals. Set `shadow_model_ids: []` to opt out entirely or
    # provide an explicit list to pin specific models.
