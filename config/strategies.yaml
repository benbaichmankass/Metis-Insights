# config/strategies.yaml — strategy config (S-012).
#
# Roster: turtle_soup, vwap, ict_scalp_5m (live since 2026-05-14,
# PR #1156), trend_donchian (going live on bybit_2 2026-05-23,
# S-STRAT-IMPROVE-S8). Originally turtle_soup + vwap only (PR B1, per
# PM § 8 #7); the roster grows as new strategies clear their gates.
#
# Single-process architecture (PR C4, per PM § 8 #1): every strategy
# runs inside the ict-trader-live systemd unit. The `service:` field is
# no longer required; src/strategy_registry.py defaults missing/absent
# service entries to "ict-trader-live".
#
# Loaded by:
#   - src/strategy_registry.py (model / signal_prefixes / execution)
#   - src/units/strategies/__init__.py::load_strategy_config (per-strategy
#     parameters: enabled, timeframe, symbols, strategy-specific). NOTE: a
#     per-strategy risk_pct was REMOVED 2026-06-29 — sizing is account-level
#     only (RiskManager basis × confidence); the strategy-risk-guard CI check
#     forbids re-adding a risk_pct field here.
#
# Two-level gating (S9, operator-approved 2026-05-24):
#   - `enabled: true|false`     — does the strategy RUN at all? false →
#                                 the signal builder short-circuits to
#                                 side=none (fully inert; no signals, no
#                                 logging).
#   - `execution: live|shadow`  — for an ENABLED strategy, do its order
#                                 packages EXECUTE, or only get LOGGED?
#                                 live (default) = eligible to execute on
#                                 accounts that route it. shadow = runs +
#                                 logs order packages everywhere (data
#                                 collection) but never sends a live order
#                                 (treated as dry on every account).
#   Both default permissive (enabled implicitly required; execution→live)
#   so omitting a field never strands capability. The account-level
#   `mode: live|dry_run` in accounts.yaml remains the per-ACCOUNT
#   execution gate; `execution:` is the per-STRATEGY execution gate.
#   Neither is a hidden default-off flag — both are declared here and
#   surfaced on /api/bot/config.
#
# Edit via Streamlit UI (src/web/config_ui.py) or directly here.
# Reload at runtime: Coordinator.reload_strategy_config() or /reload_strats.

strategies:

  turtle_soup:
    # Turtle Soup MTF v1 — sweep + reversal at 15m, 1m entry. Ported from
    # strategies/turtle_soup_mtf_v1.py constants. Strategy code lives in
    # src/units/strategies/turtle_soup.py (PR C1).
    model: null
    signal_prefixes: [turtle_soup, sweep_reversal]
    enabled: true
    execution: shadow        # shadow-guard: allow — turtle_soup net-negative money-loser, operator-approved demote 2026-07-07 (Tier-3)
                             # DOWNGRADED to shadow 2026-07-07 (Tier-3, operator-approved):
                             # turtle_soup is net-negative at EVERY stop setting on BTCUSDT
                             # (atr_stop_mult sweep 2024-05..2026-05 net 7.5bps — worst 0.30 at
                             # -66.5%/67% maxDD, least-bad 2.00 still -11%). Already de-routed
                             # from real-money bybit_2 AND paper bybit_1 (2026-07-01) for the
                             # bleed, but left execution:live + parked in ib_paper's routing
                             # list — which READ as live yet was inert (symbol BTCUSDT cannot
                             # trade on the IBKR futures account). Setting shadow makes the
                             # downgrade EXPLICIT + robust: logs packages for data, never sends
                             # a live order on ANY account/symbol. ROLLBACK: execution:live +
                             # re-route to bybit_1. (S9 gate: live=execute; shadow=data-only.)
    timeframe: "15m"          # setup TF; entry TF is 1m
    symbols:
      - BTCUSDT
      # NOTE (2026-05-22): the traded-symbol set is derived from
      # `config/accounts.yaml` (`_resolve_tick_symbols` unions every
      # configured account's `symbols`); which strategy runs on which
      # symbol follows from each account's `strategies` + the
      # symbol→exchange dispatch gate.
      # CORRECTION (2026-07-07, field-beats-comment): the prior note here
      # claimed "turtle_soup runs on MES via the ib_paper account". That is
      # WRONG — turtle_soup operates on BTCUSDT (confirmed by the live
      # turtle_soup_eval audit rows, all BTCUSDT), and BTCUSDT is not
      # tradeable on the IBKR futures account (ib_paper trades MES/MGC/MHG
      # only, and `IBClient._build_contract` raises ValueError for any other
      # symbol). So the ib_paper routing entry was an INERT no-op; it has
      # been removed from ib_paper's `strategies` list (2026-07-07), and the
      # strategy is now execution:shadow (see above) — it trades nowhere live.
    # Strategy-specific (mirrors the legacy class defaults at
    # strategies/turtle_soup_mtf_v1.py:38-55)
    sweep_lookback_15m: 60
    min_sweep_buffer_bps: 10
    min_body_to_range: 0.60
    atr_period: 14
    atr_stop_mult: 0.30
    be_at_r: 0.75
    # SL-to-break-even offset in basis points (2026-05-18, operator
    # directive). When the trail-to-break-even rule fires, the new SL
    # is set to entry × (1 ± be_offset_bps/10000) instead of exactly
    # at entry, so Bybit's round-trip taker fees (~7.5 bps on linear
    # perps for this account) don't turn a break-even close into a
    # scratch loss. 15 bps ≈ 2× the round-trip fee rate, giving a
    # small profit margin on each BE close.
    be_offset_bps: 15
    tp1_at_r: 1.00
    tp2_at_r: 3.0
    partial_close_pct: 0.25
    trail_atr_mult: 1.2
    max_entry_wait_bars_1m: 20
    entry_tf: "1m"
    setup_lookback_bars: 4
    # shadow_model_ids omitted (2026-05-19): auto-wire every model
    # whose target_deployment_stage == "shadow" on this strategy's
    # signals. Set `shadow_model_ids: []` to opt out entirely or
    # provide an explicit list to pin specific models.

  trend_donchian:
    # Donchian-breakout trend-follower (S-STRAT-IMPROVE-S8/S9). Donchian(20)
    # breakout entry + ATR(14) initial stop (2.5×) + Chandelier ATR
    # trailing exit (3.5×), BTCUSDT 2h. Strategy code:
    # src/units/strategies/trend_donchian.py; validated harness:
    # scripts/backtest_trend.py.
    #
    # STATUS: live on bybit_2 (real money). Went live 2026-05-23 at 1h
    # (S8, docs/sprint-plans/TREND-GOLIVE-PLAN-2026-05-23.md). MIGRATED
    # 1h → 2h on 2026-05-24 (S9, operator-approved) after a timeframe
    # study + walk-forward validation found 2h materially superior:
    #   * Full 3yr net +52.5R (2h 20/3.5) vs +22.5R (1h 20/3.0).
    #   * Net-POSITIVE every year incl. 2025 chop (+~22R), the exact
    #     regime where the 1h bled (~−8.5R) — the slower TF filters the
    #     chop-induced false breakouts that whipsawed 1h.
    #   * Walk-forward (train 2023-24 / OOS 2025-26): train-winner 20/3.5
    #     held OOS at +16.8R, exp 0.139, 71% months positive — OOS
    #     expectancy ≈ train (no overfit decay). Whole donchian 15-30 ×
    #     trail 3.0-3.5 plateau positive in BOTH windows.
    #   * ~3× lower drawdown (maxDD ~10R vs ~29R), consistency_ratio
    #     ~0.38 vs 0.12, top-month-share 16% vs 44% (far less
    #     period-dependent). Evidence: trainer-vm-diag #1870/#1871/#1873.
    # 1h remains the original S8 validation; 2h is the live config.
    #
    # The runtime signal builder honours `enabled` below as the single
    # source of truth; flipping `enabled: false` short-circuits the
    # builder to side="none" without code changes (same contract as the
    # other strategies). Disabling requires the Tier-3 operator-approval
    # path.
    model: null
    signal_prefixes: [trend_donchian, donchian]
    enabled: true
    execution: live          # S9 per-strategy execution gate (live | shadow).
                             # trend is the one net-positive strategy → live.
                              # matches the STRATEGY_RISK_PCT fallback in
                              # src/runtime/pipeline.py. Revisit upward
                              # only after live proof (operator-approved).
    timeframe: "1h"          # RE-TUNED 2h → 1h 2026-06-01 (Tier-3, operator-
                             # approved). SUPERSEDES the 2026-05-24 S9 1h → 2h
                             # migration: the overnight 2026-06-01 research
                             # (357 backtests, 3-fold robust) found 1h /
                             # trail 5.0 is the OOS-best corner (+43.8 R OOS,
                             # 3-fold +14/+54/+24) — it tested the wider trail
                             # the S9 analysis never did, and at trail 5.0 the
                             # 1h timeframe wins. Served as Bybit 60m via CCXT.
    symbols:
      - BTCUSDT               # currently the only supported symbol
                              # (SUPPORTED_SYMBOLS gate). NOTE: like the
                              # other strategies, this list documents
                              # intended applicability — the runtime
                              # traded-symbol set comes from
                              # config/accounts.yaml.
    # Strategy-specific — the robust-plateau centre. trail MUST stay
    # looser than the entry stop (atr_stop < trail) or the edge goes
    # negative. RE-TUNED 2026-06-01: trail 3.5 → 5.0 at the 1h timeframe,
    # the overnight-research OOS-best corner. The report's dominant
    # cross-cutting finding was that a WIDE trail (≈5.0) lifts net R in
    # every family — the default 3.0–3.5 cuts the fat-tail runners that
    # ARE the trend edge. donchian 20 unchanged (the plateau centre).
    donchian: 20
    atr_period: 14
    atr_stop_mult: 2.5
    trail_mult: 5.0
    trail_decay_arm_r: 6.49   # M20 P4.4 p80 cell (p80 winner-MFE arm, wf 4/6; sweep 2026-07-13)
    trail_decay_tight_mult: 2.5
    # No fixed profit target — the Chandelier trail is the sole
    # profit-exit (matches the backtest, which has no TP). `tp` is placed
    # tp_r × risk away as a far, effectively-unreachable sentinel that
    # still satisfies the pipeline's full-SL/TP dispatch gate. Max
    # single-trade excursion in 3yr backtest was ~11R, so 50R is safely
    # beyond reach.
    tp_r: 50.0
    # Minimum-confidence entry gate (breakout depth / ATR). RE-TUNED 0.30 -> 0.60
    # 2026-06-10 (M8 S3, Tier-3, PROPOSED — operator-approved merge gates this).
    # The prior 0.30 came from a 2h / trail-3.5 sweep that PRE-DATES the
    # 2026-06-01 migration to the live 1h / trail-5.0 config. An M8 canonical
    # parameter sweep (scripts/ml/strategy_tune_sweep.py) re-ran it at the CURRENT
    # live params (1h / donchian 20 / atr_stop 2.5 / trail 5.0 / long-only) under
    # OOS + 3-fold anchored walk-forward over BTC 2021-2026 and found 0.30 is
    # net-positive in only 2 of 3 folds (it loses the 2025-26 regime), whereas
    # 3/3 robustness begins at 0.60: OOS net Σ 34.9 -> 53.6 R, OOS expectancy
    # ~2x (0.111 -> 0.215), OOS maxDD -42% (22.3 -> 12.9 R). The 0.60-0.90 band
    # is uniformly 3/3-robust; 0.60 is the conservative onset (minimal change,
    # biggest single expectancy/drawdown jump, not at the grid edge). Shallow
    # breaks (the live -1R conf-0.05 stop-out) are where the follower bled.
    # Evidence: docs/sprint-logs/S-M8-STRATEGY-TUNING-S3.md (trainer-vm-diag #3179).
    min_confidence: 0.70
    # LONG-ONLY (2026-06-01, Tier-3, operator-approved). The regime×direction
    # matrix (docs/research/regime-roster-matrix-2026-06-01.md) showed the SHORT
    # side is a net −37 R drag over 2021-2026 that earns only in chop
    # (trending −28, transitional −24, chop +16), while the LONG side is the
    # +47 R trend edge (trending +22, transitional +22). Dropping the short leg
    # keeps +47 R and removes the −37 R drag. The chop-only short edge will be
    # reclaimed via the regime router (a single policy-table cell), not by
    # special-casing this strategy. Enforced in
    # strategy_signal_builders.trend_donchian_signal_builder (short → side=none,
    # reason=short_suppressed_long_only). Default off; set true here.
    long_only: true
    # shadow_model_ids omitted (2026-05-19 default): auto-wire every model
    # whose target_deployment_stage == "shadow" on this strategy's
    # signals. Set `shadow_model_ids: []` to opt out entirely or provide
    # an explicit list to pin specific models.
    exit_head_model: exit-head-donchian-1h-v1
    exit_head_threshold: 0.10
    exit_head_action: close

  fade_breakout_4h:
    # Failed-breakout fade (S-STRAT-IMPROVE-S9) — the MIRROR of
    # trend_donchian: fades failed Donchian breakouts (a bar that pierces
    # the prior-bar channel then closes back inside = a liquidity grab
    # that rejected) in CHOP (ADX<20), with a Chandelier ATR trail. Same
    # let-winners-run lever as the trend-follower. Strategy code:
    # src/units/strategies/fade_breakout_4h.py; validated harness:
    # scripts/backtest_fade.py.
    #
    # STATUS: execution: shadow (DEMOTED from live 2026-06-01, operator
    # decision, Tier-3 — see the `execution:` field below). Promoted live
    # 2026-05-25 on the backtest below, but the live record showed no edge
    # (16 closed, 44% win, net -86R), so it was demoted back to a logging
    # shadow. The backtest evidence that justified the original promotion
    # (docs/audits/fade-breakout-complement-2026-05-24.md):
    #   * +64.2R / 6yr (2020-2026), net-positive every year, max-DD 13.9R.
    #   * Uncorrelated with live trend_donchian (monthly_corr 0.035); the
    #     equal-weight blend lifts return/drawdown 1.97 -> 3.80 and nearly
    #     halves max-DD — the diversification payoff (the North Star).
    #   * Nested walk-forward: donchian-20 / trail-3.5 wins train (2020-23)
    #     AND holds out-of-sample (2024-26 +16.2R, exp 0.246) without
    #     peeking. Fee-robust (+39.8R even at 15bps, 2x the modelled 7.5).
    #   * CAVEAT (the residual live risk): OOS expectancy decays ~half vs
    #     train and the OOS profit is month-concentrated (42% of OOS
    #     months positive) — more fragile than the trend-follower. This
    #     was the original reason it ran shadow; the operator promoted it
    #     to live anyway on 2026-05-25.
    #
    # The runtime builder honours `enabled` as the single source of truth;
    # `execution:` is the per-strategy execution gate (enforced in
    # Coordinator.multi_account_execute). Now `live`, so it executes on
    # every account it is routed to — bybit_1 (demo, paper) AND bybit_2
    # (real money) — see config/accounts.yaml.
    model: null
    signal_prefixes: [fade_breakout, fade]
    enabled: true
    execution: shadow        # DEMOTED live -> shadow 2026-06-01 (operator
                             # decision, Tier-3): no live edge demonstrated —
                             # 16 closed trades, 44% win, net -86R (almost all
                             # bybit_1 demo; real-money bybit_2 +1.55/8). Shadow
                             # runs + logs on every routed account but sends NO
                             # live order. Re-promote only on a fresh
                             # net-positive live/shadow window.
    timeframe: "4h"          # served as Bybit 240m via CCXT.
    symbols:
      - BTCUSDT              # currently the only supported symbol
                            # (SUPPORTED_SYMBOLS gate).
    # Strategy-specific — the nested-walk-forward train-winner (donchian 20
    # / trail 3.5 / ADX<20). trail_mult is the Chandelier distance; looser
    # was consistently better across the plateau (let winners run). The
    # initial stop sits atr_stop_buffer x ATR beyond the rejection wick.
    donchian: 20
    atr_period: 14
    atr_stop_buffer: 0.5
    pierce_min: 0.0
    trail_mult: 3.5
    adx_max: 20.0
    adx_period: 14
    # No fixed profit target — the Chandelier trail is the sole profit-exit
    # (matches the backtest). `tp` is a far ~50R sentinel that still
    # satisfies the pipeline's full-SL/TP dispatch gate.
    tp_r: 50.0
    # Time-decay backstop: close at market after this many bars (~8 days at
    # 4h) if the trade has neither stopped nor trailed out. Added 2026-05-30
    # to restore live↔backtest parity — the validated config used a 48-bar
    # timeout but the live monitor() previously had no time stop (ran the
    # timeout=∞ regime), so stalled fades could sit open for weeks. A 6.2yr
    # 4h walk-forward found 48 a broad plateau (42-60 all net-positive),
    # fee-robust, helpful across donchian/trail neighbors; OOS 2024-2026 it is
    # neutral-to-slightly-better with a marginally lower maxDD (the +14R/6yr
    # full-sample lift is mostly a 2020-2023 effect). Parity + risk change,
    # NOT an alpha boost. Set 0 to disable. Tier-3; evidence:
    # docs/audits/fade-breakout-complement-2026-05-24.md § time-stop addendum.
    timeout_bars: 48
    # shadow_model_ids OMITTED 2026-06-18 (soak-everything, system-audit session,
    # operator-directed): re-enabled ML shadow auto-wiring so this BTCUSDT
    # strategy's signals feed the decision/setup/meta/conviction models. Was an
    # `[]` opt-out — removed because the goal is now to maximise decision-model
    # soak volume, and the BTC shadow corpus is symbol-appropriate here.
    # Observe-only; zero order-path effect (shadow predictions never size/gate).

  squeeze_breakout_4h:
    # Volatility-squeeze breakout (S-STRAT-IMPROVE-S9) — Bollinger-in-Keltner
    # compression -> expansion; a different ENTRY TRIGGER than the
    # price-channel strategies. The best member-#3 candidate found:
    # uncorrelated (monthly_corr 0.30) with the live 2h trend, robust plateau
    # (net-positive in train AND OOS across the param grid). Strategy code:
    # src/units/strategies/squeeze_breakout_4h.py; harness:
    # scripts/backtest_squeeze.py.
    #
    # STATUS: execution: live (RE-PROMOTED 2026-06-23, operator-PRE-approved
    # 2026-06-01 gated on debounce verification — PERF-20260601-005). It was
    # promoted live 2026-05-25, the live record confirmed the OOS caveat (60
    # closed, 0% win, net -20R) and it was demoted to shadow 2026-06-01. The
    # demotion cause was a ranging-month read COMPOUNDED by the same-bar
    # re-entry storm; that storm is now structurally eliminated (#2548 bar-close
    # debounce in the shared emission path, deployed 2026-06-01, + the
    # now-unconditional baseline netting guard, 2026-06-17). 2026-06-23 verify:
    # the strategy is healthy (evaluating every tick, quiet only because BTC is
    # in a low-ADX chop with no squeeze release), fleet shows no storm. Backtest
    # basis: +17.6R multiyear, net-positive in every regime, lowest DD (7.9R) —
    # docs/audits/squeeze-breakout-complement-2026-05-24.md.
    #
    # `execution:` = per-strategy gate (enforced in
    # Coordinator.multi_account_execute). `live` executes on every routed
    # account; squeeze is currently routed ONLY to bybit_1 (demo, PAPER) — it
    # was removed from real-money bybit_2's routing at demotion, so this
    # re-promotion is PAPER-only (no real-money exposure). Re-adding it to
    # bybit_2 would be a separate Tier-3 decision.
    model: null
    signal_prefixes: [squeeze_breakout, squeeze]
    enabled: true
    execution: live          # RE-PROMOTED shadow -> live 2026-06-23 (operator
                             # pre-approved 2026-06-01, gated on debounce verify
                             # now satisfied — PERF-20260601-005). Paper-only
                             # routing (bybit_1). Demote back to shadow if a
                             # fresh paper window shows no edge.
    timeframe: "4h"          # served as Bybit 240m via CCXT.
    symbols:
      - BTCUSDT
    # Validated config (4h, BB(20,2.0) / KC(1.0xATR)). kc_mult 1.0 is the
    # most-diversifying corner (corr 0.30); trail 3.5 is the Chandelier
    # distance (let-winners-run lever).
    bb_period: 20
    bb_std: 2.0
    kc_mult: 1.0
    atr_period: 14
    atr_stop_mult: 2.5
    trail_mult: 3.5
    # No fixed TP — the Chandelier trail is the sole profit-exit; tp_r is a
    # far ~50R sentinel satisfying the pipeline's SL/TP dispatch gate.
    tp_r: 50.0
    # shadow_model_ids OMITTED 2026-06-18 (soak-everything): re-enabled ML shadow
    # auto-wiring (was `[]`). BTCUSDT → BTC shadow corpus is symbol-appropriate;
    # observe-only, zero order-path effect. Feeds the decision/meta models.

  vwap:
    model: null
    signal_prefixes: [vwap]
    # enabled: false (M7 kill, 2026-06-09, Tier-3 — operator-approval gate).
    # Demoted by S-M7-STRATEGY-REVIEW-GATE-2026-06-09 after the first
    # production run of `scripts/ml/strategy_review_packet.py` returned
    # `proposed_action: kill`. The evidence path:
    #   1. n=40,650 multiyear backtest (`docs/research/regime-roster-matrix-2026-06-01.md`)
    #      shows **net loser in every regime cell** (trending -6179, transitional
    #      -1903, chop -2642 R) even with the live gates threaded.
    #   2. `config/regime_policy.yaml` already lists vwap as OFF in all three
    #      1-D cells (no cell where the strategy is policy-permitted).
    #   3. Live shadow soak (S9 demotion 2026-05-24 → present) produced ~133
    #      orphaned packages / 24h on bybit_1 demo (PB-20260607-001 resolved
    #      by dropping vwap from bybit_1 routing in PR #2982), every package
    #      D-grade in `comms/claude_strategy_scores.jsonl` (1,323 vwap rows).
    # The strategy still runs and logs order packages — execution: shadow
    # (below) is preserved as the rollback path. Setting enabled: false
    # short-circuits the signal builder to side=none everywhere so the
    # journal noise stops; flipping back to enabled: true restores shadow
    # execution unchanged. See docs/strategy-review-gate.md § "The five
    # actions" for the semantics. Revert prerequisites are documented in
    # docs/sprint-logs/S-M7-STRATEGY-REVIEW-GATE-2026-06-09.md § Risks and
    # Follow-Ups.
    enabled: false
    execution: shadow
    timeframe: "5m"
    symbols:
      - BTCUSDT
    threshold: 0.01
    monitor_hold_window_minutes: 240

    # vwap_cross close-path gates (2026-05-15). Block vwap_cross from
    # firing when the trade has captured < min_r_for_vwap_cross R OR
    # when the trade has been open < min_hold_minutes_for_vwap_cross
    # minutes. Both must pass for vwap_cross to fire.
    #
    # Rationale: on 2026-05-14, 3/6 closed VWAP trades exited via
    # vwap_cross at R-capture 0.009-0.085 — net loss after Bybit's
    # 0.055% taker fee. Mechanism: when VWAP drifts *to* price rather
    # than price reverting *to* VWAP, the cross fires at micro-edge
    # even though the mean-reversion thesis never played out. Gates
    # don't affect SL/TP/time_decay; only suppress the no-edge vwap
    # cross exits.
    #
    # Set either to 0 to disable that gate. Setting both to 0 restores
    # the v1 "any cross closes" behaviour.
    min_r_for_vwap_cross: 0.25
    min_hold_minutes_for_vwap_cross: 10

    # SL-to-break-even threshold (R multiples). When price moves >= be_at_r
    # x original_risk in the trade's favour and no close path (TP/SL/VWAP-
    # cross/time-decay) has fired, the strategy slides SL to entry. 1.0 is
    # the legacy hard-coded default (pre-2026-05-13). Lower values (e.g.
    # 0.5) protect faster on shallow mean-reversion runs that retrace
    # before reaching VWAP; higher (e.g. 1.5) lets the trade run further.
    be_at_r: 1.0
    # SL-to-break-even offset in basis points (2026-05-18, operator
    # directive). When the trail-to-break-even rule fires, the new SL
    # is set to entry × (1 ± be_offset_bps/10000) instead of exactly
    # at entry, so Bybit's round-trip taker fees (~7.5 bps on linear
    # perps for this account) don't turn a break-even close into a
    # scratch loss. 15 bps ≈ 2× the round-trip fee rate, giving a
    # small profit margin on each BE close (operator framing: "at
    # least net wins, not net scratches").
    be_offset_bps: 15

    # Recent-context filter (operator directive 2026-05-13).
    # Informational only — does not block entries.
    recent_context_filter:
      enabled: true
      timeframe: "1h"
      lookback_bars: 24
      neutral_band_pct: 0.003

    # HTF trend gate — disabled. Backtest #1090 (8 random 30-day windows,
    # May 2025-May 2026) showed no HTF config improves on the baseline:
    # all Sharpes clustered near zero with std 4x the mean. The 1h EMA-20
    # that was previously live was the worst tested config (Sharpe 0.009,
    # 4/8 positive vs baseline 5/8). Re-enable with a specific config if
    # future backtests on broader data show a clear edge.
    htf_trend_filter:
      enabled: false
      htf_timeframe: "1h"
