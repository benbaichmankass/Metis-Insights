  # The metals sleeve sibling of MGC, routed to ib_paper by mhg_pullback_1d.
  # `exchange: interactive_brokers` is the connector key (same as MES); COMEX
  # is the listing. IB execution path: IBClient._build_contract uses
  # ContFuture("MHG", "COMEX", currency="USD"). Contract: 2,500 lb;
  # tick 0.0005 ($1.25/tick).
  # ------------------------------------------------------------------
  MHG:
    exchange: interactive_brokers
    category: futures
    base_asset: HG              # underlying Copper (COMEX listing)
    asset_class: commodity      # copper
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.0005           # $1.25 per tick (2,500 lb x $0.0005)
    min_qty: 1.0                # 1 contract minimum
    qty_step: 1.0               # whole contracts only
    contract_value_usd: 2500.0  # 2,500 lb per contract
    max_leverage: 0             # no leverage cap (futures margin set by broker)
    display_name: "Micro Copper (COMEX/IB)"
    ib: { sec_type: FUT, exchange: COMEX, currency: USD }

