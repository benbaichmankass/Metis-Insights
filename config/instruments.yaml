  # ------------------------------------------------------------------
  # MES — Micro E-mini S&P 500 futures via CME / Interactive Brokers
  # IB execution path wired 2026-05-21 (IBClient + ib_client_for +
  # execute._submit_order interactive_brokers branch). Traded by the
  # ib_paper (mode: live → paper money) and ib_live (mode: dry_run)
  # accounts in config/accounts.yaml. No MES strategy is assigned yet —
  # see docs/runbooks/ib-integration.md for the remaining wire-up.
  # ------------------------------------------------------------------
  MES:
    exchange: interactive_brokers
    category: futures
    base_asset: ES              # underlying E-mini S&P 500
    asset_class: index          # equity-index future
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.25             # $0.25 per index point
    min_qty: 1.0                # 1 contract minimum
    qty_step: 1.0               # whole contracts only
    contract_value_usd: 5.0     # $5 per index point per contract
    max_leverage: 0             # no leverage cap (futures margin set by broker)
    display_name: "Micro E-mini S&P 500 (CME/IB)"
    ib: { sec_type: FUT, exchange: CME, currency: USD }

  # ------------------------------------------------------------------
  # MGC — Micro Gold futures via COMEX / Interactive Brokers (WS-A, 2026-06-02)
  # The metals sleeve: BTC-uncorrelated WS-A-validated pullback diversifiers,
  # routed to ib_paper (IBKR PAPER money) by mgc_pullback_1d. `exchange:` is
  # the connector-routing key (interactive_brokers, same as MES); the COMEX
  # listing detail is recorded in the spec fields. IB execution path:
  # IBClient._build_contract uses ContFuture("MGC", "COMEX", currency="USD").
  # Contract: 10 troy oz; tick 0.10 ($1.00/tick).
  # ------------------------------------------------------------------
  MGC:
    exchange: interactive_brokers
    category: futures
    base_asset: GC              # underlying Gold (COMEX listing)
    asset_class: commodity      # gold
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.10             # $1.00 per tick (10 troy oz x $0.10)
    min_qty: 1.0                # 1 contract minimum
    qty_step: 1.0               # whole contracts only
    contract_value_usd: 10.0    # 10 troy oz per contract
    max_leverage: 0             # no leverage cap (futures margin set by broker)
    display_name: "Micro Gold (COMEX/IB)"
    ib: { sec_type: FUT, exchange: COMEX, currency: USD }

