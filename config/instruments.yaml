# config/instruments.yaml — typed instrument specifications for the multi-strategy
# architecture refactor (S-REFACTOR-S2, 2026-05-20).
#
# Consumed by:
#   - src/core/profile_loader.load_instrument_profiles()
#   - coordinator.instrument_profiles (read-only property, S2)
#   - Future: allocator position sizing (S4), IB execution layer (S7)
#
# Schema per instrument:
#   exchange:             bybit | interactive_brokers
#   category:            linear | inverse | spot | futures | unknown
#   base_asset:          underlying asset ticker
#   quote_currency:      pricing currency
#   settlement_currency: P&L settlement currency
#   tick_size:           minimum price increment
#   min_qty:             minimum order quantity (contracts or units)
#   qty_step:            order quantity granularity
#   contract_value_usd:  USD notional per contract (futures); 1.0 for crypto perps
#   max_leverage:        maximum allowed leverage (0 = no cap / spot)
#   display_name:        human-readable label for UI / logs
#
# Adding a new instrument:
#   1. Add entry here following the schema above.
#   2. If IB: ensure the execution layer handles the symbol before enabling
#      live. The IB execution path is wired (2026-05-21): IBClient
#      (src/units/accounts/ib_client.py) + the interactive_brokers branch in
#      execute._submit_order currently build the MES contract only — extend
#      IBClient._build_contract before routing a new IB symbol.
#   3. Add the symbol to the relevant strategy's config/strategies.yaml entry.
#   4. Run tests/test_s2_profile_wiring.py to validate the new entry loads cleanly.

instruments:

  # ------------------------------------------------------------------
  # BTCUSDT — Bybit V5 USDT-margined linear perpetual
  # Current live instrument for all three active strategies.
  # bybit_1 and bybit_2 both trade this symbol.
  # ------------------------------------------------------------------
  BTCUSDT:
    exchange: bybit
    category: linear
    base_asset: BTC
    quote_currency: USDT
    settlement_currency: USDT
    tick_size: 0.1           # minimum price increment ($0.10)
    min_qty: 0.001           # minimum order size (0.001 BTC)
    qty_step: 0.001          # qty granularity
    contract_value_usd: 1.0  # 1 USDT per $1 of BTC move (linear perp)
    max_leverage: 100        # Bybit max for BTC linear
    display_name: "BTC/USDT Perp (Bybit)"

  # ------------------------------------------------------------------
  # MES — Micro E-mini S&P 500 futures via CME / Interactive Brokers
  # IB execution path wired 2026-05-21 (IBClient + ib_client_for +
  # execute._submit_order interactive_brokers branch). Traded by the
  # ib_paper (mode: live → paper money) and ib_live (mode: dry_run)
  # accounts in config/accounts.yaml. No MES strategy is assigned yet —
  # see docs/runbooks/ib-integration.md for the remaining wire-up.
  # ------------------------------------------------------------------
  MES:
    exchange: interactive_brokers
    category: futures
    base_asset: ES              # underlying E-mini S&P 500
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.25             # $0.25 per index point
    min_qty: 1.0                # 1 contract minimum
    qty_step: 1.0               # whole contracts only
    contract_value_usd: 5.0     # $5 per index point per contract
    max_leverage: 0             # no leverage cap (futures margin set by broker)
    display_name: "Micro E-mini S&P 500 (CME/IB)"

  # ------------------------------------------------------------------
  # MGC — Micro Gold futures via COMEX / Interactive Brokers (WS-A, 2026-06-02)
  # The metals sleeve: BTC-uncorrelated WS-A-validated pullback diversifiers,
  # routed to ib_paper (IBKR PAPER money) by mgc_pullback_1d. `exchange:` is
  # the connector-routing key (interactive_brokers, same as MES); the COMEX
  # listing detail is recorded in the spec fields. IB execution path:
  # IBClient._build_contract uses ContFuture("MGC", "COMEX", currency="USD").
  # Contract: 10 troy oz; tick 0.10 ($1.00/tick).
  # ------------------------------------------------------------------
  MGC:
    exchange: interactive_brokers
    category: futures
    base_asset: GC              # underlying Gold (COMEX listing)
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.10             # $1.00 per tick (10 troy oz x $0.10)
    min_qty: 1.0                # 1 contract minimum
    qty_step: 1.0               # whole contracts only
    contract_value_usd: 10.0    # 10 troy oz per contract
    max_leverage: 0             # no leverage cap (futures margin set by broker)
    display_name: "Micro Gold (COMEX/IB)"

  # ------------------------------------------------------------------
  # MHG — Micro Copper futures via COMEX / Interactive Brokers (WS-A, 2026-06-02)
  # The metals sleeve sibling of MGC, routed to ib_paper by mhg_pullback_1d.
  # `exchange: interactive_brokers` is the connector key (same as MES); COMEX
  # is the listing. IB execution path: IBClient._build_contract uses
  # ContFuture("MHG", "COMEX", currency="USD"). Contract: 2,500 lb;
  # tick 0.0005 ($1.25/tick).
  # ------------------------------------------------------------------
  MHG:
    exchange: interactive_brokers
    category: futures
    base_asset: HG              # underlying Copper (COMEX listing)
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.0005           # $1.25 per tick (2,500 lb x $0.0005)
    min_qty: 1.0                # 1 contract minimum
    qty_step: 1.0               # whole contracts only
    contract_value_usd: 2500.0  # 2,500 lb per contract
    max_leverage: 0             # no leverage cap (futures margin set by broker)
    display_name: "Micro Copper (COMEX/IB)"

  # ------------------------------------------------------------------
  # XAUUSD — spot gold vs USD via OANDA v20 (practice account first).
  # M15 Phase 3: traded by oanda_practice (paper money). OANDA-native
  # name XAU_USD (the connector maps the compact form); units are whole
  # troy ounces (integer), price precision 3dp.
  # ------------------------------------------------------------------
  XAUUSD:
    exchange: oanda
    category: spot
    base_asset: XAU
    quote_currency: USD
    settlement_currency: USD
    tick_size: 0.001          # OANDA gold price precision (3dp)
    min_qty: 1                # 1 unit = 1 troy oz (integer units)
    qty_step: 1
    contract_value_usd: 1.0   # spot: 1 USD per $1 move per oz
    max_leverage: 20          # OANDA US metals leverage cap (conservative)
    display_name: "Gold/USD spot (OANDA practice)"
