  ETHUSDT:
    exchange: bybit
    category: linear
    base_asset: ETH
    asset_class: crypto
    quote_currency: USDT
    settlement_currency: USDT
    tick_size: 0.01          # minimum price increment ($0.01)
    min_qty: 0.01            # minimum order size (0.01 ETH)
    qty_step: 0.01           # qty granularity
    contract_value_usd: 1.0  # 1 USDT per $1 of ETH move (linear perp)
    max_leverage: 100        # Bybit max for ETH linear
    display_name: "ETH/USDT Perp (Bybit)"

  # ------------------------------------------------------------------
  # SOL/XRP/ADA/AVAX USDT — Bybit V5 USDT-margined linear perpetuals
