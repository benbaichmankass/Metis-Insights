  # connector-routing key (connector_for_symbol). tick_size / qty_step /
  # min_qty here are STATIC FALLBACKS only — Bybit's live get_instruments_info
  # is authoritative on the demo venue (src/units/accounts/precision.py), so a
  # stale value can never block the order path. contract_value_usd: 1.0 (linear
  # perp: 1 USDT per $1 underlying move) drives local PnL resolution.
  # ------------------------------------------------------------------
  SOLUSDT:
    exchange: bybit
    category: linear
    base_asset: SOL
    asset_class: crypto
    quote_currency: USDT
    settlement_currency: USDT
    tick_size: 0.001         # fallback — live lookup authoritative
    min_qty: 0.1
    qty_step: 0.1
    contract_value_usd: 1.0
    max_leverage: 100
    display_name: "SOL/USDT Perp (Bybit)"

