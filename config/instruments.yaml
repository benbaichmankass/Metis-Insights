# config/instruments.yaml — typed instrument specifications for the multi-strategy
# architecture refactor (S-REFACTOR-S2, 2026-05-20).
#
# Consumed by:
#   - src/core/profile_loader.load_instrument_profiles()
#   - coordinator.instrument_profiles (read-only property, S2)
#   - Future: allocator position sizing (S4), IB execution layer (S7)
#
# Schema per instrument:
#   exchange:             bybit | interactive_brokers
#   category:            linear | inverse | spot | futures | unknown
#   base_asset:          underlying asset ticker
#   quote_currency:      pricing currency
#   settlement_currency: P&L settlement currency
#   tick_size:           minimum price increment
#   min_qty:             minimum order quantity (contracts or units)
#   qty_step:            order quantity granularity
#   contract_value_usd:  USD notional per contract (futures); 1.0 for crypto perps
#   max_leverage:        maximum allowed leverage (0 = no cap / spot)
#   display_name:        human-readable label for UI / logs
#   asset_class:         OPTIONAL reporting override — crypto | index | commodity
#                        | bond | equity | fx. Consumed ONLY by the reporting layer
#                        (src/web/api/_asset_class.py → /performance perAssetClass
#                        breakdown); never the order path. When omitted it is
#                        inferred from exchange/category/base_asset, so this is a
#                        pin for the ambiguous cases (a gold ETF on an equity
#                        venue, an index future on IB, …).
#   ib:                  OPTIONAL per-symbol IBKR instrument-type map (added
#                        2026-07-07, docs/integrations/ibkr-equity-etf-support-DESIGN.md
#                        §4.1). Consumed by
#                        src/units/accounts/ib_instruments.py::ib_instrument_spec()
#                        — the single source of truth for "is this symbol a
#                        FUT or a STK on IBKR, and on which exchange?", used by
#                        IBClient._build_contract (src/units/accounts/ib_client.py)
#                        and the coordinator's per-order whole-share sizing
#                        resolution. Fields: sec_type (FUT|STK), exchange
#                        (CME/COMEX for futures; SMART for equities),
#                        primary_exchange (equities only — a qualifyContracts
#                        disambiguation hint), currency. A symbol with no `ib:`
#                        block falls back to the legacy MES/MGC/MHG futures map
#                        inside the resolver (purely additive; unmapped symbols
#                        still raise a clear error rather than routing wrong).
#
# Adding a new instrument:
#   1. Add entry here following the schema above.
#   2. If IB: ensure the execution layer handles the symbol before enabling
#      live. The IB execution path is wired (2026-05-21, STK support added
#      2026-07-07): IBClient (src/units/accounts/ib_client.py) +
#      the interactive_brokers branch in execute._submit_order build the
#      contract via ib_instrument_spec() — add the symbol's `ib:` block above
#      before routing a new IB symbol (futures need a new sec_type:FUT entry
#      only if it isn't MES/MGC/MHG; equities/ETFs always need a sec_type:STK
#      entry — there is no equity default).
#   3. Add the symbol to the relevant strategy's config/strategies.yaml entry.
#   4. Run tests/test_s2_profile_wiring.py to validate the new entry loads cleanly.

instruments:

  # ------------------------------------------------------------------
  # BTCUSDT — Bybit V5 USDT-margined linear perpetual
  # Current live instrument for all three active strategies.
  # bybit_1 and bybit_2 both trade this symbol.
  # ------------------------------------------------------------------
  BTCUSDT:
    exchange: bybit
    category: linear
    base_asset: BTC
    asset_class: crypto
    quote_currency: USDT
    settlement_currency: USDT
    tick_size: 0.1           # minimum price increment ($0.10)
    min_qty: 0.001           # minimum order size (0.001 BTC)
    qty_step: 0.001          # qty granularity
    contract_value_usd: 1.0  # 1 USDT per $1 of BTC move (linear perp)
    max_leverage: 100        # Bybit max for BTC linear
    display_name: "BTC/USDT Perp (Bybit)"

