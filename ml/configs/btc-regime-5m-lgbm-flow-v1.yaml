# Order-flow-augmented regime classifier — BTCUSDT @ 5m (S-MLOPT-S10, Phase 2.2).
#
# A direct A/B against `btc-regime-5m-lgbm-v2` to quantify the marginal
# `f1_volatile` lift from the order-flow / microstructure features. Identical to
# the v2 head EXCEPT it adds the S-MLOPT-S10 columns the `market_features` family
# emits when a `market_microstructure` side-stream is joined —
#   ofi, ofi_zscore, vpin, order_imbalance, rel_spread_mean, microprice_dev
# (Cont OFI, Easley-LdP-O'Hara VPIN, taker order-imbalance, spread, Stoikov
# micro-price lean).
#
# CANNOT be A/B'd until the capture side-car (ict-orderflow-capture on the
# trainer VM, scripts/ml/orderflow_capture.py) has accrued ENOUGH forward bars —
# there is no historical L2 to backfill. Until then these columns are 0.0 and
# this collapses to the v2 head. Eval recipe once data exists:
#   - rebuild market_features BTCUSDT 5m v5 with
#     microstructure_path=datasets-out/market_microstructure/BTCUSDT/5m/v001
#   - RESTRICT the eval to the captured window (the older years have ofi=0);
#   - python -m ml compare btc-regime-5m-lgbm-v2 btc-regime-5m-lgbm-flow-v1
#     under the Phase-0 purged WF-CV; read the f1_volatile delta.
# Tracked in MB-20260604-002 — review as soon as enough data has accrued.
#
# TIER: promotion past `research_only` is Tier-3 (operator-gated). Ships at
# `research_only` — a pure eval candidate (refused by the shadow factory).

manifest_version: v1
model_id: btc-regime-5m-lgbm-flow-v1
description: "Order-flow-augmented regime classifier for BTCUSDT 5m — adds Cont OFI + Easley-LdP-O'Hara VPIN + taker order-imbalance + spread + Stoikov micro-price lean to the v2 head. A/B vs btc-regime-5m-lgbm-v2 once the order-flow capture side-car has accrued enough forward data (S-MLOPT-S10, Phase 2.2, gap G5)."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - ofi
    - ofi_zscore
    - vpin
    - order_imbalance
    - rel_spread_mean
    - microprice_dev
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # Same recency weighting as the v2 head (#2678: hl=60d for 5m) so the only
  # moving part vs the champion is the order-flow feature set — a clean A/B.
  sample_weight:
    half_life_days: 60
    time_column: ts
  class_weight:
    range: 1.0
    volatile: 50.0
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 5m
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: research_only
notes: |
  S-MLOPT-S10 Phase 2.2. Clean A/B vs btc-regime-5m-lgbm-v2: identical trainer,
  split, recency + class weighting, dataset — the ONLY change is adding the
  order-flow / microstructure columns. REQUIRES market_features rebuilt on
  builder_version v5 with a market_microstructure side-stream joined; without it
  the columns are 0.0 and this collapses to the v2 head. The capture is FORWARD-
  ONLY (no L2 history), so evaluate on the captured window. Leakage gate forbids
  forward_log_return / forward_log_return_vol / regime_label. If `f1_volatile`
  improves under the Phase-0 CV, propose promotion to shadow (operator-gated).
