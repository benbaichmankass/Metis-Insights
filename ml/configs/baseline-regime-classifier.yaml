# Example training manifest — 3-class regime classifier baseline
# (WS5-B-PART-2 PR 2B).
#
# Simplest baseline: per-bucket modal class. Bucket bars by their
# rolling-vol feature (`vol_bucket` ∈ {vol_b0, vol_b1, vol_b2}) and
# learn the empirical class distribution per bucket. Falls back to
# the training-set marginal class distribution for unseen buckets.
#
# Run end-to-end (after building a market_raw dataset and a
# market_features dataset that derives from it):
#
#   # 1. Build the market_raw bars (CSV adapter shown; bybit_v5_offvm
#   #    works the same once the operator stages credentials on a
#   #    non-VM build host).
#   python -m ml.datasets build market_raw \
#     --output-dir ./datasets-out --version v001 \
#     --source bars-btcusdt-1h.csv \
#     --symbol-scope BTCUSDT --timeframe 1h \
#     -- adapter=csv csv_path=./bars-btcusdt-1h.csv
#
#   # 2. Derive market_features from the market_raw dataset.
#   python -m ml.datasets build market_features \
#     --output-dir ./datasets-out --version v001 \
#     --source ./datasets-out/market_raw/BTCUSDT/1h/v001 \
#     --symbol-scope BTCUSDT --timeframe 1h \
#     -- market_raw_path=./datasets-out/market_raw/BTCUSDT/1h/v001 \
#        vol_window_n=20 forward_window_m=5 \
#        vol_threshold=0.003 trend_threshold=0.005 \
#        n_vol_buckets=3
#
#   # 3. Train + evaluate the classifier.
#   python -m ml train ml/configs/baseline-regime-classifier.yaml \
#     --datasets-root ./datasets-out
#
# Decision-utility: this baseline tells the operator how much
# signal `vol_bucket` alone carries about the next-window regime.
# If `accuracy` and `weighted_f1` against this manifest materially
# beat a constant-marginal baseline (todo: ship a marginal-only
# sanity manifest), discretized vol is informative for regime
# forecasting on this dataset.

manifest_version: v1
model_id: regime-classifier-baseline-v0
description: "Market-regime classifier for BTCUSDT on 1h bars: labels each bar range vs volatile from a rolling realised-volatility bucket. Wired as a shadow context signal on strategy decisions (zero production effect)."
model_family: classification_baseline
trainer: ml.trainers.regime_classifier.RegimeClassifierTrainer
trainer_config:
  target_column: regime_label
  feature_column: vol_bucket
  unknown_bucket: ""
  class_labels:
    - range
    - volatile
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 1h
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
# S-MLOPT-S15 (MB-20260601-002): reconciled shadow -> research_only to match the
# registry's effective stage (field-beats-comment). This baseline collapses to
# majority class (f1_volatile=0), so it is NOT a viable phase-4 detector; the
# trend-detector candidate is btc-regime-1h-trend-lgbm-v1 (trend axis) /
# btc-regime-1h-lgbm-v2 (vol axis), not this model.
target_deployment_stage: research_only
notes: |
  WS5-B-PART-2 PR 2B baseline. 2-class regime classifier
  (range / volatile) with `vol_bucket` as the sole feature.
  Time-aware holdout — eval is the latest 20 % of bars to
  mirror the live deployment shape. Not a candidate for any
  live tier.

  S-ML-REGIME-CLASSIFIER-FIX (2026-05-20): collapsed from
  3-class (trend/range/volatile) to 2-class (range/volatile)
  and recalibrated vol_threshold from 0.005 to 0.003.

  Root cause of f1_trend=0.0: vol_bucket cannot separate
  "trend" from "range" — trend was never the modal class in any
  bucket. Collapse fix: "trend" merged into "range".

  Root cause of f1_volatile=0.0 after initial collapse:
  vol_threshold=0.005 labeled only 22.9% volatile; with trend
  merged into range, vol_b2 became range-modal (4423 vs 2531).
  vol_threshold=0.003 (≈p50 of forward_vol on BTCUSDT 1h)
  achieves 50/50 balance and exploits vol autocorrelation:
    vol_b0→range(4791 vs 2158), vol_b1→volatile(3571 vs 3382),
    vol_b2→volatile(4672 vs 2282) — all three buckets predict
    different classes (well, b0 vs b1/b2) non-degenerately.
