# Range-based-vol regime classifier — BTCUSDT @ 1h (S-MLOPT-S9, M14 Phase 2.1).
#
# A direct A/B against `btc-regime-1h-lgbm-v2` to quantify the `f1_volatile`
# lift from range-based volatility estimators (gap G5: "no range-based vol
# estimators"). Everything is identical to the v2 head EXCEPT the volatility
# feature set: this manifest adds the four range-based estimators the
# `market_features` family now emits (S-MLOPT-S9) —
#   parkinson_vol, garman_klass_vol, rogers_satchell_vol, yang_zhang_vol
# — which use each bar's full OHLC instead of close-to-close, so they estimate
# vol far more efficiently per bar. The live-scoring regime spec is frozen on
# **yang_zhang_vol** (drift-independent + handles overnight gaps, the
# minimum-variance range estimator).
#
# Requires a `market_features` rebuild on `builder_version: v3` (the build that
# emits the new columns) — the daily `build_btcusdt_pair 1h` produces it. Run
# the A/B with:
#   python -m ml compare btc-regime-1h-lgbm-v2 btc-regime-1h-lgbm-yz-v1
# and read the `f1_volatile` delta under the Phase-0 CV. If positive, propose
# promotion to `shadow` (operator-gated, Tier-3); the v2 head stays the champion
# until then.
#
# TIER: adopting / promoting this manifest past `research_only` is Tier-3
# (operator-gated). Ships at `research_only` — a pure eval candidate (refused by
# the shadow factory, so zero live influence) until the lift is confirmed.

manifest_version: v1
model_id: btc-regime-1h-lgbm-yz-v1
description: "Range-based-vol regime classifier for BTCUSDT 1h — adds Parkinson/Garman-Klass/Rogers-Satchell/Yang-Zhang vol estimators (full-OHLC, more efficient than close-to-close) to the v2 head; regime spec frozen on yang_zhang_vol. A/B vs btc-regime-1h-lgbm-v2 to quantify the f1_volatile lift (S-MLOPT-S9, gap G5)."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - parkinson_vol
    - garman_klass_vol
    - rogers_satchell_vol
    - yang_zhang_vol
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: yang_zhang_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # Same recency weighting as the v2 head (S-MLOPT-S2 / MB-20260601-001) so the
  # only moving part vs the champion is the vol feature set — a clean A/B.
  sample_weight:
    half_life_days: 90
    time_column: ts
  class_weight:
    range: 1.0
    volatile: 4.0
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 1h
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: research_only
notes: |
  S-MLOPT-S9 Phase 2.1. Clean A/B vs btc-regime-1h-lgbm-v2: identical trainer,
  split, recency + class weighting, dataset — the ONLY change is the volatility
  feature set (adds the four range-based estimators; freezes the live regime
  spec on yang_zhang_vol). Requires market_features rebuilt on builder_version
  v3 (the build that emits the new columns). Leakage gate forbids
  forward_log_return / forward_log_return_vol / regime_label. If `f1_volatile`
  improves under the Phase-0 CV, propose promotion to shadow (operator-gated).
