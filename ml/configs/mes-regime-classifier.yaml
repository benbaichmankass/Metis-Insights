# MES starter manifest — 2-class regime classifier on MES daily history.
#
# MES-scoped twin of baseline-regime-classifier.yaml. Unlike the
# journal baselines (which need closed MES trades to exist), this one
# trains on YEARS of MES market history pulled via the new
# `yfinance_offvm` adapter — so it produces a real model from day one.
#
# Build chain (run by scripts/ops/run_mes_training.sh):
#   python -m ml build-dataset market_raw \
#     --output-dir ./datasets-out --version v001 \
#     --source yfinance_offvm --symbol-scope MES --timeframe 1d --overwrite \
#     -- adapter=yfinance_offvm symbol=MES start=2000-01-01
#
#   python -m ml build-dataset market_features \
#     --output-dir ./datasets-out --version v001 \
#     --source ./datasets-out/market_raw/MES/1d/v001 \
#     --symbol-scope MES --timeframe 1d --overwrite \
#     -- market_raw_path=./datasets-out/market_raw/MES/1d/v001 \
#        vol_window_n=20 forward_window_m=5 vol_threshold=0.01 n_vol_buckets=3
#
#   python -m ml train ml/configs/mes-regime-classifier.yaml \
#     --datasets-root ./datasets-out

manifest_version: v1
model_id: mes-regime-classifier-baseline-v0
model_family: classification_baseline
trainer: ml.trainers.regime_classifier.RegimeClassifierTrainer
trainer_config:
  target_column: regime_label
  feature_column: vol_bucket
  unknown_bucket: ""
  class_labels:
    - range
    - volatile
dataset:
  family: market_features
  symbol_scope: MES
  timeframe: 1d
  version: v001
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: shadow
notes: |
  MES starter baseline. 2-class regime classifier (range / volatile)
  with `vol_bucket` as the sole feature, trained on MES daily bars
  (default ticker ES=F via yfinance_offvm — same index level as MES,
  deepest history). Time-aware holdout (latest 20 % of bars).
  vol_threshold is set at build time (0.01 for daily equity-index
  returns, vs 0.003 for BTCUSDT 1h). Registers at `shadow`. Starter
  calibration — not a candidate for any live tier; revisit
  vol_threshold once MES intraday history is wired.
