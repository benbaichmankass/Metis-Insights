# v2 LightGBM regime classifier — MES @ 15m.
#
# Same upgrade as mes-regime-5m-lgbm-v2 but for the 15m timeframe (the
# timeframe turtle_soup trades). Ports the BTC v2 LightGBM recipe to MES,
# where the per-bucket-modal baseline (mes-regime-15m-baseline-v1) collapses
# to f1_volatile=0 (MB-20260527-002). Trains on the MES 15m market_features
# the daily cycle now builds (resampled from the cached ES=F 5m base, median-
# calibrated vol_threshold). Pair with `python -m ml compare
# mes-regime-15m-baseline-v1 mes-regime-15m-lgbm-v2`.

manifest_version: v1
model_id: mes-regime-15m-lgbm-v2
description: "v2 LightGBM regime classifier for MES (Micro E-mini S&P 500) 15m bars (the timeframe turtle_soup trades) — range vs volatile from continuous vol + log-return features. Shadow context signal."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # MES market_features are median-calibrated => ~balanced classes; a light
  # volatile weight nudges the minority signal. Tune from the first cycle's
  # precision_volatile / recall_volatile.
  class_weight:
    range: 1.0
    volatile: 1.5
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: MES
  timeframe: 15m
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: shadow
notes: |
  v2 LightGBM head, MES @ 15m. Direct A/B vs the per-bucket-modal
  baseline-v1 (same dataset, same split). MES 15m bars are resampled from a
  rolling ~60d ES=F 5m yfinance base (deeper IBKR feed is operator-gated).
  Leakage gate forbids forward_log_return / forward_log_return_vol /
  regime_label.
