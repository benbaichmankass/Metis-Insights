# First feature-based trade-outcome model (S-MLOPT-S12 Part B follow-up).
#
# The two existing trade-outcome models (trade-outcome-{global,winrate}-
# baseline-v0) are CONSTANT baselines (ml.trainers.constant_baseline) — they
# predict the global / per-strategy mean win-rate and exist only as the floor
# every real model must beat. This is the first model that actually LEARNS
# from features: a LightGBM binary classifier estimating a decision's P(win)
# from the setup descriptors the strategy recorded at signal time PLUS the
# as-of-signal account state (equity / daily-PnL / drawdown / open-trade count),
# joined leak-free from `account_context_snapshots` (the snapshot is captured
# PRE-decision, so it cannot leak the outcome).
#
# Requires the trade_outcomes dataset to be built WITH the snapshot join:
#
#   python -m ml build-dataset trade_outcomes \
#     --output-dir ./datasets-out --version v002 \
#     --source trade_journal.db --overwrite \
#     -- db_path=/abs/path/to/trade_journal.db include_snapshots=true
#
#   python -m ml train ml/configs/trade-outcome-lgbm-v1.yaml \
#     --datasets-root ./datasets-out
#   python -m ml compare \
#     trade-outcome-lgbm-v1 trade-outcome-winrate-baseline-v0
#
# build_trainer_datasets.sh passes include_snapshots=true, so the daily cycle
# materialises the enriched dataset automatically. The closed-trade corpus is
# small (~500 rows, mostly paper) so this is data-bottlenecked early — it
# registers at `candidate` and rides the candidate → shadow → advisory ladder;
# the operator promotes once it clears the gates against the baselines.

manifest_version: v1
model_id: trade-outcome-lgbm-v1
description: "First feature-based trade-outcome model — a LightGBM binary classifier estimating a closed trade's P(win) from the signal-time setup descriptors (strategy/symbol/direction/setup_type/killzone/bias) + the leak-free as-of-signal account state (equity / daily realised PnL / daily equity-high / drawdown% / open-trade count). Beats-the-baseline candidate over the two constant trade-outcome baselines; rides the candidate → shadow → advisory ladder."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: won
  feature_columns:
    # Signal-time setup descriptors (categorical) — recorded BEFORE the outcome.
    - strategy_name
    - symbol
    - direction
    - setup_type
    - killzone
    - bias
    # As-of-signal account state (numeric), joined leak-free from
    # account_context_snapshots (captured pre-decision). NaN/None where a row
    # has no matching snapshot — LightGBM handles missing values natively.
    - equity_at_signal
    - daily_pnl_realized_at_signal
    - daily_equity_high_at_signal
    - daily_drawdown_pct_at_signal
    - open_trades_count_at_signal
  categorical_columns:
    - strategy_name
    - symbol
    - direction
    - setup_type
    - killzone
    - bias
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 20
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: trade_outcomes
  symbol_scope: all
  timeframe: all
  # Must match the trainer's DATASET_VERSION (build_trainer_datasets.sh, default
  # v002). The v002 build must be (re)built with include_snapshots=true so the
  # five *_at_signal feature columns are populated, not None.
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: won
  split_strategy: time_aware_holdout
  time_column: created_at
  holdout_fraction: 0.2
target_deployment_stage: candidate
notes: |
  First feature-based trade-outcome model. Trains on the trade_outcomes family
  (closed, non-backtest trades; won = pnl > 0) enriched with the as-of-signal
  account-context snapshot join. The trainer's _OUTCOME_FORBIDDEN gate rejects
  pnl / pnl_percent / won as features (leakage); the account-state features are
  PRE-decision so they are leak-free. Registers at `candidate` — no shadow-log
  or decision influence until the operator promotes it. Data-bottlenecked early
  (~500 closed trades, mostly paper); revisit feature set + consider
  backtest-augmented rows as the corpus grows.
