# v2 LightGBM regime classifier — BTCUSDT @ 15m.
#
# Same upgrade as btc-regime-5m-lgbm-v2 but for the 15m timeframe
# (used by turtle_soup). Pair with `python -m ml compare
# btc-regime-15m-baseline-v1 btc-regime-15m-lgbm-v2`.

manifest_version: v1
model_id: btc-regime-15m-lgbm-v2
description: "v2 LightGBM regime classifier for BTCUSDT 15m bars (the timeframe turtle_soup trades) — same target as baseline-v1 but with continuous vol + log-return features. Shadow context signal."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # Recency-weighted training (S-MLOPT-S2 / MB-20260601-001). Age-decay sample
  # weight on the 5y window — keeps the full sample but down-weights old bars
  # so the recent volatility regime isn't diluted. Half-life from the
  # trainer-VM sweep (#2678): hl=60d maximised f1_volatile for 15m (0.2129 vs
  # 0.2023 @1y, 0.1433 @5y) and macro_f1. Composes with class_weight below.
  sample_weight:
    half_life_days: 60
    time_column: ts
  # Per-sample reweighting via Dataset(weight=...). The 15m regime label
  # is ~96.4% range / 3.6% volatile; without this the booster predicts
  # only the majority class and f1_volatile collapses. 28× weight
  # ≈ inverse base rate, forcing the booster to actually commit to
  # volatile predictions when the features support it.
  class_weight:
    range: 1.0
    volatile: 28.0
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 15m
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: shadow
notes: |
  v2 LightGBM head, BTCUSDT @ 15m. Direct A/B vs the per-bucket-modal
  baseline-v1 (same dataset, same split). Leakage gate forbids
  forward_log_return / forward_log_return_vol / regime_label.
