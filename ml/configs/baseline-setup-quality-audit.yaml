# Example training manifest — setup-quality V2 (audit-joined source) (WS5-C-FU).
#
# Predicts the expected R-multiple for the next trade given the
# ICT `audit_pattern` recorded by the pipeline at signal time
# (`runtime_logs/signal_audit.jsonl`). The audit-joined dataset
# (`setup_labels_audit`) widens the feature surface: where v1's
# `setup_labels` only carried trade-journal columns, v2 also
# carries the pipeline's `pattern` / `side` / `confidence` /
# `bars_back_of_setup` from the audit event matched by
# `(strategy, symbol, timestamp ± 60s)`.
#
# Run end-to-end:
#
#   python -m ml.datasets build setup_labels_audit \
#     --output-dir ./datasets-out --version v001 \
#     --source trade_journal.db \
#     -- db_path=/abs/path/to/trade_journal.db \
#        audit_log_path=/abs/path/to/runtime_logs/signal_audit.jsonl \
#        risk_pct=1.0 r_cap=3.0 match_window_seconds=60
#
#   python -m ml train ml/configs/baseline-setup-quality-audit.yaml \
#     --datasets-root ./datasets-out
#
# Decision-utility: improvement over `baseline-setup-quality.yaml`
# (which uses `setup_type` from the trade journal) tells the
# operator that the pipeline's pattern label carries signal the
# bare trade journal doesn't capture. Same evaluator + holdout
# strategy as v1 so the two manifests are directly comparable.

manifest_version: v1
model_id: setup-quality-audit-baseline-v0
model_family: regression_baseline
trainer: ml.trainers.per_strategy_winrate.PerStrategyWinRateTrainer
trainer_config:
  target_column: r_multiple
  feature_column: audit_pattern
  target_kind: numeric_mean
dataset:
  family: setup_labels_audit
  symbol_scope: all
  timeframe: all
  version: v001
evaluator: ml.evaluators.regression.RegressionEvaluator
evaluator_config:
  target_column: r_multiple
  metrics: [mse, mae]
  split_strategy: time_aware_holdout
  time_column: trade_created_at
  holdout_fraction: 0.2
target_deployment_stage: research_only
notes: |
  WS5-C-FU baseline. Per-`audit_pattern` mean R-multiple over the
  audit-joined dataset. Time-aware holdout on `trade_created_at`
  (latest 20 % of trades). Not a candidate for any live tier.
  Leakage discipline: `pnl`, `pnl_percent`, and `r_multiple` are
  all outcomes; only metadata columns (`audit_pattern`,
  `audit_side`, `audit_confidence`, `audit_bars_back_of_setup`,
  `setup_type`, `killzone`, `bias`, `direction`) may be used as
  features.
  Survivorship: the audit-joined dataset only includes setups
  that fired into a closed trade. Rejected audits (with
  `stage_rejections` set, or no `entry`/`price`) are dropped.
