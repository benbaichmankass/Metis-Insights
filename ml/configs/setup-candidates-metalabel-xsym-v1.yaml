# Cross-symbol meta-labeling model (S-MLOPT-S8, M14 Phase 1.4).
#
# The S-MLOPT-S6 meta-label, trained JOINTLY on BTC + MES candidates with
# `symbol` as a feature, so the smaller-data symbol (MES) borrows statistical
# strength from the larger (BTC) — a cheap small-data lever we don't otherwise
# use, natural since we already run two symbols. Identical stack to
# `setup-candidates-metalabel-v1` (LightGBM-regression → `won` +
# ClassificationEvaluator); the only differences are `symbol_scope: all`, a
# `symbol` categorical feature, and the joint dataset.
#
# Build the JOINT dataset first (trainer VM) — pass BOTH market_raw dirs (each
# symbol is CUSUM-sampled + vol-bucketed against its own distribution, then
# concatenated; `live_trades_db` appends each symbol's REAL trades):
#   python -m ml.datasets build setup_candidates --output-dir datasets-out \
#     --version v001 --source market_raw --symbol-scope all --timeframe all \
#     -- "market_raw_paths=datasets-out/market_raw/BTCUSDT/1h/v002,datasets-out/market_raw/MES/15m/v001" \
#        live_trades_db=data/trade_journal.db
#
# SUCCESS (roadmap): the joint config beats the per-symbol (MES-only) model on
# the MES REAL-trade holdout. Compare via two runs (joint vs MES-only) scored on
# REAL MES trades (`live_holdout`), or under purged_walk_forward.
#
# EVAL RESULT (S-MLOPT-S8, trainer-vm-diag #2891-#2894, 2026-06-06) — QUALIFIED
# POSITIVE, reframed by a data fact: MES has ZERO closed trades (all 354 real
# trades are BTCUSDT). So there is NO real MES holdout — the intended BTC->MES
# transfer is UNMEASURABLE; the only runnable cross-symbol test is the REVERSE
# (does pooling MES synthetic + a `symbol` feature help the REAL BTC holdout,
# the actual n~352 floor). Clean ablation on the identical 354-trade real-BTC
# holdout (only diff = {+MES synthetic, +symbol}):
#   JOINT (xsym):    acc 0.7571  precision 0.5417  recall 0.1477  f1 0.2321  brier 0.2201
#   BTC-only (v1):   acc 0.6808  precision 0.2093  recall 0.1023  f1 0.1374  brier 0.2220
#   majority baseline acc 0.7514 (win base rate 0.2486)
# The joint is the FIRST meta-label in this family to edge above the majority
# baseline (0.7571 > 0.7514) with a decision-useful precision (0.54 = 2.2x base
# rate; BTC-only 0.21 is BELOW base rate). CAVEATS that keep it short of a
# decisive floor-break: (1) the win is on BTC (reverse transfer), not MES; (2)
# leak-free purged-WF within-distribution does NOT corroborate (BTC-only f1
# 0.369 > joint 0.209 there — though the joint folds pool both symbols, so not a
# clean cross-model compare); (3) n=354 is noisy (BTC-only holdout acc swung
# 0.68-0.74 across builds). Verdict: cross-symbol pooling is a WEAK-POSITIVE
# lever worth observing in shadow, NOT a floor-breaker — the binding constraint
# stays data scale (354 BTC trades, 0 MES). Full writeup: docs/sprint-logs/S-MLOPT-S8.md,
# docs/claude/ml-review-backlog.json MB-20260606-002.
#
# PROMOTION PROPOSAL (Tier-3, operator-gated): advance research_only -> shadow so
# the joint model accrues an observe-only live track record (shadow logs
# predictions, never influences an order). Daily rebuild is wired opt-in/default-
# off behind ICT_BUILD_XSYM=1 in scripts/ops/build_trainer_datasets.sh — flip it
# on the trainer unit when promoting. NOT flipped autonomously; the operator
# pulls the lever.
#
# TIER: adopting this manifest / promoting past `shadow` is Tier-3
# (operator-gated). Ships at `research_only`.

manifest_version: v1
model_id: setup-candidates-metalabel-xsym-v1
description: "Cross-symbol (BTC+MES joint) meta-labeling model: predicts P(profitable) for a candidate setup from signal-time market features + the symbol, trained on the dense triple-barrier setup_candidates across both symbols so MES borrows strength from BTC. Cross-symbol-transfer variant of setup-candidates-metalabel-v1."
model_family: regression_lightgbm
trainer: ml.trainers.lightgbm_regression.LightGBMRegressionTrainer
trainer_config:
  target_column: won
  feature_columns:
    - symbol
    - direction
    - rolling_log_return_vol
    - log_return
    - vol_bucket
    - momentum
    - hour_of_day
    - dayofweek
    - log_return_lag_1
    - log_return_lag_2
  categorical_columns:
    - symbol
    - direction
    - vol_bucket
    - hour_of_day
    - dayofweek
  forbidden_features:
    - won
    - label
    - r_multiple
    - ret
    - barrier_touched
    - holding_bars
    - is_live_trade
    - entry_price
    - signal_vol
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 15
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    lambda_l2: 1.0
dataset:
  family: setup_candidates
  symbol_scope: all
  timeframe: all
  version: v001
evaluator: ml.evaluators.classification.ClassificationEvaluator
evaluator_config:
  target_column: won
  threshold: 0.5
  split_strategy: live_holdout
  live_flag_column: is_live_trade
  time_column: ts
target_deployment_stage: research_only
notes: |
  Cross-symbol transfer (S-MLOPT-S8). Joint BTC+MES training with `symbol` as a
  categorical feature. Headline eval is live_holdout (train synthetic, score the
  REAL trades); the transfer claim is verified by comparing this joint model
  vs the MES-only setup-candidates-metalabel on the REAL MES holdout. Adoption /
  promotion past shadow are Tier-3 (operator-gated).
