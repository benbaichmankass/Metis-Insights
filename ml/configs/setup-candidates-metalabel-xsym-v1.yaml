# Cross-symbol meta-labeling model (S-MLOPT-S8, M14 Phase 1.4).
#
# The S-MLOPT-S6 meta-label, trained JOINTLY on BTC + MES candidates with
# `symbol` as a feature, so the smaller-data symbol (MES) borrows statistical
# strength from the larger (BTC) — a cheap small-data lever we don't otherwise
# use, natural since we already run two symbols. Identical stack to
# `setup-candidates-metalabel-v1` (LightGBM-regression → `won` +
# ClassificationEvaluator); the only differences are `symbol_scope: all`, a
# `symbol` categorical feature, and the joint dataset.
#
# Build the JOINT dataset first (trainer VM) — pass BOTH market_raw dirs (each
# symbol is CUSUM-sampled + vol-bucketed against its own distribution, then
# concatenated; `live_trades_db` appends each symbol's REAL trades):
#   python -m ml.datasets build setup_candidates --output-dir datasets-out \
#     --version v001 --source market_raw --symbol-scope all --timeframe all \
#     -- "market_raw_paths=datasets-out/market_raw/BTCUSDT/1h/v002,datasets-out/market_raw/MES/15m/v001" \
#        live_trades_db=data/trade_journal.db
#
# SUCCESS (roadmap): the joint config beats the per-symbol (MES-only) model on
# the MES REAL-trade holdout. Compare via two runs (joint vs MES-only) scored on
# REAL MES trades (`live_holdout`), or under purged_walk_forward.
#
# TIER: adopting this manifest / promoting past `shadow` is Tier-3
# (operator-gated). Ships at `research_only`.

manifest_version: v1
model_id: setup-candidates-metalabel-xsym-v1
description: "Cross-symbol (BTC+MES joint) meta-labeling model: predicts P(profitable) for a candidate setup from signal-time market features + the symbol, trained on the dense triple-barrier setup_candidates across both symbols so MES borrows strength from BTC. Cross-symbol-transfer variant of setup-candidates-metalabel-v1."
model_family: regression_lightgbm
trainer: ml.trainers.lightgbm_regression.LightGBMRegressionTrainer
trainer_config:
  target_column: won
  feature_columns:
    - symbol
    - direction
    - rolling_log_return_vol
    - log_return
    - vol_bucket
    - momentum
    - hour_of_day
    - dayofweek
    - log_return_lag_1
    - log_return_lag_2
  categorical_columns:
    - symbol
    - direction
    - vol_bucket
    - hour_of_day
    - dayofweek
  forbidden_features:
    - won
    - label
    - r_multiple
    - ret
    - barrier_touched
    - holding_bars
    - is_live_trade
    - entry_price
    - signal_vol
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 15
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    lambda_l2: 1.0
dataset:
  family: setup_candidates
  symbol_scope: all
  timeframe: all
  version: v001
evaluator: ml.evaluators.classification.ClassificationEvaluator
evaluator_config:
  target_column: won
  threshold: 0.5
  split_strategy: live_holdout
  live_flag_column: is_live_trade
  time_column: ts
target_deployment_stage: research_only
notes: |
  Cross-symbol transfer (S-MLOPT-S8). Joint BTC+MES training with `symbol` as a
  categorical feature. Headline eval is live_holdout (train synthetic, score the
  REAL trades); the transfer claim is verified by comparing this joint model
  vs the MES-only setup-candidates-metalabel on the REAL MES holdout. Adoption /
  promotion past shadow are Tier-3 (operator-gated).
