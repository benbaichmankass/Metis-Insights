# M19 T0.4 harder-head: BTCUSDT 15m DIRECTION (up/down/flat) head base + frozen-TSFM
# quantile-FORECAST features under PURGED walk-forward CV (dataset v520). The real
# test of whether the forecast's DIRECTIONAL columns (fc_ret_med / fc_up_prob /
# fc_skew) add orthogonal signal to the direction head — exactly where the T0.1
# EMBEDDING fell flat (+0.004 macro_f1, noise). If fc lifts direction where emb
# didn't, that localizes the forecast's value beyond the vol-regime head.
# Compare vs btc-direction-15m-lgbm-base-v003 (base cols only) on the SAME dataset.
# Candidate/offline — refused by the live shadow factory, never order-influencing.
manifest_version: v1
model_id: btc-direction-15m-lgbm-fc-v1
description: "M19 T0.4 harder-head: BTCUSDT 15m DIRECTION head base + 6 frozen chronos-bolt-tiny quantile-forecast features (fc_*) under PURGED walk-forward CV (dataset v520). Tests whether the forecast's directional columns lift the direction head where the T0.1 embedding did not. Candidate/offline — never order-influencing."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: direction_label
  feature_columns:
  - vol_bucket
  - rolling_log_return_vol
  - log_return
  - log_return_lag_1
  - log_return_lag_2
  - hour_of_day
  - dayofweek
  - fc_ret_med
  - fc_range_rel
  - fc_up_prob
  - fc_skew
  - fc_q10_rel
  - fc_q90_rel
  categorical_columns:
  - vol_bucket
  - hour_of_day
  - dayofweek
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
  forbidden_features:
  - forward_log_return
  - forward_log_return_vol
  - regime_label
  - trend_regime_label
  - direction_label
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 15m
  version: v520
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: direction_label
  split_strategy: purged_walk_forward
  time_column: ts
  n_folds: 5
  min_train_fraction: 0.5
  label_horizon: 5
  embargo_fraction: 0.01
target_deployment_stage: candidate
notes: |
  M19 T0.4 harder-head (direction) treatment leg. Candidate/offline — never order-
  influencing; the shadow factory refuses candidate. fc_* are past-only (frozen
  chronos-bolt-tiny forecast — see ml/datasets/forecast_features.py). Leakage gate
  forbids forward_log_return / forward_log_return_vol / regime_label /
  trend_regime_label / direction_label. Compare against
  btc-direction-15m-lgbm-base-v003 on the SAME dataset v520.
