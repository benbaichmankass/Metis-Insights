# M19 T0.1 harder-head: BTCUSDT 15m DIRECTION (up/down/flat) base+TSFM-emb under purged CV (v003) — where hand-features are weakest.
manifest_version: v1
model_id: btc-direction-15m-lgbm-emb-v1
description: "M19 T0.1 harder-head: BTCUSDT 15m DIRECTION (up/down/flat) base+TSFM-emb\
  \ under purged CV (v003) \u2014 where hand-features are weakest."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: direction_label
  feature_columns:
  - vol_bucket
  - rolling_log_return_vol
  - log_return
  - log_return_lag_1
  - log_return_lag_2
  - hour_of_day
  - dayofweek
  - tsfm_emb_0
  - tsfm_emb_1
  - tsfm_emb_2
  - tsfm_emb_3
  - tsfm_emb_4
  - tsfm_emb_5
  - tsfm_emb_6
  - tsfm_emb_7
  - tsfm_emb_8
  - tsfm_emb_9
  - tsfm_emb_10
  - tsfm_emb_11
  - tsfm_emb_12
  - tsfm_emb_13
  - tsfm_emb_14
  - tsfm_emb_15
  - tsfm_emb_16
  - tsfm_emb_17
  - tsfm_emb_18
  - tsfm_emb_19
  - tsfm_emb_20
  - tsfm_emb_21
  - tsfm_emb_22
  - tsfm_emb_23
  - tsfm_emb_24
  - tsfm_emb_25
  - tsfm_emb_26
  - tsfm_emb_27
  - tsfm_emb_28
  - tsfm_emb_29
  - tsfm_emb_30
  - tsfm_emb_31
  categorical_columns:
  - vol_bucket
  - hour_of_day
  - dayofweek
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
  forbidden_features:
  - forward_log_return
  - forward_log_return_vol
  - regime_label
  - trend_regime_label
  - direction_label
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 15m
  version: v003
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: direction_label
  split_strategy: purged_walk_forward
  time_column: ts
  n_folds: 5
  min_train_fraction: 0.5
  label_horizon: 5
  embargo_fraction: 0.01
target_deployment_stage: candidate
notes: "M19 T0.1 harder-head: BTCUSDT 15m DIRECTION (up/down/flat) base+TSFM-emb under\
  \ purged CV (v003) \u2014 where hand-features are weakest.\nM19 T0.1 follow-up.\
  \ Candidate/offline \u2014 never order-influencing. Leakage gate forbids forward_log_return\
  \ / forward_log_return_vol / regime_label.\n"
