# v2 conviction meta-model (stacker over the calibrated lens inputs).
#
# The learned v2 conviction head from docs/unified-confidence-risk-DESIGN.md
# § 3.2: a meta-model (stacker) that ingests the calibrated conviction-lens
# inputs (c_strat / c_setup / c_wr / c_reg from build_conviction_inputs) plus
# decision context and emits a single calibrated P(win). It logs ALONGSIDE the
# formulaic v1 blend with zero influence until it clears the canonical
# candidate → shadow → advisory ladder — so it registers at `candidate`.
#
# Build the dataset first (one row per closed/filled/non-backtest order
# package, joined to its trade outcome):
#
#   python -m ml build-dataset conviction_meta \
#     --output-dir ./datasets-out --version v001 \
#     --source trade_journal.db --overwrite \
#     -- db_path=/abs/path/to/trade_journal.db
#
#   python -m ml train ml/configs/conviction-meta-v1.yaml \
#     --datasets-root ./datasets-out
#
# Skips cleanly until enough labeled order packages exist — the closed-trade
# corpus is small (design § 4.5: the v2 meta-model is data-bottlenecked and
# will likely need backtest-augmented rows), so this is empty-then-fills.

manifest_version: v1
model_id: conviction-meta-v1
description: "v2 conviction meta-model (stacker) — a LightGBM binary classifier estimating a decision's P(win) from the calibrated conviction-lens inputs (c_strat/c_setup/c_wr/c_reg) + decision context (regime, vol_regime, adx_14, symbol, direction). Logs alongside the formulaic v1 conviction blend with zero influence; rides the candidate → shadow → advisory ladder."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: won
  feature_columns:
    - c_strat
    - c_setup
    - c_wr
    - c_reg
    - adx_14
    - regime
    - vol_regime
    - symbol
    - direction
    - strategy_name
  categorical_columns:
    - regime
    - vol_regime
    - symbol
    - direction
    - strategy_name
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 20
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: conviction_meta
  symbol_scope: all
  timeframe: all
  version: v001
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: won
  split_strategy: time_aware_holdout
  time_column: created_at
  holdout_fraction: 0.2
target_deployment_stage: candidate
notes: |
  v2 conviction meta-model (stacker over the calibrated lens inputs). Trains on
  the conviction_meta family (closed/filled/non-backtest order packages joined
  to their trade outcome). Features are the EXACT live observe-only conviction
  inputs (build_conviction_inputs) + decision context, so there is no
  train/serve feature skew. Registers at `candidate` — does not log to the live
  shadow path or influence any decision until the operator promotes it onto the
  ladder. The trainer's _OUTCOME_FORBIDDEN gate rejects pnl/pnl_percent/won/
  r_multiple as features (leakage). Target `won` is the binary P(win); the
  family also carries `r_multiple` for an alternate regression variant.
