# M19 T0.3 TREATMENT — conviction meta-model on the BTCUSDT closed-trade slice,
# hand-engineered lens+context features PLUS 8 pretrained-TSFM embedding columns
# (`tsfm_emb_0..7`, as-of joined from the frozen chronos-bolt-tiny side-stream —
# the same block T0.1 proved on the regime heads). A/B'd against
# `conviction-meta-base-btc-v1` (identical slice + hyperparameters; the ONLY
# difference is the 8 embedding columns). Only 8 of the 32 available dims are
# used — the BTC closed-trade slice is small (~hundred rows), so a 32-column
# block would swamp it; the random-projection dims are exchangeable so the
# first 8 are a representative subset. Offline/candidate.
#
# Build the BTC-scoped conviction_meta dataset WITH the embedding side-stream
# (build the BTCUSDT tsfm embedding side-stream first via
# scripts/ml/build_embeddings.py over the BTCUSDT market_raw, covering the
# trade window):
#
#   python -m ml build-dataset conviction_meta \
#     --output-dir ./datasets-out --version v001emb --symbol-scope BTCUSDT \
#     --source trade_journal.db --overwrite \
#     -- db_path=/abs/path/to/trade_journal.db symbol=BTCUSDT \
#        embedding_path=datasets-out/embeddings/BTCUSDT/15m/v001
#
#   python -m ml train ml/configs/conviction-meta-emb-btc-v1.yaml \
#     --datasets-root ./datasets-out

manifest_version: v1
model_id: conviction-meta-emb-btc-v1
description: "M19 T0.3 TREATMENT — LightGBM P(win) stacker on the BTCUSDT closed-trade slice: the calibrated conviction lenses + context PLUS 8 frozen-TSFM embedding columns (tsfm_emb_0..7). A/B'd vs conviction-meta-base-btc-v1 to test whether the T0.1 representation lifts a trade-outcome (label-bound) head. Candidate/offline."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: won
  feature_columns:
    - c_strat
    - c_setup
    - c_wr
    - c_reg
    - adx_14
    - regime
    - vol_regime
    - direction
    - strategy_name
    - tsfm_emb_0
    - tsfm_emb_1
    - tsfm_emb_2
    - tsfm_emb_3
    - tsfm_emb_4
    - tsfm_emb_5
    - tsfm_emb_6
    - tsfm_emb_7
  categorical_columns:
    - regime
    - vol_regime
    - direction
    - strategy_name
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 20
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: conviction_meta
  symbol_scope: BTCUSDT
  timeframe: all
  version: v001emb
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: won
  split_strategy: time_aware_holdout
  time_column: created_at
  holdout_fraction: 0.2
target_deployment_stage: candidate
notes: |
  M19 T0.3 treatment. Adds 8 frozen chronos-bolt-tiny embedding columns to the
  conviction stacker on the BTCUSDT slice. Grade = macro_f1 / accuracy vs the
  base-btc control on the identical slice. Expectation is set by the label wall:
  win-probability is a TRADE OUTCOME, so unlike the self-supervised regime head
  (T0.1, +0.05 macro_f1) the embedding may not lift a label-bound head — a
  neutral/negative result is itself evidence that the representation should reach
  conviction through the improved c_reg regime lens, not as raw dims here.
  Candidate/offline — never influences a live decision.
