# SELF-ONLY control (v901) for the ETH cross-asset A/B (MB-20260628-REGIME-SOAK-READINESS).
# Same dataset (v901) + recipe as eth-regime-15m-lgbm-xasset-v1, minus the xa_* peer
# features — the clean same-dataset comparator. Research-only (not for soak).

manifest_version: v1
model_id: eth-regime-15m-lgbm-selfonly-v901ctrl
description: "SELF-ONLY control for the ETH cross-asset A/B \u2014 identical to eth-regime-15m-lgbm-xasset-v1\
  \ (same v901 dataset, same recipe) but WITHOUT the xa_* peer features. Isolates\
  \ whether the cross-asset peer group adds in-session separation."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
  - vol_bucket
  - rolling_log_return_vol
  - log_return
  - log_return_lag_1
  - log_return_lag_2
  - hour_of_day
  - dayofweek
  categorical_columns:
  - vol_bucket
  - hour_of_day
  - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  sample_weight:
    half_life_days: 60
    time_column: ts
  class_weight:
    range: 1.0
    volatile: 28.0
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: ETHUSDT
  timeframe: 15m
  version: v901
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: shadow
