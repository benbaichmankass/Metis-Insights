# M19 T0.1 harder-head CONTROL: BTCUSDT 15m DIRECTION base-only under purged CV (v003).
manifest_version: v1
model_id: btc-direction-15m-lgbm-base-v003
description: 'M19 T0.1 harder-head CONTROL: BTCUSDT 15m DIRECTION base-only under
  purged CV (v003).'
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: direction_label
  feature_columns:
  - vol_bucket
  - rolling_log_return_vol
  - log_return
  - log_return_lag_1
  - log_return_lag_2
  - hour_of_day
  - dayofweek
  categorical_columns:
  - vol_bucket
  - hour_of_day
  - dayofweek
  seed: 42
  n_iter: 200
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
  forbidden_features:
  - forward_log_return
  - forward_log_return_vol
  - regime_label
  - trend_regime_label
  - direction_label
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 15m
  version: v003
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: direction_label
  split_strategy: purged_walk_forward
  time_column: ts
  n_folds: 5
  min_train_fraction: 0.5
  label_horizon: 5
  embargo_fraction: 0.01
target_deployment_stage: candidate
notes: "M19 T0.1 harder-head CONTROL: BTCUSDT 15m DIRECTION base-only under purged\
  \ CV (v003).\nM19 T0.1 follow-up. Candidate/offline \u2014 never order-influencing.\
  \ Leakage gate forbids forward_log_return / forward_log_return_vol / regime_label.\n"
