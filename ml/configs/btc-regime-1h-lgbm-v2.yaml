# v2 LightGBM regime classifier — BTCUSDT @ 1h.
#
# Extends the winning v2 LightGBM recipe (btc-regime-5m/15m-lgbm-v2) to the
# 1h timeframe, replacing the legacy per-bucket-modal baseline
# (`regime-classifier-baseline-v0`, which collapses to f1_volatile=0). Same
# market_features schema, trained on the 1h shard the daily cycle already
# builds (build_btcusdt_pair 1h). Pair with `python -m ml compare
# regime-classifier-baseline-v0 btc-regime-1h-lgbm-v2`.

manifest_version: v1
model_id: btc-regime-1h-lgbm-v2
description: "v2 LightGBM regime classifier for BTCUSDT 1h bars — range vs volatile from continuous vol + log-return features (replaces the collapsed 1h modal baseline). Shadow context signal."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # The 1h regime label is less skewed than the intraday shards (the legacy
  # 1h modal baseline sits near acc=0.79 => ~21% volatile). ~4x inverse-base-
  # rate weighting pushes the booster to commit to volatile without spraying;
  # tune from the first cycle's precision_volatile / recall_volatile.
  class_weight:
    range: 1.0
    volatile: 4.0
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: BTCUSDT
  timeframe: 1h
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: shadow
notes: |
  v2 LightGBM head, BTCUSDT @ 1h. Direct A/B vs the legacy
  regime-classifier-baseline-v0 (same market_features dataset, same split).
  Leakage gate forbids forward_log_return / forward_log_return_vol /
  regime_label.
