# Range-based-vol regime classifier — MES @ 15m (S-MLOPT-S9, M14 Phase 2.1).
#
# A direct A/B against `mes-regime-15m-lgbm-v2` to quantify the `f1_volatile`
# lift from range-based volatility estimators (gap G5). Everything is identical
# to the v2 head EXCEPT the volatility feature set: this manifest adds the four
# range-based estimators the `market_features` family now emits (S-MLOPT-S9) —
#   parkinson_vol, garman_klass_vol, rogers_satchell_vol, yang_zhang_vol
# — which use each bar's full OHLC instead of close-to-close. The live-scoring
# regime spec is frozen on **yang_zhang_vol**.
#
# Requires a `market_features` rebuild on `builder_version: v3` (the daily
# `build_mes_market` produces it). Run the A/B with:
#   python -m ml compare mes-regime-15m-lgbm-v2 mes-regime-15m-lgbm-yz-v1
# and read the `f1_volatile` delta under the Phase-0 CV.
#
# TIER: adopting / promoting this manifest past `research_only` is Tier-3
# (operator-gated). Ships at `research_only` — a pure eval candidate.

manifest_version: v1
model_id: mes-regime-15m-lgbm-yz-v1
description: "Range-based-vol regime classifier for MES (Micro E-mini S&P 500) 15m (the timeframe turtle_soup trades) — adds Parkinson/Garman-Klass/Rogers-Satchell/Yang-Zhang vol estimators (full-OHLC) to the v2 head; regime spec frozen on yang_zhang_vol. A/B vs mes-regime-15m-lgbm-v2 (S-MLOPT-S9, gap G5)."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - parkinson_vol
    - garman_klass_vol
    - rogers_satchell_vol
    - yang_zhang_vol
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: yang_zhang_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # MES market_features are median-calibrated => ~balanced classes; a light
  # volatile weight matches the v2 head so the only moving part is the vol set.
  class_weight:
    range: 1.0
    volatile: 1.5
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: MES
  timeframe: 15m
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: research_only
notes: |
  S-MLOPT-S9 Phase 2.1. Clean A/B vs mes-regime-15m-lgbm-v2: identical trainer,
  split, class weighting, dataset — the ONLY change is the volatility feature
  set (adds the four range-based estimators; freezes the live regime spec on
  yang_zhang_vol). MES 15m bars are resampled from a rolling ~60d ES=F 5m
  yfinance base (deeper IBKR feed operator-gated). Requires market_features
  rebuilt on builder_version v3. Leakage gate forbids forward_log_return /
  forward_log_return_vol / regime_label. If `f1_volatile` improves under the
  Phase-0 CV, propose promotion to shadow (operator-gated).
