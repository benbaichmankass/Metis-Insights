# M19 fc family (3rd symbol) CONTROL: SOLUSDT 15m regime head, BASE features
# only, on the SAME v530 dataset the fc arm trains on (built with forecast_path
# at vol_threshold=0.005). Because both arms read identical rows from one
# dataset build, the fc-vs-base comparison is feature-set-only — no
# dataset-window confound (cleaner than the BTC/ETH precedent, which compared
# across separately-built datasets). Candidate/offline — never
# order-influencing; exists purely as the A/B control for
# sol-regime-15m-lgbm-fc-pcv-v1.
manifest_version: v1
model_id: sol-regime-15m-lgbm-base-pcv-v530
description: "M19 fc-family control: SOLUSDT 15m regime head, base features only, on the SAME v530 (fc-built) dataset as sol-regime-15m-lgbm-fc-pcv-v1 under identical purged walk-forward CV. Candidate/offline A/B control — never order-influencing."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
  - vol_bucket
  - rolling_log_return_vol
  - log_return
  - log_return_lag_1
  - log_return_lag_2
  - hour_of_day
  - dayofweek
  categorical_columns:
  - vol_bucket
  - hour_of_day
  - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  sample_weight:
    half_life_days: 60
    time_column: ts
  class_weight:
    range: 1.0
    volatile: 28.0
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: SOLUSDT
  timeframe: 15m
  version: v530
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: purged_walk_forward
  time_column: ts
  n_folds: 5
  min_train_fraction: 0.5
  label_horizon: 5
  embargo_fraction: 0.01
target_deployment_stage: candidate
notes: |
  A/B control for sol-regime-15m-lgbm-fc-pcv-v1: identical dataset (v530),
  identical CV/params/weighting — the only difference is the six fc_* feature
  columns. The fc arm graduates candidate→shadow only on a clear purged-CV win
  over THIS control + the SOL forecast side-stream in production (see the fc
  manifest's notes). Leakage gate forbids forward_log_return /
  forward_log_return_vol / regime_label.
