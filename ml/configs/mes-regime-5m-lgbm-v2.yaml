# v2 LightGBM regime classifier — MES @ 5m.
#
# Ports the winning BTC v2 LightGBM recipe to MES. The per-bucket-modal
# baseline (mes-regime-5m-baseline-v1) collapses to f1_volatile=0: on MES the
# BACKWARD-looking vol_bucket does not separate the forward-vol regime label,
# so argmax always picks 'range' (MB-20260527-002). The gradient-boosted head
# learns from the continuous vol + log-return features the modal baseline
# can't represent — the same change that lifted BTC f1_volatile from 0 to
# 0.11-0.23. Trains on the MES market_features the daily cycle now builds
# (build_mes_market in build_trainer_datasets.sh: ES=F 5m via yfinance,
# median-calibrated vol_threshold). Pair with `python -m ml compare
# mes-regime-5m-baseline-v1 mes-regime-5m-lgbm-v2`.

manifest_version: v1
model_id: mes-regime-5m-lgbm-v2
description: "v2 LightGBM regime classifier for MES (Micro E-mini S&P 500) 5m bars — range vs volatile from continuous vol + log-return features (the modal baseline collapses on MES). Shadow context signal."
model_family: classification_lightgbm
trainer: ml.trainers.lightgbm_multiclass.LightGBMMulticlassTrainer
trainer_config:
  target_column: regime_label
  feature_columns:
    - vol_bucket
    - rolling_log_return_vol
    - log_return
    - log_return_lag_1
    - log_return_lag_2
    - hour_of_day
    - dayofweek
  categorical_columns:
    - vol_bucket
    - hour_of_day
    - dayofweek
  freeze_regime_spec: true
  vol_feature_column: rolling_log_return_vol
  vol_window_n: 20
  seed: 42
  n_iter: 200
  # The MES market_features are built with a median-calibrated vol_threshold
  # (build_mes_features_tf), so the range/volatile classes are ~balanced
  # (unlike BTC's ~99.5%-range intraday). A light volatile weight nudges the
  # booster toward the minority signal without wrecking precision; tune from
  # the first cycle's precision_volatile / recall_volatile.
  class_weight:
    range: 1.0
    volatile: 1.5
  lgbm_params:
    learning_rate: 0.05
    num_leaves: 31
    min_data_in_leaf: 50
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 5
dataset:
  family: market_features
  symbol_scope: MES
  timeframe: 5m
  version: v002
evaluator: ml.evaluators.multiclass_classification.MulticlassClassificationEvaluator
evaluator_config:
  target_column: regime_label
  split_strategy: time_aware_holdout
  time_column: ts
  holdout_fraction: 0.2
target_deployment_stage: shadow
notes: |
  v2 LightGBM head, MES @ 5m. Direct A/B vs the per-bucket-modal
  baseline-v1 (same dataset, same split). MES market history is a rolling
  ~60d ES=F 5m window (yfinance is the deepest intraday source available to
  the trainer; a deeper IBKR feed is operator-gated). Leakage gate forbids
  forward_log_return / forward_log_return_vol / regime_label.
