# Drop-in: switch ict-cloudflared-tunnel to cloudflared --token auth mode.
#
# Why this exists (2026-05-12 dashboard 502 incident):
#   setup_named_cloudflare_tunnel.sh used to decode the CF API tunnel token
#   via Python's base64.b64decode. The CF API returns URL-safe base64 (chars
#   - and _); Python's standard b64decode raises binascii.Error on those
#   chars, which was silently swallowed by `2>/dev/null || true`. The result:
#   credentials file written empty → cloudflared crash-loops with no tunnel
#   connections → Vercel gets 502 on every /api/bot/* request.
#
# Fix: store the raw token in /etc/ict-trader/cloudflared/tunnel.env
#   (written by setup_named_cloudflare_tunnel.sh) and pass it to cloudflared
#   via --token. No base64 decode, no credentials JSON, no fragile format
#   assumptions about the CF API token structure.
#
# The service file (deploy/ict-cloudflared-tunnel.service) is unchanged per
# the CLAUDE.md rule; this drop-in is the additive override layer.
#
# Auto-installed by:
#   - scripts/install_systemd_units.sh on every pull-and-deploy
#   - scripts/ops/setup_named_cloudflare_tunnel.sh on every
#     setup-named-cloudflare-tunnel operator action
#
# tunnel.env format (chmod 600, owned by ubuntu):
#   CLOUDFLARED_TUNNEL_TOKEN=<raw token from CF API /cfd_tunnel/{id}/token>

[Service]
EnvironmentFile=-/etc/ict-trader/cloudflared/tunnel.env
ExecStart=
ExecStart=/bin/sh -c 'exec /home/ubuntu/.local/bin/cloudflared --no-autoupdate tunnel --config /etc/ict-trader/cloudflared/config.yml run --token "$CLOUDFLARED_TUNNEL_TOKEN"'
