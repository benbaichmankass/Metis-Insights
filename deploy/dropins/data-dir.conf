# systemd drop-in: bind the trader services to the OCI block-storage mount.
#
# Install on the live VM as one of:
#   /etc/systemd/system/ict-trader-live.service.d/data-dir.conf
#   /etc/systemd/system/ict-web-api.service.d/data-dir.conf
#   /etc/systemd/system/ict-claude-bridge.service.d/data-dir.conf
#
# Then:
#   sudo systemctl daemon-reload
#   sudo systemctl restart ict-trader-live
#
# Behavior:
#   - RequiresMountsFor=/data/bot-data — systemd holds the unit
#     in "activating" until the mount is up. If /data/bot-data is
#     not mounted, the service does not start (instead of starting
#     and silently writing to a now-unmounted parent dir on the
#     root filesystem, which is exactly the bug this externalization
#     is designed to prevent).
#   - ExecStartPre runs the preflight before each (re)start. Any
#     check failure prevents the trader from starting on a broken
#     mount.
#   - Environment=DATA_DIR=/data/bot-data opts the helpers in
#     src/utils/paths.py into the mount. Unset → repo-relative
#     paths (PR 1 behavior, unchanged).
#
# Override at the .env layer instead of editing this file: setting
# DATA_DIR in /home/ubuntu/ict-trading-bot/.env wins over this drop-in
# because the unit's EnvironmentFile is loaded after the Environment=
# directive. That's by design — operator can flip in/out without
# touching systemd.

[Unit]
RequiresMountsFor=/data/bot-data
After=data-bot\x2ddata.mount

[Service]
Environment=DATA_DIR=/data/bot-data
ExecStartPre=/home/ubuntu/ict-trading-bot/scripts/check_data_dir.sh /data/bot-data
