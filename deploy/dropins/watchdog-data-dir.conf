# systemd drop-in: inject DATA_DIR env into ict-liveness-watchdog.
#
# Install on the live VM as:
#   /etc/systemd/system/ict-liveness-watchdog.service.d/data-dir.conf
#
# Installed automatically by scripts/install_systemd_units.sh on every
# pull-and-deploy. No manual step required after the first deploy.
#
# No service restart needed after install — the watchdog is a oneshot
# fired by ict-liveness-watchdog.timer; the next timer tick (≤60 s)
# picks up the new environment automatically.
#
# Why this exists:
#   check_heartbeat.py resolves DEFAULT_HEARTBEAT at module load time
#   using DATA_DIR (mirrors src.utils.paths resolution order). Without
#   this drop-in the watchdog inherits only .env (which has no DATA_DIR
#   after fix-data-dir stripped it) and falls back to
#   <repo>/runtime_logs/heartbeat.txt — the pre-migration path last
#   written 2026-05-11. The trader writes fresh beats to
#   /data/bot-data/runtime_logs/heartbeat.txt via its own drop-in, so
#   the watchdog perpetually reads a stale heartbeat, fires CRITICAL
#   every 60 s, and restarts a perfectly healthy trader every ~3 min
#   (2026-05-12 incident).
#
# Intentionally minimal: no RequiresMountsFor, no ExecStartPre.
# The watchdog is read-only; if the mount is absent the heartbeat will
# be missing and it should ALERT, not block or refuse to start.
# Data-integrity preflight (check_data_dir.sh) is the trader's
# responsibility, not the watchdog's.

[Service]
Environment=DATA_DIR=/data/bot-data
