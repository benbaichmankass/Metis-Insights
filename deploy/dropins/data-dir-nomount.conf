# systemd drop-in: inject DATA_DIR env WITHOUT binding to a mount.
#
# Sibling of data-dir.conf, for live hosts where /data/bot-data is a
# directory on the boot/root volume rather than a separate block-storage
# mount — the Ampere live candidate (ict-bot-arm) post-2026-06-14 cutover.
#
# Why a separate flavor:
#   data-dir.conf carries `[Unit] RequiresMountsFor=/data/bot-data`,
#   `After=data-bot\x2ddata.mount`, and `ExecStartPre=check_data_dir.sh`.
#   On a host where /data/bot-data is NOT a mount, systemd holds the unit
#   in "activating" forever waiting for a mount unit that never appears
#   (and the preflight `mountpoint` check fails), so every unit that gets
#   the drop-in is wedged dead. That binding is correct + desirable on the
#   block-volume live VMs (it refuses to start the trader on a broken
#   mount); it is actively harmful on a boot-volume-dir host.
#
#   install_systemd_units.sh picks this flavor automatically when
#   `mountpoint -q /data/bot-data` is false, so the same deploy script is
#   safe on both topologies.
#
# Same env as data-dir.conf so the DATA_DIR-aware path helpers
# (src/utils/paths.py, check_heartbeat.py) resolve the canonical store.
# `.env` (loaded via EnvironmentFile after Environment=) still wins, so
# this is belt-and-suspenders for the candidate whose .env already pins
# both vars.

[Service]
Environment=DATA_DIR=/data/bot-data
Environment=TRADE_JOURNAL_DB=/data/bot-data/trade_journal.db
