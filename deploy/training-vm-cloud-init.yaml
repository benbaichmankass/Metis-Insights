#cloud-config
# Cloud-init bootstrap for the ICT training-center VM (S-AI-WS9).
#
# This file is injected via OCI instance metadata `user_data`
# (base64-encoded by scripts/ops/provision_training_vm.py).
# Cloud-init applies on first boot. Anything in this file should
# be IDEMPOTENT so a re-run on the same image is harmless.
#
# What we set up:
#   - apt: python3.11, python3-pip, python3-venv, git, curl, jq
#   - User: `ubuntu` already exists on the official Canonical image
#     (the standard OCI user); no need to create it. SSH key is
#     injected separately via OCI metadata (`ssh_authorized_keys`).
#   - Project tree under /home/ubuntu/ict-trading-bot (parallel to
#     the live VM layout). Cloned read-only; the training workflow
#     pulls when it runs.
#   - Systemd: `ict-trainer.service` UNIT FILE INSTALLED, but
#     `enabled=false` and `started=false` by default. The operator
#     opts in explicitly once the training cadence is decided.
#     This keeps the VM idle by default — Always Free quota
#     stays free.
#   - Marker file: /etc/ict-trainer-vm.role with content
#     `training-center`. Any future ops script can grep for this
#     to distinguish the trainer from the live trader.

package_update: true
package_upgrade: false  # leave kernel patching to operator cadence

packages:
  - python3.11
  - python3.11-venv
  - python3-pip
  - git
  - curl
  - jq
  - rsync

write_files:
  - path: /etc/ict-trainer-vm.role
    permissions: '0644'
    owner: root:root
    content: |
      training-center
      # ICT training-center VM marker (S-AI-WS9).
      # If you see this file you are on the trainer, NOT the live trader.
      # The live trader has /etc/ict-trader-vm.role with content `live-trader`
      # (added separately when that VM was set up; absent on old images).

  - path: /etc/systemd/system/ict-trainer.service
    permissions: '0644'
    owner: root:root
    content: |
      # ICT model training center service (S-AI-WS9).
      #
      # DISABLED BY DEFAULT. Claude enables it autonomously via the
      # trainer-vm-diag relay (the trainer charter at
      # docs/claude/trainer-vm-mode.md § 3.a authorizes trainer-side
      # systemd changes without operator approval). The dispatch:
      #
      #   trainer-vm-diag-request issue body:
      #     cmd: sudo systemctl enable --now ict-trainer.service
      #
      # Defers to scripts/ops/run_training_cycle.sh inside the cloned
      # repo. That script is the operator-facing entrypoint; it can
      # call ml.cli, run experiment manifests, sync from the live VM,
      # etc.
      #
      # Backtest sweeps (post-incident validation, ad-hoc cadence
      # sweeps, etc.) use a separate orchestrator —
      # scripts/ops/run_backtest_sweep.sh + docs/runbooks/trainer-
      # backtest.md. That orchestrator can run without the
      # ict-trainer.service systemd unit being enabled; the unit is
      # for scheduled training cycles, not interactive backtests.
      #
      # RESOURCE CAP + OOMPolicy (2026-07-02, BL-20260702-TRAINER-OOM): the
      # 6GB trainer VM has zero resource controls historically, and a
      # 2026-07-02 OOM kill (mid-cycle, ~36min into a 68-manifest run) took
      # down the WHOLE unit's cgroup — the systemd default OOMPolicy=stop —
      # stranding the ~30 not-yet-trained manifests for a full day. MemoryHigh
      # throttles/reclaims BEFORE the hard kill (soft cap); MemoryMax is the
      # hard ceiling, leaving ~1GB headroom over the ~400Mi baseline + ~2Gi
      # reclaimable buff/cache observed. OOMPolicy=continue means a kernel-OOM
      # of ONE manifest's subprocess no longer takes the orchestrating bash
      # (and hence the whole cycle) down with it — the loop's own rc=137
      # handling in run_training_cycle.sh already treats a killed subprocess
      # as a single manifest_failed + continue, which is a far cheaper outcome
      # than losing the unit. The new checkpoint/resume in
      # run_training_cycle.sh (+ ict-trainer-catchup.timer below) is the
      # backstop for the rarer case of the whole VM/unit dying anyway.
      [Unit]
      Description=ICT model training center (S-AI-WS9)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/home/ubuntu/ict-trading-bot
      MemoryHigh=4G
      MemoryMax=5G
      OOMPolicy=continue
      ExecStart=/bin/bash scripts/ops/run_training_cycle.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ict-trainer.timer
    permissions: '0644'
    owner: root:root
    content: |
      # Daily cadence timer for the training cycle. Disabled by default
      # at provision time; Claude enables it autonomously via the
      # trainer-vm-diag relay once a cycle is desired:
      #
      #   trainer-vm-diag-request issue body:
      #     cmd: sudo systemctl enable --now ict-trainer.timer
      #
      # One umbrella cycle per day handles all manifests on a single
      # shared dataset sync — see docs/ml/training-center.md § Cadence.
      [Unit]
      Description=Periodic ICT model training cycle

      [Timer]
      OnCalendar=daily
      RandomizedDelaySec=1h
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /etc/systemd/system/ict-trainer-catchup.service
    permissions: '0644'
    owner: root:root
    content: |
      # ICT trainer catch-up run (2026-07-02, BL-20260702-TRAINER-OOM).
      #
      # DISABLED BY DEFAULT (enable alongside ict-trainer.timer via the
      # trainer-vm-diag relay — Tier-1 autonomous per docs/claude/trainer-vm-
      # mode.md § 3.a). Re-invokes the SAME run_training_cycle.sh a few hours
      # after the primary daily cycle. Thanks to the checkpoint/resume logic
      # in that script (runtime_logs/trainer/cycle_progress_<UTC-date>.json),
      # this is a near-no-op on a clean day (every manifest already
      # done/skipped) and only actually retrains manifests a killed primary
      # run never got to — so a mid-cycle OOM (or any other kill) no longer
      # strands the rest of the day's training until tomorrow.
      [Unit]
      Description=ICT model training center — same-day catch-up run (S-AI-WS9)
      After=network-online.target ict-trainer.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/home/ubuntu/ict-trading-bot
      MemoryHigh=4G
      MemoryMax=5G
      OOMPolicy=continue
      ExecStart=/bin/bash scripts/ops/run_training_cycle.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ict-trainer-catchup.timer
    permissions: '0644'
    owner: root:root
    content: |
      # Fires ict-trainer-catchup.service once daily at 05:00 UTC — well
      # after the primary ict-trainer.timer's `daily` + up to 1h
      # RandomizedDelaySec window (00:00-01:00 UTC), so a clean day's cycle
      # is long finished before this fires and finds nothing to do.
      [Unit]
      Description=Same-day catch-up for an interrupted ICT training cycle

      [Timer]
      OnCalendar=*-*-* 05:00:00 UTC
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /etc/systemd/system/ict-promotion-readiness.service
    permissions: '0644'
    owner: root:root
    content: |
      # S-MLOPT-S18 / M14 Phase 4.3: scheduled promotion-readiness sweep.
      #
      # DISABLED BY DEFAULT. Claude enables it autonomously via the
      # trainer-vm-diag relay (trainer charter — trainer-side systemd
      # changes are Tier-1 autonomous):
      #
      #   trainer-vm-diag-request issue body:
      #     cmd: sudo systemctl enable --now ict-promotion-readiness.timer
      #
      # Wraps `scripts/ops/run_promotion_readiness.sh`, which runs
      # `python -m ml promotion-readiness` across the registry, writes
      # report.json + SUMMARY.md under
      # runtime_logs/trainer_mirror/promotion_readiness/<UTC-date>/
      # (mirrored to the live VM by ict-trainer-publish), and pushes
      # a one-line operator ping into the live VM's pending_pings/
      # queue when any model is promote-ready or demote-proposed.
      # Reports only — never auto-promotes.
      [Unit]
      Description=ICT promotion-readiness sweep (S-MLOPT-S18)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/home/ubuntu/ict-trading-bot
      Environment=LIVE_VM_IP=141.145.193.91
      Environment=LIVE_VM_USER=ubuntu
      Environment=VM_SSH_KEY=/home/ubuntu/.ssh/id_ed25519
      ExecStart=/bin/bash scripts/ops/run_promotion_readiness.sh
      # Exit code 10 means "sweep ran + actionable proposals found" and
      # is a normal outcome (the operator ping was queued) — do not let
      # systemd treat it as a service failure.
      SuccessExitStatus=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ict-promotion-readiness.timer
    permissions: '0644'
    owner: root:root
    content: |
      # Daily cadence for the promotion-readiness sweep. Disabled by
      # default at provision time; Claude enables it autonomously via
      # the trainer-vm-diag relay:
      #
      #   trainer-vm-diag-request issue body:
      #     cmd: sudo systemctl enable --now ict-promotion-readiness.timer
      #
      # One sweep per day after the daily training cycle finishes is the
      # intended cadence (the report grades whatever the trainer just
      # produced + accumulated shadow evidence).
      [Unit]
      Description=Periodic ICT promotion-readiness sweep

      [Timer]
      OnCalendar=daily
      RandomizedDelaySec=30min
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /etc/systemd/system/ict-drift-retrain.service
    permissions: '0644'
    owner: root:root
    content: |
      # S-MLOPT-S16 / M14 Phase 4.1: drift-triggered, recency-weighted
      # retraining.
      #
      # DISABLED BY DEFAULT. Claude enables it autonomously via the
      # trainer-vm-diag relay (trainer charter — trainer-side systemd
      # changes are Tier-1 autonomous):
      #
      #   trainer-vm-diag-request issue body:
      #     cmd: sudo systemctl enable --now ict-drift-retrain.timer
      #
      # Wraps `scripts/ops/run_drift_retrain.sh`, which runs
      # `python -m ml drift-retrain` to ADWIN-scan every deployed
      # head's real-time shadow scores. For each head the detector
      # flags AND that resolves to a manifest under ml/configs/, fires
      # `python -m ml train <manifest>` (the manifest's existing
      # `sample_weight.half_life_days` from S-MLOPT-S2 carries the
      # recency weighting). The dispatch is gated on
      # RETRAIN_PLAN_ONLY=0 — the service ships with
      # RETRAIN_PLAN_ONLY=1 so the first soak only writes the JSONL
      # log; flip RETRAIN_PLAN_ONLY=0 in a drop-in once the operator
      # has eyeballed a few cycles. The variable is scoped to this
      # retrain orchestrator (NOT the deprecated DRY_RUN trading-mode
      # flag the dry-run-guard forbids). Conservative: no
      # auto-promotion past `shadow`, bounded by the trainer's
      # registry-stage ceiling.
      [Unit]
      Description=ICT drift-triggered retraining (S-MLOPT-S16)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/home/ubuntu/ict-trading-bot
      Environment=RETRAIN_PLAN_ONLY=1
      ExecStart=/bin/bash scripts/ops/run_drift_retrain.sh
      # Exit code 11 means "scan ran + dispatch fired (or would in dry-run)"
      # — a normal outcome, not a failure.
      SuccessExitStatus=11
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ict-drift-retrain.timer
    permissions: '0644'
    owner: root:root
    content: |
      # Hourly drift scan. Disabled by default at provision time;
      # Claude enables it autonomously via the trainer-vm-diag relay:
      #
      #   trainer-vm-diag-request issue body:
      #     cmd: sudo systemctl enable --now ict-drift-retrain.timer
      #
      # Hourly is conservative — ADWIN scans the head's full
      # real-time score series each pass (no incremental state on
      # disk), so cadence is purely "how often do we want to react to
      # a fresh drift?" not a memory pressure. Composes with the
      # daily ict-trainer.timer cron.
      [Unit]
      Description=Periodic ICT drift-retrain scan

      [Timer]
      OnCalendar=hourly
      RandomizedDelaySec=5min
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /etc/systemd/system/ict-trainer-publish.service
    permissions: '0644'
    owner: root:root
    content: |
      # Trainer-mirror publisher (S-AI-WS8-PART-2).
      # Builds runtime_logs/trainer_status.json and rsyncs trainer
      # artifacts to the live VM so the Streamlit dashboard has
      # transparency into trainer state. Read-only push — only JSONL
      # logs, registry, status blob, and experiment metrics.json files
      # cross. No code, no secrets, no live-trader paths touched.
      # Enabled by default at boot so the dashboard is never blind to
      # a freshly-provisioned trainer.
      [Unit]
      Description=Publish trainer mirror to live VM
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/home/ubuntu/ict-trading-bot
      ExecStart=/bin/bash scripts/ops/publish_trainer_mirror.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ict-trainer-publish.timer
    permissions: '0644'
    owner: root:root
    content: |
      # 2-minute heartbeat for the trainer-mirror publisher.
      # Keeps the dashboard's "trainer status" panel live even when
      # no training cycle is running. Persistent=true so a paused VM
      # catches up on resume.
      [Unit]
      Description=Periodic trainer mirror publish

      [Timer]
      OnBootSec=30sec
      OnUnitActiveSec=2min
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /etc/systemd/system/ict-trainer-forecast.service
    permissions: '0644'
    owner: root:root
    content: |
      # Live TSFM forecast producer (M19 Track-1, fc-head serve).
      # Regenerates runtime_logs/trainer_mirror/forecasts/<SYMBOL>.json via
      # scripts/ml/publish_live_forecasts.py; the publish timer mirrors them to
      # the live VM where forecast_live.py serves the fc_* row to the shadow /
      # per-bar regime scorer. Produces only; publish mirrors.
      [Unit]
      Description=Produce live TSFM forecast-serve artifacts (fc_*)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      User=ubuntu
      WorkingDirectory=/home/ubuntu/ict-trading-bot
      Nice=10
      ExecStart=/bin/bash scripts/ops/run_forecast_producer.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ict-trainer-forecast.timer
    permissions: '0644'
    owner: root:root
    content: |
      # 15-minute cadence for the live TSFM forecast producer (the 15m bar the
      # fc head scores). Persistent=true so a paused VM catches up on resume.
      [Unit]
      Description=Periodic live TSFM forecast production

      [Timer]
      OnBootSec=90sec
      OnUnitActiveSec=15min
      Persistent=true

      [Install]
      WantedBy=timers.target

runcmd:
  # Idempotent repo clone. If the directory already exists (e.g.
  # cloud-init re-run on an image with prior state) skip the clone.
  - |
    if [ ! -d /home/ubuntu/ict-trading-bot/.git ]; then
      sudo -u ubuntu git clone \
        https://github.com/benbaichmankass/ict-trading-bot.git \
        /home/ubuntu/ict-trading-bot
    fi
  - chown -R ubuntu:ubuntu /home/ubuntu/ict-trading-bot
  # Reload systemd so the unit + timer files are discovered, but
  # do NOT enable or start ict-trainer.{service,timer} — operator
  # opt-in is the contract. The mirror-publisher timer DOES start
  # automatically so the dashboard sees the trainer immediately.
  - systemctl daemon-reload
  - systemctl enable --now ict-trainer-publish.timer || true
  # M19 Track-1: the live fc_* forecast producer (15-min cadence). Enabled by
  # default so a freshly-provisioned trainer serves forecasts immediately.
  - systemctl enable --now ict-trainer-forecast.timer || true
  # Sanity check: print Python + repo state to /var/log/cloud-init-output.log
  - python3.11 --version
  - sudo -u ubuntu sh -c "cd /home/ubuntu/ict-trading-bot && git log -1 --oneline"
  # Bootstrap the trainer venv with runtime + backtest deps so an
  # interactive backtest sweep can run immediately on a fresh
  # provision. Idempotent: re-runs are no-ops. The
  # ict-trainer.service systemd unit independently bootstraps if
  # missing (see scripts/ops/run_training_cycle.sh § Venv).
  - sudo -u ubuntu bash /home/ubuntu/ict-trading-bot/scripts/ops/trainer_bootstrap.sh || true

final_message: |
  ICT training-center VM bootstrap complete (S-AI-WS9).
  Role marker: /etc/ict-trainer-vm.role
  Repo: /home/ubuntu/ict-trading-bot
  ict-trainer.service: installed, disabled (Claude enables via diag relay).
  ict-trainer.timer:   installed, disabled (Claude enables via diag relay).
  ict-trainer-catchup.service: installed, disabled (Claude enables via diag relay; same-day resume of an interrupted cycle, see run_training_cycle.sh checkpoint/resume).
  ict-trainer-catchup.timer:   installed, disabled (Claude enables via diag relay; daily 05:00 UTC).
  ict-trainer-publish.service: installed, enabled (oneshot).
  ict-trainer-publish.timer:   installed, enabled (every 2 min).
  ict-trainer-forecast.service: installed, enabled (oneshot; M19 fc_* producer).
  ict-trainer-forecast.timer:   installed, enabled (every 15 min).
  ict-promotion-readiness.service: installed, disabled (Claude enables via diag relay).
  ict-promotion-readiness.timer:   installed, disabled (Claude enables via diag relay).
  ict-drift-retrain.service: installed, disabled (Claude enables via diag relay; RETRAIN_PLAN_ONLY=1 by default).
  ict-drift-retrain.timer:   installed, disabled (Claude enables via diag relay).
  Live trader status: this VM is NOT the live trader.
  Claude enables training autonomously via trainer-vm-diag:
    cmd: sudo systemctl enable --now ict-trainer.timer
  (Daily cadence; one umbrella cycle covers all manifests.)
