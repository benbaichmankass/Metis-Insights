# Repo-level ruff config.
#
# Added in S-045 T3a (PR #438). Two reasons:
#
# 1. Exclude `*.ipynb` from ruff. Ruff's notebook autofix re-serialises
#    every JSON cell — escaped Unicode (`→`) becomes literal
#    (`→`), markdown cells get auto-injected `"id"` fields, and the
#    diff balloons far beyond the actual lint fix. Those are not
#    behaviour-preserving for Colab consumers. Notebook hygiene is
#    its own follow-up; ruff stays out of the .ipynb tree.
#
# 2. Live-mode invariant + operator-hold paths. The S-045 sprint
#    prompt forbids touching `src/runtime/orders.py`,
#    `src/runtime/pipeline.py`, `src/runtime/trading_mode.py`,
#    `src/units/accounts/*`, `src/main.py`, `config/accounts.yaml`,
#    `deploy/*` without an operator ping-PR. Even mechanical lint
#    fixes are out of scope. We do NOT exclude these paths here
#    (we still want CI to flag any new hits on operator-hold paths
#    so the next session sees them) — fixes for the residual hits
#    in those paths are tracked as a follow-up ping-PR. See
#    `docs/sprints/sprint-045-prompt.md` § 7 "Hard guardrails".
#
# Future cleanup: when the broader rule set lands (S-045 T3i drops
# `--select` in `.github/workflows/ruff-lint.yml`), ruff will use
# its default rule set against everything not excluded here.

extend-exclude = ["*.ipynb"]

# Per-file ignores for residual hits in operator-hold paths.
# These paths cannot be edited inside this sprint per
# `docs/sprints/sprint-045-prompt.md` § 2 (operator hold list).
# Each entry below is a known mechanical fix that is waiting on a
# separate operator-approved ping-PR. Once the ping-PR lands, the
# corresponding entry in this block must be removed in the same PR.
#
# Tracking — S-045 T3i ping-PR backlog:
# - src/runtime/pipeline.py — 9 × E402 (deferred imports below
#   the matplotlib stub block; identical pattern to many test files
#   that already carry `# noqa: E402` after T3f).
# - src/units/accounts/dxtrade_client.py:40 — 1 × F401
#   (unused import).
# - src/units/accounts/integrator.py:15 + :16 — 2 × F401
#   (unused `os` + `typing.Any`).
# - src/units/accounts/prop_risk.py:29 — 1 × F401
#   (unused `datetime.time`).
# - src/units/accounts/execute.py:269 + :271 — 2 × F541
#   (`return f"rejected_too_small:no orderId in response"` /
#    `return f"rejected_too_small:breakout exchange does not
#    support live smoke yet"` — neither has placeholders).
[lint.per-file-ignores]
"src/runtime/pipeline.py" = ["E402"]
"src/units/accounts/dxtrade_client.py" = ["F401"]
"src/units/accounts/integrator.py" = ["F401"]
"src/units/accounts/prop_risk.py" = ["F401"]
"src/units/accounts/execute.py" = ["F541"]
